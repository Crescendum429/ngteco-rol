<script type="text/babel" data-file="inventario.jsx">

// Inventario — Materia Prima + Producto Terminado + Movimientos
// Sistema de stock con mínimos, alertas, reservas y CRUD de movimientos

function Inventario() {
  const [tab, setTab] = useState('resumen');

  const tabs = [
    { k: 'resumen', l: 'Resumen',           ico: 'chart' },
    { k: 'mp',      l: 'Materia prima',     ico: 'flask' },
    { k: 'pt',      l: 'Producto terminado', ico: 'package' },
    { k: 'mov',     l: 'Movimientos',       ico: 'activity' },
  ];

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Inventario</Eyebrow>
          <h1 className="page-title">Inventario <em>en tiempo real</em></h1>
          <div className="page-sub">Stock de materia prima y producto terminado, con trazabilidad por movimientos.</div>
        </div>
        <div className="row">
          <Btn variant="ghost" onClick={() => {
            const mp = (window.INVENTARIO_MP_MOCK || []).map(m => {
              const def = (window.MATERIALES_MOCK || []).find(x => x.id === m.id);
              return { tipo: 'MP', id: m.id, nombre: def?.nombre || m.id, stock: m.stock_kg, unidad: 'kg', minimo: m.minimo_kg, costo_prom: m.costo_prom_kg };
            });
            const pt = (window.INVENTARIO_PT_MOCK || []).map(p => {
              const def = (window.PRODUCTOS_MOCK || []).find(x => x.id === p.prod_id);
              return { tipo: 'PT', id: p.prod_id, nombre: def?.nombre || p.prod_id, stock: p.stock_cajas, unidad: 'cajas', minimo: p.minimo_cajas, reservado: p.reservado };
            });
            window.solpExportCSV(`inventario_${new Date().toISOString().slice(0,10)}.csv`, ['tipo','id','nombre','stock','unidad','minimo','reservado','costo_prom'], [...mp, ...pt]);
          }}><Icon name="download" size={14}/> Exportar</Btn>
          <Btn variant="primary" onClick={() => {
            const fecha = prompt('Fecha (YYYY-MM-DD):', new Date().toISOString().slice(0,10));
            if (!fecha) return;
            const clase = (prompt('Clase (mp / pt / pieza):', 'mp') || '').toLowerCase();
            if (!['mp','pt','pieza'].includes(clase)) return;
            const tipo = (prompt('Tipo (entrada / salida / ajuste):', 'entrada') || '').toLowerCase();
            if (!['entrada','salida','ajuste','consumo','produccion'].includes(tipo)) return;
            const item_id = prompt('ID del item:');
            if (!item_id) return;
            const cantidad = parseFloat(prompt('Cantidad:'));
            if (isNaN(cantidad)) return;
            const nota = prompt('Nota (opcional):', '') || '';
            const movs = window.MOV_INVENTARIO_MOCK || [];
            const id = (movs.reduce((m, x) => Math.max(m, Number(x.id) || 0), 0)) + 1;
            const unidad = clase === 'mp' ? 'kg' : clase === 'pt' ? 'cajas' : 'unidades';
            const next = [{ id, fecha, tipo, clase, item_id, cantidad, unidad, ref: 'manual', nota }, ...movs];
            window.MOV_INVENTARIO_MOCK = next;
            if (window._api?.saveCollection) window._api.saveCollection('movimientos_inventario', next);
            window.solpToast(`Movimiento ${id} registrado.`);
          }}><Icon name="plus" size={14}/> Nuevo movimiento</Btn>
        </div>
      </div>

      <div className="tab-bar">
        {tabs.map(t => (
          <button key={t.k} className={`tab ${tab === t.k ? 'on' : ''}`} onClick={() => setTab(t.k)}>
            <Icon name={t.ico} size={13}/> {t.l}
          </button>
        ))}
      </div>

      {tab === 'resumen' && <InvResumen />}
      {tab === 'mp'      && <InvMateriaPrima />}
      {tab === 'pt'      && <InvProductoTerminado />}
      {tab === 'mov'     && <InvMovimientos />}
    </div>
  );
}

// ═══════════════════════ Resumen ═══════════════════════
function InvResumen() {
  const mpBajos = INVENTARIO_MP_MOCK.filter(x => x.stock_kg <= x.minimo_kg);
  const ptBajos = INVENTARIO_PT_MOCK.filter(x => (x.stock_cajas - x.reservado) <= x.minimo_cajas);
  const totalKg = INVENTARIO_MP_MOCK.reduce((a, x) => a + x.stock_kg, 0);
  const totalCajas = INVENTARIO_PT_MOCK.reduce((a, x) => a + x.stock_cajas, 0);
  const valorMP = INVENTARIO_MP_MOCK.reduce((a, x) => a + x.stock_kg * x.costo_prom_kg, 0);
  const valorPT = INVENTARIO_PT_MOCK.reduce((a, x) => {
    const p = PRODUCTOS_MOCK.find(q => q.id === x.prod_id);
    return a + x.stock_cajas * (p?.costo_caja || 0);
  }, 0);

  return (
    <>
      <div className="kpi-grid" style={{ marginBottom: 18 }}>
        <Kpi label="Materia prima"    icon="flask"   value={`${fmtNum(totalKg)} kg`} delta={fmtMoney(valorMP)} />
        <Kpi label="Producto terminado" icon="package" value={`${totalCajas} cajas`} delta={fmtMoney(valorPT)} />
        <Kpi label="Alertas MP"       icon="alert"   value={`${mpBajos.length}`} accent={mpBajos.length ? 'var(--bad)' : 'var(--good)'} />
        <Kpi label="Alertas PT"       icon="alert"   value={`${ptBajos.length}`} accent={ptBajos.length ? 'var(--warn)' : 'var(--good)'} />
      </div>

      {(mpBajos.length > 0 || ptBajos.length > 0) && (
        <div className="panel panel-flush" style={{ marginBottom: 18 }}>
          <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}>
            <PanelHead title="Alertas de stock bajo" sub="Items por debajo del mínimo" />
          </div>
          {mpBajos.map(m => {
            const mat = MATERIALES_MOCK.find(x => x.id === m.id);
            return (
              <div key={m.id} className="list-row">
                <div className="ico" style={{ background: 'var(--bad-soft)', color: 'var(--bad)' }}>
                  <Icon name="flask" size={14}/>
                </div>
                <div className="body">
                  <div className="ttl">{mat?.nombre}</div>
                  <div className="cap">{fmtNum(m.stock_kg)} kg · mínimo {m.minimo_kg} kg</div>
                </div>
                <Chip tone="bad">Bajo mínimo</Chip>
              </div>
            );
          })}
          {ptBajos.map(p => {
            const prod = PRODUCTOS_MOCK.find(x => x.id === p.prod_id);
            const disp = p.stock_cajas - p.reservado;
            return (
              <div key={p.prod_id} className="list-row">
                <div className="ico" style={{ background: 'var(--warn-soft)', color: 'var(--warn)' }}>
                  <Icon name="package" size={14}/>
                </div>
                <div className="body">
                  <div className="ttl">{prod?.nombre}</div>
                  <div className="cap">Disponible {disp} cajas · mínimo {p.minimo_cajas} · reservadas {p.reservado}</div>
                </div>
                <Chip tone="warn">Revisar</Chip>
              </div>
            );
          })}
        </div>
      )}

      <div className="cols-2" style={{ gap: 18 }}>
        <div className="panel panel-flush">
          <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}>
            <PanelHead title="Materia prima" sub="Stock actual vs. mínimo" />
          </div>
          <div style={{ padding: 14 }}>
            {INVENTARIO_MP_MOCK.map(m => {
              const mat = MATERIALES_MOCK.find(x => x.id === m.id);
              const pct = Math.min(100, (m.stock_kg / (m.minimo_kg * 2)) * 100);
              const tone = m.stock_kg <= m.minimo_kg ? 'var(--bad)' : m.stock_kg <= m.minimo_kg * 1.5 ? 'var(--warn)' : 'var(--good)';
              return (
                <div key={m.id} style={{ marginBottom: 14 }}>
                  <div className="row" style={{ justifyContent: 'space-between', marginBottom: 5 }}>
                    <span style={{ fontSize: 13, fontWeight: 500 }}>{mat?.nombre}</span>
                    <span className="mono xs">{fmtNum(m.stock_kg)} kg</span>
                  </div>
                  <div style={{ height: 6, background: 'var(--bg-raised)', borderRadius: 3, overflow: 'hidden', position: 'relative' }}>
                    <div style={{ height: '100%', width: `${pct}%`, background: tone, transition: 'width .3s' }}/>
                    <div style={{ position: 'absolute', left: `${(m.minimo_kg / (m.minimo_kg * 2)) * 100}%`, top: -2, width: 1, height: 10, background: 'var(--text)', opacity: 0.4 }}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="panel panel-flush">
          <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}>
            <PanelHead title="Producto terminado" sub="Cajas disponibles (no reservadas)" />
          </div>
          <div style={{ padding: 14 }}>
            {INVENTARIO_PT_MOCK.map(p => {
              const prod = PRODUCTOS_MOCK.find(x => x.id === p.prod_id);
              const disp = p.stock_cajas - p.reservado;
              const tone = disp <= p.minimo_cajas ? 'var(--warn)' : 'var(--good)';
              return (
                <div key={p.prod_id} className="row" style={{ justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid var(--line)' }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 500 }}>{prod?.nombre}</div>
                    <div className="xs mute">mín {p.minimo_cajas} · reservadas {p.reservado}</div>
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <div className="mono" style={{ fontWeight: 600, color: tone }}>{disp}</div>
                    <div className="xs mute">de {p.stock_cajas} cajas</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </>
  );
}

// ═══════════════════════ Materia Prima ═══════════════════════
function InvMateriaPrima() {
  return (
    <div className="panel panel-flush">
      <table className="tbl tbl-hover">
        <thead>
          <tr><th>Material</th><th className="num">Stock (kg)</th><th className="num">Mínimo</th><th className="num">Costo/kg</th><th className="num">Valor total</th><th>Última entrada</th><th>Estado</th></tr>
        </thead>
        <tbody>
          {INVENTARIO_MP_MOCK.map(m => {
            const mat = MATERIALES_MOCK.find(x => x.id === m.id);
            const bajo = m.stock_kg <= m.minimo_kg;
            const alerta = m.stock_kg <= m.minimo_kg * 1.5;
            return (
              <tr key={m.id}>
                <td>
                  <div className="row" style={{ gap: 8 }}>
                    <div style={{ width: 10, height: 10, borderRadius: '50%', background: mat?.color }}/>
                    <div style={{ fontWeight: 600 }}>{mat?.nombre}</div>
                  </div>
                </td>
                <td className="num mono">{fmtNum(m.stock_kg)}</td>
                <td className="num mono xs mute">{m.minimo_kg}</td>
                <td className="num mono">{fmtMoney(m.costo_prom_kg)}</td>
                <td className="num mono">{fmtMoney(m.stock_kg * m.costo_prom_kg)}</td>
                <td className="mono xs">{m.ultima_entrada}</td>
                <td>{bajo ? <Chip tone="bad">Bajo mínimo</Chip> : alerta ? <Chip tone="warn">Cercano</Chip> : <Chip tone="good">OK</Chip>}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ═══════════════════════ Producto Terminado ═══════════════════════
function InvProductoTerminado() {
  return (
    <div className="panel panel-flush">
      <table className="tbl tbl-hover">
        <thead>
          <tr><th>Producto</th><th className="num">Stock</th><th className="num">Reservadas</th><th className="num">Disponible</th><th className="num">Mínimo</th><th className="num">Valor</th><th>Estado</th></tr>
        </thead>
        <tbody>
          {INVENTARIO_PT_MOCK.map(p => {
            const prod = PRODUCTOS_MOCK.find(x => x.id === p.prod_id);
            const disp = p.stock_cajas - p.reservado;
            const bajo = disp <= p.minimo_cajas;
            const valor = p.stock_cajas * (prod?.costo_caja || 0);
            return (
              <tr key={p.prod_id}>
                <td>
                  <div style={{ fontWeight: 600 }}>{prod?.nombre}</div>
                  <div className="xs mute">{prod?.unidades_caja} unid/caja</div>
                </td>
                <td className="num mono">{p.stock_cajas}</td>
                <td className="num mono xs mute">{p.reservado || '—'}</td>
                <td className="num mono" style={{ color: bajo ? 'var(--warn)' : 'inherit', fontWeight: bajo ? 600 : 400 }}>{disp}</td>
                <td className="num mono xs mute">{p.minimo_cajas}</td>
                <td className="num mono">{fmtMoney(valor)}</td>
                <td>{bajo ? <Chip tone="warn">Revisar</Chip> : <Chip tone="good">OK</Chip>}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ═══════════════════════ Movimientos ═══════════════════════
function InvMovimientos() {
  const [filtro, setFiltro] = useState('todos');
  const items = MOV_INVENTARIO_MOCK.filter(m => filtro === 'todos' || m.tipo === filtro)
    .slice().sort((a, b) => b.fecha.localeCompare(a.fecha));

  const tipoConfig = {
    entrada:    { t: 'good',    ico: 'arrow_r', l: 'Entrada' },
    salida:     { t: 'bad',     ico: 'arrow_r', l: 'Salida' },
    produccion: { t: 'info',    ico: 'box',     l: 'Producción' },
    ajuste:     { t: 'default', ico: 'edit',    l: 'Ajuste' },
    reserva:    { t: 'accent',  ico: 'clock',   l: 'Reserva' },
  };

  return (
    <>
      <div className="panel" style={{ marginBottom: 14 }}>
        <Seg value={filtro} onChange={setFiltro} options={[
          { value: 'todos',      label: `Todos (${MOV_INVENTARIO_MOCK.length})` },
          { value: 'entrada',    label: 'Entradas' },
          { value: 'salida',     label: 'Salidas' },
          { value: 'produccion', label: 'Producción' },
          { value: 'ajuste',     label: 'Ajustes' },
          { value: 'reserva',    label: 'Reservas' },
        ]} />
      </div>

      <div className="panel panel-flush">
        <table className="tbl">
          <thead>
            <tr><th>Fecha</th><th>Tipo</th><th>Item</th><th className="num">Cantidad</th><th>Referencia</th><th>Nota</th></tr>
          </thead>
          <tbody>
            {items.map(m => {
              const cfg = tipoConfig[m.tipo] || tipoConfig.ajuste;
              const item = m.clase === 'mp'
                ? MATERIALES_MOCK.find(x => x.id === m.item_id)
                : PRODUCTOS_MOCK.find(x => x.id === m.item_id);
              const isNeg = m.tipo === 'salida';
              return (
                <tr key={m.id}>
                  <td className="mono xs">{m.fecha}</td>
                  <td><Chip tone={cfg.t}>{cfg.l}</Chip></td>
                  <td>
                    <div style={{ fontWeight: 500 }}>{item?.nombre || m.item_id}</div>
                    <div className="xs mute">{m.clase === 'mp' ? 'Materia prima' : 'Producto terminado'}</div>
                  </td>
                  <td className="num mono" style={{ color: isNeg ? 'var(--bad)' : 'inherit' }}>
                    {isNeg ? '−' : '+'}{fmtNum(m.cantidad)} <span className="xs mute">{m.unidad}</span>
                  </td>
                  <td className="mono xs">{m.ref || '—'}</td>
                  <td className="xs">{m.nota}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </>
  );
}

Object.assign(window, { Inventario });

</script>

<script type="text/babel" data-file="pedidos.jsx">

// Pedidos — Cotizaciones, OC, Facturas (SRI), Guías, Certificados
// Flujo: Cotización → Orden de compra → Factura electrónica + Guía remisión + Certificado calidad

function Pedidos() {
  const [tab, setTab] = useState('pipeline');
  const [sel, setSel] = useState(null); // { kind, id }
  const [showWizard, setShowWizard] = useState(false);

  const tabs = [
    { k: 'pipeline', l: 'Pipeline',     ico: 'activity' },
    { k: 'cot',      l: 'Cotizaciones', ico: 'doc' },
    { k: 'oc',       l: 'Órdenes',      ico: 'box' },
    { k: 'fact',     l: 'Facturas',     ico: 'receipt' },
    { k: 'guia',     l: 'Guías',        ico: 'truck' },
    { k: 'cert',     l: 'Certificados', ico: 'check' },
  ];

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Gestión de pedidos</Eyebrow>
          <h1 className="page-title">Pedidos <em>& facturación</em></h1>
          <div className="page-sub">Del pedido de cotización a la entrega con factura electrónica SRI.</div>
        </div>
        <div className="row">
          <Btn variant="ghost" onClick={() => {
            const all = [
              ...(window.COTIZACIONES_MOCK || []).map(c => ({ tipo: 'COT', id: c.id, cliente: c.cliente, fecha: c.fecha, estado: c.estado, total: (c.items || []).reduce((s, i) => s + (i.cant_cajas||0)*(i.precio_caja||0), 0) })),
              ...(window.ORDENES_COMPRA_MOCK || []).map(o => ({ tipo: 'OC', id: o.id, cliente: o.cliente, fecha: o.fecha_recepcion, estado: o.estado, total: (o.items || []).reduce((s, i) => s + (i.cant_cajas||0)*(i.precio_caja||0), 0) })),
              ...(window.FACTURAS_MOCK || []).map(f => ({ tipo: 'FAC', id: f.id, cliente: f.cliente, fecha: f.fecha_emision, estado: f.estado_sri, total: f.total })),
            ];

// ═══════════════════════ Pipeline Overview ═══════════════════════
function PedidosPipeline({ onOpen }) {
  const cots = COTIZACIONES_MOCK;
  const ocs  = ORDENES_COMPRA_MOCK;
  const facts = FACTURAS_MOCK;

  const pendientes = cots.filter(c => c.estado === 'enviada' || c.estado === 'borrador').length;
  const aprobadas  = cots.filter(c => c.estado === 'aprobada').length;
  const enProd     = ocs.filter(o => o.estado === 'en_produccion' || o.estado === 'pendiente').length;
  const porFacturar = ocs.filter(o => o.estado === 'lista' && !o.factura_asociada).length;
  const porPagar    = facts.filter(f => !f.pagada && f.estado_sri === 'autorizada').length;
  const montoPorPagar = facts.filter(f => !f.pagada).reduce((a, f) => a + f.total, 0);

  // Recordatorios: OCs con entrega en <5 días y no están listas
  const hoy = new Date('2026-04-22');
  const recordatorios = ocs.filter(o => o.estado !== 'entregada').map(o => {
    const diff = Math.ceil((new Date(o.fecha_entrega) - hoy) / 86400000);
    return { ...o, dias: diff };
  }).sort((a, b) => a.dias - b.dias);

  return (
    <>
      <div className="kpi-grid" style={{ marginBottom: 18 }}>
        <Kpi label="Cotizaciones en proceso" icon="doc"  value={`${pendientes}`} delta={`${aprobadas} aprobadas por convertir`} />
        <Kpi label="Órdenes en producción"   icon="box"  value={`${enProd}`} accent="var(--info)" />
        <Kpi label="Por facturar"            icon="receipt" value={`${porFacturar}`} accent="var(--warn)" />
        <Kpi label="Por cobrar"              icon="dollar"  value={fmtMoney(montoPorPagar)} delta={`${porPagar} facturas pendientes`} accent="var(--bad)" />
      </div>

      <div className="cols-2" style={{ gap: 18 }}>
        <div className="panel panel-flush">
          <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}>
            <PanelHead title="Próximas entregas" sub="Órdenes con fecha de entrega comprometida" />
          </div>
          {recordatorios.length === 0 && <div style={{ padding: 30, textAlign: 'center', color: 'var(--text-dim)' }}>Ninguna entrega pendiente.</div>}
          {recordatorios.map(r => {
            const cli = CLIENTES_MOCK.find(c => c.id === r.cliente);
            const urgencia = r.dias < 0 ? 'atraso' : r.dias < 3 ? 'urgente' : r.dias < 7 ? 'proximo' : 'normal';
            return (
              <button key={r.id} className="list-row" onClick={() => onOpen('oc', r.id)}
                style={{ width: '100%', textAlign: 'left', background: 'transparent', border: 0, cursor: 'pointer', color: 'var(--text)' }}>
                <div className={`reminder-pill ${urgencia}`}>
                  <strong>{r.dias < 0 ? `+${-r.dias}d` : r.dias === 0 ? 'HOY' : `${r.dias}d`}</strong>
                  <span className="xs">{r.dias < 0 ? 'atraso' : 'restante'}</span>
                </div>
                <div className="body">
                  <div className="ttl">{r.id} · {cli?.razon_social || r.cliente}</div>
                  <div className="cap">Entrega {r.fecha_entrega} · {r.items.length} productos · estado: {r.estado}</div>
                </div>
                <Icon name="arrow_r" size={14} className="mute" />
              </button>
            );
          })}
        </div>

        <div className="panel panel-flush">
          <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}>
            <PanelHead title="Flujo del pedido" sub="Etapas del proceso comercial" />
          </div>
          <div style={{ padding: 18 }}>
            <FlowDiagram />
          </div>
        </div>
      </div>

      <div className="panel panel-flush" style={{ marginTop: 18 }}>
        <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}>
          <PanelHead title="Actividad reciente" sub="Últimos movimientos en el módulo" />
        </div>
        {[
          { fecha: '2026-04-22', txt: 'Factura FAC-001-001-000001234 autorizada por SRI', ico: 'check', tone: 'good' },
          { fecha: '2026-04-22', txt: 'Guía GR-001-001-000000892 emitida para Life', ico: 'truck', tone: 'info' },
          { fecha: '2026-04-18', txt: 'OC-FA-20260418 (Farmayala) ingresó a producción', ico: 'box', tone: 'info' },
          { fecha: '2026-04-17', txt: 'Cotización COT-2026-0043 enviada a Life', ico: 'doc', tone: 'default' },
          { fecha: '2026-04-15', txt: 'Cotización COT-2026-0042 aprobada por Farmayala', ico: 'check', tone: 'good' },
        ].map((a, i) => (
          <div key={i} className="list-row">
            <div className="ico" style={{ background: a.tone === 'good' ? 'var(--good-soft)' : a.tone === 'info' ? 'var(--info-soft)' : 'var(--accent-soft)',
              color: a.tone === 'good' ? 'var(--good)' : a.tone === 'info' ? 'var(--info)' : 'var(--accent-hi)' }}>
              <Icon name={a.ico} size={14}/>
            </div>
            <div className="body">
              <div className="ttl">{a.txt}</div>
              <div className="cap">{a.fecha}</div>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

function FlowDiagram() {
  const stages = [
    { k: 'cot',  l: 'Cotización',  c: 'var(--accent)' },
    { k: 'oc',   l: 'Orden compra', c: 'var(--info)' },
    { k: 'prod', l: 'Producción',  c: 'var(--warn)' },
    { k: 'fact', l: 'Factura SRI', c: 'var(--good)' },
    { k: 'ent',  l: 'Entrega + Cert.', c: 'var(--accent-hi)' },
  ];
  return (
    <div className="flow">
      {stages.map((s, i) => (
        <React.Fragment key={s.k}>
          <div className="flow-node">
            <div className="flow-bubble" style={{ background: s.c, color: 'var(--bg)' }}>{i + 1}</div>
            <div className="flow-label">{s.l}</div>
          </div>
          {i < stages.length - 1 && <div className="flow-arrow">→</div>}
        </React.Fragment>
      ))}
    </div>
  );
}

// ═══════════════════════ Helpers ═══════════════════════
function cliente(id) { return CLIENTES_MOCK.find(c => c.id === id); }
function producto(id) { return PRODUCTOS_MOCK.find(p => p.id === id); }

function EstadoChip({ estado, kind }) {
  const colores = {
    borrador:   { t: 'default',  l: 'Borrador' },
    enviada:    { t: 'accent',  l: 'Enviada' },
    aprobada:   { t: 'good',    l: 'Aprobada' },
    convertida: { t: 'good',    l: 'Convertida' },
    rechazada:  { t: 'bad',     l: 'Rechazada' },
    pendiente:      { t: 'default', l: 'Pendiente' },
    en_produccion:  { t: 'info',    l: 'En producción' },
    lista:          { t: 'accent',  l: 'Lista' },
    facturada:      { t: 'good',    l: 'Facturada' },
    entregada:      { t: 'good',    l: 'Entregada' },
    firmada:        { t: 'default', l: 'Firmada' },
    autorizada:     { t: 'good',    l: 'Autorizada SRI' },
  };
  const cfg = colores[estado] || { t: 'default', l: estado };
  return <Chip tone={cfg.t}>{cfg.l}</Chip>;
}

function calcTotal(items, campo = 'precio_caja') {
  return items.reduce((a, i) => a + (i.cant_cajas || 0) * (i[campo] || 0), 0);
}

function OCProgress({ estado }) {
  const etapas = ['pendiente','en_produccion','lista','facturada','entregada'];
  const labels = { pendiente:'Recibida', en_produccion:'Producción', lista:'Lista', facturada:'Facturada', entregada:'Entregada' };
  const idx = etapas.indexOf(estado);
  return (
    <div className="progress-stepper">
      {etapas.map((e, i) => (
        <React.Fragment key={e}>
          <div className={`ps-node ${i <= idx ? 'done' : ''} ${i === idx ? 'current' : ''}`}>
            <div className="ps-dot">{i <= idx ? <Icon name="check" size={11}/> : i + 1}</div>
            <div className="ps-lbl">{labels[e]}</div>
          </div>
          {i < etapas.length - 1 && <div className={`ps-line ${i < idx ? 'done' : ''}`}></div>}
        </React.Fragment>
      ))}
    </div>
  );
}

<script type="text/babel" data-file="clientes.jsx">

// Clientes — CRUD completo con datos fiscales, dir matriz + sucursal, contacto, crédito.
// Base para emitir facturas electrónicas y guías de remisión SRI.

function Clientes() {
  const [clientes, setClientes] = useState(CLIENTES_MOCK);
  const [q, setQ] = useState('');
  const [sel, setSel] = useState(null); // cliente.id
  const [modo, setModo] = useState('ver'); // ver | editar | nuevo
  const [draft, setDraft] = useState(null);

  const filtered = clientes.filter(c => {
    if (!q) return true;
    const s = q.toLowerCase();
    return (c.razon_social || '').toLowerCase().includes(s)
        || (c.nombre_comercial || '').toLowerCase().includes(s)
        || (c.ruc || '').includes(s);
  });

  const current = clientes.find(c => c.id === sel);

  const abrir = (id) => { setSel(id); setModo('ver'); setDraft(null); };
  const editar = () => { setDraft(JSON.parse(JSON.stringify(current))); setModo('editar'); };
  const nuevo = () => {
    const blank = {
      id: `cli-${Date.now().toString(36)}`,
      razon_social: '', nombre_comercial: '', ruc: '', tipo: 'Sociedad', obligado_contabilidad: true,
      email_fact: '', email_contacto: '', telefono: '', celular: '',
      contacto_nombre: '', contacto_cargo: '',
      dir_matriz:   { calle: '', numero: '', interseccion: '', ciudad: '', referencia: '' },
      dir_sucursal: { calle: '', numero: '', interseccion: '', ciudad: '', referencia: '' },
      credito_dias: 30, credito_limite: 0,
      agente_retencion: false, resolucion_retencion: '',
      notas: '',
    };
    setDraft(blank); setSel(null); setModo('nuevo');
  };
  const cancelar = () => { setModo('ver'); setDraft(null); };
  const persistir = async (lista) => {
    window.CLIENTES_MOCK = lista;
    if (window._api?.saveCollection) await window._api.saveCollection('clientes', lista);
  };
  const guardar = async () => {
    let lista;
    if (modo === 'nuevo') {
      lista = [draft, ...clientes];
      setClientes(lista);
      setSel(draft.id);
    } else {
      lista = clientes.map(c => c.id === draft.id ? draft : c);
      setClientes(lista);
    }
    await persistir(lista);
    setModo('ver');
    setDraft(null);
  };
  const eliminar = async () => {
    if (!current) return;
    if (!await window.solpConfirm(`Eliminar a "${current.razon_social}"? Las facturas y cotizaciones asociadas se conservan.`)) return;
    const lista = clientes.filter(c => c.id !== current.id);
    setClientes(lista);
    await persistir(lista);
    setSel(null);
  };

  // Stats del cliente seleccionado
  const stats = current ? (() => {
    const cots = COTIZACIONES_MOCK.filter(c => c.cliente === current.id);
    const ocs  = ORDENES_COMPRA_MOCK.filter(o => o.cliente === current.id);
    const facts = FACTURAS_MOCK.filter(f => f.cliente === current.id);
    const pendientes = facts.filter(f => !f.pagada).reduce((a, f) => a + (f.total || 0), 0);
    const facturado = facts.reduce((a, f) => a + (f.total || 0), 0);
    return { cots, ocs, facts, pendientes, facturado };
  })() : null;

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Gestión comercial</Eyebrow>
          <h1 className="page-title">Clientes</h1>
          <div className="page-sub">Datos fiscales completos para facturación electrónica SRI.</div>
        </div>
        <div className="row">
          <Btn variant="ghost" onClick={() => {
            const rows = (window.CLIENTES_MOCK || []).map(c => ({
              id: c.id, razon_social: c.razon_social, nombre_comercial: c.nombre_comercial,
              ruc: c.ruc, email_fact: c.email_fact, email_contacto: c.email_contacto,
              telefono: c.telefono, celular: c.celular, contacto: c.contacto_nombre,
              credito_dias: c.credito_dias, credito_limite: c.credito_limite,
              agente_retencion: c.agente_retencion ? 'sí' : 'no',
            }));
            window.solpExportCSV(`clientes_${new Date().toISOString().slice(0,10)}.csv`, ['id','razon_social','nombre_comercial','ruc','email_fact','email_contacto','telefono','celular','contacto','credito_dias','credito_limite','agente_retencion'], rows);
          }}><Icon name="download" size={14}/> Exportar CSV</Btn>
          <Btn variant="primary" onClick={nuevo}><Icon name="plus" size={14}/> Nuevo cliente</Btn>
        </div>
      </div>

      <div className="cli-layout">
        {/* Lista izquierda */}
        <div className="cli-list panel panel-flush">
          <div style={{ padding: 14, borderBottom: '1px solid var(--line)' }}>
            <div className="search-box">
              <Icon name="search" size={14}/>
              <input placeholder="Buscar por razón social, RUC, nombre comercial…" value={q} onChange={e => setQ(e.target.value)} />
            </div>
            <div className="xs mute" style={{ marginTop: 8 }}>{filtered.length} de {clientes.length} clientes</div>
          </div>
          <div className="cli-list-items">
            {filtered.map(c => {
              const activa = c.id === sel;
              const facts = FACTURAS_MOCK.filter(f => f.cliente === c.id);
              const pend = facts.filter(f => !f.pagada).length;
              return (
                <button key={c.id} className={`cli-item ${activa ? 'active' : ''}`} onClick={() => abrir(c.id)}>
                  <div className="cli-item-avatar" aria-hidden>
                    {(c.nombre_comercial || c.razon_social).charAt(0).toUpperCase()}
                  </div>
                  <div className="cli-item-body">
                    <div className="cli-item-name">{c.nombre_comercial || c.razon_social}</div>
                    <div className="cli-item-meta">
                      <span className="mono">{c.ruc}</span>
                      {pend > 0 && <span className="cli-pill-warn">{pend} por cobrar</span>}
                    </div>
                  </div>
                </button>
              );
            })}
            {filtered.length === 0 && (
              <div style={{ padding: 30, textAlign: 'center', color: 'var(--text-mute)', fontSize: 12.5 }}>
                Ningún cliente coincide con "{q}".
              </div>
            )}
          </div>
        </div>

        {/* Detalle derecho */}
        <div className="cli-detail">
          {!current && modo !== 'nuevo' && (
            <div className="panel" style={{ textAlign: 'center', padding: '60px 30px' }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}><Icon name="users" size={40} /></div>
              <div style={{ fontFamily: 'var(--serif)', fontSize: 22 }}>Seleccione un cliente</div>
              <div className="xs mute" style={{ marginTop: 8 }}>o cree uno nuevo para empezar.</div>
              <div style={{ marginTop: 16 }}>
                <Btn variant="primary" onClick={nuevo}><Icon name="plus" size={14}/> Nuevo cliente</Btn>
              </div>
            </div>
          )}

          {modo === 'ver' && current && <ClienteVer cliente={current} stats={stats} onEdit={editar} onDelete={eliminar} />}
          {(modo === 'editar' || modo === 'nuevo') && draft && (
            <ClienteEditor
              draft={draft}
              setDraft={setDraft}
              esNuevo={modo === 'nuevo'}
              onCancel={cancelar}
              onSave={guardar}
            />
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════ Ver Cliente ═══════════════════════
function ClienteVer({ cliente, stats, onEdit, onDelete }) {
  return (
    <div>
      {/* Header */}
      <div className="panel" style={{ padding: 22 }}>
        <div className="row" style={{ justifyContent: 'space-between', alignItems: 'flex-start', gap: 16 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <Eyebrow>{cliente.tipo || 'Sociedad'} · {cliente.obligado_contabilidad ? 'Obligada a llevar contabilidad' : 'No obligada'}</Eyebrow>
            <h2 style={{ fontFamily: 'var(--serif)', fontSize: 28, letterSpacing: '-0.01em', marginTop: 6 }}>
              {cliente.razon_social}
            </h2>
            {cliente.nombre_comercial && cliente.nombre_comercial !== cliente.razon_social && (
              <div className="xs mute" style={{ marginTop: 2 }}>Nombre comercial: {cliente.nombre_comercial}</div>
            )}
            <div className="mono" style={{ marginTop: 8, fontSize: 13 }}>RUC: {cliente.ruc}</div>
          </div>
          <div className="row">
            <Btn variant="ghost" onClick={onDelete}><Icon name="trash" size={13}/> Eliminar</Btn>
            <Btn variant="primary" onClick={onEdit}><Icon name="edit" size={13}/> Editar</Btn>
          </div>
        </div>

function DocModal({ onClose, children, title, actions }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [onClose]);

  const handlePrint = () => {
    const doc = document.querySelector('.doc-page');
    if (!doc) return window.print();
    // Print just the page via window.print; .doc-modal-chrome hides in print.
    window.print();
  };

  return (
    <div className="doc-overlay" onClick={(e) => { if (e.target.classList.contains('doc-overlay')) onClose(); }}>
      <div className="doc-modal-chrome">
        <div className="doc-modal-head">
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <Btn variant="ghost" size="sm" onClick={onClose}><Icon name="x" size={14}/></Btn>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 16, letterSpacing: '-0.01em' }}>{title}</div>
          </div>
          <div className="row">
            {actions}
            <Btn variant="ghost" size="sm" onClick={handlePrint}><Icon name="download" size={13}/> Imprimir / PDF</Btn>
          </div>
        </div>
        <div className="doc-scroll">
          {children}
        </div>
      </div>
    </div>
  );
}

// Edit-in-place helper. Click to convert to input, blur to save.
function Editable({ value, onChange, className = '', multiline = false, placeholder = '' }) {
  const [editing, setEditing] = useState(false);
  const [tmp, setTmp] = useState(value);
  useEffect(() => { setTmp(value); }, [value]);
  if (!editing) {
    return (
      <span className={`doc-editable ${className}`} onClick={() => setEditing(true)} title="Click para editar">
        {value || <span className="doc-placeholder">{placeholder || '—'}</span>}
      </span>
    );
  }
  const commit = () => { setEditing(false); if (tmp !== value) onChange(tmp); };
  const Tag = multiline ? 'textarea' : 'input';
  return (
    <Tag
      className={`doc-editable-input ${className}`}
      value={tmp}
      autoFocus
      rows={multiline ? 3 : undefined}
      onChange={(e) => setTmp(e.target.value)}
      onBlur={commit}
      onKeyDown={(e) => {
        if (e.key === 'Enter' && !multiline) { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { setEditing(false); setTmp(value); }
      }}
    />
  );
}

// Simulated clave-de-acceso barcode (pure SVG stripes, just decorative)
function ClaveBars({ clave }) {
  if (!clave) return null;
  const seed = clave.length;
  const bars = Array.from({ length: 60 }).map((_, i) => {
    const w = ((seed * (i + 1)) % 7) < 3 ? 1 : 2;
    const black = ((seed * 7 + i * 3) % 5) < 3;
    return { w, black };
  });
  let x = 0;
  return (
    <svg viewBox="0 0 200 30" width="100%" height="24" style={{ marginTop: 4 }}>
      {bars.map((b, i) => {
        const el = <rect key={i} x={x} y={0} width={b.w} height={30} fill={b.black ? '#000' : 'transparent'} />;
        x += b.w + 0.6;
        return el;
      })}
    </svg>
  );
}

// Templates por tipo de producto — se alimenta del kind + nombre
function getCertTemplate(prod) {
  if (!prod) return [];
  const kind = prod.kind;
  if (kind === 'vaso') {
    return [
      { parametro: 'Capacidad nominal',    especificacion: '30 mL ± 2%',             metodo: 'Inspección volumétrica',        resultado: '30.2 mL' },
      { parametro: 'Peso por unidad',      especificacion: `${prod.peso_g}g ± 5%`,   metodo: 'Balanza analítica',             resultado: `${prod.peso_g.toFixed(3)}g` },
      { parametro: 'Espesor de pared',     especificacion: '0.30 – 0.40 mm',         metodo: 'Micrómetro calibrado',          resultado: '0.34 mm' },
      { parametro: 'Transparencia',        especificacion: 'Cristalino, sin turbidez', metodo: 'Inspección visual ISO 9001',  resultado: 'Conforme' },
      { parametro: 'Hermeticidad',         especificacion: 'Sin fuga en 24h',        metodo: 'Prueba de inmersión',           resultado: 'Conforme' },
      { parametro: 'Material',             especificacion: prod.material,            metodo: 'FTIR / hoja técnica',           resultado: 'Conforme' },
    ];
  }
  if (kind === 'jeringa') {
    return [
      { parametro: 'Capacidad dosificadora', especificacion: '5 mL ± 0.1 mL',        metodo: 'Calibración gravimétrica',      resultado: '5.02 mL' },
      { parametro: 'Peso conjunto',          especificacion: `${prod.peso_g}g ± 4%`, metodo: 'Balanza analítica',             resultado: `${prod.peso_g.toFixed(3)}g` },
      { parametro: 'Sellado del tapón',      especificacion: 'Sin fuga a 0.5 bar',   metodo: 'Prueba neumática',              resultado: 'Conforme' },
      { parametro: 'Deslizamiento pistón',   especificacion: '< 15 N',               metodo: 'Dinamómetro',                   resultado: '11.2 N' },
      { parametro: 'Graduación legible',     especificacion: 'Visible a 30 cm',      metodo: 'Inspección visual',             resultado: 'Conforme' },
      { parametro: 'Material',               especificacion: prod.material,          metodo: 'FTIR / hoja técnica',           resultado: 'Conforme' },
    ];
  }
  if (kind === 'gotero') {
    return [
      { parametro: 'Volumen de gota',     especificacion: '0.05 mL ± 10%',           metodo: 'Calibración gravimétrica',      resultado: '0.048 mL' },
      { parametro: 'Hermeticidad tapón',  especificacion: 'Sin fuga 48h invertido',  metodo: 'Prueba invertida',              resultado: 'Conforme' },
      { parametro: 'Peso por unidad',     especificacion: `${prod.peso_g}g ± 5%`,    metodo: 'Balanza analítica',             resultado: `${prod.peso_g.toFixed(3)}g` },
      { parametro: 'Resistencia de rosca',especificacion: 'Sin deformación a 1.2 Nm',metodo: 'Torquímetro',                   resultado: 'Conforme' },
      { parametro: 'Material',            especificacion: prod.material,             metodo: 'FTIR / hoja técnica',           resultado: 'Conforme' },
    ];
  }
  if (kind === 'accesorio') {
    return [
      { parametro: 'Dimensiones',         especificacion: 'Según plano técnico',     metodo: 'Calibre digital',               resultado: 'Conforme' },
      { parametro: 'Peso por unidad',     especificacion: `${prod.peso_g}g ± 5%`,    metodo: 'Balanza analítica',             resultado: `${prod.peso_g.toFixed(3)}g` },
      { parametro: 'Acabado superficial', especificacion: 'Sin rebabas ni burbujas', metodo: 'Inspección visual',             resultado: 'Conforme' },
      { parametro: 'Material',            especificacion: prod.material,             metodo: 'FTIR / hoja técnica',           resultado: 'Conforme' },
    ];
  }
  return [
    { parametro: 'Peso por unidad',     especificacion: `${prod.peso_g}g ± 5%`,      metodo: 'Balanza analítica',             resultado: `${prod.peso_g.toFixed(3)}g` },
    { parametro: 'Material',            especificacion: prod.material,               metodo: 'FTIR / hoja técnica',           resultado: 'Conforme' },
  ];
}

Object.assign(window, { RideFactura, RideGuia, ProformaCot, RideCertificado, DocModal, Editable, WizardNuevaCotizacion });

// ═══════════════════════════════════════════════════════════════════
// Wizard: Nueva cotización (modal, 3 pasos)
// Paso 1: cliente · Paso 2: ítems · Paso 3: condiciones + confirmación
// ═══════════════════════════════════════════════════════════════════
function WizardNuevaCotizacion({ onClose, onCreated }) {
  const [step, setStep] = useState(1);
  const [clienteId, setClienteId] = useState(null);
  const [qCli, setQCli] = useState('');
  const [items, setItems] = useState([]); // { prod_id, cant_cajas, precio_caja }
  const [qProd, setQProd] = useState('');
  const [validezDias, setValidezDias] = useState(15);
  const [observaciones, setObservaciones] = useState('');
  const [fecha] = useState(() => new Date().toISOString().slice(0, 10));

  const cli = clienteId ? CLIENTES_MOCK.find(c => c.id === clienteId) : null;
  const clientesFiltrados = CLIENTES_MOCK.filter(c =>
    !qCli || c.razon_social.toLowerCase().includes(qCli.toLowerCase()) || c.ruc.includes(qCli)
  );
  const productosFiltrados = PRODUCTOS_MOCK.filter(p =>
    !qProd || p.nombre.toLowerCase().includes(qProd.toLowerCase())
  );

  const addItem = (prod) => {
    if (items.find(i => i.prod_id === prod.id)) return;
    // Precio caja sugerido = costo_caja * 1.35 (margen 35% por defecto)
    const precioSug = Math.round(prod.costo_caja * 1.35 * 100) / 100;
    setItems([...items, { prod_id: prod.id, cant_cajas: 10, precio_caja: precioSug }]);
    setQProd('');
  };
  const updItem = (idx, k, v) => {
    const next = [...items];
    next[idx] = { ...next[idx], [k]: v };
    setItems(next);
  };
  const rmItem = (idx) => setItems(items.filter((_, i) => i !== idx));

  const subtotal = items.reduce((s, i) => s + (Number(i.cant_cajas) || 0) * (Number(i.precio_caja) || 0), 0);
  const iva = subtotal * 0.12;
  const total = subtotal + iva;

  const canNext = (step === 1 && !!clienteId) || (step === 2 && items.length > 0) || step === 3;

  const crear = async () => {
    // Genera un ID incremental tipo COT-YYYY-NNNN
    const year = new Date().getFullYear();
    const lastNum = COTIZACIONES_MOCK
      .filter(c => c.id.startsWith(`COT-${year}-`))
      .map(c => Number(c.id.split('-')[2]) || 0)
      .reduce((m, n) => Math.max(m, n), 40);
    const nuevaId = `COT-${year}-${String(lastNum + 1).padStart(4, '0')}`;
    const nueva = {
      id: nuevaId,
      cliente: clienteId,
      fecha,
      validez_dias: Number(validezDias) || 15,
      estado: 'borrador',
      items: items.map(it => ({ prod_id: it.prod_id, cant_cajas: Number(it.cant_cajas) || 0, precio_caja: Number(it.precio_caja) || 0 })),
      observaciones,
    };
    const lista = [nueva, ...(window.COTIZACIONES_MOCK || [])];
    window.COTIZACIONES_MOCK = lista;
    if (window._api?.saveCollection) await window._api.saveCollection('cotizaciones', lista);
    if (onCreated) onCreated(nuevaId);
    onClose();
  };

  const stepInfo = [
    { n: 1, label: 'Cliente' },
    { n: 2, label: 'Ítems' },
    { n: 3, label: 'Condiciones' },
  ];

  return (
    <div className="doc-overlay" onClick={e => { if (e.target.classList.contains('doc-overlay')) onClose(); }}>
      <div style={{
        background: 'var(--bg)', width: 'min(860px, 94vw)', maxHeight: '92vh',
        margin: 'auto', borderRadius: 'var(--radius)', border: '1px solid var(--line)',
        display: 'flex', flexDirection: 'column', overflow: 'hidden',
      }}>
        {/* Header */}
        <div style={{ padding: '18px 22px', borderBottom: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 22, letterSpacing: '-0.01em' }}>Nueva cotización</div>
            <div className="xs mute" style={{ marginTop: 2 }}>Paso {step} de 3 · {stepInfo[step-1].label}</div>
          </div>
          <Btn variant="ghost" size="sm" onClick={onClose}><Icon name="x" size={14}/></Btn>
        </div>

        {/* Stepper */}
        <div style={{ display: 'flex', padding: '14px 22px', gap: 8, borderBottom: '1px solid var(--line)', background: 'var(--bg-raised)' }}>
          {stepInfo.map((s, i) => (
            <div key={s.n} style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{
                width: 24, height: 24, borderRadius: '50%',
                background: step >= s.n ? 'var(--accent)' : 'var(--line)',
                color: step >= s.n ? 'var(--bg)' : 'var(--text-muted)',
                display: 'grid', placeItems: 'center', fontSize: 11, fontWeight: 600,
              }}>{step > s.n ? '✓' : s.n}</div>
              <div style={{ fontSize: 12.5, color: step >= s.n ? 'var(--text)' : 'var(--text-muted)', fontWeight: step === s.n ? 600 : 400 }}>
                {s.label}
              </div>
              {i < stepInfo.length - 1 && <div style={{ flex: 1, height: 1, background: 'var(--line)' }} />}
            </div>
          ))}
        </div>

        {/* Body */}
        <div style={{ padding: 22, overflow: 'auto', flex: 1 }}>
          {step === 1 && (
            <div>
              <input className="input" type="text" placeholder="Buscar cliente por nombre o RUC…"
                value={qCli} onChange={e => setQCli(e.target.value)}
                style={{ width: '100%', marginBottom: 14 }} />
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 10, maxHeight: 400, overflow: 'auto' }}>
                {clientesFiltrados.map(c => (
                  <button key={c.id} onClick={() => setClienteId(c.id)}
                    className="panel" style={{
                      padding: 14, textAlign: 'left', cursor: 'pointer',
                      border: clienteId === c.id ? '2px solid var(--accent)' : '1px solid var(--line)',
                      background: clienteId === c.id ? 'var(--accent-soft)' : 'var(--bg)',
                    }}>
                    <div style={{ fontWeight: 600, marginBottom: 4 }}>{c.razon_social}</div>
                    <div className="xs mute mono">{c.ruc}</div>
                    <div className="xs mute" style={{ marginTop: 4 }}>{c.dir_matriz?.ciudad} · Crédito {c.credito_dias}d</div>
                  </button>
                ))}
                {clientesFiltrados.length === 0 && (
                  <div className="xs mute" style={{ padding: 24, textAlign: 'center', gridColumn: '1 / -1' }}>
                    Sin resultados.
                  </div>
                )}
              </div>
            </div>
          )}

          {step === 2 && (
            <div>
              {/* buscador + agregar */}
              <div style={{ position: 'relative', marginBottom: 14 }}>
                <input className="input" type="text" placeholder="Buscar producto para agregar…"
                  value={qProd} onChange={e => setQProd(e.target.value)}
                  style={{ width: '100%' }} />
                {qProd && productosFiltrados.length > 0 && (
                  <div style={{
                    position: 'absolute', top: '100%', left: 0, right: 0, marginTop: 4,
                    background: 'var(--bg-raised)', border: '1px solid var(--line)',
                    borderRadius: 'var(--radius-sm)', maxHeight: 260, overflow: 'auto', zIndex: 10,
                    boxShadow: 'var(--shadow-lg)',
                  }}>
                    {productosFiltrados.slice(0, 10).map(p => (
                      <button key={p.id} onClick={() => addItem(p)}
                        style={{
                          width: '100%', padding: '10px 14px', textAlign: 'left',
                          background: 'transparent', border: 0, borderBottom: '1px solid var(--line)',
                          cursor: 'pointer', color: 'var(--text)',
                        }}>
                        <div style={{ fontWeight: 500 }}>{p.nombre}</div>
                        <div className="xs mute">{p.material} · {p.unidades_caja}u/caja · costo caja ${p.costo_caja.toFixed(2)}</div>
                      </button>
                    ))}
                  </div>
                )}
              </div>

              {/* Tabla items */}
              {items.length === 0 ? (
                <div className="xs mute" style={{ padding: 32, textAlign: 'center', border: '1px dashed var(--line)', borderRadius: 'var(--radius-sm)' }}>
                  Aún no has agregado productos. Usa el buscador arriba.
                </div>
              ) : (
                <table className="tbl">
                  <thead>
                    <tr><th>Producto</th><th className="num">Cajas</th><th className="num">Precio caja</th><th className="num">Importe</th><th></th></tr>
                  </thead>
                  <tbody>
                    {items.map((it, i) => {
                      const p = PRODUCTOS_MOCK.find(pp => pp.id === it.prod_id);
                      const importe = (Number(it.cant_cajas) || 0) * (Number(it.precio_caja) || 0);
                      return (
                        <tr key={it.prod_id}>
                          <td>
                            <div style={{ fontWeight: 500 }}>{p?.nombre}</div>
                            <div className="xs mute">{p?.material} · {p?.unidades_caja}u/caja</div>
                          </td>
                          <td className="num">
                            <input className="input" type="number" min="1" value={it.cant_cajas}
                              onChange={e => updItem(i, 'cant_cajas', e.target.value)}
                              style={{ width: 80, textAlign: 'right' }} />
                          </td>
                          <td className="num">
                            <input className="input" type="number" step="0.01" min="0" value={it.precio_caja}
                              onChange={e => updItem(i, 'precio_caja', e.target.value)}
                              style={{ width: 90, textAlign: 'right' }} />
                          </td>
                          <td className="num mono">${importe.toFixed(2)}</td>
                          <td><Btn variant="ghost" size="sm" onClick={() => rmItem(i)}><Icon name="x" size={12}/></Btn></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}

              {items.length > 0 && (
                <div className="tot-rows" style={{ marginTop: 16, maxWidth: 300, marginLeft: 'auto' }}>
                  <div><span>Subtotal</span><span className="mono">${subtotal.toFixed(2)}</span></div>
                  <div><span>IVA 12%</span><span className="mono">${iva.toFixed(2)}</span></div>
                  <div className="tot-big"><span>Total</span><span className="mono">${total.toFixed(2)}</span></div>
                </div>
              )}
            </div>
          )}

          {step === 3 && (
            <div>
              {/* Resumen */}
              <div className="panel" style={{ marginBottom: 14 }}>
                <Eyebrow>Cliente</Eyebrow>
                <div style={{ fontFamily: 'var(--serif)', fontSize: 18, marginTop: 4 }}>{cli?.razon_social}</div>
                <div className="xs mute">{cli?.ruc} · {cli?.dir_matriz?.ciudad}</div>
              </div>
              <div className="panel" style={{ marginBottom: 14 }}>
                <Eyebrow>Ítems · {items.length} productos</Eyebrow>
                {items.map((it, i) => {
                  const p = PRODUCTOS_MOCK.find(pp => pp.id === it.prod_id);
                  return (
                    <div key={i} className="row" style={{ justifyContent: 'space-between', padding: '6px 0', borderBottom: i < items.length - 1 ? '1px solid var(--line)' : 'none' }}>
                      <div><div style={{ fontSize: 13 }}>{p?.nombre}</div><div className="xs mute">{it.cant_cajas} cajas × ${Number(it.precio_caja).toFixed(2)}</div></div>
                      <div className="mono">${((Number(it.cant_cajas)||0) * (Number(it.precio_caja)||0)).toFixed(2)}</div>
                    </div>
                  );
                })}
                <div className="tot-rows" style={{ marginTop: 10 }}>
                  <div className="tot-big"><span>Total con IVA</span><span className="mono">${total.toFixed(2)}</span></div>
                </div>
              </div>
              <div className="cols-2" style={{ gap: 16 }}>
                <div>
                  <label className="xs mute" style={{ display: 'block', marginBottom: 4 }}>Validez (días)</label>
                  <input className="input" type="number" min="1" value={validezDias}
                    onChange={e => setValidezDias(e.target.value)} style={{ width: '100%' }} />
                </div>
                <div>
                  <label className="xs mute" style={{ display: 'block', marginBottom: 4 }}>Fecha de emisión</label>
                  <div className="mono" style={{ padding: '8px 12px', background: 'var(--bg-raised)', borderRadius: 'var(--radius-sm)' }}>{fecha}</div>
                </div>
              </div>
              <div style={{ marginTop: 14 }}>
                <label className="xs mute" style={{ display: 'block', marginBottom: 4 }}>Observaciones (opcional)</label>
                <textarea className="input" rows={3} value={observaciones}
                  onChange={e => setObservaciones(e.target.value)}
                  placeholder="Ej. entrega en 15 días, certificado de calidad adjunto…"
                  style={{ width: '100%', resize: 'vertical' }} />
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{ padding: '14px 22px', borderTop: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'var(--bg-raised)' }}>
          <div>
            {step > 1 && <Btn variant="ghost" onClick={() => setStep(step - 1)}><Icon name="arrow_l" size={13}/> Atrás</Btn>}
          </div>
          <div className="row" style={{ gap: 8 }}>
            <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
            {step < 3 && (
              <Btn variant="primary" disabled={!canNext} onClick={() => setStep(step + 1)}>
                Siguiente <Icon name="arrow_r" size={13}/>
              </Btn>
            )}
            {step === 3 && (
              <Btn variant="primary" disabled={!clienteId || items.length === 0} onClick={crear}>
                <Icon name="check" size={13}/> Crear cotización
              </Btn>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

</script>
<script type="text/babel" data-file="app.jsx">

// App shell + Tweaks integration

const { useState: useStateA, useEffect: useEffectA } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "lavender",
  "density": "normal",
  "showExplanations": true
}/*EDITMODE-END*/;

const ACCENTS = {
  lavender: { h: '295', c: '0.16', l: '72%', lHi: '80%' },
  mint:     { h: '155', c: '0.15', l: '70%', lHi: '78%' },
  amber:    { h: '75',  c: '0.16', l: '72%', lHi: '80%' },
  rose:     { h: '15',  c: '0.17', l: '70%', lHi: '78%' },
  sky:      { h: '230', c: '0.14', l: '72%', lHi: '80%' },
};

function App() {
  const [tw, setTw] = useStateA(() => {
    try {
      const saved = localStorage.getItem('solplast.tweaks');
      if (saved) return { ...TWEAK_DEFAULTS, ...JSON.parse(saved) };
    } catch {}
    return TWEAK_DEFAULTS;
  });
  const [editMode, setEditMode] = useStateA(false);
  const [logged, setLogged] = useStateA(() => localStorage.getItem('solplast.logged') || null);
  const [page, setPage] = useStateA(() => localStorage.getItem('solplast.page') || 'home');
  const [navOpen, setNavOpen] = useStateA(false);

  // Apply tweaks to DOM
  useEffectA(() => {
    document.documentElement.setAttribute('data-theme', tw.theme);
    const acc = ACCENTS[tw.accent] || ACCENTS.lavender;
    document.documentElement.style.setProperty('--accent',    `oklch(${acc.l} ${acc.c} ${acc.h})`);
    document.documentElement.style.setProperty('--accent-hi', `oklch(${acc.lHi} ${acc.c} ${acc.h})`);
    document.documentElement.style.setProperty('--accent-soft', `color-mix(in oklab, oklch(${acc.l} ${acc.c} ${acc.h}) 18%, transparent)`);
    localStorage.setItem('solplast.tweaks', JSON.stringify(tw));
  }, [tw]);

  useEffectA(() => { if (logged) localStorage.setItem('solplast.logged', logged); else localStorage.removeItem('solplast.logged'); }, [logged]);
  useEffectA(() => { localStorage.setItem('solplast.page', page); }, [page]);

  // Edit-mode host handshake
  useEffectA(() => {
    const onMsg = (e) => {
      if (e?.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e?.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    setTw(prev => ({ ...prev, [k]: v }));
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch {}
  };

  useEffectA(() => {
    if (logged === 'operario' && page !== 'registro') setPage('registro');
  }, [logged, page]);

  if (!logged) return <Login onLogin={(role) => { setLogged(role); setPage(role === 'operario' ? 'registro' : 'home'); }} />;

  const role = logged;

  return (
    <>
      <Topbar onOpenNav={() => setNavOpen(true)} page={page} />
      <div className="app" data-screen-label={`app-${page}`}>
        <Sidebar page={page} setPage={setPage} role={role} open={navOpen} onClose={() => setNavOpen(false)} theme={tw.theme} setTheme={(t) => setTweak('theme', t)} onLogout={async () => { await window._api?.logout(); setLogged(null); }} />
        <main className="content-wrap" style={{ marginLeft: window.innerWidth > 960 ? 0 : 0 }}>
          <div className="content">
            {page === 'home' && <Home setPage={setPage} role={role} />}
            {page === 'nomina' && <Nomina setPage={setPage} />}
            {page === 'registro' && <RegistroDiario role={role} />}
            {page === 'catalogo' && <Catalogo />}
            {page === 'costos' && <Costos />}
            {page === 'metricas' && <Metricas />}
            {page === 'empleados' && <Empleados />}
            {page === 'inventario' && <Inventario />}
            {page === 'pedidos' && <Pedidos />}
            {page === 'clientes' && <Clientes />}
          </div>
        </main>
      </div>
      <MobileBottomNav page={page} setPage={setPage} role={role} />
      {editMode && <TweaksPanel tw={tw} setTweak={setTweak} onLogout={() => setLogged(null)} />}
    </>
  );
}

function TweaksPanel({ tw, setTweak, onLogout }) {
  return (
    <div className="tweaks-panel fadein">
      <h4><Icon name="sliders" size={14}/> Tweaks</h4>
      <div className="tweak-row">
        <span>Tema</span>
        <Seg options={[{ value: 'dark', label: 'Oscuro' }, { value: 'light', label: 'Claro' }]} value={tw.theme} onChange={v => setTweak('theme', v)} />
      </div>
      <div className="tweak-row">
        <span>Acento</span>
        <div className="tweak-swatches">
          {Object.entries(ACCENTS).map(([k, v]) => (
            <button key={k} onClick={() => setTweak('accent', k)} className={tw.accent === k ? 'on' : ''}
              style={{ background: `oklch(${v.l} ${v.c} ${v.h})` }} title={k} />
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <span>Explicaciones inline</span>
        <Toggle checked={tw.showExplanations} onChange={v => setTweak('showExplanations', v)}>{tw.showExplanations ? 'On' : 'Off'}</Toggle>
      </div>
      <div style={{ borderTop: '1px solid var(--line)', marginTop: 10, paddingTop: 10, fontSize: 11.5 }}>
        <Btn variant="ghost" size="sm" onClick={onLogout} block><Icon name="logout" size={12}/> Cerrar sesión</Btn>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>
</body></html>
