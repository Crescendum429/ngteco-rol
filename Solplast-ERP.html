const CAT_LABELS = { empacadora:'Empacadora', fundas:'Fundas', impresion:'Impresión', seguridad:'Seguridad', otro:'Otro' };
const CAT_OPTIONS = Object.entries(CAT_LABELS).map(([v,l])=>({ value:v, label:l }));
const UNIDADES_OPTIONS = ['unidades','rollos','cajas','kg','metros','pares'];

function SparklineAux({ auxId, height=32, width=80 }) {
  const hist = (AUX_CONSUMO_HISTORICO[auxId] || []).slice(-14);
  if (!hist.length) return null;
  const vals = hist.map(h => h.usado);
  const max = Math.max(...vals, 1);
  const step = width / Math.max(hist.length - 1, 1);
  const y = v => height - Math.max(2, (v / max) * (height - 4)) - 2;
  const path = vals.map((v, i) => `${i===0?'M':'L'}${i*step},${y(v)}`).join(' ');
  return (
    <svg width={width} height={height} style={{ display:'block' }}>
      <path d={path} fill="none" stroke="var(--accent)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      {vals.map((v,i) => v > 0 && <circle key={i} cx={i*step} cy={y(v)} r="2" fill="var(--accent)" opacity="0.7"/>)}
    </svg>
  );
}

function AuxDetalle({ aux, onBack }) {
  const hist = AUX_CONSUMO_HISTORICO[aux.id] || [];
  const totalUsado = hist.reduce((a,h) => a+h.usado, 0);
  const diasConUso = hist.filter(h => h.usado > 0).length;
  const promDia = diasConUso > 0 ? (totalUsado / diasConUso) : 0;
  const diasRestantes = promDia > 0 ? Math.floor(aux.stock / promDia) : null;

  return (
    <div className="fadein">
      <div className="row" style={{ gap:8, marginBottom:14 }}>
        <Btn size="sm" variant="ghost" onClick={onBack}><Icon name="arrow_l" size={12}/> Material auxiliar</Btn>
      </div>
      <div className="page-head">
        <div>
          <Eyebrow>Material auxiliar · {CAT_LABELS[aux.categoria]||aux.categoria}</Eyebrow>
          <h1 className="page-title">{aux.nombre}</h1>
          <div className="page-sub">Stock: <strong>{aux.stock} {aux.unidad}</strong> · Mínimo: {aux.minimo} · Costo: {fmtMoney(aux.costo_unit||0)}/{aux.unidad}</div>
        </div>
        {diasRestantes !== null && (
          <div style={{ textAlign:'right' }}>
            <div style={{ fontFamily:'var(--serif)', fontSize:36, letterSpacing:'-0.02em', color: diasRestantes < 7 ? 'var(--warn)' : 'var(--good)' }}>{diasRestantes}</div>
            <div className="xs mute">días de stock estimados</div>
          </div>
        )}
      </div>

      <div className="kpi-grid" style={{ marginBottom:18, gridTemplateColumns:'repeat(3,1fr)' }}>
        <Kpi label="Total usado (mes)" icon="activity" value={String(totalUsado)} unit={` ${aux.unidad}`} />
        <Kpi label="Promedio / día activo" icon="clock" value={promDia.toFixed(1)} unit={` ${aux.unidad}`} />
        <Kpi label="Días con consumo" icon="calendar" value={String(diasConUso)} unit={` / ${hist.length}`} />
      </div>

      <div className="panel panel-flush">
        <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--line)' }}>
          <PanelHead title="Consumo diario — últimos 30 días" sub="Ordenado cronológico" />
        </div>
        <table className="tbl">
          <thead><tr><th>Fecha</th><th className="num">Usado</th><th className="num">Stock tras</th></tr></thead>
          <tbody>
            {hist.slice().reverse().map((h,i) => (
              <tr key={i}>
                <td className="mono xs">{h.fecha}</td>
                <td className="num mono" style={{ color: h.usado > 0 ? 'var(--text)' : 'var(--text-mute)' }}>{h.usado > 0 ? h.usado : '—'} <span className="xs mute">{aux.unidad}</span></td>
                <td className="num mono">{h.stock_tras} <span className="xs mute">{aux.unidad}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function InvMaterialAux() {
  const [items, setItems] = useState(() => INVENTARIO_AUX_MOCK.map(a => ({ ...a, costo_unit: a.costo_unit || 0 })));
  const [sel, setSel] = useState(null);          // item being edited (drawer)
  const [form, setForm] = useState(null);
  const [detalle, setDetalle] = useState(null);  // item detail view
  const [showRegistrar, setShowRegistrar] = useState(false);
  const [usoHoy, setUsoHoy] = useState({});
  const [registroGuardado, setRegistroGuardado] = useState(false);

  // Cargar desde backend al montar (la lista inyectada puede estar stale).
  React.useEffect(() => {
    (async () => {
      try {
        const r = await fetch('/api/inventario/auxiliar', { credentials:'same-origin' }).then(x => x.ok ? x.json() : null);
        if (Array.isArray(r)) {
          setItems(r.map(a => ({ ...a, costo_unit: a.costo_unit || 0 })));
          INVENTARIO_AUX_MOCK.length = 0; INVENTARIO_AUX_MOCK.push(...r);
        }
      } catch (e) {}
    })();
  }, []);

  // Persiste la lista completa al backend (PUT /api/inventario/auxiliar).
  const persist = async (lista) => {
    INVENTARIO_AUX_MOCK.length = 0; INVENTARIO_AUX_MOCK.push(...lista);
    try {
      const ok = await (window._apiUtil?.put?.('/api/inventario/auxiliar', lista)
        || fetch('/api/inventario/auxiliar', {
            method:'PUT', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(lista), credentials:'same-origin'
          }).then(r => r.ok));
      if (ok === false || ok?.error) window.solpToast && window.solpToast('No se pudo guardar en servidor', 'bad');
    } catch (e) { window.solpToast && window.solpToast('Error guardando: ' + e.message, 'bad'); }
  };

  const setF = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const categorias = [...new Set(items.map(a => a.categoria))];

  const abrirNuevo = () => {
    const empty = { id:`aux-${Date.now()}`, nombre:'', categoria:'empacadora', unidad:'unidades', stock:0, minimo:0, costo_unit:0, isNew:true };
    setSel(empty); setForm(empty);
  };

  const abrirEditar = (a) => { setSel(a); setForm({ ...a }); };

  const guardarItem = async () => {
    if (!form.nombre.trim()) return;
    const clean = { ...form }; delete clean.isNew;
    const nueva = sel.isNew
      ? [...items, clean]
      : items.map(a => a.id === sel.id ? clean : a);
    setItems(nueva);
    await persist(nueva);
    window.solpToast && window.solpToast('Ítem guardado', 'ok');
    setSel(null); setForm(null);
  };

  const toggleDesact = async (id) => {
    const nueva = items.map(a => a.id === id ? { ...a, desactivado: !a.desactivado } : a);
    setItems(nueva);
    await persist(nueva);
  };

  const eliminar = async (id) => {
    const a = items.find(x => x.id === id);
    if (a && a.stock > 0) { window.solpToast ? window.solpToast(`No se puede eliminar: tiene ${a.stock} ${a.unidad} en stock. Desactívalo.`, 'warn') : alert('Tiene stock'); return; }
    if (!await window.solpConfirm('¿Eliminar este ítem?')) return;
    const nueva = items.filter(a => a.id !== id);
    setItems(nueva);
    await persist(nueva);
    window.solpToast && window.solpToast('Ítem eliminado', 'ok');
    setSel(null); setForm(null);
  };

  const guardarRegistroDia = async () => {
    const fecha = new Date().toISOString().slice(0, 10);
    const payload = items
      .filter(a => (usoHoy[a.id] || 0) > 0)
      .map(a => ({ aux_id: a.id, usado: Number(usoHoy[a.id]) || 0 }));
    if (payload.length) {
      const res = await (window._apiUtil?.registrarDiaAux?.({ fecha, items: payload })
        || fetch('/api/inventario/auxiliar/registrar-dia', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ fecha, items: payload }), credentials:'same-origin'
          }).then(r => r.ok ? r.json() : { error:'HTTP '+r.status }));
      if (res?.error) { window.solpToast && window.solpToast(res.error, 'bad'); return; }
      if (res?.auxiliar) {
        setItems(res.auxiliar);
        INVENTARIO_AUX_MOCK.length = 0; INVENTARIO_AUX_MOCK.push(...res.auxiliar);
      } else {
        const nueva = items.map(a => {
          const u = usoHoy[a.id] || 0;
          return u > 0 ? { ...a, stock: Math.max(0, a.stock - u) } : a;
        });
        setItems(nueva);
      }
    }
    setRegistroGuardado(true);
    setTimeout(() => { setShowRegistrar(false); setRegistroGuardado(false); setUsoHoy({}); }, 1200);
  };

  if (detalle) return <AuxDetalle aux={detalle} onBack={() => setDetalle(null)} />;

  return (
    <>
      <div className="row" style={{ justifyContent:'space-between', marginBottom:14, flexWrap:'wrap', gap:10 }}>
        <div className="row" style={{ gap:8 }}>
          <Btn onClick={() => setShowRegistrar(true)}><Icon name="edit" size={14}/> Registrar día</Btn>
        </div>
        <Btn variant="primary" onClick={abrirNuevo}><Icon name="plus" size={14}/> Nuevo ítem</Btn>
      </div>

      {/* Modal Registrar día */}
      {showRegistrar && (
        <div className="modal-back" onClick={() => setShowRegistrar(false)}>
          <div className="modal-card lg" onClick={e => e.stopPropagation()} style={{ maxWidth:560 }}>
            <div className="modal-head">
              <div style={{ fontFamily:'var(--serif)', fontSize:22 }}>Registrar consumo del día</div>
              <Btn variant="ghost" size="sm" onClick={() => setShowRegistrar(false)}><Icon name="x" size={16}/></Btn>
            </div>
            <div className="modal-body">
              {registroGuardado ? (
                <div style={{ textAlign:'center', padding:'30px 0' }}>
                  <div style={{ width:52, height:52, borderRadius:'50%', background:'var(--good-soft)', color:'var(--good)', display:'inline-flex', alignItems:'center', justifyContent:'center', marginBottom:12 }}>
                    <Icon name="check" size={24} strokeWidth={3}/>
                  </div>
                  <div style={{ fontFamily:'var(--serif)', fontSize:20 }}>¡Registrado!</div>
                </div>
              ) : (
                <>
                  <div className="xs mute" style={{ marginBottom:14 }}>Ingresa cuánto se usó hoy de cada material. El stock se descuenta automáticamente.</div>
                  {items.filter(a => !a.desactivado).map(a => {
                    const uso = usoHoy[a.id] || 0;
                    const stockTras = Math.max(0, a.stock - uso);
                    const bajo = stockTras <= a.minimo;
                    return (
                      <div key={a.id} style={{ display:'grid', gridTemplateColumns:'1fr auto auto auto', alignItems:'center', gap:10, padding:'10px 0', borderBottom:'1px solid var(--line)' }}>
                        <div>
                          <div style={{ fontWeight:500 }}>{a.nombre}</div>
                          <div className="xs mute">Stock: {a.stock} {a.unidad}</div>
                        </div>
                        <div className="num-stepper sm">
                          <button onClick={() => setUsoHoy(m=>({...m,[a.id]:Math.max(0,uso-1)}))}><Icon name="minus" size={11}/></button>
                          <input type="number" value={uso} min={0} max={a.stock}
                            onChange={e => setUsoHoy(m=>({...m,[a.id]:Math.max(0,parseInt(e.target.value)||0)}))}
                            style={{ width:54 }}/>
                          <button onClick={() => setUsoHoy(m=>({...m,[a.id]:uso+1}))}><Icon name="plus" size={11}/></button>
                        </div>
                        <span className="xs mute">{a.unidad}</span>
                        <span className="xs" style={{ minWidth:80, textAlign:'right', color: bajo?'var(--warn)':'var(--text-mute)' }}>
                          → {stockTras} {bajo && <Icon name="alert" size={10}/>}
                        </span>
                      </div>
                    );
                  })}
                </>
              )}
            </div>
            {!registroGuardado && (
              <div className="modal-foot">
                <Btn onClick={() => setShowRegistrar(false)}>Cancelar</Btn>
                <Btn variant="primary" onClick={guardarRegistroDia}><Icon name="check" size={14}/> Guardar registro</Btn>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Drawer editar/nuevo */}
      <Drawer open={!!sel} onClose={() => { setSel(null); setForm(null); }} title={sel?.isNew ? 'Nuevo material auxiliar' : sel?.nombre}
        footer={sel ? (
          <div className="row" style={{ justifyContent:'space-between', width:'100%' }}>
            {!sel.isNew && (
              <div className="row" style={{ gap:6 }}>
                <Btn variant="ghost" className="danger" onClick={() => eliminar(sel.id)}><Icon name="trash" size={13}/> Eliminar</Btn>
                <Btn variant="ghost" onClick={() => toggleDesact(sel.id)}>{sel.desactivado ? 'Reactivar' : 'Desactivar'}</Btn>
              </div>
            )}
            <div className="row" style={{ marginLeft:'auto', gap:8 }}>
              <Btn onClick={() => { setSel(null); setForm(null); }}>Cancelar</Btn>
              <Btn variant="primary" onClick={guardarItem}>Guardar</Btn>
            </div>
          </div>
        ) : null}>
        {sel && form && (
          <div>
            <div className="cols-2">
              <div className="field" style={{ gridColumn:'span 2' }}>
                <label>Nombre</label>
                <input className="input" value={form.nombre} onChange={e=>setF('nombre',e.target.value)} placeholder="Ej. Rollos empacadora grandes"/>
              </div>
              <div className="field">
                <label>Categoría</label>
                <select className="select" value={form.categoria} onChange={e=>setF('categoria',e.target.value)}>
                  {CAT_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
                </select>
              </div>
              <div className="field">
                <label>Unidad</label>
                <select className="select" value={form.unidad} onChange={e=>setF('unidad',e.target.value)}>
                  {UNIDADES_OPTIONS.map(u=><option key={u} value={u}>{u}</option>)}
                </select>
              </div>
              <div className="field">
                <label>Stock actual</label>
                <input className="input mono" type="number" value={form.stock} onChange={e=>setF('stock',parseFloat(e.target.value)||0)}/>
              </div>
              <div className="field">
                <label>Mínimo</label>
                <input className="input mono" type="number" value={form.minimo} onChange={e=>setF('minimo',parseFloat(e.target.value)||0)}/>
              </div>
              <div className="field">
                <label>Costo unitario ($)</label>
                <input className="input mono" type="number" step="0.01" value={form.costo_unit||0} onChange={e=>setF('costo_unit',parseFloat(e.target.value)||0)}/>
              </div>
            </div>
          </div>
        )}
      </Drawer>

      {/* Lista por categoría */}
      {categorias.map(cat => {
        const catItems = items.filter(a => a.categoria === cat);
        return (
          <div key={cat} style={{ marginBottom:20 }}>
            <Eyebrow style={{ marginBottom:10 }}>{CAT_LABELS[cat]||cat}</Eyebrow>
            <div className="panel panel-flush">
              <table className="tbl tbl-hover">
                <thead>
                  <tr>
                    <th>Ítem</th>
                    <th className="num">Stock</th>
                    <th className="num">Mínimo</th>
                    <th className="num">Costo/u</th>
                    <th>Tendencia 14d</th>
                    <th>Estado</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {catItems.map(a => {
                    const bajo = a.stock <= a.minimo;
                    const hist = AUX_CONSUMO_HISTORICO[a.id] || [];
                    const ultimoUso = hist.filter(h=>h.usado>0).slice(-1)[0]?.fecha || '—';
                    return (
                      <tr key={a.id} style={{ opacity: a.desactivado ? 0.5 : 1 }}>
                        <td>
                          <button onClick={() => setDetalle(a)} style={{ background:'none', border:0, padding:0, cursor:'pointer', textAlign:'left', color:'var(--text)' }}>
                            <div style={{ fontWeight:600 }}>{a.nombre}</div>
                            <div className="xs mute">Último uso: {ultimoUso}</div>
                          </button>
                        </td>
                        <td className="num mono" style={{ color: bajo?'var(--warn)':'inherit', fontWeight: bajo?600:400 }}>{fmtNum(a.stock)} <span className="xs mute">{a.unidad}</span></td>
                        <td className="num mono xs mute">{a.minimo}</td>
                        <td className="num mono xs">{a.costo_unit > 0 ? fmtMoney(a.costo_unit) : <span className="mute">—</span>}</td>
                        <td><SparklineAux auxId={a.id} width={80} height={28}/></td>
                        <td>{a.desactivado ? <Chip tone="bad">Desactivado</Chip> : bajo ? <Chip tone="warn">Reponer</Chip> : <Chip tone="good">OK</Chip>}</td>
                        <td>
                          <div className="row" style={{ gap:4 }}>
                            <Btn size="sm" variant="ghost" onClick={() => abrirEditar(a)}><Icon name="edit" size={12}/></Btn>
                            <Btn size="sm" variant="ghost" title={a.desactivado?'Reactivar':'Desactivar'} onClick={()=>toggleDesact(a.id)}><Icon name={a.desactivado?'check':'x'} size={12}/></Btn>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}
    </>
  );
}

// ═══════════════════ Panorámica Mensual — visual redesign ═══════════════════
function InvPanoramica() {
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const titulo = `${meses[MES_ACTUAL]} ${ANIO_ACTUAL}`;
  const [vista, setVista] = useState('heatmap'); // heatmap | tabla | auxiliar

  const dias = PANORAMICA_MES_MOCK;
  const activos = dias.filter(d => !d.esFinde && !d.esFuturo && d.cajas > 0);
  const totalCajas = activos.reduce((a,d)=>a+d.cajas,0);
  const totalMat   = activos.reduce((a,d)=>a+d.material_kg,0);
  const totalDes   = activos.reduce((a,d)=>a+d.desecho_kg,0);
  const maxCajas   = Math.max(...activos.map(d=>d.cajas),1);

  const PROD_COLORS = {
    v_life:'oklch(72% 0.16 155)', v_solplast:'oklch(72% 0.16 220)',
    v_lamosan:'oklch(72% 0.16 295)', cuchara_5ml:'oklch(72% 0.16 60)',
    j_life:'oklch(72% 0.16 30)', j_farmayala:'oklch(72% 0.16 10)',
    gotero:'oklch(72% 0.16 230)',
  };

  // Group days into weeks for heatmap
  const diaSemLabel = ['D','L','M','X','J','V','S'];
  const firstDow = new Date(ANIO_ACTUAL, MES_ACTUAL, 1).getDay();
  const grid = []; // rows = weeks, cols = days of week (0=Sun)
  let week = Array(7).fill(null);
  dias.forEach(d => {
    const dow = new Date(`${d.fecha}T00:00:00`).getDay();
    week[dow] = d;
    if (dow === 6) { grid.push(week); week = Array(7).fill(null); }
  });
  if (week.some(x=>x)) grid.push(week);

  // Aux consumption summary
  const auxSummary = INVENTARIO_AUX_MOCK.map(a => {
    const hist = AUX_CONSUMO_HISTORICO[a.id] || [];
    const total = hist.reduce((s,h)=>s+h.usado,0);
    return { ...a, total_mes: total };
  }).filter(a => a.total_mes > 0).sort((a,b)=>b.total_mes-a.total_mes);

  return (
    <>
      <div style={{ marginBottom:18 }}>
        <div className="row" style={{ justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:12, marginBottom:14 }}>
          <div>
            <Eyebrow>{titulo}</Eyebrow>
            <div style={{ fontFamily:'var(--serif)', fontSize:28, letterSpacing:'-0.02em' }}>Panorámica del mes</div>
          </div>
          <div className="row" style={{ gap:10 }}>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontFamily:'var(--serif)', fontSize:26, color:'var(--accent-hi)' }}>{totalCajas}</div>
              <div className="xs mute">cajas</div>
            </div>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontFamily:'var(--serif)', fontSize:26 }}>{fmtNum(totalMat,0)}</div>
              <div className="xs mute">kg mat.</div>
            </div>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontFamily:'var(--serif)', fontSize:26, color:'var(--bad)' }}>{totalDes.toFixed(0)}</div>
              <div className="xs mute">kg desecho</div>
            </div>
            <Seg value={vista} onChange={setVista} options={[
              { value:'heatmap',  label:'Mapa' },
              { value:'tabla',    label:'Tabla' },
              { value:'auxiliar', label:'Auxiliar' },
            ]} />
          </div>
        </div>
      </div>

      {/* HEATMAP + barras por producto */}
      {vista === 'heatmap' && (
        <>
          {/* Calendar heatmap */}
          <div className="panel" style={{ marginBottom:18 }}>
            <PanelHead title="Cajas por día" sub="Intensidad = volumen relativo al mejor día del mes" />
            <div style={{ overflowX:'auto' }}>
              {/* Day of week headers */}
              <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:4, marginBottom:4 }}>
                {diaSemLabel.map((d,i) => (
                  <div key={i} style={{ textAlign:'center', fontSize:10, color:'var(--text-mute)', fontWeight:600 }}>{d}</div>
                ))}
              </div>
              {/* Weeks */}
              {grid.map((semana, wi) => (
                <div key={wi} style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:4, marginBottom:4 }}>
                  {semana.map((d, di) => {
                    if (!d) return <div key={di}/>;
                    const pct = d.cajas > 0 ? d.cajas / maxCajas : 0;
                    const esFuturo = d.esFuturo;
                    const esFinde = d.esFinde;
                    const sinReg = !esFinde && !esFuturo && d.cajas === 0;
                    const dow = new Date(`${d.fecha}T00:00:00`).getDay();
                    const esHoy = d.dia === HOY.getDate();
                    return (
                      <div key={di} title={`${d.fecha}: ${d.cajas} cajas, ${d.material_kg} kg, ${d.desecho_kg} kg desecho`}
                        style={{
                          height: 40,
                          borderRadius: 6,
                          background: esFinde ? 'var(--bg-hover)' : esFuturo ? 'var(--bg-raised)' : sinReg ? 'color-mix(in oklab,var(--bad) 15%,transparent)' : `color-mix(in oklab,var(--accent) ${Math.round(10+pct*65)}%,transparent)`,

                        {d.cajas > 0 && <div style={{ fontSize:9, color:'var(--text-mute)' }}>{d.cajas}c</div>}

              <div className="row" style={{ gap:4 }}>
                <div style={{ width:14, height:14, borderRadius:3, background:'color-mix(in oklab,var(--accent) 20%,transparent)' }}/>

                <span className="mute">Fin de semana</span>
              </div>

          </div>

          {/* Barras por producto */}
          <div className="panel">
            <PanelHead title="Producción diaria por producto" sub="Cajas registradas en la jornada" />
            <div style={{ overflowX:'auto' }}>
              <div style={{ display:'flex', gap:2, alignItems:'flex-end', height:120, minWidth: `${activos.length * 36}px`, paddingBottom:20, position:'relative' }}>
                {/* Y axis ghost lines */}
                {[0.25,0.5,0.75,1].map(p => (
                  <div key={p} style={{ position:'absolute', left:0, right:0, bottom:`${20+p*(120-20)}px`, borderTop:'1px dashed var(--line)', pointerEvents:'none' }}/>
                ))}
                {activos.map((dia, di) => {
                  const dayProds = PANORAMICA_PROD_DIARIA[dia.fecha] || {};
                  const total = Object.values(dayProds).reduce((a,v)=>a+v,0) || dia.cajas;
                  const pids = Object.keys(dayProds);
                  const barH = Math.max(4, (dia.cajas / maxCajas) * 90);
                  const dow = new Date(`${dia.fecha}T00:00:00`).getDay();
                  const diaSem = ['D','L','M','X','J','V','S'][dow];
                  return (
                    <div key={di} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', position:'relative' }}>
                      <div title={`${dia.fecha}: ${dia.cajas} cajas`}
                        style={{ width:'100%', height:`${barH}px`, marginTop:'auto', borderRadius:'3px 3px 0 0', overflow:'hidden', display:'flex', flexDirection:'column-reverse' }}>
                        {pids.length > 0 ? pids.map((pid,pi) => {
                          const v = dayProds[pid];
                          const h = (v / total) * barH;
                          return <div key={pid} style={{ height:`${h}px`, background: PROD_COLORS[pid]||'var(--accent)', flexShrink:0 }}/>;
                        }) : <div style={{ height:`${barH}px`, background:'var(--accent)', opacity:0.6 }}/>}

                      <div style={{ position:'absolute', bottom:0, fontSize:9, color:'var(--text-mute)', marginTop:2 }}>{dia.dia}</div>

              </div>
            </div>
            {/* Legend */}
            <div className="row" style={{ gap:10, flexWrap:'wrap', marginTop:8, fontSize:11 }}>
              {Object.entries(PROD_COLORS).map(([pid, color]) => {
                const prod = PRODUCTOS_MOCK.find(p=>p.id===pid);
                return prod ? (
                  <div key={pid} className="row" style={{ gap:4 }}>
                    <div style={{ width:10, height:10, borderRadius:2, background:color }}/>
                    <span className="mute">{prod.nombre}</span>

                ) : null;
              })}
            </div>
          </div>
        </>
      )}

      {/* TABLA clásica */}
      {vista === 'tabla' && (
        <div className="panel panel-flush">
          <table className="tbl" style={{ tableLayout:'fixed' }}>
            <thead>
              <tr>
                <th style={{ width:36 }}>Día</th>
                <th style={{ width:48 }}>Sem.</th>
                <th>Estado</th>
                <th className="num" style={{ width:72 }}>Cajas</th>
                <th className="num" style={{ width:80 }}>Mat. kg</th>
                <th className="num" style={{ width:80 }}>Desecho</th>
                <th>Barra</th>
              </tr>
            </thead>
            <tbody>
              {dias.map(d => {
                const diaSem = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][new Date(`${d.fecha}T00:00:00`).getDay()];
                const pct = d.cajas > 0 ? Math.round((d.cajas / maxCajas) * 100) : 0;
                return (
                  <tr key={d.dia} style={{ opacity: d.esFuturo ? 0.3 : 1, background: d.esFinde ? 'color-mix(in oklab,var(--line) 30%,transparent)' : undefined }}>
                    <td className="mono" style={{ fontWeight:600, color:'var(--accent-hi)' }}>{d.dia}</td>
                    <td className="xs mute">{diaSem}</td>
                    <td>
                      {d.esFinde && <span className="xs mute">fin de semana</span>}
                      {d.esFuturo && !d.esFinde && <span className="xs mute">pendiente</span>}
                      {!d.esFinde && !d.esFuturo && d.cajas === 0 && <span className="xs" style={{ color:'var(--bad)' }}>sin registro</span>}
                      {!d.esFinde && !d.esFuturo && d.cajas > 0 && <span className="xs mono mute">{d.registro_id}</span>}
                    </td>
                    <td className="num mono" style={{ fontWeight: d.cajas>0?600:400, color: d.cajas>0?'var(--text)':'var(--text-mute)' }}>{d.cajas||'—'}</td>
                    <td className="num mono xs">{d.material_kg>0?fmtNum(d.material_kg,1):'—'}</td>
                    <td className="num mono xs" style={{ color: d.desecho_kg>0?'var(--bad)':'var(--text-mute)' }}>{d.desecho_kg>0?d.desecho_kg.toFixed(1):'—'}</td>
                    <td>{pct>0 && <div style={{ height:8, background:'var(--bg-raised)', borderRadius:4, overflow:'hidden' }}><div style={{ height:'100%', width:`${pct}%`, background:'var(--accent)', borderRadius:4 }}/></div>}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{ borderTop:'2px solid var(--line)', fontWeight:600 }}>
                <td colSpan={3} style={{ padding:'12px 14px', color:'var(--text-mute)', fontSize:12 }}>TOTAL</td>
                <td className="num mono" style={{ padding:'12px 14px', color:'var(--accent-hi)' }}>{totalCajas}</td>
                <td className="num mono xs" style={{ padding:'12px 14px' }}>{fmtNum(totalMat,1)}</td>
                <td className="num mono xs" style={{ padding:'12px 14px', color:'var(--bad)' }}>{totalDes.toFixed(1)}</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      )}

      {/* AUXILIAR — consumo mensual */}
      {vista === 'auxiliar' && (
        <>
          <div className="panel" style={{ marginBottom:18 }}>
            <PanelHead title="Consumo de material auxiliar" sub={`Mes de ${titulo} — ítems con uso registrado`} />
            {auxSummary.length === 0 && <div className="xs mute" style={{ padding:20 }}>Sin consumos registrados este mes.</div>}
            {auxSummary.map(a => {
              const maxTot = Math.max(...auxSummary.map(x=>x.total_mes),1);
              const pct = (a.total_mes / maxTot) * 100;
              const costo = a.costo_unit > 0 ? fmtMoney(a.total_mes * a.costo_unit) : null;
              return (
                <div key={a.id} style={{ display:'grid', gridTemplateColumns:'1fr auto auto 80px', alignItems:'center', gap:12, padding:'10px 0', borderBottom:'1px solid var(--line)' }}>
                  <div>
                    <div style={{ fontWeight:500 }}>{a.nombre}</div>
                    <div className="xs mute">{CAT_LABELS[a.categoria]||a.categoria}</div>
                  </div>
                  <div className="mono" style={{ fontWeight:600 }}>{fmtNum(a.total_mes)} <span className="xs mute">{a.unidad}</span></div>
                  {costo ? <div className="mono xs" style={{ color:'var(--text-mute)' }}>{costo}</div> : <div/>}
                  <div style={{ height:8, background:'var(--bg-raised)', borderRadius:4, overflow:'hidden' }}>
                    <div style={{ height:'100%', width:`${pct}%`, background:'var(--info)', borderRadius:4 }}/>
                  </div>
                </div>
              );
            })}
          </div>
          {/* Trend sparklines */}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))', gap:12 }}>
            {INVENTARIO_AUX_MOCK.filter(a => (AUX_CONSUMO_HISTORICO[a.id]||[]).some(h=>h.usado>0)).map(a => {
              const hist = AUX_CONSUMO_HISTORICO[a.id] || [];
              const total = hist.reduce((s,h)=>s+h.usado,0);
              return (
                <div key={a.id} className="panel" style={{ padding:14 }}>
                  <div style={{ fontWeight:600, marginBottom:4 }}>{a.nombre}</div>
                  <div className="xs mute" style={{ marginBottom:8 }}>{total} {a.unidad} usados</div>
                  <SparklineAux auxId={a.id} width={180} height={36}/>
                </div>
              );
            })}
          </div>
        </>
      )}
    </>
  );
}

function InvMovimientos() {
  const [filtro,   setFiltro]   = useState('todos');
  const [movs,     setMovs]     = useState(() => Array.isArray(MOV_INVENTARIO_MOCK) ? [...MOV_INVENTARIO_MOCK] : []);
  const [editId,   setEditId]   = useState(null);
  const [editForm, setEditForm] = useState({ nota:'', ref:'', fecha:'' });
  const [saving,   setSaving]   = useState(false);

  useEffect(() => {
    let vivo = true;
    (async () => {
      try {
        const r = await window._apiUtil?.fetchMovimientos?.();
        if (vivo && Array.isArray(r)) setMovs(r);
      } catch (e) { /* sin conexion: queda lo inyectado en el primer paint */ }
    })();
    return () => { vivo = false; };
  }, []);

  const items = movs.filter(m => filtro==='todos' || m.tipo===filtro)
    .slice().sort((a,b) => b.fecha.localeCompare(a.fecha));

  const tipoConfig = {
    entrada:    { t:'good',    ico:'arrow_r', l:'Entrada'    },
    salida:     { t:'bad',     ico:'arrow_r', l:'Salida'     },
    produccion: { t:'info',    ico:'box',     l:'Producción' },
    ajuste:     { t:'default', ico:'edit',    l:'Ajuste'     },
    consumo:    { t:'warn',    ico:'flame',   l:'Consumo'    },
  };

  function startEdit(m) {
    setEditId(m.id);
    setEditForm({ nota: m.nota||'', ref: m.ref||'', fecha: m.fecha||'' });
  }

  async function guardarEdit(id) {
    setSaving(true);
    try {
      const r = await window._apiUtil.updateMovimiento(id, editForm);
      if (r?.ok || r === null) {
        setMovs(x => x.map(m => m.id === id ? { ...m, ...editForm } : m));
        setEditId(null);
      } else alert('Error: ' + (r?.error||'desconocido'));
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  async function eliminar(id) {
    if (!confirm('¿Eliminar este movimiento? El stock ya aplicado NO se revierte automáticamente.')) return;
    setSaving(true);
    try {
      await window._apiUtil.deleteMovimiento(id);
      setMovs(x => x.filter(m => m.id !== id));
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  return (
    <>
      <div className="panel" style={{ marginBottom:14 }}>
        <Seg value={filtro} onChange={setFiltro} options={[
          { value:'todos',      label:`Todos (${movs.length})` },
          { value:'entrada',    label:'Entradas' },
          { value:'salida',     label:'Salidas' },
          { value:'produccion', label:'Producción' },
          { value:'consumo',    label:'Consumo' },
        ]} />
      </div>
      <div className="panel panel-flush">
        <table className="tbl">
          <thead><tr><th>Fecha</th><th>Tipo</th><th>Ítem</th><th className="num">Cantidad</th><th>Ref.</th><th>Nota</th><th></th></tr></thead>
          <tbody>
            {items.map(m => {
              const cfg  = tipoConfig[m.tipo] || tipoConfig.ajuste;
              const item = m.clase==='mp'
                ? MATERIALES_MOCK.find(x=>x.id===m.item_id)
                : PRODUCTOS_MOCK.find(x=>x.id===m.item_id);
              const isNeg = m.tipo==='salida'||m.tipo==='consumo';
              const isEdit = editId === m.id;
              return (
                <React.Fragment key={m.id}>
                  <tr style={{ background: isEdit ? 'var(--bg-raised)' : undefined }}>
                    <td className="mono xs">{isEdit ? <input className="input mono" value={editForm.fecha} onChange={e=>setEditForm(f=>({...f,fecha:e.target.value}))} style={{ width:110, padding:'3px 6px', fontSize:11.5 }}/> : m.fecha}</td>
                    <td><Chip tone={cfg.t}>{cfg.l}</Chip></td>
                    <td><div style={{ fontWeight:500 }}>{item?.nombre||m.item_id}</div><div className="xs mute">{m.clase==='mp'?'MP':'PT'}</div></td>
                    <td className="num mono" style={{ color:isNeg?'var(--bad)':'inherit' }}>{isNeg?'−':'+'}{fmtNum(m.cantidad)} <span className="xs mute">{m.unidad}</span></td>
                    <td className="mono xs">
                      {isEdit ? <input className="input mono" value={editForm.ref} onChange={e=>setEditForm(f=>({...f,ref:e.target.value}))} style={{ width:120, padding:'3px 6px', fontSize:11.5 }} placeholder="Referencia"/> : (m.ref||'—')}
                    </td>
                    <td className="xs">
                      {isEdit ? <input className="input" value={editForm.nota} onChange={e=>setEditForm(f=>({...f,nota:e.target.value}))} style={{ width:'100%', padding:'3px 6px', fontSize:11.5 }} placeholder="Nota"/> : m.nota}
                    </td>
                    <td>
                      {isEdit ? (
                        <div className="row" style={{ gap:4, justifyContent:'flex-end' }}>
                          <Btn size="sm" variant="primary" onClick={() => guardarEdit(m.id)} disabled={saving}><Icon name="check" size={11}/></Btn>
                          <Btn size="sm" variant="ghost" onClick={() => setEditId(null)}><Icon name="x" size={11}/></Btn>
                        </div>
                      ) : (
                        <div className="row" style={{ gap:4, justifyContent:'flex-end' }}>
                          <Btn size="sm" variant="ghost" onClick={() => startEdit(m)}><Icon name="edit" size={12}/></Btn>
                          <Btn size="sm" variant="ghost" className="danger" onClick={() => eliminar(m.id)}><Icon name="trash" size={12}/></Btn>
                        </div>
                      )}
                    </td>
                  </tr>
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>
    </>
  );
}


// ─── Modal: Nuevo movimiento manual ───
function NuevoMovimientoModal({ onClose, onSaved }) {
  const [clase, setClase] = useState('mp');
  const [tipo, setTipo] = useState('entrada');
  const [itemId, setItemId] = useState('');
  const [cantidad, setCantidad] = useState(0);
  const [unidad, setUnidad] = useState('kg');
  const [ref, setRef] = useState('');
  const [nota, setNota] = useState('');
  const [saving, setSaving] = useState(false);

  const tiposPorClase = {
    mp:     ['entrada', 'consumo', 'ajuste'],
    pt:     ['produccion', 'salida', 'ajuste'],
    aux:    ['entrada', 'consumo', 'ajuste'],
    pieza:  ['produccion', 'consumo', 'ajuste'],
    molido: ['entrada', 'consumo', 'ajuste'],
  };

  const itemsPorClase = () => {
    if (clase === 'mp') return (MATERIALES_MOCK || []).map(m => ({ id: m.id, label: m.nombre }));
    if (clase === 'pt') return (PRODUCTOS_MOCK || []).map(p => ({ id: p.id, label: p.nombre }));
    if (clase === 'aux') return (INVENTARIO_AUX_MOCK || []).map(a => ({ id: a.id, label: a.nombre }));
    if (clase === 'molido') {
      // Bins estandar del sistema (segregado por origen) + los que ya existan.
      const estandar = [
        { id:'mol-canula', label:'Cánula' }, { id:'mol-vaso', label:'Vaso' },
        { id:'mol-piston', label:'Pistón' }, { id:'mol-tapon', label:'Tapón' },
        { id:'mol-acordeon', label:'Acordeón' }, { id:'mol-capuchon', label:'Capuchón' },
        { id:'mol-alta', label:'PE Alta' }, { id:'mol-baja', label:'PE Baja' },
        { id:'mol-mazarota', label:'Mazarota' },
      ];
      const existentes = (INVENTARIO_MOLIDO_MOCK || []).map(m =>
        ({ id: m.id, label: (m.origen || m.id) + (m.producto ? ` (${m.producto})` : '') }));
      const ids = new Set(existentes.map(x => x.id));
      return [...existentes, ...estandar.filter(e => !ids.has(e.id))];
    }
    if (clase === 'pieza') return (INVENTARIO_PIEZAS_MOCK || []).map(p => ({
      id: `${(p.pieza || '').toLowerCase()}:${p.estado}${p.cliente_id ? ':' + p.cliente_id : ''}`,
      label: `${p.pieza} (${p.estado}${p.cliente_id ? ' · ' + p.cliente_id : ''})`,
    }));
    return [];
  };

  const unidadesPorClase = {
    mp: ['kg'], pt: ['cajas'], aux: ['unidades', 'rollos', 'cajas', 'kg', 'metros'],
    pieza: ['unidades'], molido: ['kg'],
  };

  React.useEffect(() => {
    const tipos = tiposPorClase[clase] || ['entrada'];
    if (!tipos.includes(tipo)) setTipo(tipos[0]);
    const items = itemsPorClase();
    if (items.length && !items.some(i => i.id === itemId)) setItemId(items[0].id);
    const unidades = unidadesPorClase[clase] || ['unidades'];
    if (!unidades.includes(unidad)) setUnidad(unidades[0]);
  }, [clase]);

  async function guardar() {
    if (!itemId || cantidad <= 0) {
      window.solpToast && window.solpToast('Completa item y cantidad', 'warn');
      return;
    }
    setSaving(true);
    const body = { clase, tipo, item_id: itemId, cantidad: parseFloat(cantidad), unidad, ref, nota };
    let res = null;
    try {
      res = await (window._apiUtil?.createMovimiento?.(body)
        || window._api?.crearMovimiento?.(body)
        || fetch('/api/inventario/movimientos', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body), credentials: 'same-origin'
          }).then(r => r.ok ? r.json() : { error: 'HTTP ' + r.status }));
    } catch (e) { res = { error: e.message }; }
    setSaving(false);
    if (res?.error) { window.solpToast && window.solpToast(res.error, 'bad'); return; }
    window.solpToast && window.solpToast(`Movimiento #${res?.id || ''} registrado`, 'ok');
    onSaved && onSaved();
  }

  const items = itemsPorClase();
  const tipos = tiposPorClase[clase] || ['entrada'];
  const unidades = unidadesPorClase[clase] || ['unidades'];

  return (
    <div className="modal-back" onClick={onClose}>
      <div className="modal-card lg" onClick={e => e.stopPropagation()} style={{ maxWidth: 560 }}>
        <div className="modal-head">
          <div style={{ fontFamily: 'var(--serif)', fontSize: 22 }}>Nuevo movimiento</div>
          <Btn variant="ghost" size="sm" onClick={onClose}><Icon name="x" size={16}/></Btn>
        </div>
        <div className="modal-body">
          <div className="xs mute" style={{ marginBottom: 14 }}>
            Registra entrada, salida o ajuste manual. Para entradas comunes (compra MP, producción) usa los flujos dedicados.
          </div>
          <div className="cols-2">
            <div className="field">
              <label>Categoría</label>
              <select className="select" value={clase} onChange={e => setClase(e.target.value)}>
                <option value="mp">Materia prima</option>
                <option value="pt">Producto terminado</option>
                <option value="aux">Material auxiliar</option>
                <option value="pieza">Pieza suelta</option>
                <option value="molido">Molido</option>
              </select>
            </div>
            <div className="field">
              <label>Tipo</label>
              <select className="select" value={tipo} onChange={e => setTipo(e.target.value)}>
                {tipos.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div className="field" style={{ gridColumn: 'span 2' }}>
              <label>Ítem</label>
              <select className="select" value={itemId} onChange={e => setItemId(e.target.value)}>
                <option value="">— selecciona —</option>
                {items.map(it => <option key={it.id} value={it.id}>{it.label}</option>)}
              </select>
            </div>
            <div className="field">
              <label>Cantidad</label>
              <input className="input mono" type="number" min="0" step="0.001"
                value={cantidad} onChange={e => setCantidad(parseFloat(e.target.value) || 0)} />
            </div>
            <div className="field">
              <label>Unidad</label>
              <select className="select" value={unidad} onChange={e => setUnidad(e.target.value)}>
                {unidades.map(u => <option key={u} value={u}>{u}</option>)}
              </select>
            </div>
            <div className="field" style={{ gridColumn: 'span 2' }}>
              <label>Referencia <span className="xs mute">(orden, lote, factura proveedor…)</span></label>
              <input className="input" value={ref} onChange={e => setRef(e.target.value)} placeholder="Ej. FACT-PROV-9912" />
            </div>
            <div className="field" style={{ gridColumn: 'span 2' }}>
              <label>Nota</label>
              <input className="input" value={nota} onChange={e => setNota(e.target.value)} placeholder="Detalle del movimiento" />
            </div>
          </div>
        </div>
        <div className="modal-foot">
          <Btn onClick={onClose}>Cancelar</Btn>
          <Btn variant="primary" onClick={guardar} disabled={saving || !itemId || cantidad <= 0}>
            {saving ? 'Guardando…' : 'Guardar movimiento'}
          </Btn>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { Inventario, NuevoMovimientoModal });

</script>

<script type="text/babel" data-file="pedidos.jsx">

// Pedidos — Cotizaciones, OC, Facturas (SRI), Guías, Certificados
// Flujo: Cotización → Orden de compra → Factura electrónica + Guía remisión + Certificado calidad

function Pedidos({ setPage }) {

      {tab === 'pipeline' && <PedidosPipeline onOpen={(kind, id) => { setTab(kind); setSel({ kind, id }); }} />}

      {tab === 'oc'   && <OrdenesTab       selId={sel?.kind === 'oc'   ? sel.id : null} clearSel={() => setSel(null)} />}

      {tab === 'guia' && <GuiasTab         selId={sel?.kind === 'guia' ? sel.id : null} clearSel={() => setSel(null)} />}

      {showWizard && (

        />

// ═══════════════════════ Pipeline Overview ═══════════════════════
function PedidosPipeline({ onOpen }) {
  const cots = COTIZACIONES_MOCK;
  const ocs  = ORDENES_COMPRA_MOCK;
  const facts = FACTURAS_MOCK;

  const pendientes = cots.filter(c => c.estado === 'enviada' || c.estado === 'borrador').length;
  const aprobadas  = cots.filter(c => c.estado === 'aprobada').length;
  const enProd     = ocs.filter(o => o.estado === 'en_produccion' || o.estado === 'pendiente').length;
  const porFacturar = ocs.filter(o => o.estado === 'lista' && !o.factura_asociada).length;
  const porPagar    = facts.filter(f => !f.pagada && f.estado_sri === 'autorizada').length;
  const montoPorPagar = facts.filter(f => !f.pagada).reduce((a, f) => a + f.total, 0);

  // Recordatorios: OCs con entrega en <5 días y no están listas
  const hoy = new Date('2026-04-22');
  const recordatorios = ocs.filter(o => o.estado !== 'entregada').map(o => {
    const diff = Math.ceil((new Date(o.fecha_entrega) - hoy) / 86400000);
    return { ...o, dias: diff };
  }).sort((a, b) => a.dias - b.dias);

  return (
    <>
      <div className="kpi-grid" style={{ marginBottom: 18 }}>
        <Kpi label="Cotizaciones en proceso" icon="doc"  value={`${pendientes}`} delta={`${aprobadas} aprobadas por convertir`} />
        <Kpi label="Órdenes en producción"   icon="box"  value={`${enProd}`} accent="var(--info)" />
        <Kpi label="Por facturar"            icon="receipt" value={`${porFacturar}`} accent="var(--warn)" />
        <Kpi label="Por cobrar"              icon="dollar"  value={fmtMoney(montoPorPagar)} delta={`${porPagar} facturas pendientes`} accent="var(--bad)" />
      </div>

      <div className="cols-2" style={{ gap: 18 }}>
        <div className="panel panel-flush">
          <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}>
            <PanelHead title="Próximas entregas" sub="Órdenes con fecha de entrega comprometida" />
          </div>
          {recordatorios.length === 0 && <div style={{ padding: 30, textAlign: 'center', color: 'var(--text-dim)' }}>Ninguna entrega pendiente.</div>}
          {recordatorios.map(r => {
            const cli = CLIENTES_MOCK.find(c => c.id === r.cliente);
            const urgencia = r.dias < 0 ? 'atraso' : r.dias < 3 ? 'urgente' : r.dias < 7 ? 'proximo' : 'normal';
            return (
              <button key={r.id} className="list-row" onClick={() => onOpen('oc', r.id)}
                style={{ width: '100%', textAlign: 'left', background: 'transparent', border: 0, cursor: 'pointer', color: 'var(--text)' }}>
                <div className={`reminder-pill ${urgencia}`}>
                  <strong>{r.dias < 0 ? `+${-r.dias}d` : r.dias === 0 ? 'HOY' : `${r.dias}d`}</strong>
                  <span className="xs">{r.dias < 0 ? 'atraso' : 'restante'}</span>
                </div>
                <div className="body">
                  <div className="ttl">{r.id} · {cli?.razon_social || r.cliente}</div>
                  <div className="cap">Entrega {r.fecha_entrega} · {r.items.length} productos · estado: {r.estado}</div>
                </div>
                <Icon name="arrow_r" size={14} className="mute" />
              </button>
            );
          })}
        </div>

        <div className="panel panel-flush">
          <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}>
            <PanelHead title="Flujo del pedido" sub="Etapas del proceso comercial" />
          </div>
          <div style={{ padding: 18 }}>
            <FlowDiagram />
          </div>
        </div>
      </div>

      <div className="panel panel-flush" style={{ marginTop: 18 }}>
        <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}>
          <PanelHead title="Actividad reciente" sub="Últimos movimientos en el módulo" />
        </div>
        {[
          { fecha: '2026-04-22', txt: 'Factura FAC-001-001-000001234 autorizada por SRI', ico: 'check', tone: 'good' },
          { fecha: '2026-04-22', txt: 'Guía GR-001-001-000000892 emitida para Life', ico: 'truck', tone: 'info' },
          { fecha: '2026-04-18', txt: 'OC-FA-20260418 (Farmayala) ingresó a producción', ico: 'box', tone: 'info' },
          { fecha: '2026-04-17', txt: 'Cotización COT-2026-0043 enviada a Life', ico: 'doc', tone: 'default' },
          { fecha: '2026-04-15', txt: 'Cotización COT-2026-0042 aprobada por Farmayala', ico: 'check', tone: 'good' },
        ].map((a, i) => (
          <div key={i} className="list-row">
            <div className="ico" style={{ background: a.tone === 'good' ? 'var(--good-soft)' : a.tone === 'info' ? 'var(--info-soft)' : 'var(--accent-soft)',
              color: a.tone === 'good' ? 'var(--good)' : a.tone === 'info' ? 'var(--info)' : 'var(--accent-hi)' }}>
              <Icon name={a.ico} size={14}/>
            </div>
            <div className="body">
              <div className="ttl">{a.txt}</div>
              <div className="cap">{a.fecha}</div>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

function FlowDiagram() {
  const stages = [
    { k: 'cot',  l: 'Cotización',  c: 'var(--accent)' },
    { k: 'oc',   l: 'Orden compra', c: 'var(--info)' },
    { k: 'prod', l: 'Producción',  c: 'var(--warn)' },
    { k: 'fact', l: 'Factura SRI', c: 'var(--good)' },
    { k: 'ent',  l: 'Entrega + Cert.', c: 'var(--accent-hi)' },
  ];
  return (
    <div className="flow">
      {stages.map((s, i) => (
        <React.Fragment key={s.k}>
          <div className="flow-node">
            <div className="flow-bubble" style={{ background: s.c, color: 'var(--bg)' }}>{i + 1}</div>
            <div className="flow-label">{s.l}</div>
          </div>
          {i < stages.length - 1 && <div className="flow-arrow">→</div>}
        </React.Fragment>
      ))}
    </div>
  );
}

// ═══════════════════════ Helpers ═══════════════════════
function cliente(id) { return CLIENTES_MOCK.find(c => c.id === id); }
function producto(id) { return PRODUCTOS_MOCK.find(p => p.id === id); }

function EstadoChip({ estado, kind }) {
  const colores = {
    borrador:   { t: 'default',  l: 'Borrador' },
    enviada:    { t: 'accent',  l: 'Enviada' },
    aprobada:   { t: 'good',    l: 'Aprobada' },
    convertida: { t: 'good',    l: 'Convertida' },
    rechazada:  { t: 'bad',     l: 'Rechazada' },
    pendiente:      { t: 'default', l: 'Pendiente' },
    en_produccion:  { t: 'info',    l: 'En producción' },
    lista:          { t: 'accent',  l: 'Lista' },
    facturada:      { t: 'good',    l: 'Facturada' },
    entregada:      { t: 'good',    l: 'Entregada' },
    firmada:        { t: 'default', l: 'Firmada' },
    autorizada:     { t: 'good',    l: 'Autorizada SRI' },
  };
  const cfg = colores[estado] || { t: 'default', l: estado };
  return <Chip tone={cfg.t}>{cfg.l}</Chip>;
}

function calcTotal(items, campo = 'precio_caja') {
  return items.reduce((a, i) => a + (i.cant_cajas || 0) * (i[campo] || 0), 0);
}

// ═══════════════════════ Cotizaciones ═══════════════════════
function CotizacionesTab({ selId, clearSel }) {
  const [q, setQ] = useState('');
  const [filtro, setFiltro] = useState('todas');
  const [detail, setDetail] = useState(selId || null);

  React.useEffect(() => { if (selId) setDetail(selId); }, [selId]);

  const items = COTIZACIONES_MOCK.filter(c => {
    const cli = cliente(c.cliente);
    const matchQ = !q || c.id.toLowerCase().includes(q.toLowerCase()) || (cli?.razon_social || '').toLowerCase().includes(q.toLowerCase());
    const matchF = filtro === 'todas' || c.estado === filtro;
    return matchQ && matchF;
  }).sort((a, b) => b.fecha.localeCompare(a.fecha));

  if (detail) {
    const cot = COTIZACIONES_MOCK.find(c => c.id === detail);
    if (!cot) return null;
    return <CotizacionDetalle cot={cot} onBack={() => { setDetail(null); clearSel(); }} />;
  }

  return (
    <>
      <div className="panel" style={{ marginBottom: 14 }}>
        <div className="row" style={{ justifyContent: 'space-between', flexWrap: 'wrap', gap: 10 }}>
          <div className="row" style={{ gap: 8, flex: 1, minWidth: 220 }}>
            <input className="input" type="text" placeholder="Buscar por número o cliente…" value={q} onChange={e => setQ(e.target.value)} style={{ flex: 1 }} />
          </div>
          <Seg value={filtro} onChange={setFiltro} options={[
            { value: 'todas',      label: `Todas (${COTIZACIONES_MOCK.length})` },
            { value: 'borrador',   label: 'Borrador' },
            { value: 'enviada',    label: 'Enviadas' },
            { value: 'aprobada',   label: 'Aprobadas' },
            { value: 'rechazada',  label: 'Rechazadas' },
          ]} />
        </div>
      </div>

      <div className="panel panel-flush">
        <table className="tbl tbl-hover">
          <thead>
            <tr>
              <th>Número</th><th>Cliente</th><th>Fecha</th><th>Items</th><th className="num">Total</th><th>Validez</th><th>Estado</th><th></th>
            </tr>
          </thead>
          <tbody>
            {items.map(c => {
              const cli = cliente(c.cliente);
              const total = calcTotal(c.items);
              return (
                <tr key={c.id} onClick={() => setDetail(c.id)} style={{ cursor: 'pointer' }}>
                  <td className="mono">{c.id}</td>
                  <td>{cli?.razon_social}</td>
                  <td className="mono xs">{c.fecha}</td>
                  <td>{c.items.length}</td>
                  <td className="num mono">{fmtMoney(total)}</td>
                  <td className="xs mute">{c.validez_dias} días</td>
                  <td><EstadoChip estado={c.estado} kind="cot" /></td>
                  <td><Icon name="arrow_r" size={12} className="mute" /></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </>
  );
}

function CotizacionDetalle({ cot: cotProp, onBack }) {
  const [cot,          setCot]          = useState(cotProp);
  const [showProforma, setShowProforma] = useState(false);
  const [saving,       setSaving]       = useState(false);
  const cli   = cliente(cot.cliente);
  const total = calcTotal(cot.items);
  const iva   = total * 0.12;
  const conIva = total + iva;

  async function cambiarEstado(nuevoEstado) {
    setSaving(true);
    try {
      const r = await window._apiUtil.patchCollectionItem('cotizaciones', cot.id, { estado: nuevoEstado });
      if (r?.ok || r === null) {
        setCot(c => ({ ...c, estado: nuevoEstado }));
        const idx = COTIZACIONES_MOCK.findIndex(x => x.id === cot.id);
        if (idx >= 0) COTIZACIONES_MOCK[idx].estado = nuevoEstado;
      } else alert('Error: ' + (r?.error || 'desconocido'));
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  async function convertirOC() {
    // Create a new OC from the cotización
    const year = new Date().getFullYear();
    const cliObj = cliente(cot.cliente);
    const cliCode = cliObj?.nombre_comercial?.slice(0,2).toUpperCase() || 'XX';
    const fecha = new Date().toISOString().slice(0,10);
    const nuevaOC = {
      id: `OC-${cliCode}-${fecha.replace(/-/g,'')}`,
      cliente: cot.cliente,
      cotizacion_id: cot.id,
      fecha_recepcion: fecha,
      fecha_entrega: new Date(Date.now() + 15*86400000).toISOString().slice(0,10),
      estado: 'pendiente',
      items: cot.items.map(it => ({ prod_id: it.prod_id, cant_cajas: it.cant_cajas, precio_caja: it.precio_caja })),
      nro_pedido_cliente: '',
      factura_asociada: null,
    };
    ORDENES_COMPRA_MOCK.unshift(nuevaOC);
    const ocs = await window._apiUtil.fetchCollection('ordenes_compra');
    if (ocs) { await window._apiUtil.putCollection('ordenes_compra', [...(ocs), nuevaOC]); }
    await cambiarEstado('convertida');
    setCot(c => ({ ...c, oc_asociada: nuevaOC.id }));
  }

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <div className="row" style={{ gap:8, marginBottom:6 }}>
            <Btn size="sm" variant="ghost" onClick={onBack}><Icon name="arrow_l" size={12}/> Cotizaciones</Btn>
          </div>
          <Eyebrow>Cotización</Eyebrow>
          <h1 className="page-title">{cot.id}</h1>
          <div className="page-sub">{cli?.razon_social} · emitida {cot.fecha} · validez {cot.validez_dias} días</div>
        </div>
        <div className="row" style={{ flexWrap:'wrap', gap:8 }}>
          <EstadoChip estado={cot.estado} />
          {cot.estado === 'borrador'  && <Btn onClick={() => cambiarEstado('enviada')} disabled={saving}><Icon name="send" size={14}/> Enviar</Btn>}
          {cot.estado === 'enviada'   && <Btn onClick={() => cambiarEstado('aprobada')} disabled={saving}><Icon name="check" size={14}/> Marcar aprobada</Btn>}
          {cot.estado === 'enviada'   && <Btn variant="ghost" className="danger" onClick={() => cambiarEstado('rechazada')} disabled={saving}>Rechazar</Btn>}
          {cot.estado === 'aprobada' && !cot.oc_asociada && <Btn variant="primary" onClick={convertirOC} disabled={saving}><Icon name="arrow_r" size={14}/> Convertir a OC</Btn>}
          {cot.oc_asociada && <Chip tone="good">OC: {cot.oc_asociada}</Chip>}
          <Btn variant="primary" onClick={() => setShowProforma(true)}><Icon name="download" size={14}/> Ver proforma</Btn>
        </div>
      </div>
      {showProforma && <ProformaCot cotId={cot.id} onClose={() => setShowProforma(false)} />}

      <div className="cols-2" style={{ gap: 16, marginBottom: 18 }}>
        <div className="panel">
          <Eyebrow>Cliente</Eyebrow>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 22, letterSpacing: '-0.01em', marginTop: 4 }}>{cli?.razon_social}</div>
          <div className="info-grid" style={{ marginTop: 10 }}>
            <div><span className="xs mute">RUC</span><div className="mono">{cli?.ruc}</div></div>
            <div><span className="xs mute">Email</span><div className="xs">{cli?.email_contacto || cli?.email_fact}</div></div>
            <div><span className="xs mute">Teléfono</span><div className="xs">{cli?.telefono}</div></div>
            <div><span className="xs mute">Crédito</span><div className="xs">{cli?.credito_dias} días</div></div>
          </div>
        </div>
        <div className="panel">
          <Eyebrow>Resumen</Eyebrow>
          <div className="tot-rows" style={{ marginTop: 8 }}>
            <div><span>Subtotal</span><span className="mono">{fmtMoney(total)}</span></div>
            <div><span>IVA 12%</span><span className="mono">{fmtMoney(iva)}</span></div>
            <div className="tot-big"><span>Total</span><span className="mono">{fmtMoney(conIva)}</span></div>
          </div>
          {cot.observaciones && (
            <div style={{ marginTop: 12, padding: 10, background: 'var(--bg-raised)', borderRadius: 'var(--radius-sm)', fontSize: 12.5 }}>
              <strong className="xs mute">Observaciones</strong>
              <div style={{ marginTop: 4 }}>{cot.observaciones}</div>
            </div>
          )}
        </div>
      </div>

      <div className="panel panel-flush">
        <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}>
          <PanelHead title="Ítems cotizados" sub={`${cot.items.length} productos`} />
        </div>
        <table className="tbl">
          <thead>
            <tr><th>Producto</th><th>Material</th><th className="num">Cajas</th><th className="num">Unidades</th><th className="num">Precio caja</th><th className="num">Subtotal</th></tr>
          </thead>
          <tbody>
            {cot.items.map((it, i) => {
              const p = producto(it.prod_id);
              return (
                <tr key={i}>
                  <td><div style={{ fontWeight: 600 }}>{p?.nombre}</div><div className="xs mute">{p?.id}</div></td>
                  <td className="xs">{p?.material}</td>
                  <td className="num mono">{it.cant_cajas}</td>
                  <td className="num mono xs">{fmtNum((p?.unidades_caja || 0) * it.cant_cajas)}</td>
                  <td className="num mono">{fmtMoney(it.precio_caja)}</td>
                  <td className="num mono">{fmtMoney(it.cant_cajas * it.precio_caja)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ═══════════════════════ Órdenes de Compra ═══════════════════════
function OrdenesTab({ selId, clearSel }) {
  const [detail, setDetail] = useState(selId || null);
  React.useEffect(() => { if (selId) setDetail(selId); }, [selId]);

  const items = ORDENES_COMPRA_MOCK.slice().sort((a, b) => b.fecha_recepcion.localeCompare(a.fecha_recepcion));

  if (detail) {
    const oc = ORDENES_COMPRA_MOCK.find(o => o.id === detail);
    if (!oc) return null;
    return <OCDetalle oc={oc} onBack={() => { setDetail(null); clearSel(); }} />;
  }

  return (
    <div className="panel panel-flush">
      <table className="tbl tbl-hover">
        <thead>

function OCDetalle({ oc: ocProp, onBack }) {
  const [oc,            setOc]            = useState(ocProp);
  const [showDespacho,  setShowDespacho]  = useState(false);
  const [showPreDespa,  setShowPreDespa]  = useState(false);
  const [responsable,   setResponsable]   = useState('');
  const [saving,        setSaving]        = useState(false);

  const cli   = cliente(oc.cliente);
  const total = calcTotal(oc.items);
  const iva   = total * 0.12;

  // FIFO lot state
  const [loteSel, setLoteSel] = useState(() => {
    const init = {};
    oc.items.forEach(it => {
      const lotes = LOTES_MOCK.filter(l => l.prod_id === it.prod_id && l.estado === 'stock')
        .sort((a,b) => a.fecha_fab.localeCompare(b.fecha_fab));
      let rest = it.cant_cajas;
      init[it.prod_id] = {};
      lotes.forEach(l => { if (rest <= 0) return; const usar = Math.min(l.cajas, rest); init[it.prod_id][l.id] = usar; rest -= usar; });
    });
    return init;
  });
  const loteTotal = (pid) => Object.values(loteSel[pid]||{}).reduce((a,v)=>a+v,0);

  async function avanzarEstado(nuevoEstado) {
    setSaving(true);
    try {
      const r = await window._apiUtil.patchCollectionItem('ordenes_compra', oc.id, { estado: nuevoEstado });
      if (r?.ok || r === null) {
        setOc(o => ({ ...o, estado: nuevoEstado }));
        // Update mock
        const idx = ORDENES_COMPRA_MOCK.findIndex(x => x.id === oc.id);
        if (idx >= 0) ORDENES_COMPRA_MOCK[idx].estado = nuevoEstado;
      } else alert('Error: ' + (r?.error || 'desconocido'));
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  async function confirmarPreDespacho() {
    if (!responsable.trim()) { alert('Ingresa el nombre del responsable'); return; }
    setSaving(true);
    try {
      const patch = { estado: 'predespacho', responsable_predespacho: responsable, fecha_predespacho: new Date().toISOString().slice(0,10), lotes_despacho: loteSel };
      const r = await window._apiUtil.patchCollectionItem('ordenes_compra', oc.id, patch);
      if (r?.ok || r === null) {
        setOc(o => ({ ...o, ...patch }));
        const idx = ORDENES_COMPRA_MOCK.findIndex(x => x.id === oc.id);
        if (idx >= 0) Object.assign(ORDENES_COMPRA_MOCK[idx], patch);
        setShowPreDespa(false);
      } else alert('Error: ' + (r?.error || 'desconocido'));
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <div className="row" style={{ gap:8, marginBottom:6 }}>
            <Btn size="sm" variant="ghost" onClick={onBack}><Icon name="arrow_l" size={12}/> Órdenes</Btn>
          </div>
          <Eyebrow>Orden de compra</Eyebrow>
          <h1 className="page-title">{oc.id}</h1>
          <div className="page-sub">{cli?.razon_social} · {oc.nro_pedido_cliente} · recibida {oc.fecha_recepcion}</div>
        </div>
        <div className="row" style={{ flexWrap:'wrap', gap:8 }}>
          <EstadoChip estado={oc.estado} />
          {oc.estado === 'pendiente'     && <Btn variant="ghost" onClick={() => avanzarEstado('en_produccion')} disabled={saving}>→ En producción</Btn>}
          {oc.estado === 'en_produccion' && <Btn variant="ghost" onClick={() => avanzarEstado('lista')} disabled={saving}>→ Marcar lista</Btn>}
          {oc.estado === 'lista'         && <Btn variant="primary" onClick={() => setShowPreDespa(true)}><Icon name="check" size={14}/> Iniciar pre-despacho</Btn>}
          {oc.estado === 'predespacho'   && <Btn variant="primary" onClick={() => setShowDespacho(true)}><Icon name="truck" size={14}/> Confirmar despacho + factura</Btn>}
          {oc.factura_asociada           && <Btn variant="ghost"><Icon name="receipt" size={14}/> Ver {oc.factura_asociada}</Btn>}
        </div>
      </div>

      <OCProgress estado={oc.estado} />

      {/* Pre-despacho info banner */}
      {oc.estado === 'predespacho' && (
        <div className="alert good" style={{ marginTop:14 }}>
          <div className="icon"><Icon name="check" size={16}/></div>
          <div className="body">
            <div className="title">Pre-despacho validado por {oc.responsable_predespacho}</div>
            <div className="msg">Fecha: {oc.fecha_predespacho} · Lotes confirmados. Listo para emitir factura y guía.</div>
          </div>
        </div>
      )}

      {/* Modal pre-despacho */}
      {showPreDespa && (
        <div className="modal-back" onClick={() => setShowPreDespa(false)}>
          <div className="modal-card lg" onClick={e => e.stopPropagation()} style={{ maxWidth:680 }}>
            <div className="modal-head">
              <div style={{ fontFamily:'var(--serif)', fontSize:22 }}>Pre-despacho — validación de lotes</div>
              <Btn variant="ghost" size="sm" onClick={() => setShowPreDespa(false)}><Icon name="x" size={16}/></Btn>
            </div>
            <div className="modal-body">
              <div className="alert info" style={{ marginBottom:16 }}>
                <div className="icon"><Icon name="info" size={16}/></div>
                <div className="body">
                  <div className="title">Revisar lotes antes de facturar</div>
                  <div className="msg">Fernando o Carlos verifican que los lotes seleccionados corresponden a lo que se despacha. FIFO pre-seleccionado.</div>
                </div>
              </div>
              {oc.items.map(it => {
                const p = producto(it.prod_id);
                const lotes = LOTES_MOCK.filter(l => l.prod_id === it.prod_id && l.estado === 'stock')
                  .sort((a,b) => a.fecha_fab.localeCompare(b.fecha_fab));
                const sel = loteSel[it.prod_id] || {};
                const totalSel = loteTotal(it.prod_id);
                const completo = totalSel >= it.cant_cajas;
                return (
                  <div key={it.prod_id} style={{ marginBottom:20 }}>
                    <div className="row" style={{ justifyContent:'space-between', marginBottom:8 }}>
                      <div><div style={{ fontWeight:600 }}>{p?.nombre}</div><div className="xs mute">Necesita: {it.cant_cajas} cajas · Seleccionado: <strong style={{ color:completo?'var(--good)':'var(--warn)' }}>{totalSel}</strong></div></div>
                      {completo ? <Chip tone="good"><Icon name="check" size={10}/> OK</Chip> : <Chip tone="warn">Falta {it.cant_cajas-totalSel}</Chip>}
                    </div>
                    {lotes.map((l, li) => (
                      <div key={l.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 12px', background:'var(--surface)', border:`1px solid ${sel[l.id]>0?'var(--accent)':'var(--line)'}`, borderRadius:'var(--radius-sm)', marginBottom:6 }}>
                        {li===0 && <Chip tone="good" style={{ fontSize:10, flexShrink:0 }}>FIFO 1°</Chip>}
                        {li>0   && <span style={{ width:52 }}/>}
                        <div className="mono xs" style={{ color:'var(--accent-hi)', minWidth:120 }}>{l.id}</div>
                        <div className="xs mute">Fab: <strong>{l.fecha_fab}</strong></div>
                        <div className="xs mute">Disp: {l.cajas}</div>
                        <div style={{ marginLeft:'auto' }}>
                          <div className="num-stepper sm">
                            <button onClick={() => setLoteSel(s=>({...s,[it.prod_id]:{...s[it.prod_id],[l.id]:Math.max(0,(s[it.prod_id]?.[l.id]||0)-1)}}))}>
                              <Icon name="minus" size={11}/>
                            </button>
                            <input type="number" value={sel[l.id]||0} min={0} max={l.cajas}
                              onChange={e => setLoteSel(s=>({...s,[it.prod_id]:{...s[it.prod_id],[l.id]:Math.min(l.cajas,parseInt(e.target.value)||0)}}))}
                              style={{ width:50 }}/>
                            <button onClick={() => setLoteSel(s=>({...s,[it.prod_id]:{...s[it.prod_id],[l.id]:Math.min(l.cajas,(s[it.prod_id]?.[l.id]||0)+1)}}))}>
                              <Icon name="plus" size={11}/>
                            </button>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })}
              <div className="field" style={{ marginTop:16 }}>
                <label>Validado por</label>
                <input className="input" value={responsable} onChange={e => setResponsable(e.target.value)} placeholder="Nombre del responsable (Fernando, Carlos…)" />
              </div>
            </div>
            <div className="modal-foot">
              <Btn onClick={() => setShowPreDespa(false)}>Cancelar</Btn>
              <Btn variant="primary" onClick={confirmarPreDespacho} disabled={saving || !responsable.trim()}>
                <Icon name="check" size={14}/> Confirmar pre-despacho
              </Btn>
            </div>
          </div>
        </div>
      )}

      <div className="cols-2" style={{ gap:16, marginTop:18 }}>
        <div className="panel">
          <Eyebrow>Fechas clave</Eyebrow>
          <div className="info-grid" style={{ marginTop:8 }}>
            <div><span className="xs mute">Recepción OC</span><div>{oc.fecha_recepcion}</div></div>
            <div><span className="xs mute">Entrega comprometida</span><div>{oc.fecha_entrega}</div></div>
            <div><span className="xs mute">Cotización origen</span><div className="xs mono">{oc.cotizacion_id||'— directa'}</div></div>
            <div><span className="xs mute">OC cliente</span><div className="xs mono">{oc.nro_pedido_cliente}</div></div>
          </div>
        </div>
        <div className="panel">
          <Eyebrow>Totales</Eyebrow>
          <div className="tot-rows" style={{ marginTop:8 }}>
            <div><span>Subtotal</span><span className="mono">{fmtMoney(total)}</span></div>
            <div><span>IVA 12%</span><span className="mono">{fmtMoney(iva)}</span></div>
            <div className="tot-big"><span>Total</span><span className="mono">{fmtMoney(total+iva)}</span></div>
          </div>
        </div>
      </div>

      <div className="panel panel-flush" style={{ marginTop:18 }}>
        <div style={{ padding:18, borderBottom:'1px solid var(--line)' }}>
          <PanelHead title="Ítems solicitados" sub={`${oc.items.length} productos`} />
        </div>
        <table className="tbl">
          <thead><tr><th>Producto</th><th className="num">Cajas</th><th className="num">Precio caja</th><th className="num">Subtotal</th><th>Disponible</th><th>Lotes</th></tr></thead>
          <tbody>
            {oc.items.map((it, i) => {
              const p = producto(it.prod_id);
              const inv = INVENTARIO_PT_MOCK.find(x => x.prod_id === it.prod_id);
              const disp = inv ? (inv.stock_cajas - inv.reservado) : 0;
              const cubre = disp >= it.cant_cajas;
              const lotes = LOTES_MOCK.filter(l => l.prod_id === it.prod_id && l.estado === 'stock')
                .sort((a,b)=>a.fecha_fab.localeCompare(b.fecha_fab));
              return (
                <tr key={i}>
                  <td><div style={{ fontWeight:600 }}>{p?.nombre}</div></td>
                  <td className="num mono">{it.cant_cajas}</td>
                  <td className="num mono">{fmtMoney(it.precio_caja)}</td>
                  <td className="num mono">{fmtMoney(it.cant_cajas*it.precio_caja)}</td>
                  <td><Chip tone={cubre?'good':'warn'}>{cubre?`${disp} disp.`:`Falta ${it.cant_cajas-disp}`}</Chip></td>
                  <td>
                    <div className="row" style={{ gap:4, flexWrap:'wrap' }}>
                      {lotes.slice(0,2).map(l=><Chip key={l.id} style={{ fontSize:10 }}>{l.id} · {l.fecha_fab}</Chip>)}
                      {lotes.length>2 && <Chip style={{ fontSize:10 }}>+{lotes.length-2}</Chip>}
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function OCProgress({ estado }) {
  const etapas = ['pendiente','en_produccion','lista','predespacho','facturada','entregada'];
  const labels  = { pendiente:'Recibida', en_produccion:'Producción', lista:'Lista', predespacho:'Pre-despacho', facturada:'Facturada', entregada:'Entregada' };
  const idx     = etapas.indexOf(estado);
  return (
    <div className="progress-stepper">
      {etapas.map((e, i) => (
        <React.Fragment key={e}>
          <div className={`ps-node ${i <= idx ? 'done' : ''} ${i === idx ? 'current' : ''}`}>
            <div className="ps-dot">{i <= idx ? <Icon name="check" size={11}/> : i + 1}</div>
            <div className="ps-lbl">{labels[e]}</div>
          </div>
          {i < etapas.length - 1 && <div className={`ps-line ${i < idx ? 'done' : ''}`}></div>}
        </React.Fragment>
      ))}
    </div>
  );
}

  if (detail) {
    const f = FACTURAS_MOCK.find(x => x.id === detail);

    return <FacturaDetalle factura={f} onBack={() => { setDetail(null); clearSel(); }} setPage={setPage} />;

function FacturaDetalle({ factura: facturaProp, onBack, setPage }) {
  const [factura,    setFactura]    = useState(facturaProp);
  const [docOpen,    setDocOpen]    = useState(null);
  const [showAnular, setShowAnular] = useState(false);
  const [motivo,     setMotivo]     = useState('');
  const [saving,     setSaving]     = useState(false);
  const cli = cliente(factura.cliente);

  // Days since authorization (90-day anulación window)
  const diasDesdeAut = factura.fecha_autorizacion
    ? Math.floor((Date.now() - new Date(factura.fecha_autorizacion.slice(0,10)+'T00:00:00')) / 86400000)
    : 999;
  const puedeAnular = factura.estado_sri === 'autorizada' && diasDesdeAut <= 90;

  async function anular() {
    if (!motivo.trim()) { alert('Ingresa el motivo de anulación'); return; }
    setSaving(true);
    try {
      const r = await window._apiUtil.sriAnular(factura.id, motivo, 'factura');
      if (r?.ok) {
        setFactura(f => ({ ...f, estado_sri:'anulada', motivo_anulacion: motivo }));
        const idx = FACTURAS_MOCK.findIndex(x => x.id === factura.id);
        if (idx >= 0) { FACTURAS_MOCK[idx].estado_sri = 'anulada'; FACTURAS_MOCK[idx].motivo_anulacion = motivo; }
        setShowAnular(false);
      } else alert('Error: ' + (r?.error||'desconocido'));
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  return (
    <div className="fadein">
      {docOpen === 'ride' && <RideFactura facturaId={factura.id} onClose={() => setDocOpen(null)} />}
      {docOpen === 'guia' && factura.guia_asociada && (
        <RideGuia guiaId={factura.guia_asociada} onClose={() => setDocOpen(null)} />
      )}
      {docOpen === 'cert' && factura.cert_calidad && (
        <RideCertificado certId={factura.cert_calidad} onClose={() => setDocOpen(null)} />
      )}

      <div className="page-head">
        <div>
          <div className="row" style={{ gap:8, marginBottom:6 }}>
            <Btn size="sm" variant="ghost" onClick={onBack}><Icon name="arrow_l" size={12}/> Facturas</Btn>
          </div>
          <Eyebrow>Factura electrónica SRI</Eyebrow>
          <h1 className="page-title">{factura.id}</h1>
          <div className="page-sub">{cli?.razon_social} · emitida {factura.fecha_emision}</div>
        </div>
        <div className="row" style={{ flexWrap:'wrap', gap:8 }}>
          <EstadoSRI estado={factura.estado_sri}/>
          {factura.estado_sri === 'autorizada' && setPage && (
            <Btn variant="ghost" onClick={() => setPage('contabilidad')}>
              <Icon name="doc" size={14}/> Nota de crédito
            </Btn>
          )}
          {puedeAnular && (
            <Btn variant="ghost" className="danger" onClick={() => setShowAnular(true)}>
              <Icon name="x" size={14}/> Anular
            </Btn>
          )}
          <Btn variant="ghost" onClick={() => setDocOpen('ride')}><Icon name="download" size={14}/> Ver RIDE</Btn>
        </div>
      </div>

      {/* Anulación modal */}
      <Modal open={showAnular} onClose={() => setShowAnular(false)} title="Anular factura"
        footer={<>
          <Btn onClick={() => setShowAnular(false)}>Cancelar</Btn>
          <Btn variant="danger" className="danger" onClick={anular} disabled={saving||!motivo.trim()}>
            {saving?'Anulando…':'Confirmar anulación'}
          </Btn>
        </>}>
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <div className="alert warn">
            <div className="icon"><Icon name="alert" size={16}/></div>
            <div className="body">
              <div className="title">Anulación de factura SRI</div>

            </div>
          </div>
          <div className="field" style={{ margin:0 }}>
            <label>Motivo de anulación</label>
            <textarea className="input" rows={3} value={motivo} onChange={e=>setMotivo(e.target.value)}
              placeholder="Ej: Error en datos del cliente, devolución total del pedido…" style={{ resize:'vertical' }}/>
          </div>
        </div>
      </Modal>

      {factura.estado_sri === 'anulada' && (

          <div className="icon"><Icon name="x" size={16}/></div>

            <div className="title">Factura anulada</div>

        <div className="panel panel-flush" style={{ marginBottom:16, background:'var(--good-soft)', borderColor:'var(--good)' }}>

            <div style={{ flex:1 }}>
              <div style={{ fontWeight:600 }}>Autorizada por el SRI</div>
              <div className="xs mute">Auth. {factura.autorizacion_sri} · {factura.fecha_autorizacion}</div>
            </div>
          </div>
        </div>
