// Certificado de calidad (multi-componente)
// ═══════════════════════════════════════════════════════════════════
function RideCertificado({ certId, onClose }) {
  const baseCert = CERTIFICADOS_MOCK.find(c => c.id === certId);
  const [cert, setCert] = useState(baseCert);
  const fact = FACTURAS_MOCK.find(f => f.id === cert.factura_id);
  const cli = fact ? CLIENTES_MOCK.find(c => c.id === fact.cliente) : null;

  if (!cert) return null;

  const upd = (k, v) => setCert({ ...cert, [k]: v });

  // Para cada item en la factura, intentamos cargar su template de certificado desde PRODUCTOS_MOCK
  const items = fact?.items || [];

  return (
    <DocModal onClose={onClose} title={`Certificado ${cert.id}`}>
      <div className="doc-page a4 doc-cert">
        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', paddingBottom: 18, borderBottom: '3px solid #5b3a8a' }}>
          <div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 42, lineHeight: 0.9, letterSpacing: '-0.02em' }}>
              sol<em style={{ fontStyle: 'italic', color: '#5b3a8a' }}>plast</em>
            </div>
            <div style={{ fontSize: 10, color: '#555', marginTop: 6, letterSpacing: '0.08em', textTransform: 'uppercase' }}>
              Control de Calidad · Laboratorio interno
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 28, letterSpacing: '-0.01em', color: '#5b3a8a' }}>
              Certificado de Análisis
            </div>
            <div className="mono" style={{ fontSize: 12, marginTop: 4 }}>{cert.id}</div>
          </div>
        </div>

        {/* Identificación */}
        <div className="cert-meta">
          <div><span className="cert-label">Emitido a</span><div>{cli?.razon_social}</div></div>
          <div><span className="cert-label">RUC</span><div className="mono">{cli?.ruc}</div></div>
          <div><span className="cert-label">Factura</span><div className="mono xs">{cert.factura_id}</div></div>
          <div><span className="cert-label">Fecha de emisión</span><div><Editable value={cert.fecha} onChange={v => upd('fecha', v)} /></div></div>
          <div><span className="cert-label">Lote de producción</span><div className="mono"><Editable value={cert.lote} onChange={v => upd('lote', v)} /></div></div>
          <div><span className="cert-label">Controlado por</span><div><Editable value={cert.controlado_por} onChange={v => upd('controlado_por', v)} /></div></div>
        </div>

        {/* Para cada producto, un bloque de parámetros */}
        {items.map((it, i) => {
          const prod = PRODUCTOS_MOCK.find(p => p.id === it.prod_id);
          return <CertProductoBloque key={i} prod={prod} cantidad={it.cant_cajas} />;
        })}

        {/* Declaración */}
        <div className="cert-declaracion">
          <div className="cert-label">Declaración</div>
          <p style={{ marginTop: 8, fontSize: 11, lineHeight: 1.6 }}>
            Se certifica que el lote arriba identificado fue sometido al proceso de control de calidad interno de {EMISOR.nombre_comercial} y que los parámetros analizados cumplen con las especificaciones técnicas establecidas para cada producto. Los envases son aptos para uso farmacéutico y no contienen aditivos distintos de los declarados en la ficha técnica correspondiente.
          </p>
        </div>

        {/* Observaciones */}
        <div style={{ marginTop: 20 }}>
          <div className="cert-label">Observaciones</div>
          <div style={{ marginTop: 6, fontSize: 11, lineHeight: 1.6, color: '#333' }}>
            <Editable value={cert.observaciones || ''} onChange={v => upd('observaciones', v)} multiline placeholder="Sin observaciones" />
          </div>
        </div>

        {/* Firmas */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 40, marginTop: 60, fontSize: 10.5 }}>
          <div style={{ textAlign: 'center' }}>
            <div style={{ borderBottom: '1px solid #000', height: 40 }} />
            <div style={{ marginTop: 6 }}><b>{EMISOR.responsable_calidad}</b></div>
            <div className="xs mute">Responsable de Calidad</div>
          </div>
          <div style={{ textAlign: 'center' }}>
            <div style={{ borderBottom: '1px solid #000', height: 40 }} />
            <div style={{ marginTop: 6 }}><b>{EMISOR.revisor_calidad}</b></div>
            <div className="xs mute">Revisor · Jefe de Producción</div>
          </div>
        </div>
      </div>
    </DocModal>
  );
}

function CertProductoBloque({ prod, cantidad }) {
  if (!prod) return null;
  const params = getCertTemplate(prod);
  return (
    <div className="cert-producto">
      <div className="cert-producto-head">
        <div>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 20, letterSpacing: '-0.01em' }}>{prod.nombre}</div>
          <div className="xs mute" style={{ marginTop: 2 }}>{prod.material} · {prod.unidades_caja} unidades/caja · {cantidad} cajas</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <span className="cert-ok-badge">✓ Aprobado</span>
        </div>
      </div>
      <table className="cert-params">
        <thead>
          <tr>
            <th>Parámetro</th>
            <th>Especificación</th>
            <th>Método</th>
            <th>Resultado</th>
            <th style={{ textAlign: 'center' }}>Estado</th>
          </tr>
        </thead>
        <tbody>
          {params.map((p, i) => (
            <tr key={i}>
              <td style={{ fontWeight: 500 }}>{p.parametro}</td>
              <td className="xs">{p.especificacion}</td>
              <td className="xs mute">{p.metodo}</td>
              <td className="mono">{p.resultado}</td>
              <td style={{ textAlign: 'center', color: '#0d7f45' }}>✓</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// Templates por tipo de producto — se alimenta del kind + nombre
function getCertTemplate(prod) {
  if (!prod) return [];
  const kind = prod.kind;
  if (kind === 'vaso') {
    return [
      { parametro: 'Capacidad nominal',    especificacion: '30 mL ± 2%',             metodo: 'Inspección volumétrica',        resultado: '30.2 mL' },
      { parametro: 'Peso por unidad',      especificacion: `${prod.peso_g}g ± 5%`,   metodo: 'Balanza analítica',             resultado: `${prod.peso_g.toFixed(3)}g` },
      { parametro: 'Espesor de pared',     especificacion: '0.30 – 0.40 mm',         metodo: 'Micrómetro calibrado',          resultado: '0.34 mm' },
      { parametro: 'Transparencia',        especificacion: 'Cristalino, sin turbidez', metodo: 'Inspección visual ISO 9001',  resultado: 'Conforme' },
      { parametro: 'Hermeticidad',         especificacion: 'Sin fuga en 24h',        metodo: 'Prueba de inmersión',           resultado: 'Conforme' },
      { parametro: 'Material',             especificacion: prod.material,            metodo: 'FTIR / hoja técnica',           resultado: 'Conforme' },
    ];
  }
  if (kind === 'jeringa') {
    return [
      { parametro: 'Capacidad dosificadora', especificacion: '5 mL ± 0.1 mL',        metodo: 'Calibración gravimétrica',      resultado: '5.02 mL' },
      { parametro: 'Peso conjunto',          especificacion: `${prod.peso_g}g ± 4%`, metodo: 'Balanza analítica',             resultado: `${prod.peso_g.toFixed(3)}g` },
      { parametro: 'Sellado del tapón',      especificacion: 'Sin fuga a 0.5 bar',   metodo: 'Prueba neumática',              resultado: 'Conforme' },
      { parametro: 'Deslizamiento pistón',   especificacion: '< 15 N',               metodo: 'Dinamómetro',                   resultado: '11.2 N' },
      { parametro: 'Graduación legible',     especificacion: 'Visible a 30 cm',      metodo: 'Inspección visual',             resultado: 'Conforme' },
      { parametro: 'Material',               especificacion: prod.material,          metodo: 'FTIR / hoja técnica',           resultado: 'Conforme' },
    ];
  }
  if (kind === 'gotero') {
    return [
      { parametro: 'Volumen de gota',     especificacion: '0.05 mL ± 10%',           metodo: 'Calibración gravimétrica',      resultado: '0.048 mL' },
      { parametro: 'Hermeticidad tapón',  especificacion: 'Sin fuga 48h invertido',  metodo: 'Prueba invertida',              resultado: 'Conforme' },
      { parametro: 'Peso por unidad',     especificacion: `${prod.peso_g}g ± 5%`,    metodo: 'Balanza analítica',             resultado: `${prod.peso_g.toFixed(3)}g` },
      { parametro: 'Resistencia de rosca',especificacion: 'Sin deformación a 1.2 Nm',metodo: 'Torquímetro',                   resultado: 'Conforme' },
      { parametro: 'Material',            especificacion: prod.material,             metodo: 'FTIR / hoja técnica',           resultado: 'Conforme' },
    ];
  }
  if (kind === 'accesorio') {
    return [
      { parametro: 'Dimensiones',         especificacion: 'Según plano técnico',     metodo: 'Calibre digital',               resultado: 'Conforme' },
      { parametro: 'Peso por unidad',     especificacion: `${prod.peso_g}g ± 5%`,    metodo: 'Balanza analítica',             resultado: `${prod.peso_g.toFixed(3)}g` },
      { parametro: 'Acabado superficial', especificacion: 'Sin rebabas ni burbujas', metodo: 'Inspección visual',             resultado: 'Conforme' },
      { parametro: 'Material',            especificacion: prod.material,             metodo: 'FTIR / hoja técnica',           resultado: 'Conforme' },
    ];
  }
  return [
    { parametro: 'Peso por unidad',     especificacion: `${prod.peso_g}g ± 5%`,      metodo: 'Balanza analítica',             resultado: `${prod.peso_g.toFixed(3)}g` },
    { parametro: 'Material',            especificacion: prod.material,               metodo: 'FTIR / hoja técnica',           resultado: 'Conforme' },
  ];
}

Object.assign(window, { RideFactura, RideGuia, ProformaCot, RideCertificado, DocModal, Editable, WizardNuevaCotizacion });

// ═══════════════════════════════════════════════════════════════════
// Wizard: Nueva cotización (modal, 3 pasos)
// Paso 1: cliente · Paso 2: ítems · Paso 3: condiciones + confirmación
// ═══════════════════════════════════════════════════════════════════
function WizardNuevaCotizacion({ onClose, onCreated }) {
  const [step, setStep] = useState(1);
  const [clienteId, setClienteId] = useState(null);
  const [qCli, setQCli] = useState('');
  const [items, setItems] = useState([]); // { prod_id, cant_cajas, precio_caja }
  const [qProd, setQProd] = useState('');
  const [validezDias, setValidezDias] = useState(15);
  const [observaciones, setObservaciones] = useState('');
  const [fecha] = useState(() => new Date().toISOString().slice(0, 10));

  const cli = clienteId ? CLIENTES_MOCK.find(c => c.id === clienteId) : null;
  const clientesFiltrados = CLIENTES_MOCK.filter(c =>
    !qCli || c.razon_social.toLowerCase().includes(qCli.toLowerCase()) || c.ruc.includes(qCli)
  );
  const productosFiltrados = PRODUCTOS_MOCK.filter(p =>
    !qProd || p.nombre.toLowerCase().includes(qProd.toLowerCase())
  );

  const addItem = (prod) => {
    if (items.find(i => i.prod_id === prod.id)) return;
    // Precio caja sugerido = costo_caja * 1.35 (margen 35% por defecto)
    const precioSug = Math.round(prod.costo_caja * 1.35 * 100) / 100;
    setItems([...items, { prod_id: prod.id, cant_cajas: 10, precio_caja: precioSug }]);
    setQProd('');
  };
  const updItem = (idx, k, v) => {
    const next = [...items];
    next[idx] = { ...next[idx], [k]: v };
    setItems(next);
  };
  const rmItem = (idx) => setItems(items.filter((_, i) => i !== idx));

  const subtotal = items.reduce((s, i) => s + (Number(i.cant_cajas) || 0) * (Number(i.precio_caja) || 0), 0);
  const iva = subtotal * 0.12;
  const total = subtotal + iva;

  const canNext = (step === 1 && !!clienteId) || (step === 2 && items.length > 0) || step === 3;

  const crear = () => {
    // Genera un ID incremental tipo COT-YYYY-NNNN
    const year = new Date().getFullYear();
    const lastNum = COTIZACIONES_MOCK
      .filter(c => c.id.startsWith(`COT-${year}-`))
      .map(c => Number(c.id.split('-')[2]) || 0)
      .reduce((m, n) => Math.max(m, n), 40);
    const nuevaId = `COT-${year}-${String(lastNum + 1).padStart(4, '0')}`;
    const nueva = {
      id: nuevaId,
      cliente: clienteId,
      fecha,
      validez_dias: Number(validezDias) || 15,
      estado: 'borrador',
      items: items.map(it => ({ prod_id: it.prod_id, cant_cajas: Number(it.cant_cajas) || 0, precio_caja: Number(it.precio_caja) || 0 })),
      observaciones,
    };
    COTIZACIONES_MOCK.unshift(nueva);
    if (onCreated) onCreated(nuevaId);
    onClose();
  };

  const stepInfo = [
    { n: 1, label: 'Cliente' },
    { n: 2, label: 'Ítems' },
    { n: 3, label: 'Condiciones' },
  ];

  return (
    <div className="doc-overlay" onClick={e => { if (e.target.classList.contains('doc-overlay')) onClose(); }}>
      <div style={{
        background: 'var(--bg)', width: 'min(860px, 94vw)', maxHeight: '92vh',
        margin: 'auto', borderRadius: 'var(--radius)', border: '1px solid var(--line)',
        display: 'flex', flexDirection: 'column', overflow: 'hidden',
      }}>
        {/* Header */}
        <div style={{ padding: '18px 22px', borderBottom: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 22, letterSpacing: '-0.01em' }}>Nueva cotización</div>
            <div className="xs mute" style={{ marginTop: 2 }}>Paso {step} de 3 · {stepInfo[step-1].label}</div>
          </div>
          <Btn variant="ghost" size="sm" onClick={onClose}><Icon name="x" size={14}/></Btn>
        </div>

        {/* Stepper */}
        <div style={{ display: 'flex', padding: '14px 22px', gap: 8, borderBottom: '1px solid var(--line)', background: 'var(--bg-raised)' }}>
          {stepInfo.map((s, i) => (
            <div key={s.n} style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{
                width: 24, height: 24, borderRadius: '50%',
                background: step >= s.n ? 'var(--accent)' : 'var(--line)',
                color: step >= s.n ? 'var(--bg)' : 'var(--text-muted)',
                display: 'grid', placeItems: 'center', fontSize: 11, fontWeight: 600,
              }}>{step > s.n ? '✓' : s.n}</div>
              <div style={{ fontSize: 12.5, color: step >= s.n ? 'var(--text)' : 'var(--text-muted)', fontWeight: step === s.n ? 600 : 400 }}>
                {s.label}
              </div>
              {i < stepInfo.length - 1 && <div style={{ flex: 1, height: 1, background: 'var(--line)' }} />}
            </div>
          ))}
        </div>

        {/* Body */}
        <div style={{ padding: 22, overflow: 'auto', flex: 1 }}>
          {step === 1 && (
            <div>
              <input className="input" type="text" placeholder="Buscar cliente por nombre o RUC…"
                value={qCli} onChange={e => setQCli(e.target.value)}
                style={{ width: '100%', marginBottom: 14 }} />
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 10, maxHeight: 400, overflow: 'auto' }}>
                {clientesFiltrados.map(c => (
                  <button key={c.id} onClick={() => setClienteId(c.id)}
                    className="panel" style={{
                      padding: 14, textAlign: 'left', cursor: 'pointer',
                      border: clienteId === c.id ? '2px solid var(--accent)' : '1px solid var(--line)',
                      background: clienteId === c.id ? 'var(--accent-soft)' : 'var(--bg)',
                    }}>
                    <div style={{ fontWeight: 600, marginBottom: 4 }}>{c.razon_social}</div>
                    <div className="xs mute mono">{c.ruc}</div>
                    <div className="xs mute" style={{ marginTop: 4 }}>{c.dir_matriz?.ciudad} · Crédito {c.credito_dias}d</div>
                  </button>
                ))}
                {clientesFiltrados.length === 0 && (
                  <div className="xs mute" style={{ padding: 24, textAlign: 'center', gridColumn: '1 / -1' }}>
                    Sin resultados.
                  </div>
                )}
              </div>
            </div>
          )}

          {step === 2 && (
            <div>
              {/* buscador + agregar */}
              <div style={{ position: 'relative', marginBottom: 14 }}>
                <input className="input" type="text" placeholder="Buscar producto para agregar…"
                  value={qProd} onChange={e => setQProd(e.target.value)}
                  style={{ width: '100%' }} />
                {qProd && productosFiltrados.length > 0 && (
                  <div style={{
                    position: 'absolute', top: '100%', left: 0, right: 0, marginTop: 4,
                    background: 'var(--bg-raised)', border: '1px solid var(--line)',
                    borderRadius: 'var(--radius-sm)', maxHeight: 260, overflow: 'auto', zIndex: 10,
                    boxShadow: 'var(--shadow-lg)',
                  }}>
                    {productosFiltrados.slice(0, 10).map(p => (
                      <button key={p.id} onClick={() => addItem(p)}
                        style={{
                          width: '100%', padding: '10px 14px', textAlign: 'left',
                          background: 'transparent', border: 0, borderBottom: '1px solid var(--line)',
                          cursor: 'pointer', color: 'var(--text)',
                        }}>
                        <div style={{ fontWeight: 500 }}>{p.nombre}</div>
                        <div className="xs mute">{p.material} · {p.unidades_caja}u/caja · costo caja ${p.costo_caja.toFixed(2)}</div>
                      </button>
                    ))}
                  </div>
                )}
              </div>

              {/* Tabla items */}
              {items.length === 0 ? (
                <div className="xs mute" style={{ padding: 32, textAlign: 'center', border: '1px dashed var(--line)', borderRadius: 'var(--radius-sm)' }}>
                  Aún no has agregado productos. Usa el buscador arriba.
                </div>
              ) : (
                <table className="tbl">
                  <thead>
                    <tr><th>Producto</th><th className="num">Cajas</th><th className="num">Precio caja</th><th className="num">Importe</th><th></th></tr>
                  </thead>
                  <tbody>
                    {items.map((it, i) => {
                      const p = PRODUCTOS_MOCK.find(pp => pp.id === it.prod_id);
                      const importe = (Number(it.cant_cajas) || 0) * (Number(it.precio_caja) || 0);
                      return (
                        <tr key={it.prod_id}>
                          <td>
                            <div style={{ fontWeight: 500 }}>{p?.nombre}</div>
                            <div className="xs mute">{p?.material} · {p?.unidades_caja}u/caja</div>
                          </td>
                          <td className="num">
                            <input className="input" type="number" min="1" value={it.cant_cajas}
                              onChange={e => updItem(i, 'cant_cajas', e.target.value)}
                              style={{ width: 80, textAlign: 'right' }} />
                          </td>
                          <td className="num">
                            <input className="input" type="number" step="0.01" min="0" value={it.precio_caja}
                              onChange={e => updItem(i, 'precio_caja', e.target.value)}
                              style={{ width: 90, textAlign: 'right' }} />
                          </td>
                          <td className="num mono">${importe.toFixed(2)}</td>
                          <td><Btn variant="ghost" size="sm" onClick={() => rmItem(i)}><Icon name="x" size={12}/></Btn></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}

              {items.length > 0 && (
                <div className="tot-rows" style={{ marginTop: 16, maxWidth: 300, marginLeft: 'auto' }}>
                  <div><span>Subtotal</span><span className="mono">${subtotal.toFixed(2)}</span></div>
                  <div><span>IVA 12%</span><span className="mono">${iva.toFixed(2)}</span></div>
                  <div className="tot-big"><span>Total</span><span className="mono">${total.toFixed(2)}</span></div>
                </div>
              )}
            </div>
          )}

          {step === 3 && (
            <div>
              {/* Resumen */}
              <div className="panel" style={{ marginBottom: 14 }}>
                <Eyebrow>Cliente</Eyebrow>
                <div style={{ fontFamily: 'var(--serif)', fontSize: 18, marginTop: 4 }}>{cli?.razon_social}</div>
                <div className="xs mute">{cli?.ruc} · {cli?.dir_matriz?.ciudad}</div>
              </div>
              <div className="panel" style={{ marginBottom: 14 }}>
                <Eyebrow>Ítems · {items.length} productos</Eyebrow>
                {items.map((it, i) => {
                  const p = PRODUCTOS_MOCK.find(pp => pp.id === it.prod_id);
                  return (
                    <div key={i} className="row" style={{ justifyContent: 'space-between', padding: '6px 0', borderBottom: i < items.length - 1 ? '1px solid var(--line)' : 'none' }}>
                      <div><div style={{ fontSize: 13 }}>{p?.nombre}</div><div className="xs mute">{it.cant_cajas} cajas × ${Number(it.precio_caja).toFixed(2)}</div></div>
                      <div className="mono">${((Number(it.cant_cajas)||0) * (Number(it.precio_caja)||0)).toFixed(2)}</div>
                    </div>
                  );
                })}
                <div className="tot-rows" style={{ marginTop: 10 }}>
                  <div className="tot-big"><span>Total con IVA</span><span className="mono">${total.toFixed(2)}</span></div>
                </div>
              </div>
              <div className="cols-2" style={{ gap: 16 }}>
                <div>
                  <label className="xs mute" style={{ display: 'block', marginBottom: 4 }}>Validez (días)</label>
                  <input className="input" type="number" min="1" value={validezDias}
                    onChange={e => setValidezDias(e.target.value)} style={{ width: '100%' }} />
                </div>
                <div>
                  <label className="xs mute" style={{ display: 'block', marginBottom: 4 }}>Fecha de emisión</label>
                  <div className="mono" style={{ padding: '8px 12px', background: 'var(--bg-raised)', borderRadius: 'var(--radius-sm)' }}>{fecha}</div>
                </div>
              </div>
              <div style={{ marginTop: 14 }}>
                <label className="xs mute" style={{ display: 'block', marginBottom: 4 }}>Observaciones (opcional)</label>
                <textarea className="input" rows={3} value={observaciones}
                  onChange={e => setObservaciones(e.target.value)}
                  placeholder="Ej. entrega en 15 días, certificado de calidad adjunto…"
                  style={{ width: '100%', resize: 'vertical' }} />
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{ padding: '14px 22px', borderTop: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'var(--bg-raised)' }}>
          <div>
            {step > 1 && <Btn variant="ghost" onClick={() => setStep(step - 1)}><Icon name="arrow_l" size={13}/> Atrás</Btn>}
          </div>
          <div className="row" style={{ gap: 8 }}>
            <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
            {step < 3 && (
              <Btn variant="primary" disabled={!canNext} onClick={() => setStep(step + 1)}>
                Siguiente <Icon name="arrow_r" size={13}/>
              </Btn>
            )}
            {step === 3 && (
              <Btn variant="primary" disabled={!clienteId || items.length === 0} onClick={crear}>
                <Icon name="check" size={13}/> Crear cotización
              </Btn>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

</script>
<script type="text/babel" data-file="dashboard.jsx">

// Dashboard ejecutivo — producción, OC urgentes, facturas por cobrar, márgenes

function Dashboard({ setPage }) {
  const hoy  = new Date().toISOString().slice(0, 10);
  const hace7 = new Date(Date.now() -  7 * 86400000).toISOString().slice(0, 10);
  const en7   = new Date(Date.now() +  7 * 86400000).toISOString().slice(0, 10);

  const diasFaltantes = (fecha) => Math.ceil((new Date(fecha + 'T00:00:00') - new Date()) / 86400000);

  // ── Registros semana ──
  const regSemana   = REGISTROS_RECIENTES.filter(r => r.fecha >= hace7);
  const cajasHoy    = REGISTROS_RECIENTES.find(r => r.fecha === hoy)?.cajas || 0;
  const cajasSemana = regSemana.reduce((s, r) => s + r.cajas, 0);
  const matSemana   = regSemana.reduce((s, r) => s + (r.material || 0), 0);

  // ── OC urgentes ──
  const ocUrgentes = ORDENES_COMPRA_MOCK
    .filter(o => ['pendiente', 'en_produccion', 'lista'].includes(o.estado) && o.fecha_entrega <= en7)
    .sort((a, b) => a.fecha_entrega.localeCompare(b.fecha_entrega));

  // ── Facturas por cobrar ──
  const factPend = FACTURAS_MOCK.filter(f => !f.pagada && f.estado_sri === 'autorizada');
  const totalCobrar = factPend.reduce((s, f) => s + (f.total || 0), 0);

  // ── Lotes recientes (últimos 5) ──
  const lotesRecientes = LOTES_MOCK
    .filter(l => l.estado === 'stock')
    .sort((a, b) => b.fecha_fab.localeCompare(a.fecha_fab))
    .slice(0, 5);

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Vista ejecutiva</Eyebrow>
          <h1 className="page-title">Dashboard</h1>
          <div className="page-sub">Resumen operacional — producción, OC urgentes, cobros y stock reciente.</div>
        </div>
        <div className="row">
          <Btn onClick={() => setPage('registro')}><Icon name="clipboard" size={14}/> Nuevo registro</Btn>
          <Btn variant="primary" onClick={() => setPage('pedidos')}><Icon name="receipt" size={14}/> Ver pedidos</Btn>
        </div>
      </div>

      {/* KPIs */}
      <div className="kpi-grid" style={{ marginBottom: 20 }}>
        <Kpi label="Cajas hoy" icon="box"
          value={cajasHoy > 0 ? String(cajasHoy) : '—'}
          delta={cajasHoy > 0 ? 'registro cargado' : 'sin registro aún'} />
        <Kpi label="Cajas semana" icon="package"
          value={String(cajasSemana)}
          delta={`${matSemana.toFixed(0)} kg · ${regSemana.length} jornadas`} />
        <Kpi label="Por cobrar" icon="dollar"
          value={fmtMoneyShort(totalCobrar)}
          delta={`${factPend.length} factura${factPend.length !== 1 ? 's' : ''} autorizadas`}
          accent={totalCobrar > 0 ? 'var(--warn)' : 'var(--good)'} />
        <Kpi label="OC urgentes" icon="alert"
          value={String(ocUrgentes.length)}
          delta="próximos 7 días"
          accent={ocUrgentes.length > 0 ? 'var(--bad)' : 'var(--good)'} />
      </div>

      <div className="cols-2" style={{ marginBottom: 20 }}>
        {/* OC por entregar */}
        <div className="panel panel-flush">
          <div style={{ padding: '14px 18px', borderBottom: '1px solid var(--line)' }}>
            <PanelHead title="OC por entregar" sub={`Próximos 7 días`}
              right={<Btn size="sm" variant="ghost" onClick={() => setPage('pedidos')}><Icon name="arrow_r" size={12}/></Btn>} />
          </div>
          {ocUrgentes.length === 0 ? (
            <div style={{ padding: '28px 18px', textAlign: 'center', color: 'var(--text-mute)', fontSize: 13 }}>
              <Icon name="check" size={22}/><div style={{ marginTop: 6 }}>Sin OC urgentes</div>
            </div>
          ) : ocUrgentes.map(oc => {
            const cli = CLIENTES_MOCK.find(c => c.id === oc.cliente);
            const dias = diasFaltantes(oc.fecha_entrega);
            const tone = dias < 0 ? 'var(--bad)' : dias <= 2 ? 'var(--warn)' : 'var(--text)';
            const bgTone = dias < 0 ? 'var(--bad-soft)' : dias <= 2 ? 'var(--warn-soft)' : 'var(--info-soft)';
            const total = oc.items.reduce((s, it) => s + it.cant_cajas * (it.precio_caja || 0), 0);
            return (
              <button key={oc.id} className="list-row" style={{ width:'100%', textAlign:'left', border:0, background:'transparent', color:'var(--text)', cursor:'pointer' }}
                onClick={() => setPage('pedidos')}>
                <div className="ico" style={{ background: bgTone, color: tone }}><Icon name="truck" size={14}/></div>
                <div className="body" style={{ flex: 1, minWidth: 0 }}>
                  <div className="ttl">{cli?.nombre_comercial}</div>
                  <div className="cap mono xs">{oc.id} · {fmtMoney(total)}</div>
                </div>
                <div style={{ textAlign:'right', flexShrink: 0 }}>
                  <div style={{ fontFamily:'var(--serif)', fontSize:17, color: tone }}>
                    {dias < 0 ? `${Math.abs(dias)}d atraso` : dias === 0 ? 'HOY' : `${dias}d`}
                  </div>
                  <div className="xs mute">{oc.fecha_entrega}</div>
                </div>
              </button>
            );
          })}
        </div>

        {/* Facturas por cobrar */}
        <div className="panel panel-flush">
          <div style={{ padding: '14px 18px', borderBottom: '1px solid var(--line)' }}>
            <PanelHead title="Facturas por cobrar" sub={`${factPend.length} sin pago`}
              right={<Btn size="sm" variant="ghost" onClick={() => setPage('pedidos')}><Icon name="arrow_r" size={12}/></Btn>} />
          </div>
          {factPend.length === 0 ? (
            <div style={{ padding: '28px 18px', textAlign: 'center', color: 'var(--text-mute)', fontSize: 13 }}>
              <Icon name="check" size={22}/><div style={{ marginTop: 6 }}>Todo cobrado</div>
            </div>
          ) : factPend.map(f => {
            const cli = CLIENTES_MOCK.find(c => c.id === f.cliente);
            const vd  = diasFaltantes(f.fecha_vencimiento);
            const tone = vd < 0 ? 'var(--bad)' : vd <= 5 ? 'var(--warn)' : 'var(--text)';
            return (
              <button key={f.id} className="list-row" style={{ width:'100%', textAlign:'left', border:0, background:'transparent', color:'var(--text)', cursor:'pointer' }}
                onClick={() => setPage('pedidos')}>
                <div className="ico" style={{ background: vd < 0 ? 'var(--bad-soft)' : 'var(--good-soft)', color: tone }}><Icon name="receipt" size={14}/></div>
                <div className="body" style={{ flex:1, minWidth:0 }}>
                  <div className="ttl">{cli?.nombre_comercial}</div>
                  <div className="cap mono xs">{f.id}</div>
                </div>
                <div style={{ textAlign:'right', flexShrink:0 }}>
                  <div style={{ fontFamily:'var(--serif)', fontSize:16, color: tone }}>{fmtMoney(f.total)}</div>
                  <div className="xs mute">vence {f.fecha_vencimiento}</div>
                </div>
              </button>
            );
          })}
          {factPend.length > 0 && (
            <div style={{ padding:'10px 18px', borderTop:'1px solid var(--line)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span className="xs mute">Total pendiente</span>
              <span style={{ fontFamily:'var(--serif)', fontSize:20, color:'var(--warn)' }}>{fmtMoney(totalCobrar)}</span>
            </div>
          )}
        </div>
      </div>

      <div className="cols-2">
        {/* Producción semana */}
        <div className="panel panel-flush">
          <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--line)' }}>
            <PanelHead title="Producción esta semana" sub={`${matSemana.toFixed(1)} kg de material`}
              right={<Btn size="sm" variant="ghost" onClick={() => setPage('registro')}><Icon name="arrow_r" size={12}/></Btn>} />
          </div>
          {regSemana.length === 0 ? (
            <div style={{ padding:'28px 18px', textAlign:'center', color:'var(--text-mute)' }}>Sin registros esta semana</div>
          ) : (
            <table className="tbl">
              <thead><tr><th>Fecha</th><th className="num">Cajas</th><th className="num">Material</th><th>Obs.</th></tr></thead>
              <tbody>
                {regSemana.map(r => (
                  <tr key={r.id}>
                    <td className="mono xs">{r.fecha}</td>
                    <td className="num mono">{r.cajas}</td>
                    <td className="num mono xs">{(r.material||0).toFixed(1)} kg</td>
                    <td className="xs mute">{r.obs || '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>

        {/* Últimos lotes en stock */}
        <div className="panel panel-flush">
          <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--line)' }}>
            <PanelHead title="Lotes recientes en stock" sub="Disponibles para despacho"
              right={<Btn size="sm" variant="ghost" onClick={() => setPage('inventario')}><Icon name="arrow_r" size={12}/></Btn>} />
          </div>
          {lotesRecientes.length === 0 ? (
            <div style={{ padding:'28px 18px', textAlign:'center', color:'var(--text-mute)' }}>Sin lotes en stock</div>
          ) : (
            <table className="tbl">
              <thead><tr><th>Lote</th><th>Producto</th><th className="num">Cajas</th><th>Fab.</th></tr></thead>
              <tbody>
                {lotesRecientes.map(l => {
                  const p = PRODUCTOS_MOCK.find(x => x.id === l.prod_id);
                  return (
                    <tr key={l.id}>
                      <td className="mono xs" style={{ color:'var(--accent-hi)' }}>{l.id}</td>
                      <td style={{ fontSize:12.5 }}>{p?.nombre || l.prod_id}</td>
                      <td className="num mono">{l.cajas}</td>
                      <td className="mono xs mute">{l.fecha_fab}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { Dashboard });

</script>
<script type="text/babel" data-file="configuracion.jsx">

// Configuración — Datos Solplast (emisor) + Sub-componentes editables

function Configuracion() {
  const [tab, setTab] = useState('emisor');
  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Sistema</Eyebrow>
          <h1 className="page-title"><em>Configuración</em></h1>
          <div className="page-sub">Datos fiscales de Solplast, subcomponentes por producto y configuración SRI.</div>
        </div>
      </div>
      <div className="tabs">
        <button className={`tab ${tab==='emisor'  ?'on':''}`} onClick={() => setTab('emisor')}>Datos Solplast</button>
        <button className={`tab ${tab==='subcomp' ?'on':''}`} onClick={() => setTab('subcomp')}>Subcomponentes</button>
        <button className={`tab ${tab==='sri'     ?'on':''}`} onClick={() => setTab('sri')}>Configuración SRI</button>
      </div>
      {tab === 'emisor'  && <ConfigEmisor />}
      {tab === 'subcomp' && <ConfigSubcomponentes />}
      {tab === 'sri'     && <ConfigSRI />}
    </div>
  );
}

function ConfigEmisor() {
  const [form,   setForm]   = useState(null);
  const [saving, setSaving] = useState(false);
  const [saved,  setSaved]  = useState(false);

  useEffect(() => {
    (async () => {
      const data = await window._apiUtil.fetchEmisor();
      setForm(data ? { ...data } : { ...EMISOR });
    })();
  }, []);

  const set    = (k, v)    => { setForm(f => ({ ...f, [k]: v })); setSaved(false); };
  const setDir = (k, v)    => setForm(f => ({ ...f, dir_matriz: { ...(f.dir_matriz || {}), [k]: v } }));

  async function guardar() {
    setSaving(true);
    try {
      const r = await window._apiUtil.saveEmisor(form);
      if (r?.ok || r === null) { Object.assign(EMISOR, form); setSaved(true); }
      else alert('Error: ' + (r?.error || 'desconocido'));
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  if (!form) return <div style={{ padding: 40, textAlign:'center', color:'var(--text-mute)' }}><Icon name="clock" size={24}/></div>;

  const F = ({ label, k, type = 'text', span }) => (
    <div style={span ? { gridColumn:`span ${span}` } : {}}>
      <label className="xs mute" style={{ display:'block', marginBottom:4 }}>{label}</label>
      <input className="input" type={type} value={form[k] || ''} onChange={e => set(k, e.target.value)} />
    </div>
  );
  const FDir = ({ label, k }) => (
    <div>
      <label className="xs mute" style={{ display:'block', marginBottom:4 }}>{label}</label>
      <input className="input" value={form.dir_matriz?.[k] || ''} onChange={e => setDir(k, e.target.value)} />
    </div>
  );

  return (
    <div style={{ maxWidth: 780 }}>
      <div className="panel" style={{ marginBottom: 16 }}>
        <PanelHead title="Información de la empresa" sub="Aparece en facturas, guías y certificados de calidad." />
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
          <F label="Razón social" k="razon_social" span={2}/>
          <F label="Nombre comercial" k="nombre_comercial"/>
          <F label="RUC" k="ruc"/>
          <F label="Teléfono" k="telefono"/>
          <F label="Móvil" k="movil"/>
          <F label="Email" k="email" type="email" span={2}/>
          <F label="Responsable de calidad" k="responsable_calidad"/>
          <F label="Revisor de calidad" k="revisor_calidad"/>
        </div>
      </div>

      <div className="panel" style={{ marginBottom: 16 }}>
        <PanelHead title="Dirección matriz" />
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
          <FDir label="Barrio" k="barrio"/>
          <FDir label="Ciudad" k="ciudad"/>
          <FDir label="Calle" k="calle"/>
          <FDir label="Número" k="numero"/>
          <FDir label="Intersección" k="interseccion" />
          <FDir label="País" k="ciudad"/>
        </div>
      </div>

      <div className="row" style={{ gap: 12 }}>
        <Btn variant="primary" onClick={guardar} disabled={saving}>
          {saving ? 'Guardando…' : <><Icon name="check" size={14}/> Guardar datos Solplast</>}
        </Btn>
        {saved && <span className="xs" style={{ color:'var(--good)' }}><Icon name="check" size={12}/> Guardado correctamente</span>}
      </div>
    </div>
  );
}

function ConfigSubcomponentes() {
  const [sub,    setSub]    = useState(null);
  const [saving, setSaving] = useState(false);
  const [saved,  setSaved]  = useState(false);

  useEffect(() => {
    (async () => {
      const data = await window._apiUtil.fetchSubcomponentes();
      setSub(data ? JSON.parse(JSON.stringify(data)) : JSON.parse(JSON.stringify(SUBCOMPONENTES_MOCK)));
    })();
  }, []);

  const addPieza = (kind) => {
    setSub(s => ({ ...s, [kind]: [...(s[kind]||[]), { id: `pieza_${Date.now()}`, nombre: 'Nueva pieza', unidad:'unidades' }] }));
    setSaved(false);
  };
  const removePieza = (kind, i) => {
    setSub(s => ({ ...s, [kind]: s[kind].filter((_,j) => j !== i) }));
    setSaved(false);
  };
  const editPieza = (kind, i, k, v) => {
    setSub(s => ({ ...s, [kind]: s[kind].map((p,j) => j === i ? { ...p, [k]: v } : p) }));
    setSaved(false);
  };
  const addKind = () => {
    const k = prompt('Nombre del tipo de producto (ej: "sonda")');
    if (!k) return;
    setSub(s => ({ ...s, [k]: [] }));
  };

  async function guardar() {
    setSaving(true);
    try {
      const r = await window._apiUtil.saveSubcomponentes(sub);
      if (r?.ok || r === null) {
        Object.keys(sub).forEach(k => { if (!window.SUBCOMPONENTES_MOCK) window.SUBCOMPONENTES_MOCK = {}; window.SUBCOMPONENTES_MOCK[k] = sub[k]; });
        setSaved(true);
      } else alert('Error: ' + (r?.error || 'desconocido'));
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  if (!sub) return <div style={{ padding:40, textAlign:'center', color:'var(--text-mute)' }}><Icon name="clock" size={24}/></div>;

  return (
    <div>
      <div className="alert info" style={{ marginBottom:16 }}>
        <div className="icon"><Icon name="info" size={16}/></div>
        <div className="body">
          <div className="title">Piezas por tipo de producto</div>
          <div className="msg">Define qué piezas componen cada tipo de producto (jeringa, gotero, etc.). Se usan en el Registro Diario y en el inventario de piezas sueltas.</div>
        </div>
      </div>
      {Object.entries(sub).map(([kind, piezas]) => (
        <div key={kind} className="panel" style={{ marginBottom: 14 }}>
          <div className="row" style={{ justifyContent:'space-between', marginBottom:12 }}>
            <div>
              <Eyebrow style={{ marginBottom:3 }}>{kind}</Eyebrow>
              <div style={{ fontFamily:'var(--serif)', fontSize:18 }}>{piezas.length} pieza{piezas.length !== 1 ? 's' : ''}</div>
            </div>
            <Btn size="sm" onClick={() => addPieza(kind)}><Icon name="plus" size={12}/> Agregar pieza</Btn>
          </div>
          {piezas.length === 0 && <div className="xs mute">Sin piezas. Este tipo no usa subcomponentes.</div>}
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {piezas.map((p, i) => (
              <div key={i} style={{ display:'grid', gridTemplateColumns:'1fr 1fr auto', gap:8, alignItems:'center' }}>
                <input className="input" value={p.nombre} placeholder="Nombre visible"
                  onChange={e => editPieza(kind, i, 'nombre', e.target.value)}
                  style={{ padding:'7px 10px', fontSize:13 }} />
                <input className="input mono" value={p.id} placeholder="ID interno"
                  onChange={e => editPieza(kind, i, 'id', e.target.value)}
                  style={{ padding:'7px 10px', fontSize:12.5 }} />
                <Btn size="sm" variant="ghost" className="danger" onClick={() => removePieza(kind, i)}><Icon name="x" size={12}/></Btn>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div className="row" style={{ gap:12, marginTop:4 }}>
        <Btn size="sm" variant="ghost" onClick={addKind}><Icon name="plus" size={12}/> Nuevo tipo</Btn>
        <Btn variant="primary" onClick={guardar} disabled={saving}>
          {saving ? 'Guardando…' : <><Icon name="check" size={14}/> Guardar subcomponentes</>}
        </Btn>
        {saved && <span className="xs" style={{ color:'var(--good)' }}><Icon name="check" size={12}/> Guardado</span>}
      </div>
    </div>
  );
}

// ─── ConfigSRI ───────────────────────────────────────────────────────────────
function ConfigSRI() {
  const [cfg,     setCfg]     = useState(null);
  const [secs,    setSecs]    = useState(null);
  const [editSec, setEditSec] = useState({}); // { key: valor_editable }
  const [saving,  setSaving]  = useState(false);
  const [saved,   setSaved]   = useState(null);
  const [noServer,setNoServer]= useState(false);

  const COD_DOC = { '01':'Factura', '04':'Nota de crédito', '05':'Nota de débito', '06':'Guía remisión', '07':'Retención' };

  async function cargar() {
    try {
      const [c, s] = await Promise.all([
        window._apiUtil.sriConfig(),
        window._apiUtil.sriSecuenciales(),
      ]);
      if (c) { setCfg(c); setNoServer(false); }
      else   { setNoServer(true); }
      if (s) setSecs(s);
    } catch(e) { setNoServer(true); }
  }

  useEffect(() => { cargar(); }, []);

  async function guardarSecuencial(cod_doc) {
    const valor = parseInt(editSec[cod_doc]);
    if (isNaN(valor) || valor < 0) { alert('Valor inválido'); return; }
    setSaving(true);
    try {
      // Establecimiento y punto leen del emisor configurado (Solplast = 002/001).
      const estab = (window.EMISOR && window.EMISOR.establecimiento_default) || '002';
      const pto   = (window.EMISOR && window.EMISOR.punto_emision_default) || '001';
      const r = await window._apiUtil.setSriSecuencial({ cod_doc, establecimiento: estab, punto_emision: pto, valor });
      if (r?.ok) { await cargar(); setSaved(cod_doc); setTimeout(() => setSaved(null), 2500); }
      else alert('Error: ' + (r?.error||'desconocido'));
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  if (noServer) {
    return (
      <div className="alert warn" style={{ marginTop:8 }}>
        <div className="icon"><Icon name="alert" size={16}/></div>
        <div className="body">
          <div className="title">Servidor no conectado</div>
          <div className="msg">La configuración SRI solo está disponible cuando el backend está corriendo. Aquí se gestionan ambiente (PRUEBAS / PRODUCCIÓN), estado del certificado .p12 y los secuenciales.</div>
        </div>
      </div>
    );
  }

  if (!cfg) return <div style={{ textAlign:'center', padding:40, color:'var(--text-mute)' }}><Icon name="clock" size={24}/></div>;

  const secsActuales = cfg.secuenciales_actuales || {};

  return (
    <div style={{ maxWidth:780 }}>
      {/* Estado del ambiente */}
      <div className="panel" style={{ marginBottom:16 }}>
        <PanelHead title="Estado del sistema SRI" />
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14, marginTop:8 }}>
          <div>
            <div className="xs mute" style={{ marginBottom:4 }}>Ambiente</div>
            <Chip tone={cfg.ambiente_nombre==='PRODUCCION'?'good':'warn'} style={{ fontSize:13, padding:'5px 12px' }}>
              {cfg.ambiente_nombre}
            </Chip>
          </div>
          <div>
            <div className="xs mute" style={{ marginBottom:4 }}>Certificado .p12</div>
            <Chip tone={cfg.cert_configurado?'good':'bad'} style={{ fontSize:13 }}>
              {cfg.cert_configurado ? '✓ Configurado' : '✗ Sin configurar'}
            </Chip>
          </div>
          <div>
            <div className="xs mute" style={{ marginBottom:4 }}>Modo emisión</div>
            <Chip tone={cfg.simulado?'warn':'good'} style={{ fontSize:13 }}>
              {cfg.simulado ? 'Simulado (SRI_SIMULADO=true)' : 'Producción real'}
            </Chip>
          </div>
        </div>
        {!cfg.cert_configurado && (
          <div className="alert warn" style={{ marginTop:14 }}>
            <div className="icon"><Icon name="alert" size={16}/></div>
            <div className="body">
              <div className="title">Sin certificado digital</div>
              <div className="msg">Configura SRI_CERT_PATH y SRI_CERT_PASSWORD en las variables de entorno de Render para firmar XMLs. Sin esto solo funciona en modo simulado.</div>
            </div>
          </div>
        )}
      </div>

      {/* Secuenciales */}
      <div className="panel">
        <PanelHead title="Secuenciales por tipo de comprobante"
          sub="El contador puede ajustar el último número emitido para heredar numeración de sistemas anteriores." />
        <div style={{ display:'flex', flexDirection:'column', gap:10, marginTop:12 }}>
          {Object.entries(COD_DOC).map(([cod, nombre]) => {
            const actual = secsActuales[nombre.toLowerCase().replace(/ /g,'_')] ||
                           secsActuales[cod] || 0;
            const proximo = actual + 1;
            const editVal = editSec[cod];
            return (
              <div key={cod} style={{ display:'grid', gridTemplateColumns:'1fr auto auto auto', alignItems:'center', gap:12, padding:'10px 14px', background:'var(--bg-raised)', borderRadius:'var(--radius-sm)', border:'1px solid var(--line)' }}>
                <div>
                  <div style={{ fontWeight:600 }}>{nombre}</div>
                  <div className="xs mute mono">cod_doc: {cod}</div>
                </div>
                <div style={{ textAlign:'right' }}>
                  <div className="xs mute">Último emitido</div>
                  <div className="mono" style={{ fontWeight:600 }}>{String(actual).padStart(9,'0')}</div>
                </div>
                <div style={{ textAlign:'right' }}>
                  <div className="xs mute">Próximo</div>
                  <div className="mono" style={{ color:'var(--accent-hi)' }}>{String(proximo).padStart(9,'0')}</div>
                </div>
                {editVal !== undefined ? (
                  <div className="row" style={{ gap:4 }}>
                    <input className="input mono" type="number" value={editVal}
                      onChange={e => setEditSec(s=>({...s,[cod]:e.target.value}))}
                      style={{ width:100, padding:'4px 8px' }}
                      onKeyDown={e => { if(e.key==='Enter') guardarSecuencial(cod); if(e.key==='Escape') setEditSec(s=>{const n={...s};delete n[cod];return n;}); }}/>
                    <Btn size="sm" variant="primary" onClick={() => guardarSecuencial(cod)} disabled={saving}>
                      {saved===cod ? <Icon name="check" size={12}/> : <Icon name="check" size={12}/>}
                    </Btn>
                    <Btn size="sm" variant="ghost" onClick={() => setEditSec(s=>{const n={...s};delete n[cod];return n;})}><Icon name="x" size={12}/></Btn>
                  </div>
                ) : (
                  <Btn size="sm" variant="ghost" onClick={() => setEditSec(s=>({...s,[cod]:String(actual)}))}>
                    <Icon name="edit" size={12}/> Ajustar
                  </Btn>
                )}
              </div>
            );
          })}
        </div>
        <div className="xs mute" style={{ marginTop:12 }}>
          <Icon name="alert" size={11}/> Cambiar el secuencial solo si heredas numeración de otro sistema. Un valor incorrecto puede generar errores en el SRI.
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { Configuracion });

</script>
<script type="text/babel" data-file="auditoria.jsx">

// Auditoría — historial filtrable de cambios del sistema

function Auditoria() {
  const [logs,         setLogs]         = useState(null);
  const [loading,      setLoading]      = useState(false);
  const [filtroEntity, setFiltroEntity] = useState('');
  const [filtroAction, setFiltroAction] = useState('');
  const [expandido,    setExpandido]    = useState(null);
  const [noServer,     setNoServer]     = useState(false);

  async function cargar() {
    setLoading(true);
    setExpandido(null);
    try {
      const params = {};
      if (filtroEntity) params.entity = filtroEntity;
      const data = await window._apiUtil.fetchAuditLog(params);
      if (data === null) { setNoServer(true); setLogs([]); }
      else { setNoServer(false); setLogs(data); }
    } catch(e) { setNoServer(true); setLogs([]); }
    setLoading(false);
  }

  useEffect(() => { cargar(); }, []);

  const actionColor = {
    create:    'var(--good)',
    update:    'var(--accent-hi)',
    delete:    'var(--bad)',
    desactivar:'var(--warn)',
    reactivar: 'var(--info)',
    despachar: 'var(--info)',
    calcular:  'var(--accent)',
    emitir:    'var(--accent)',
    bulk_update:'var(--text-dim)',
  };

  const items = (logs || []).filter(l => !filtroAction || l.action === filtroAction);

  const ENTITIES = ['empleado','producto','material','empaque','cotizacion','ordenes_compra',
                    'factura','lote','pieza','movimiento','emisor','subcomponentes','lote','override'];
  const ACTIONS  = ['create','update','delete','bulk_update','desactivar','reactivar','despachar','calcular','emitir'];

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Sistema · Trazabilidad</Eyebrow>
          <h1 className="page-title">Auditoría</h1>
          <div className="page-sub">Registro append-only de todos los cambios sensibles: quién, qué, cuándo.</div>
        </div>
        <Btn onClick={cargar} disabled={loading}><Icon name="arrow_r" size={14}/> Actualizar</Btn>
      </div>

      <div className="panel" style={{ marginBottom:14 }}>
        <div className="row" style={{ flexWrap:'wrap', gap:12 }}>
          <div style={{ flex:1, minWidth:180 }}>
            <label className="xs mute" style={{ display:'block', marginBottom:4 }}>Entidad</label>
            <select className="select" value={filtroEntity} onChange={e => setFiltroEntity(e.target.value)}>
              <option value="">Todas</option>
              {ENTITIES.map(e => <option key={e} value={e}>{e}</option>)}
            </select>
          </div>
          <div style={{ flex:1, minWidth:160 }}>
            <label className="xs mute" style={{ display:'block', marginBottom:4 }}>Acción</label>
            <select className="select" value={filtroAction} onChange={e => setFiltroAction(e.target.value)}>
              <option value="">Todas</option>
              {ACTIONS.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
          </div>
          <div style={{ display:'flex', alignItems:'flex-end' }}>
            <Btn onClick={cargar} disabled={loading}>Filtrar</Btn>
          </div>
        </div>
      </div>

      {noServer && (
        <div className="alert warn" style={{ marginBottom:14 }}>
          <div className="icon"><Icon name="alert" size={16}/></div>
          <div className="body">
            <div className="title">Servidor no conectado</div>
            <div className="msg">El audit log solo está disponible cuando el backend está corriendo y autenticado.</div>
          </div>
        </div>
      )}

      {loading && <div style={{ padding:40, textAlign:'center', color:'var(--text-mute)' }}><Icon name="clock" size={24}/></div>}

      {!loading && !noServer && items.length === 0 && (
        <div className="panel" style={{ textAlign:'center', padding:40, color:'var(--text-mute)' }}>Sin registros con los filtros actuales.</div>
      )}

      {!loading && items.length > 0 && (
        <div className="panel panel-flush">
          <table className="tbl tbl-hover">
            <thead>
              <tr><th>Fecha / Hora</th><th>Usuario</th><th>Entidad</th><th>Acción</th><th>ID</th><th></th></tr>
            </thead>
            <tbody>
              {items.map((l, i) => {
                const isExp = expandido === i;
                const hasDetail = l.before || l.after;
                return (
                  <React.Fragment key={i}>
                    <tr onClick={() => hasDetail && setExpandido(isExp ? null : i)}
                      style={{ cursor: hasDetail ? 'pointer' : 'default' }}>
                      <td className="mono xs">{(l.ts || '').replace('T',' ').slice(0,19)}</td>
                      <td><Chip>{l.user || 'system'}</Chip></td>
                      <td className="xs">{l.entity}</td>
                      <td>
                        <span style={{ fontWeight:600, color: actionColor[l.action] || 'var(--text-mute)' }}>
                          {l.action}
                        </span>
                      </td>
                      <td className="mono xs mute">{l.entity_id}</td>
                      <td>{hasDetail && <Icon name={isExp ? 'chev_u' : 'chev_d'} size={12} className="mute"/>}</td>
                    </tr>
                    {isExp && (
                      <tr>
                        <td colSpan={6} style={{ padding:'12px 18px', background:'var(--bg-raised)' }}>
                          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
                            {l.before && (
                              <div>
                                <div className="eyebrow" style={{ marginBottom:6 }}>Antes</div>
                                <pre style={{ margin:0, fontSize:10.5, color:'var(--text-dim)', whiteSpace:'pre-wrap', fontFamily:'var(--mono)', background:'var(--bg)', padding:10, borderRadius:'var(--radius-sm)', border:'1px solid var(--line)', maxHeight:200, overflow:'auto' }}>
                                  {JSON.stringify(l.before, null, 2)}
                                </pre>
                              </div>
                            )}
                            {l.after && (
                              <div>
                                <div className="eyebrow" style={{ marginBottom:6 }}>Después</div>
                                <pre style={{ margin:0, fontSize:10.5, color:'var(--text-dim)', whiteSpace:'pre-wrap', fontFamily:'var(--mono)', background:'var(--bg)', padding:10, borderRadius:'var(--radius-sm)', border:'1px solid var(--line)', maxHeight:200, overflow:'auto' }}>
                                  {JSON.stringify(l.after, null, 2)}
                                </pre>
                              </div>
                            )}
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
          <div style={{ padding:'10px 18px', borderTop:'1px solid var(--line)', fontSize:11.5, color:'var(--text-mute)' }}>
            {items.length} registro{items.length !== 1 ? 's' : ''} · solo se muestran los últimos 200
          </div>
        </div>
      )}
    </div>
  );
}

Object.assign(window, { Auditoria });

</script>
<script type="text/babel" data-file="contabilidad.jsx">

// Contabilidad — NC/ND · Retenciones · Cuenta Corriente · Reportes

// ─── CSV download helper ──────────────────────────────────────────────────────
function downloadCSV(filename, headers, rows) {
  const csvRows = [headers, ...rows].map(r =>
    r.map(c => `"${String(c == null ? '' : c).replace(/"/g, '""')}"`).join(',')
  );
  const blob = new Blob(['\ufeff' + csvRows.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ─── Contabilidad shell ───────────────────────────────────────────────────────
function Contabilidad({ setPage }) {
  const [tab, setTab] = useState('nc');
  const tabs = [
    { k:'nc',  l:'Notas crédito / débito' },
    { k:'ret', l:'Retenciones recibidas'  },
    { k:'cc',  l:'Cuenta corriente'       },
    { k:'rep', l:'Reportes para contador' },
  ];
  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Comercial · Finanzas</Eyebrow>
          <h1 className="page-title"><em>Contabilidad</em></h1>
          <div className="page-sub">Notas de crédito/débito, retenciones, pagos parciales y reportes mensuales para el contador.</div>
        </div>
      </div>
      <div className="tabs" style={{ marginBottom:20 }}>
        {tabs.map(t => <button key={t.k} className={`tab ${tab===t.k?'on':''}`} onClick={() => setTab(t.k)}>{t.l}</button>)}
      </div>
      {tab === 'nc'  && <TabNotasCredito setPage={setPage}/>}
      {tab === 'ret' && <TabRetenciones/>}
      {tab === 'cc'  && <TabCuentaCorriente/>}
      {tab === 'rep' && <TabReportesContador/>}
    </div>
  );
}

// ─── Notas Crédito / Débito ───────────────────────────────────────────────────
function TabNotasCredito({ setPage }) {
  const [notas,   setNotas]   = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [tipoNew, setTipoNew] = useState('credito');
  const [form,    setForm]    = useState({ factura_id:'', motivo:'', tipo:'devolucion', items:[] });
  const [saving,  setSaving]  = useState(false);
  const [emitId,  setEmitId]  = useState(null);

  async function cargar() {
    const nc = await window._apiUtil.fetchNotas('credito');
    const nd = await window._apiUtil.fetchNotas('debito');
    setNotas([...(nc||[]).map(n=>({...n,_kind:'credito'})), ...(nd||[]).map(n=>({...n,_kind:'debito'}))]);
  }
  useEffect(() => { cargar(); }, []);

  const factura = form.factura_id ? FACTURAS_MOCK.find(f => f.id === form.factura_id) : null;

  function iniciarNueva(tipo) {
    setTipoNew(tipo);
    setForm({ factura_id:'', motivo:'', tipo: tipo==='credito'?'devolucion':'adicional', items:[] });
    setShowNew(true);
  }

  function facturaSeleccionada(fid) {
    const f = FACTURAS_MOCK.find(x => x.id === fid);
    setForm(prev => ({
      ...prev,
      factura_id: fid,
      items: f ? f.items.map(it => ({ ...it, cantidad_nc: it.cant_cajas })) : [],
    }));
  }

  async function emitirNC(nota) {
    if (!confirm(`¿Emitir ${nota._kind === 'credito' ? 'nota de crédito' : 'nota de débito'} al SRI?`)) return;
    setEmitId(nota.id);
    try {
      const r = await window._apiUtil.sriEmitirNC(nota.id);
      if (r?.ok) {
        await cargar();
        alert(`✓ ${r.estado_sri}`);
      } else {
        alert(`Error SRI: ${r?.error || 'desconocido'}`);
      }
    } catch(e) { alert(e.message); }
    setEmitId(null);
  }

  async function guardar() {
    if (!form.factura_id) { alert('Selecciona la factura origen'); return; }
    if (!form.motivo.trim()) { alert('Ingresa el motivo'); return; }
    setSaving(true);
    try {
      const factOrig = FACTURAS_MOCK.find(f => f.id === form.factura_id);
      const cli = factOrig?.cliente;
      const subtotal = form.items.reduce((s,it) => s + (it.cantidad_nc||0)*(it.precio_unit||0), 0);
      const iva = subtotal * 0.12;
      const nueva = {
        id: `N${tipoNew==='credito'?'C':'D'}-${Date.now()}`,
        _kind: tipoNew,
        cliente: cli,
        factura_origen: form.factura_id,
        fecha_emision: new Date().toISOString().slice(0,10),
        motivo: form.motivo,
        tipo: form.tipo,
        items: form.items,
        subtotal, iva, total: subtotal + iva,
        estado_sri: 'pendiente',
      };
      const existing = await window._apiUtil.fetchNotas(tipoNew);
      await window._apiUtil.saveNotas(tipoNew, [...(existing||[]), nueva]);
      await cargar();
      setShowNew(false);
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  const kindLabel = { credito:'Nota de crédito', debito:'Nota de débito' };

  return (
    <>
      <div className="row" style={{ justifyContent:'flex-end', marginBottom:14, gap:8 }}>
        <Btn size="sm" onClick={() => iniciarNueva('credito')}><Icon name="plus" size={12}/> Nueva NC</Btn>
        <Btn size="sm" onClick={() => iniciarNueva('debito')}><Icon name="plus" size={12}/> Nueva ND</Btn>
      </div>

      {notas === null && <div style={{ textAlign:'center', padding:40, color:'var(--text-mute)' }}><Icon name="clock" size={24}/></div>}
      {notas !== null && notas.length === 0 && (
        <div className="panel" style={{ textAlign:'center', padding:40, color:'var(--text-mute)' }}>
          Sin notas emitidas. Genera una NC desde una factura autorizada.
        </div>
      )}
      {notas !== null && notas.length > 0 && (
        <div className="panel panel-flush">
          <table className="tbl tbl-hover">
            <thead><tr><th>Número</th><th>Tipo</th><th>Factura origen</th><th>Cliente</th><th>Fecha</th><th className="num">Total</th><th>Estado SRI</th><th></th></tr></thead>
            <tbody>
              {notas.map(n => {
                const cli = CLIENTES_MOCK.find(c => c.id === n.cliente);
                return (
                  <tr key={n.id}>
                    <td className="mono xs">{n.id}</td>
                    <td><Chip tone={n._kind==='credito'?'good':'warn'}>{kindLabel[n._kind]}</Chip></td>
                    <td className="mono xs">{n.factura_origen}</td>
                    <td>{cli?.nombre_comercial||n.cliente}</td>
                    <td className="mono xs">{n.fecha_emision}</td>
                    <td className="num mono">{fmtMoney(n.total)}</td>
                    <td><EstadoSRI estado={n.estado_sri}/></td>
                    <td>
                      {n.estado_sri === 'pendiente' && (
                        <Btn size="sm" variant="primary" onClick={() => emitirNC(n)} disabled={emitId===n.id}>
                          {emitId===n.id?'…':'Emitir SRI'}
                        </Btn>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Modal nueva NC/ND */}
      {showNew && (
        <div className="modal-back" onClick={() => setShowNew(false)}>
          <div className="modal-card lg" onClick={e=>e.stopPropagation()} style={{ maxWidth:700 }}>
