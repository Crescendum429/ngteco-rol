}

function NomStepRevisar({ onNext, onBack }) {
  const empIds = Object.keys(HORAS_DETALLE);
  const firstId = empIds[0] || EMPLEADOS_MOCK[0]?.id || '';
  const [sel, setSel] = useState(firstId);
  const [edits, setEdits] = useState({});
  const [saving, setSaving] = useState(false);

  const baseDays = HORAS_DETALLE[sel] || [];
  const days = baseDays.map((d, i) => {
    const override = edits[sel]?.[i] || {};
    const edited = Object.keys(override).length > 0;
    const h1 = override.h1 !== undefined ? override.h1 : d.h1;
    const h2 = override.h2 !== undefined ? override.h2 : d.h2;
    const h3 = override.h3 !== undefined ? override.h3 : d.h3;
    const h4 = override.h4 !== undefined ? override.h4 : d.h4;
    const total = computeTotal(h1, h2, h3, h4);
    const flag = edited ? 'CORREGIDO MANUALMENTE' : d.flag;
    return { ...d, h1, h2, h3, h4, total, flag };
  });

  const hayCambios = Object.keys(edits).some(k => Object.keys(edits[k] || {}).length > 0);

  async function guardarCorrecciones() {
    if (!hayCambios) return;
    setSaving(true);
    const ediciones = {};
    for (const empKey of Object.keys(edits)) {
      const perDay = edits[empKey] || {};
      const base = HORAS_DETALLE[empKey] || [];
      for (const idx of Object.keys(perDay)) {
        const row = base[idx];
        if (!row) continue;
        ediciones[empKey] = ediciones[empKey] || {};
        ediciones[empKey][row.fecha] = perDay[idx];
      }
    }
    const ok = await window._api?.corregirNomina(null, ediciones);
    setSaving(false);
    if (ok) location.reload();
    else alert('Error guardando correcciones.');
  }

  const horasTotal = Object.values(HORAS_DETALLE).flat().reduce((a, d) => a + (d.total || 0), 0);
  const anomsTotal = Object.values(HORAS_DETALLE).flat().filter(d => d.flag && !d.flag.startsWith('CORREG')).length;
  const empOptions = empIds.map(id => {
    const emp = EMPLEADOS_MOCK.find(e => e.id === id);
    return { value: id, label: emp?.nombre || id };
  });

  function updateCell(idx, field, value) {
    setEdits(e => ({
      ...e,
      [sel]: { ...(e[sel] || {}), [idx]: { ...((e[sel] || {})[idx] || {}), [field]: value } }
    }));
  }

  const fechaFmt = (ds) => {
    const [y, m, d] = (ds || '').split('-');
    return d ? `${d}/${m}` : ds;
  };
  const dow = (ds) => {
    if (!ds) return '';
    const parts = ds.split('-');
    if (parts.length !== 3) return '';
    const y = parts[0].length === 2 ? '20' + parts[0] : parts[0];
    const d = new Date(`${y}-${parts[1]}-${parts[2]}T00:00:00`);
    return ['dom','lun','mar','mié','jue','vie','sáb'][d.getDay()] || '';
  };

  return (
    <div>
      <div className="cols-3" style={{ marginBottom: 16 }}>
        <div className="panel">
          <div className="row" style={{ justifyContent: 'space-between' }}>
            <Eyebrow>Empleados</Eyebrow>
            <span className="num-big">{empIds.length || EMPLEADOS_MOCK.length}</span>
          </div>
          <div className="small mute" style={{ marginTop: 6 }}>detectados en el reporte</div>
        </div>
        <div className="panel">
          <div className="row" style={{ justifyContent: 'space-between' }}>
            <Eyebrow>Anomalías</Eyebrow>
            <span className="num-big" style={{ color: 'var(--warn)' }}>{anomsTotal}</span>
          </div>
          <div className="small mute" style={{ marginTop: 6 }}>requieren revisión manual</div>
        </div>
        <div className="panel">
          <div className="row" style={{ justifyContent: 'space-between' }}>
            <Eyebrow>Horas totales</Eyebrow>
            <span className="num-big">{horasTotal.toFixed(1)}</span>
          </div>
          <div className="small mute" style={{ marginTop: 6 }}>en el período</div>
        </div>
      </div>

      <div className="panel">
        <div className="panel-head">
          <div>
            <h3 className="panel-title">Hoja de horas editable</h3>
            <div className="panel-sub">Corrige manualmente antes de calcular los sueldos</div>
          </div>
          {empOptions.length > 0 && (
            <Select value={sel} onChange={setSel} options={empOptions} />
          )}
        </div>

        {days.length === 0 ? (
          <div className="xs mute" style={{ padding: 20 }}>No hay datos de horas. Sube un reporte XLS primero.</div>
        ) : (
          <div style={{ overflowX: 'auto' }}>
            <table className="tbl">
              <thead>
                <tr>
                  <th>Fecha</th><th>Entrada</th><th>Almuerzo</th><th>Regreso</th><th>Salida</th><th className="num">Total</th><th>Obs.</th>
                </tr>
              </thead>
              <tbody>
                {days.map((d, i) => {
                  const flagged = d.flag && !d.flag.startsWith('CORREG');
                  return (
                    <tr key={i} style={flagged ? { background: 'color-mix(in oklab, var(--warn-soft) 20%, transparent)' } : {}}>
                      <td>{fechaFmt(d.fecha)} <span className="mute xs">{dow(d.fecha)}</span></td>
                      <td><input className="input" type="time" value={d.h1 || ''} onChange={e => updateCell(i, 'h1', e.target.value)} style={{ padding: '4px 6px', fontSize: 13, width: 90 }} /></td>
                      <td><input className="input" type="time" value={d.h2 || ''} onChange={e => updateCell(i, 'h2', e.target.value)} style={{ padding: '4px 6px', fontSize: 13, width: 90 }} /></td>
                      <td><input className="input" type="time" value={d.h3 || ''} onChange={e => updateCell(i, 'h3', e.target.value)} style={{ padding: '4px 6px', fontSize: 13, width: 90 }} /></td>
                      <td><input className="input" type="time" value={d.h4 || ''} onChange={e => updateCell(i, 'h4', e.target.value)} style={{ padding: '4px 6px', fontSize: 13, width: 90 }} /></td>
                      <td className="num mono">{d.total.toFixed(1)}</td>
                      <td>{d.flag && <Chip tone={flagged ? 'warn' : 'good'}>{d.flag}</Chip>}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        <div className="row" style={{ justifyContent: 'space-between', marginTop: 18 }}>
          <Btn onClick={onBack}><Icon name="arrow_l" size={14}/> Volver</Btn>
          <div className="row">
            {hayCambios && (
              <Btn onClick={guardarCorrecciones} disabled={saving}>
                {saving ? 'Guardando…' : 'Guardar correcciones'}
              </Btn>
            )}
            <Btn variant="primary" onClick={onNext}>Calcular sueldos <Icon name="arrow_r" size={14}/></Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

function computeTotal(h1, h2, h3, h4) {
  const toMin = (t) => {
    if (!t) return null;
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  };
  let total = 0;
  const m1 = toMin(h1), m2 = toMin(h2), m3 = toMin(h3), m4 = toMin(h4);
  if (m1 != null && m2 != null) total += m2 - m1;
  if (m3 != null && m4 != null) total += m4 - m3;
  return total / 60;
}

function NomStepSueldos({ periodo, onBack }) {
  const [d13, setD13] = useState(false);
  const [d14, setD14] = useState(false);
  const [expanded, setExpanded] = useState(null);

  const totalIngresos = NOMINA_ULTIMO.reduce((a, e) => a + e.ingresos, 0);
  const totalIess     = NOMINA_ULTIMO.reduce((a, e) => a + e.iess, 0);
  const totalFondos   = NOMINA_ULTIMO.reduce((a, e) => a + e.fondos, 0);
  const totalPagado   = NOMINA_ULTIMO.reduce((a, e) => a + e.total, 0);

  return (
    <div>
      <div className="panel" style={{ marginBottom: 16 }}>
        <PanelHead
          title="Extras del mes"
          sub="Activa los décimos cuando corresponda según el calendario legal ecuatoriano"
          right={
            <div className="row">
              <Toggle checked={d13} onChange={setD13}>13er sueldo</Toggle>
              <Toggle checked={d14} onChange={setD14}>14to sueldo (${SBU_2026})</Toggle>
            </div>
          }
        />
        <div className="alert info">
          <div className="icon"><Icon name="info" size={16}/></div>
          <div className="body">
            <div className="title">Cálculo con ley ecuatoriana</div>
            <div className="msg">Horas 50% (Art. 55) · Horas 100% fines de semana (Art. 55) · IESS 9.45% · Fondos 8.33% · 13ro: dic 24 · 14to Sierra: ago 15</div>
          </div>
        </div>
      </div>

      <div className="kpi-grid" style={{ marginBottom: 18 }}>
        <Kpi label="Total ingresos" icon="dollar" value={fmtMoneyShort(totalIngresos)} />
        <Kpi label="IESS empleado"  icon="minus"  value={fmtMoneyShort(totalIess)} />
        <Kpi label="Fondos reserva" icon="plus"   value={fmtMoneyShort(totalFondos)} />
        <Kpi label="Total a transferir" icon="arrow_r" value={fmtMoneyShort(totalPagado)}
             accent="var(--accent-hi)" />
      </div>

      <Eyebrow style={{ marginBottom: 10 }}>Detalle por empleado</Eyebrow>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {NOMINA_ULTIMO.map(n => {
          const emp = EMPLEADOS_MOCK.find(e => e.id === n.id);
          const isOpen = expanded === n.id;
          return (
            <div key={n.id} className="panel" style={{ padding: 0, overflow: 'hidden' }}>
              <button
                onClick={() => setExpanded(isOpen ? null : n.id)}
                style={{ width: '100%', textAlign: 'left', background: 'transparent', border: 0, padding: '16px 18px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 14, color: 'var(--text)' }}
              >
                <div className="avatar" style={{ background: emp.color, width: 36, height: 36, fontSize: 12 }}>{emp.iniciales}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600 }}>{n.nombre}</div>
                  <div className="xs mute">{emp.cargo}</div>
                </div>
                <div className="hide-mobile stat-stack">
                  <div className="st"><div className="st-val mono">{n.dias}</div><div className="st-lbl">días</div></div>
                  <div className="st"><div className="st-val mono">{n.horas.toFixed(1)}</div><div className="st-lbl">horas</div></div>
                  <div className="st"><div className="st-val mono" style={{ color: 'var(--warn)' }}>{n.h50 + n.h100 > 0 ? (n.h50 + n.h100).toFixed(1) : '—'}</div><div className="st-lbl">extras</div></div>
                </div>
                <div style={{ textAlign: 'right', minWidth: 110 }}>
                  <div style={{ fontFamily: 'var(--serif)', fontSize: 22, letterSpacing: '-0.01em' }}>{fmtMoney(n.total)}</div>
                  <div className="xs mute">total a transferir</div>
                </div>
                <Icon name={isOpen ? 'chev_u' : 'chev_d'} size={16} className="mute" />
              </button>
              {isOpen && (
                <div style={{ padding: '0 18px 18px', borderTop: '1px solid var(--line)' }}>
                  <div className="cols-3" style={{ marginTop: 16 }}>
                    <div>
                      <Eyebrow>Ingresos</Eyebrow>
                      <div className="row" style={{ justifyContent: 'space-between', padding: '6px 0' }}>
                        <span className="small mute">1ra quincena</span><span className="mono">{fmtMoney(n.quincena)}</span>
                      </div>
                      <div className="row" style={{ justifyContent: 'space-between', padding: '6px 0' }}>
                        <span className="small mute">2da quincena</span><span className="mono">{fmtMoney(n.quincena)}</span>
                      </div>
                      <div className="row" style={{ justifyContent: 'space-between', padding: '6px 0' }}>
                        <span className="small mute">Horas extras</span><span className="mono">{fmtMoney(n.extras)}</span>
                      </div>
                      <div className="row" style={{ justifyContent: 'space-between', padding: '6px 0' }}>
                        <span className="small mute">Transporte ({n.dias}×${emp.transporte.toFixed(2)})</span><span className="mono">{fmtMoney(n.transporte)}</span>
                      </div>
                    </div>
                    <div>
                      <Eyebrow>Egresos</Eyebrow>
                      <div className="row" style={{ justifyContent: 'space-between', padding: '6px 0' }}>
                        <span className="small mute">IESS 9.45%</span><span className="mono" style={{color:'var(--bad)'}}>-{fmtMoney(n.iess)}</span>
                      </div>
                      {emp.prestamo_iess > 0 && (
                        <div className="row" style={{ justifyContent: 'space-between', padding: '6px 0' }}>
                          <span className="small mute">Préstamo IESS</span><span className="mono" style={{color:'var(--bad)'}}>-{fmtMoney(emp.prestamo_iess)}</span>
                        </div>
                      )}
                      {emp.fondos_reserva && (
                        <div className="row" style={{ justifyContent: 'space-between', padding: '6px 0' }}>
                          <span className="small mute">Fondos de reserva</span><span className="mono" style={{color:'var(--good)'}}>+{fmtMoney(n.fondos)}</span>
                        </div>
                      )}
                    </div>
                    <div>
                      <Eyebrow>Resultado</Eyebrow>
                      <div className="row" style={{ justifyContent: 'space-between', padding: '6px 0' }}>
                        <span className="small mute">Total ingresos</span><span className="mono">{fmtMoney(n.ingresos)}</span>
                      </div>
                      <div className="row" style={{ justifyContent: 'space-between', padding: '6px 0' }}>
                        <span className="small mute">Neto a recibir</span><span className="mono">{fmtMoney(n.neto)}</span>
                      </div>
                      <div className="row" style={{ justifyContent: 'space-between', padding: '10px 0 6px', borderTop: '1px dashed var(--line)', marginTop: 4 }}>
                        <strong>Total transferir</strong>
                        <strong style={{ fontFamily: 'var(--serif)', fontSize: 18 }}>{fmtMoney(n.total)}</strong>
                      </div>
                    </div>
                  </div>
                  <div className="row" style={{ marginTop: 14 }}>
                    <Btn size="sm"><Icon name="download" size={12}/> PDF individual</Btn>
                    <Btn size="sm" variant="ghost">Bono/ajuste</Btn>
                    <Btn size="sm" variant="ghost">Pasar horas al próximo mes</Btn>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div className="row" style={{ justifyContent: 'space-between', marginTop: 22, flexWrap: 'wrap', gap: 10 }}>
        <Btn onClick={onBack}><Icon name="arrow_l" size={14}/> Volver a horas</Btn>
        <div className="row" style={{ flexWrap: 'wrap' }}>
          <Btn><Icon name="download" size={14}/> PDFs todos</Btn>
          <Btn variant="primary"><Icon name="download" size={14}/> Descargar nómina {periodo} (XLSX)</Btn>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { Nomina });

</script>

<script type="text/babel" data-file="registro.jsx">
// Registro Diario — wizard con trazabilidad por producto

function RegistroDiario({ role }) {
  const [step, setStep] = useState(0);
  const [showConfirm, setShowConfirm] = useState(false);
  const [saved, setSaved] = useState(false);
  const [date, setDate] = useState(() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });

  // Producción: { [prod_id]: cajas }
  const [prod, setProd] = useState({ v_life: 12, v_solplast: 6, cuchara_5ml: 5, j_life: 3 });

  // Material consumido POR producto:
  // { [prod_id]: { virgen: { [mat_id]: kg }, molido: [{ origen: prod_id, kg }] } }
  const [consumo, setConsumo] = useState({
    v_life:      { virgen: { pp_clarificado: 25, pp_omo: 12 }, molido: [{ origen: 'v_life', kg: 2.5 }] },
    v_solplast:  { virgen: { pp_omo: 16 }, molido: [] },
    cuchara_5ml: { virgen: { pp_clarificado: 8 }, molido: [{ origen: 'cuchara_5ml', kg: 1.2 }] },
    j_life:      { virgen: { pp_clarificado: 12, pe_alta: 10, pe_baja: 7 }, molido: [] },
  });

  // Desechos y molido GENERADO por producto:
  // { [prod_id]: { desecho_kg, molido_kg } }
  const [residuos, setResiduos] = useState({
    v_life:      { desecho: 1.8, molido: 1.2 },
    v_solplast:  { desecho: 1.0, molido: 0.5 },
    cuchara_5ml: { desecho: 0.4, molido: 0.3 },
    j_life:      { desecho: 2.2, molido: 1.5 },
  });

  const [obs, setObs] = useState('');

  const steps = [
    { label: 'Día',            icon: 'calendar', sub: 'Fecha de la jornada' },
    { label: 'Producción',     icon: 'box',      sub: 'Qué productos se hicieron' },
    { label: 'Material',       icon: 'flask',    sub: 'Virgen + molido por producto' },
    { label: 'Desechos',       icon: 'trash',    sub: 'Merma y molido generado' },
    { label: 'Revisar',        icon: 'check',    sub: 'Confirmar y guardar' },
  ];

  // Derivados
  const activeProds = Object.entries(prod).filter(([, v]) => v > 0).map(([id]) => id);
  const totalCajas = Object.values(prod).reduce((a, b) => a + b, 0);

  const totalVirgen = activeProds.reduce((sum, pid) => {
    const v = consumo[pid]?.virgen || {};
    return sum + Object.values(v).reduce((a, b) => a + (b || 0), 0);
  }, 0);
  const totalMolidoUsado = activeProds.reduce((sum, pid) => {
    const ml = consumo[pid]?.molido || [];
    return sum + ml.reduce((a, m) => a + (m.kg || 0), 0);
  }, 0);
  const totalMat = totalVirgen + totalMolidoUsado;

  const totalDesecho = activeProds.reduce((s, pid) => s + (residuos[pid]?.desecho || 0), 0);
  const totalMolidoGen = activeProds.reduce((s, pid) => s + (residuos[pid]?.molido || 0), 0);
  const mermaPct = totalMat > 0 ? (totalDesecho / totalMat) * 100 : 0;

  const next = () => setStep(s => Math.min(s + 1, 4));
  const back = () => setStep(s => Math.max(s - 1, 0));

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Producción · Cierre de jornada</Eyebrow>
          <h1 className="page-title">Registro <em>diario</em></h1>
          <div className="page-sub">
            {role === 'operario'
              ? 'Al final de tu turno, registra qué productos se hicieron y cuánto material usó cada uno.'
              : 'Cierre de jornada con trazabilidad por producto: material, molido usado, desechos y molido generado.'}
          </div>
        </div>
        <Chip tone="accent"><Icon name="clock" size={11}/> Turno activo</Chip>
      </div>

      <div className="wiz-stepper">
        {steps.map((s, i) => (
          <button key={i} className={`wstep ${i === step ? 'active' : ''} ${i < step ? 'done' : ''}`} onClick={() => setStep(i)}>
            <span className="wico">
              {i < step ? <Icon name="check" size={14} strokeWidth={3}/> : <Icon name={s.icon} size={14} />}
            </span>
            <div>
              <div className="wlbl">{s.label}</div>
              <div className="wsub">{s.sub}</div>
            </div>
          </button>
        ))}
      </div>

      <div className="panel" style={{ minHeight: 420 }}>
        {step === 0 && <RegStepDia date={date} setDate={setDate} />}
        {step === 1 && <RegStepProd prod={prod} setProd={setProd} />}
        {step === 2 && <RegStepMaterial activeProds={activeProds} consumo={consumo} setConsumo={setConsumo} totalMat={totalMat} totalVirgen={totalVirgen} totalMolidoUsado={totalMolidoUsado} />}
        {step === 3 && <RegStepResiduos activeProds={activeProds} residuos={residuos} setResiduos={setResiduos} totalDesecho={totalDesecho} totalMolidoGen={totalMolidoGen} mermaPct={mermaPct} />}
        {step === 4 && <RegStepRevisar date={date} activeProds={activeProds} prod={prod} consumo={consumo} residuos={residuos} obs={obs} setObs={setObs} totalMat={totalMat} totalVirgen={totalVirgen} totalMolidoUsado={totalMolidoUsado} totalCajas={totalCajas} totalDesecho={totalDesecho} totalMolidoGen={totalMolidoGen} mermaPct={mermaPct} />}

        <div className="row" style={{ justifyContent: 'space-between', marginTop: 24, paddingTop: 16, borderTop: '1px solid var(--line)' }}>
          <Btn onClick={back} disabled={step === 0}><Icon name="arrow_l" size={14}/> Atrás</Btn>
          <div className="small mute">Paso {step + 1} de {steps.length}</div>
          {step < 4 ? (
            <Btn variant="primary" onClick={next}>Siguiente <Icon name="arrow_r" size={14}/></Btn>
          ) : (
            <Btn variant="primary" onClick={() => setShowConfirm(true)}><Icon name="check" size={14}/> Guardar jornada</Btn>
          )}
        </div>
      </div>

      <Modal open={showConfirm && !saved} onClose={() => setShowConfirm(false)} title="¿Guardar jornada?"
        footer={<><Btn onClick={() => setShowConfirm(false)}>Revisar de nuevo</Btn><Btn variant="primary" onClick={() => { setSaved(true); }}><Icon name="check" size={14}/> Sí, guardar</Btn></>}>
        <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: 'var(--accent-soft)', color: 'var(--accent-hi)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <Icon name="calendar" size={20}/>
          </div>
          <div>
            <div style={{ fontSize: 14, marginBottom: 8 }}>Vas a guardar la jornada del <strong>{date}</strong> con:</div>
            <ul style={{ margin: 0, paddingLeft: 18, fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.8 }}>
              <li><strong style={{ color: 'var(--text)' }}>{activeProds.length}</strong> productos · <strong style={{ color: 'var(--text)' }}>{totalCajas}</strong> cajas</li>
              <li><strong style={{ color: 'var(--text)' }}>{totalMat.toFixed(1)} kg</strong> material ({totalVirgen.toFixed(1)} virgen + {totalMolidoUsado.toFixed(1)} molido)</li>
              <li><strong style={{ color: 'var(--text)' }}>{totalDesecho.toFixed(1)} kg</strong> desecho · <strong style={{ color: 'var(--good)' }}>+{totalMolidoGen.toFixed(1)} kg</strong> al bin de molido</li>
              <li>Merma: <strong style={{ color: mermaPct > 5 ? 'var(--warn)' : 'var(--good)' }}>{mermaPct.toFixed(1)}%</strong></li>
            </ul>
            <div className="xs mute" style={{ marginTop: 12 }}>Una vez guardada, quedará en el historial. Podrás editarla después si encuentras un error.</div>
          </div>
        </div>
      </Modal>

      <Modal open={saved} onClose={() => { setSaved(false); setShowConfirm(false); }} title="¡Jornada guardada!"
        footer={<><Btn onClick={() => { setSaved(false); setShowConfirm(false); setStep(0); }}>Registrar otra</Btn><Btn variant="primary" onClick={() => { setSaved(false); setShowConfirm(false); }}>Listo</Btn></>}>
        <div style={{ textAlign: 'center', padding: '10px 0' }}>
          <div style={{ width: 60, height: 60, borderRadius: '50%', background: 'var(--good-soft)', color: 'var(--good)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 14 }}>
            <Icon name="check" size={28} strokeWidth={3}/>
          </div>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 20, marginBottom: 6 }}>Jornada del {date}</div>
          <div className="small mute">Guardada correctamente. Los costos y métricas se actualizarán en el próximo recalculo.</div>
        </div>
      </Modal>

      {role !== 'operario' && (
        <div className="panel panel-flush" style={{ marginTop: 18 }}>
          <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}>
            <PanelHead title="Últimos registros" sub="Historial de jornadas guardadas" />
          </div>
          {REGISTROS_RECIENTES.map((r, i) => (
            <div key={i} className="list-row">
              <div className="ico" style={{ background: 'var(--accent-soft)', color: 'var(--accent-hi)' }}>
                <Icon name="calendar" size={14}/>
              </div>
              <div className="body">
                <div className="ttl">{r.fecha}</div>
                <div className="cap">{r.material} kg material · {r.cajas} cajas{r.obs && ` · ${r.obs}`}</div>
              </div>
              <Btn variant="ghost" size="sm"><Icon name="edit" size={13}/></Btn>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function RegStepDia({ date, setDate }) {
  const fmt = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const hoy = fmt(new Date());
  const ayer = fmt(new Date(Date.now() - 86400000));
  return (
    <div style={{ maxWidth: 540, margin: '20px auto', textAlign: 'center' }}>
      <div style={{ color: 'var(--accent)', margin: '0 auto 16px' }}><Icon name="calendar" size={32}/></div>
      <h2 style={{ fontFamily: 'var(--serif)', fontSize: 32, marginBottom: 8, letterSpacing: '-0.02em' }}>¿Qué día estás registrando?</h2>
      <div className="small mute" style={{ marginBottom: 24 }}>Usualmente hoy, pero puedes registrar un día pasado si se te olvidó.</div>
      <input type="date" value={date} onChange={e => setDate(e.target.value)} className="input" style={{ fontSize: 20, padding: '14px 18px', textAlign: 'center', fontFamily: 'var(--serif)' }} />
      <div className="row wrap" style={{ justifyContent: 'center', marginTop: 14 }}>
        <Btn size="sm" onClick={() => setDate(hoy)}>Hoy</Btn>
        <Btn size="sm" onClick={() => setDate(ayer)}>Ayer</Btn>
      </div>
    </div>
  );
}

function RegStepProd({ prod, setProd }) {
  return (
    <div>
      <h3 className="panel-title" style={{ marginBottom: 4 }}>¿Qué productos se hicieron hoy?</h3>
      <div className="panel-sub" style={{ marginBottom: 18 }}>Cajas completadas por línea. Después podrás registrar material y desechos de cada uno.</div>
      <div className="prod-grid">
        {PRODUCTOS_MOCK.map(p => {
          const v = prod[p.id] || 0;
          const active = v > 0;
          return (
            <div key={p.id} className={`prod-card ${active ? 'on' : ''}`}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
                <ProductIllus kind={p.kind} size={34} color={active ? 'var(--accent-hi)' : 'var(--text-dim)'} />
                <div style={{ textAlign: 'right' }}>
                  <div className="xs mute">x caja</div>
                  <div className="mono xs">{fmtNum(p.unidades_caja)}</div>
                </div>
              </div>
              <div style={{ fontWeight: 600, marginTop: 8, marginBottom: 2 }}>{p.nombre}</div>
              <div className="xs mute" style={{ marginBottom: 10 }}>{p.peso_g} g · {fmtMoney(p.costo_caja)}/caja</div>
              <div className="num-stepper">
                <button onClick={() => setProd({ ...prod, [p.id]: Math.max(0, v - 1) })}><Icon name="minus" size={12}/></button>
                <input type="number" value={v} onChange={e => setProd({ ...prod, [p.id]: parseInt(e.target.value) || 0 })} />
                <button onClick={() => setProd({ ...prod, [p.id]: v + 1 })}><Icon name="plus" size={12}/></button>
              </div>
            </div>
          );
        })}
      </div>
      <div className="sum-bar" style={{ marginTop: 18 }}>
        <div>Total cajas hoy</div>
        <div className="mono" style={{ fontSize: 22, fontFamily: 'var(--serif)' }}>
          {Object.values(prod).reduce((a,b)=>a+b,0)} cajas
        </div>
      </div>
    </div>
  );
}

function RegStepMaterial({ activeProds, consumo, setConsumo, totalMat, totalVirgen, totalMolidoUsado }) {
  if (activeProds.length === 0) {
    return <EmptyProducts msg="Primero selecciona los productos que se hicieron hoy (paso anterior)." />;
  }
  return (
    <div>
      <h3 className="panel-title" style={{ marginBottom: 4 }}>Material consumido por producto</h3>
      <div className="panel-sub" style={{ marginBottom: 14 }}>
        Para cada producto, registra el material <strong>virgen</strong> (bodega) y el <strong>molido</strong> reusado.
        Solo puedes reusar molido del mismo producto.
      </div>

      <div className="legend-row">
        <div className="legend-chip"><span className="dot" style={{ background: 'var(--accent-hi)' }}/>Virgen · material nuevo</div>
        <div className="legend-chip"><span className="dot" style={{ background: 'var(--good)' }}/>Molido · reusado</div>
      </div>

      <div className="prod-consumo-list">
        {activeProds.map(pid => {
          const p = PRODUCTOS_MOCK.find(x => x.id === pid);
          const c = consumo[pid] || { virgen: {}, molido: [] };
          const setC = (nc) => setConsumo({ ...consumo, [pid]: nc });
          const vTotal = Object.values(c.virgen || {}).reduce((a, b) => a + (b || 0), 0);
          const mTotal = (c.molido || []).reduce((a, m) => a + (m.kg || 0), 0);

          return (
            <div key={pid} className="prod-consumo-card">
              <div className="pcc-head">
                <ProductIllus kind={p.kind} size={28} color="var(--accent-hi)" />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600 }}>{p.nombre}</div>
                  <div className="xs mute">{p.material}</div>
                </div>
                <div className="pcc-totals">
                  <div><span className="xs mute">Virgen</span><strong className="mono">{vTotal.toFixed(1)} kg</strong></div>
                  <div><span className="xs mute">Molido</span><strong className="mono" style={{ color: 'var(--good)' }}>{mTotal.toFixed(1)} kg</strong></div>
                  <div><span className="xs mute">Total</span><strong className="mono" style={{ fontFamily: 'var(--serif)' }}>{(vTotal+mTotal).toFixed(1)} kg</strong></div>
                </div>
              </div>

              {/* Virgen por material */}
              <div className="pcc-block">
                <div className="pcc-label"><span className="dot" style={{ background: 'var(--accent-hi)' }}/> Virgen</div>
                <div className="pcc-mat-grid">
                  {MATERIALES_MOCK.map(m => (
                    <div key={m.id} className="pcc-mat-item">
                      <div className="swatch-sm" style={{ background: m.color }} />
                      <div className="pcc-mat-name">{m.nombre}</div>
                      <div className="num-stepper sm">
                        <button onClick={() => setC({ ...c, virgen: { ...c.virgen, [m.id]: Math.max(0, (c.virgen[m.id] || 0) - 1) } })}><Icon name="minus" size={11}/></button>
                        <input type="number" step="0.5" value={c.virgen[m.id] || 0}
                          onChange={e => setC({ ...c, virgen: { ...c.virgen, [m.id]: parseFloat(e.target.value) || 0 } })} />
                        <button onClick={() => setC({ ...c, virgen: { ...c.virgen, [m.id]: (c.virgen[m.id] || 0) + 1 } })}><Icon name="plus" size={11}/></button>
                      </div>
                      <span className="unit sm">kg</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Molido */}
              <div className="pcc-block">
                <div className="pcc-label" style={{ justifyContent: 'space-between' }}>
                  <div className="row" style={{ gap: 6 }}><span className="dot" style={{ background: 'var(--good)' }}/> Molido reusado</div>
                  <Btn size="sm" variant="ghost" onClick={() => setC({ ...c, molido: [...(c.molido||[]), { origen: pid, kg: 0 }] })}>
                    <Icon name="plus" size={12}/> Agregar lote
                  </Btn>
                </div>
                {(c.molido || []).length === 0 ? (
                  <div className="pcc-empty">Sin molido reusado en este producto.</div>
                ) : (
                  <div className="pcc-mol-list">
                    {c.molido.map((m, i) => (
                      <div key={i} className="pcc-mol-row">
                        <Icon name="flame" size={14} style={{ color: 'var(--good)' }}/>
                        <span className="xs mute">desde</span>
                        <select className="input sm" value={m.origen}
                          onChange={e => {
                            const nm = [...c.molido]; nm[i] = { ...m, origen: e.target.value };
                            setC({ ...c, molido: nm });
                          }}>
                          {PRODUCTOS_MOCK.filter(pp => pp.id === pid || pp.kind === p.kind).map(pp => (
                            <option key={pp.id} value={pp.id}>{pp.nombre}{pp.id === pid ? ' (mismo)' : ''}</option>
                          ))}
                        </select>
                        <div className="num-stepper sm">
                          <button onClick={() => { const nm=[...c.molido]; nm[i]={...m,kg:Math.max(0,(m.kg||0)-0.5)}; setC({...c,molido:nm}); }}><Icon name="minus" size={11}/></button>
                          <input type="number" step="0.5" value={m.kg}
                            onChange={e => { const nm=[...c.molido]; nm[i]={...m,kg:parseFloat(e.target.value)||0}; setC({...c,molido:nm}); }} />
                          <button onClick={() => { const nm=[...c.molido]; nm[i]={...m,kg:(m.kg||0)+0.5}; setC({...c,molido:nm}); }}><Icon name="plus" size={11}/></button>
                        </div>
                        <span className="unit sm">kg</span>
                        <button className="pcc-del" onClick={() => setC({ ...c, molido: c.molido.filter((_, j) => j !== i) })}>
                          <Icon name="close" size={12}/>
                        </button>
                      </div>
                    ))}
                  </div>
                )}
                <div className="pcc-note xs mute">
                  <Icon name="info" size={11}/> Solo aparecen productos compatibles (mismo tipo de pieza y material).
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <div className="sum-bar" style={{ marginTop: 18 }}>
        <div>Total material consumido</div>
        <div className="row" style={{ gap: 16 }}>
          <div className="xs mute">Virgen <strong className="mono" style={{ color: 'var(--text)' }}>{totalVirgen.toFixed(1)} kg</strong></div>
          <div className="xs mute">Molido <strong className="mono" style={{ color: 'var(--good)' }}>{totalMolidoUsado.toFixed(1)} kg</strong></div>
          <div className="mono" style={{ fontSize: 22, fontFamily: 'var(--serif)' }}>{totalMat.toFixed(1)} kg</div>
        </div>
      </div>
    </div>
  );
}

function RegStepResiduos({ activeProds, residuos, setResiduos, totalDesecho, totalMolidoGen, mermaPct }) {
  if (activeProds.length === 0) {
    return <EmptyProducts msg="Primero selecciona los productos que se hicieron hoy (paso 2)." />;
  }
  const tone = mermaPct > 5 ? 'warn' : mermaPct > 3 ? 'info' : 'good';
  return (
    <div>
      <h3 className="panel-title" style={{ marginBottom: 4 }}>Desechos y molido generado</h3>
      <div className="panel-sub" style={{ marginBottom: 14 }}>
        Por cada producto: el <strong>desecho</strong> (irrecuperable) y el <strong>molido generado</strong> que queda
        disponible para reusar en <em>el mismo producto</em>.
      </div>

      <div className="legend-row">
        <div className="legend-chip"><span className="dot" style={{ background: 'var(--bad)' }}/>Desecho · no recuperable</div>
        <div className="legend-chip"><span className="dot" style={{ background: 'var(--good)' }}/>Molido generado · al bin del producto</div>
      </div>

      <div className="residuo-list">
        {activeProds.map(pid => {
          const p = PRODUCTOS_MOCK.find(x => x.id === pid);
          const r = residuos[pid] || { desecho: 0, molido: 0 };
          const setR = (nr) => setResiduos({ ...residuos, [pid]: nr });
          return (
            <div key={pid} className="residuo-card">
              <div className="rc-head">
                <ProductIllus kind={p.kind} size={28} color="var(--accent-hi)" />
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600 }}>{p.nombre}</div>
                  <div className="xs mute">Bin de molido disponible para próxima jornada</div>
                </div>
              </div>
              <div className="rc-fields">
                <div className="rc-field">
                  <div className="rc-lbl"><span className="dot" style={{ background: 'var(--bad)' }}/> Desecho</div>
                  <div className="num-stepper">
                    <button onClick={() => setR({ ...r, desecho: Math.max(0, (r.desecho||0) - 0.5) })}><Icon name="minus" size={12}/></button>
                    <input type="number" step="0.1" value={r.desecho || 0}
                      onChange={e => setR({ ...r, desecho: parseFloat(e.target.value) || 0 })} />
                    <button onClick={() => setR({ ...r, desecho: (r.desecho||0) + 0.5 })}><Icon name="plus" size={12}/></button>
                  </div>
                  <span className="unit">kg</span>
                </div>
                <div className="rc-field">
                  <div className="rc-lbl"><span className="dot" style={{ background: 'var(--good)' }}/> Molido generado</div>
                  <div className="num-stepper">
                    <button onClick={() => setR({ ...r, molido: Math.max(0, (r.molido||0) - 0.5) })}><Icon name="minus" size={12}/></button>
                    <input type="number" step="0.1" value={r.molido || 0}
                      onChange={e => setR({ ...r, molido: parseFloat(e.target.value) || 0 })} />
                    <button onClick={() => setR({ ...r, molido: (r.molido||0) + 0.5 })}><Icon name="plus" size={12}/></button>
                  </div>
                  <span className="unit">kg</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <div className="sum-bar" style={{ marginTop: 18 }}>
        <div>Totales del día</div>
        <div className="row" style={{ gap: 16 }}>
          <div className="xs mute">Desecho <strong className="mono" style={{ color: 'var(--bad)' }}>{totalDesecho.toFixed(1)} kg</strong></div>
          <div className="xs mute">Molido generado <strong className="mono" style={{ color: 'var(--good)' }}>{totalMolidoGen.toFixed(1)} kg</strong></div>
        </div>
      </div>

      <div className={`alert ${tone}`} style={{ marginTop: 12 }}>
        <div className="icon"><Icon name={tone === 'warn' ? 'alert' : 'info'} size={16}/></div>
        <div className="body">
          <div className="title">Merma efectiva: {mermaPct.toFixed(1)}% del material</div>
          <div className="msg">
            {mermaPct > 5 ? 'Por encima del objetivo (3%). Revisar calibración de máquinas.' :
             mermaPct > 3 ? 'Levemente sobre el objetivo. Aceptable si no persiste.' :
             'Dentro del objetivo. Buen rendimiento.'}
          </div>
        </div>
      </div>
    </div>
  );
}

function EmptyProducts({ msg }) {
  return (
    <div style={{ textAlign: 'center', padding: '60px 20px', color: 'var(--text-dim)' }}>
      <Icon name="box" size={32} />
      <div style={{ marginTop: 10 }}>{msg}</div>
    </div>
  );
}

function RegStepRevisar({ date, activeProds, prod, consumo, residuos, obs, setObs, totalMat, totalVirgen, totalMolidoUsado, totalCajas, totalDesecho, totalMolidoGen, mermaPct }) {
  return (
    <div>
      <h3 className="panel-title" style={{ marginBottom: 4 }}>Revisa antes de guardar</h3>
      <div className="panel-sub" style={{ marginBottom: 18 }}>Cada producto muestra su desglose completo. Si algo no está bien, vuelve al paso correspondiente.</div>

      <div className="cols-2">
        <div className="summary-box">
          <div className="sb-ttl"><Icon name="calendar" size={13}/> Jornada</div>
          <div className="sb-big">{date}</div>
        </div>
        <div className="summary-box">
          <div className="sb-ttl"><Icon name="box" size={13}/> Producción</div>
          <div className="sb-big">{totalCajas} cajas · {activeProds.length} productos</div>
        </div>
        <div className="summary-box">
          <div className="sb-ttl"><Icon name="flask" size={13}/> Material</div>
          <div className="sb-big">{totalMat.toFixed(1)} kg</div>
          <div className="xs mute" style={{ marginTop: 4 }}>Virgen {totalVirgen.toFixed(1)} · Molido {totalMolidoUsado.toFixed(1)}</div>
        </div>
        <div className="summary-box">
          <div className="sb-ttl"><Icon name="trash" size={13}/> Desechos / molido</div>
          <div className="sb-big">{totalDesecho.toFixed(1)} kg · +{totalMolidoGen.toFixed(1)} molido</div>
          <div className="xs mute" style={{ marginTop: 4 }}>Merma <strong style={{ color: mermaPct > 5 ? 'var(--warn)' : 'var(--good)' }}>{mermaPct.toFixed(1)}%</strong></div>
        </div>
      </div>

      <div style={{ marginTop: 20 }}>
        <Eyebrow>Desglose por producto</Eyebrow>
        <div className="rev-prod-list">
          {activeProds.map(pid => {
            const p = PRODUCTOS_MOCK.find(x => x.id === pid);
            const c = consumo[pid] || { virgen: {}, molido: [] };
            const r = residuos[pid] || { desecho: 0, molido: 0 };
            const vTotal = Object.values(c.virgen || {}).reduce((a, b) => a + (b || 0), 0);
            const mTotal = (c.molido || []).reduce((a, m) => a + (m.kg || 0), 0);
            return (
              <div key={pid} className="rev-prod-row">
                <ProductIllus kind={p.kind} size={28} color="var(--accent-hi)" />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600 }}>{p.nombre}</div>
                  <div className="xs mute">{prod[pid]} cajas · {(vTotal + mTotal).toFixed(1)} kg material</div>
                </div>
                <div className="rev-metrics">
                  <div><span className="xs mute">Virgen</span><strong className="mono">{vTotal.toFixed(1)}</strong></div>
                  <div><span className="xs mute">Molido ↑</span><strong className="mono" style={{ color: 'var(--good)' }}>{mTotal.toFixed(1)}</strong></div>
                  <div><span className="xs mute">Desecho</span><strong className="mono" style={{ color: 'var(--bad)' }}>{r.desecho.toFixed(1)}</strong></div>
                  <div><span className="xs mute">Molido ↓</span><strong className="mono" style={{ color: 'var(--good)' }}>+{r.molido.toFixed(1)}</strong></div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="field" style={{ marginTop: 18 }}>
        <label>Observaciones (opcional)</label>
        <textarea className="input" rows={3} value={obs} onChange={e => setObs(e.target.value)}
          placeholder="Ej: paro por falla eléctrica 14:00–14:30, cambio de molde tarde..." style={{ resize: 'vertical', fontFamily: 'inherit' }} />
      </div>
    </div>
  );
}

Object.assign(window, { RegistroDiario });

</script>

<script type="text/babel" data-file="catalogo.jsx">
// Catálogo: Materiales + Productos + Empaques + Gastos fijos en un solo módulo

function Catalogo() {
  const [tab, setTab] = useState('productos');
  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Producción · Configuración</Eyebrow>
          <h1 className="page-title"><em>Catálogo</em></h1>
          <div className="page-sub">Todo lo que alimenta el cálculo de costos, en un solo lugar. Cambia aquí y se actualiza en todo el sistema.</div>
        </div>
        <Btn variant="primary"><Icon name="plus" size={14}/> Nuevo</Btn>
      </div>

      <div className="tabs">
        {[
          { k: 'productos', l: 'Productos',  c: PRODUCTOS_MOCK.length },
          { k: 'materiales',l: 'Materiales', c: MATERIALES_MOCK.length },
          { k: 'empaques',  l: 'Empaques',   c: EMPAQUES_MOCK.length },
          { k: 'gastos',    l: 'Gastos fijos', c: Object.keys(GASTOS_FIJOS_MOCK).length },
        ].map(t => (
          <button key={t.k} className={`tab ${tab === t.k ? 'on' : ''}`} onClick={() => setTab(t.k)}>
            {t.l} <span className="count">{t.c}</span>
          </button>
        ))}
      </div>

      {tab === 'productos' && <TabProductos />}
      {tab === 'materiales' && <TabMateriales />}
      {tab === 'empaques' && <TabEmpaques />}
      {tab === 'gastos' && <TabGastos />}
    </div>
  );
}

function TabProductos() {
  const [sel, setSel] = useState(null);
  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);
  const groups = {};
  PRODUCTOS_MOCK.forEach(p => { (groups[p.kind] = groups[p.kind] || []).push(p); });
  const kindLabel = { vaso: 'Vasos', cuchara: 'Cucharas', gotero: 'Goteros', jeringa: 'Jeringas' };

  function openProd(p) { setSel(p); setForm({ ...p }); }

  async function handleSave() {
    if (!form || !sel) return;
    setSaving(true);
    await window._api?.saveProducto(sel.id, form);
    setSaving(false);
    location.reload();
  }

  return (
    <>
      {Object.entries(groups).map(([kind, items]) => (
        <div key={kind} style={{ marginBottom: 24 }}>
          <Eyebrow>{kindLabel[kind] || kind}</Eyebrow>
          <div className="prod-grid">
            {items.map(p => (
              <button key={p.id} className="prod-card static" onClick={() => openProd(p)}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
                  <ProductIllus kind={p.kind} size={42} />
                  <Chip>{fmtNum(p.unidades_caja)} u/caja</Chip>
                </div>
                <div style={{ fontWeight: 600, marginTop: 10 }}>{p.nombre}</div>
                <div className="xs mute" style={{ marginBottom: 12 }}>{p.peso_g} g · factor {p.factor}x</div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', paddingTop: 12, borderTop: '1px dashed var(--line)' }}>
                  <span className="xs mute">costo unitario</span>
                  <strong style={{ fontFamily: 'var(--serif)', fontSize: 18, color: 'var(--accent-hi)' }}>${p.costo_unit.toFixed(4)}</strong>
                </div>
              </button>
            ))}
          </div>
        </div>
      ))}
      <Drawer open={!!sel} onClose={() => { setSel(null); setForm(null); }} title={sel?.nombre}
        footer={<div className="row" style={{ justifyContent: 'flex-end', gap: 8 }}>
          <Btn onClick={() => { setSel(null); setForm(null); }}>Cancelar</Btn>
          <Btn variant="primary" onClick={handleSave} disabled={saving}>{saving ? 'Guardando…' : 'Guardar'}</Btn>
        </div>}>
        {sel && form && <ProductEditor form={form} setForm={setForm} sel={sel} />}
      </Drawer>
    </>
  );
}

function ProductEditor({ form, setForm, sel }) {
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  return (
    <div>
      <div style={{ display: 'flex', gap: 16, marginBottom: 24, alignItems: 'center' }}>
        <div style={{ padding: 16, background: 'var(--bg-raised)', borderRadius: 'var(--radius-lg)', border: '1px solid var(--line)' }}>
          <ProductIllus kind={sel.kind} size={64} />
        </div>
        <div>
          <Eyebrow>Producto</Eyebrow>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 22 }}>{form.nombre}</div>
          <div className="xs mute">{sel.material}</div>
        </div>
      </div>
      <div className="cols-2">
        <Input label="Nombre" value={form.nombre} onChange={e => set('nombre', e.target.value)} />
        <Input label="Unidades por caja" type="number" value={form.unidades_caja} onChange={e => set('unidades_caja', parseInt(e.target.value) || 0)} />
        <Input label="Peso por unidad (g)" type="number" step="0.001" value={form.peso_g} onChange={e => set('peso_g', parseFloat(e.target.value) || 0)} />
        <Input label="Factor de mano de obra" type="number" step="0.1" value={form.factor} onChange={e => set('factor', parseFloat(e.target.value) || 1)} hint="Jeringas pesan más que vasos en tiempo-máquina" />
      </div>
      <Eyebrow style={{ marginTop: 24 }}>Composición de costo (calculada)</Eyebrow>
      <div style={{ background: 'var(--bg-raised)', borderRadius: 'var(--radius-md)', padding: 14 }}>
        <CostBreakdownBar p={sel} />
      </div>
    </div>
  );
}

function CostBreakdownBar({ p }) {
  // Mock breakdown
  const parts = [
    { k: 'Material', v: p.costo_unit * 0.55, c: 'var(--accent)' },
    { k: 'Nómina',   v: p.costo_unit * 0.22, c: 'var(--info)' },
    { k: 'Empaque',  v: p.costo_unit * 0.15, c: 'var(--good)' },
    { k: 'Gastos fijos', v: p.costo_unit * 0.08, c: 'var(--warn)' },
  ];
  const total = parts.reduce((a,b)=>a+b.v,0);
  return (
    <div>
      <div className="stack-bar">
        {parts.map(p => <div key={p.k} style={{ flex: p.v / total, background: p.c }} title={p.k} />)}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8, marginTop: 12 }}>
        {parts.map(part => (
          <div key={part.k} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12 }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: part.c }} />
            <span style={{ flex: 1 }}>{part.k}</span>
            <span className="mono">${part.v.toFixed(4)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function TabMateriales() {
  const [sel, setSel] = useState(null);
  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);

  function openMat(m) { setSel(m); setForm({ ...m }); }

  async function handleSave() {
    if (!form || !sel) return;
    setSaving(true);
    await window._api?.saveMaterial(sel.id, form);
    setSaving(false);
    location.reload();
  }

  return (
    <>
      <div className="panel panel-flush">
        <table className="tbl">
          <thead>
            <tr><th>Material</th><th className="num">Costo / kg</th><th className="num">Merma típica</th><th>Uso</th><th></th></tr>
          </thead>
          <tbody>
            {MATERIALES_MOCK.map(m => (
              <tr key={m.id} style={{ cursor: 'pointer' }} onClick={() => openMat(m)}>
                <td>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ width: 28, height: 28, borderRadius: 8, background: m.color, opacity: 0.25, border: `1px solid ${m.color}` }} />
                    <strong>{m.nombre}</strong>
                  </div>
                </td>
                <td className="num mono">{fmtMoney(m.costo_kg, 2)}</td>
                <td className="num"><Chip tone={m.merma > 4 ? 'warn' : 'good'}>{m.merma}%</Chip></td>
                <td className="small mute">{m.id === 'pvc' ? 'Goteros (PVC cortado)' : 'Inyección / extrusión'}</td>
                <td><Btn variant="ghost" size="sm" onClick={e => { e.stopPropagation(); openMat(m); }}><Icon name="edit" size={13}/></Btn></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <Drawer open={!!sel} onClose={() => { setSel(null); setForm(null); }} title={sel?.nombre}
        footer={<div className="row" style={{ justifyContent: 'flex-end', width: '100%', gap: 10 }}>
          <Btn onClick={() => { setSel(null); setForm(null); }}>Cancelar</Btn>
          <Btn variant="primary" onClick={handleSave} disabled={saving}>{saving ? 'Guardando…' : 'Guardar'}</Btn>
        </div>}>
        {sel && form && <MaterialEditor form={form} setForm={setForm} sel={sel} />}
      </Drawer>
    </>
  );
}

function MaterialEditor({ form, setForm, sel }) {
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  return (
    <div>
      <div style={{ display: 'flex', gap: 14, alignItems: 'center', marginBottom: 22 }}>
        <div style={{ width: 56, height: 56, borderRadius: 12, background: sel.color, opacity: 0.35, border: `1.5px solid ${sel.color}` }} />
        <div>
          <Eyebrow>Material</Eyebrow>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 22 }}>{sel.nombre}</div>
        </div>
      </div>
      <div className="cols-2">
        <Input label="Nombre" value={form.nombre} onChange={e => set('nombre', e.target.value)} />
        <Input label="Costo por kg ($)" type="number" step="0.01" value={form.costo_kg} onChange={e => set('costo_kg', parseFloat(e.target.value) || 0)} />
        <Input label="Merma típica (%)" type="number" step="0.1" value={form.merma} onChange={e => set('merma', parseFloat(e.target.value) || 0)} hint="Para alertas en el registro diario" />
        <Input label="Código interno" value={form.id} onChange={() => {}} />
      </div>
    </div>
  );
}

function TabEmpaques() {
  const [sel, setSel] = useState(null);
  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  function openEmp(e) { setSel(e); setForm({ ...e }); }

  async function handleSave() {
    if (!form || !sel) return;
    setSaving(true);
    await window._api?.saveEmpaque(sel.id, form);
    setSaving(false);
    location.reload();
  }

  return (
    <>
      <div className="empaque-grid">
        {EMPAQUES_MOCK.map(e => (
          <button key={e.id} className="empaque-card" onClick={() => openEmp(e)} style={{ textAlign: 'left', border: '1px solid var(--line)', cursor: 'pointer', color: 'var(--text)' }}>
            <div className="ico" style={{ background: 'var(--accent-soft)', color: 'var(--accent-hi)' }}>
              <Icon name="package" size={16}/>
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 600 }}>{e.nombre}</div>
              <div className="xs mute">por {e.unidad}</div>
            </div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 18 }}>{fmtMoney(e.costo, 3)}</div>
          </button>
        ))}
      </div>
      <Drawer open={!!sel} onClose={() => { setSel(null); setForm(null); }} title={sel?.nombre}
        footer={<div className="row" style={{ justifyContent: 'flex-end', width: '100%', gap: 10 }}>

<script type="text/babel" data-file="costos.jsx">
// Costos — breakdown + evolución + comparador
function Costos() {
  const [sel, setSel] = useState(PRODUCTOS_MOCK[0].id);
  const [view, setView] = useState('detalle');
  const prod = PRODUCTOS_MOCK.find(p => p.id === sel);

  const nominaMes = (NOMINA_HISTORICA[NOMINA_HISTORICA.length - 1]?.total) || 0;
  const gastosFijos = Object.values(GASTOS_FIJOS_MOCK).reduce((a, b) => a + b, 0);
  const totalUnits = PRODUCCION_MES.reduce((a, p) => a + p.unidades, 0);

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Producción · Análisis</Eyebrow>
          <h1 className="page-title">Costos <em>por producto</em></h1>
          <div className="page-sub">Costo unitario real, con descomposición completa: material, empaques, nómina prorrateada y gastos fijos.</div>
        </div>
        <Seg options={[{ value: 'detalle', label: 'Detalle' }, { value: 'comparar', label: 'Comparar' }, { value: 'evolucion', label: 'Evolución' }]} value={view} onChange={setView} />
      </div>

      {view === 'detalle' && <VistaDetalle prod={prod} sel={sel} setSel={setSel} nominaMes={nominaMes} gastosFijos={gastosFijos} totalUnits={totalUnits} />}
      {view === 'comparar' && <VistaComparar />}
      {view === 'evolucion' && <VistaEvolucion />}
    </div>
  );
}

function VistaDetalle({ prod, sel, setSel, nominaMes, gastosFijos, totalUnits }) {
  const [inclNomina, setInclNomina] = useState(true);
  const [inclGastos, setInclGastos] = useState(true);
  const [usarMermaReal, setUsarMermaReal] = useState(false);
  const matCost = prod.costo_unit * 0.55;
  const empCost = prod.costo_unit * 0.15;
  const nomCost = prod.costo_unit * 0.22;
  const gfCost  = prod.costo_unit * 0.08;

  return (
    <>
      <div className="prod-picker">
        {PRODUCTOS_MOCK.map(p => (
          <button key={p.id} className={`pp ${sel === p.id ? 'on' : ''}`} onClick={() => setSel(p.id)}>
            <ProductIllus kind={p.kind} size={28} color={sel === p.id ? 'var(--accent-hi)' : 'var(--text-dim)'} />
            <div>
              <div style={{ fontSize: 12, fontWeight: 600 }}>{p.nombre}</div>
              <div className="xs mute mono">${p.costo_unit.toFixed(4)}</div>
            </div>
          </button>
        ))}
      </div>

      <div className="cols-2" style={{ marginTop: 18 }}>
        <div className="panel">
          <Eyebrow>Seleccionado</Eyebrow>
          <div style={{ display: 'flex', alignItems: 'center', gap: 20, marginTop: 10, marginBottom: 20 }}>
            <div style={{ padding: 16, background: 'var(--bg-raised)', borderRadius: 16, border: '1px solid var(--line)' }}>
              <ProductIllus kind={prod.kind} size={56} />
            </div>
            <div>
              <h2 style={{ fontFamily: 'var(--serif)', fontSize: 28, letterSpacing: '-0.02em', margin: 0 }}>{prod.nombre}</h2>
              <div className="small mute">{prod.material}</div>
              <div className="row" style={{ marginTop: 6 }}>
                <Chip>{fmtNum(prod.unidades_caja)} u/caja</Chip>
                <Chip>{prod.peso_g} g</Chip>
                <Chip>factor {prod.factor}x</Chip>
              </div>
            </div>
          </div>

          <div className="cost-lines">
            <div className="cl">
              <div className="dot" style={{ background: 'var(--accent)' }}/>
              <div className="l">Material ({prod.peso_g} g × precio medio)</div>
              <div className="v mono">${matCost.toFixed(4)}</div>
            </div>
            <div className="cl">
              <div className="dot" style={{ background: 'var(--good)' }}/>
              <div className="l">Empaque (caja + funda + cinta)</div>
              <div className="v mono">${empCost.toFixed(4)}</div>
            </div>
            <div className="cl">
              <div className="dot" style={{ background: 'var(--info)' }}/>
              <div className="l">Nómina prorrateada</div>
              <div className="v mono">${nomCost.toFixed(4)}</div>
            </div>
            <div className="cl">
              <div className="dot" style={{ background: 'var(--warn)' }}/>
              <div className="l">Gastos fijos ({fmtMoneyShort(gastosFijos)}/mes ÷ {fmtNum(totalUnits/1000,0)}k u)</div>
              <div className="v mono">${gfCost.toFixed(4)}</div>
            </div>
            <div className="cl tot">
              <div className="l">Total unitario</div>
              <div className="v mono" style={{ fontFamily: 'var(--serif)', fontSize: 22 }}>${prod.costo_unit.toFixed(4)}</div>
            </div>
            <div className="cl sub">
              <div className="l small mute">Costo por caja ({fmtNum(prod.unidades_caja)} u)</div>
              <div className="v mono">{fmtMoney(prod.costo_caja)}</div>
            </div>
          </div>
        </div>

        <div>
          <div className="panel">
            <PanelHead title="Descomposición visual" sub="Proporción por componente" />
            <CostDonut parts={[
              { k: 'Material', v: matCost, c: 'var(--accent)' },
              { k: 'Empaque',  v: empCost, c: 'var(--good)' },
              { k: 'Nómina',   v: nomCost, c: 'var(--info)' },
              { k: 'Gastos',   v: gfCost,  c: 'var(--warn)' },
            ]} />
          </div>
          <div className="panel" style={{ marginTop: 16 }}>
            <PanelHead title="¿Por qué este costo?" sub="Cómo el sistema llega al número" />
            <div className="alert info" style={{ marginBottom: 10 }}>
              <div className="icon"><Icon name="info" size={14}/></div>
              <div className="body">
                <div className="msg">
                  Partimos del <strong>peso de la pieza</strong> ({prod.peso_g} g) × <strong>costo del material</strong>. Sumamos los empaques que usa este producto.
                  La nómina del mes ({fmtMoneyShort(nominaMes)}) se reparte entre todas las unidades producidas ponderadas por <strong>factor {prod.factor}x</strong>.
                  Los gastos fijos se prorratean del mismo modo.
                </div>
              </div>
            </div>
            <Check checked={inclNomina} onChange={setInclNomina}>Incluir nómina en el prorrateo</Check>
            <Check checked={inclGastos} onChange={setInclGastos}>Incluir gastos fijos</Check>
            <Check checked={usarMermaReal} onChange={setUsarMermaReal}>Usar merma real del mes (en vez de la típica)</Check>
          </div>
        </div>
      </div>
    </>
  );
}

function CostDonut({ parts }) {
  const total = parts.reduce((a,b)=>a+b.v,0);
  const size = 180, r = 70, cx = 100, cy = 100, strokeW = 22;
  let cum = 0;
  const circ = 2 * Math.PI * r;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 20, flexWrap: 'wrap' }}>
      <svg width={200} height={size}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--line)" strokeWidth={strokeW} />
        {parts.map((p, i) => {
          const frac = p.v / total;
          const dash = frac * circ;
          const off = -cum * circ;
          cum += frac;
          return (
            <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={p.c} strokeWidth={strokeW}
              strokeDasharray={`${dash} ${circ - dash}`} strokeDashoffset={off}
              transform={`rotate(-90 ${cx} ${cy})`} />
          );
        })}
        <text x={cx} y={cy - 4} textAnchor="middle" fontSize="10" fill="var(--text-mute)">Total</text>
        <text x={cx} y={cy + 14} textAnchor="middle" fontFamily="var(--serif)" fontSize="20" fill="var(--text)">${total.toFixed(4)}</text>
      </svg>
      <div style={{ flex: 1 }}>
        {parts.map(p => (
          <div key={p.k} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '6px 0' }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: p.c }} />
            <span style={{ flex: 1, fontSize: 13 }}>{p.k}</span>
            <span className="mono xs">${p.v.toFixed(4)}</span>
            <span className="xs mute" style={{ width: 40, textAlign: 'right' }}>{((p.v/total)*100).toFixed(0)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function VistaComparar() {
  const [ids, setIds] = useState(['v_life', 'j_life', 'gotero']);
  const items = PRODUCTOS_MOCK.filter(p => ids.includes(p.id));
  const max = Math.max(...items.map(p => p.costo_unit));
  return (
    <>
      <div className="panel" style={{ marginBottom: 16 }}>
        <Eyebrow>Seleccionar productos para comparar</Eyebrow>
        <div className="row wrap" style={{ marginTop: 10 }}>
          {PRODUCTOS_MOCK.map(p => (
            <button key={p.id} className={`pp-toggle ${ids.includes(p.id) ? 'on' : ''}`} onClick={() => setIds(ids.includes(p.id) ? ids.filter(x => x !== p.id) : [...ids, p.id])}>
              <ProductIllus kind={p.kind} size={18} />
              <span>{p.nombre}</span>
            </button>
          ))}
        </div>
      </div>

      <div className="panel">
        <PanelHead title="Comparación" sub="Costo unitario y composición lado a lado" />
        {items.map(p => (
          <div key={p.id} style={{ marginBottom: 18 }}>
            <div className="row" style={{ justifyContent: 'space-between', marginBottom: 6 }}>
              <div className="row">
                <ProductIllus kind={p.kind} size={22} />
                <strong>{p.nombre}</strong>
              </div>
              <span className="mono" style={{ fontFamily: 'var(--serif)', fontSize: 18 }}>${p.costo_unit.toFixed(4)}</span>
            </div>
            <div className="compare-bar">
              <div style={{ flex: 55, background: 'var(--accent)' }} title="Material"/>
              <div style={{ flex: 22, background: 'var(--info)' }} title="Nómina"/>
              <div style={{ flex: 15, background: 'var(--good)' }} title="Empaque"/>
              <div style={{ flex: 8, background: 'var(--warn)' }} title="Gastos"/>
              <div style={{ flex: ((max - p.costo_unit) / max) * 100, background: 'transparent' }} />
            </div>
          </div>
        ))}
        <div className="legend-row">
          <span><span className="sw" style={{background:'var(--accent)'}}/> Material</span>
          <span><span className="sw" style={{background:'var(--info)'}}/> Nómina</span>
          <span><span className="sw" style={{background:'var(--good)'}}/> Empaque</span>
          <span><span className="sw" style={{background:'var(--warn)'}}/> Gastos fijos</span>
        </div>
      </div>
    </>
  );
}

function VistaEvolucion() {
  const prods = Object.keys(COSTOS_EVOLUCION);
  const series = prods.map((p, i) => ({ data: COSTOS_EVOLUCION[p], color: ['var(--accent)', 'var(--info)', 'var(--warn)', 'var(--good)'][i] }));
  return (
    <div className="panel">
      <PanelHead title="Evolución del costo unitario" sub="Últimos 8 meses · principales productos" />
      <LineChart
        series={series}
        labels={COSTOS_EVOLUCION_MESES.map(m => m.split(' ')[0])}
        height={340}
        yFmt={v => '$' + v.toFixed(4)}
      />
      <div className="legend-row" style={{ marginTop: 16 }}>
        {prods.map((p, i) => (
          <span key={p}><span className="sw" style={{background: ['var(--accent)', 'var(--info)', 'var(--warn)', 'var(--good)'][i]}}/> {p}</span>
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { Costos });

</script>

<script type="text/babel" data-file="empleados.jsx">
// Empleados — grid de tarjetas + drawer lateral de edición

const EMPTY_EMP = {
  id: 'nuevo', nombre: '', cargo: '', iniciales: '··',
  color: 'var(--accent-soft)', salario: 470, transporte: 1.5, horas_base: 8,
  region: 'Sierra/Amazonia', fondos_reserva: false, prestamo_iess: 0, isNew: true,
};

function Empleados() {
  const [sel, setSel] = useState(null);
  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);
  const [q, setQ] = useState('');
  const items = EMPLEADOS_MOCK.filter(e => e.nombre.toLowerCase().includes(q.toLowerCase()));

  function openEmp(e) { setSel(e); setForm({ ...e }); }

  async function handleSave() {
    if (!form) return;
    setSaving(true);
    let ok;
    if (form.isNew) {
      ok = await window._api?.createEmpleado(form);
    } else {
      ok = await window._api?.saveEmpleado(sel.id, form);
    }
    setSaving(false);
    if (ok !== false) location.reload();
  }

  async function handleDelete() {
    if (!sel || sel.isNew) return;
    if (!confirm(`¿Desactivar a ${sel.nombre}? Se eliminará de la nómina.`)) return;
    await window._api?.deleteEmpleado(sel.id);
    location.reload();
  }

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Personal · Configuración</Eyebrow>
          <h1 className="page-title"><em>Empleados</em></h1>

        </div>
        <div className="row">
          <div className="field" style={{ margin: 0, width: 260 }}>
            <div style={{ position: 'relative' }}>
              <Icon name="search" size={14} className="mute" style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)' }} />
              <input className="input" style={{ paddingLeft: 32 }} placeholder="Buscar..." value={q} onChange={e => setQ(e.target.value)} />

        </div>
      </div>

      <div className="emp-grid">
        {items.map(e => (
          <button key={e.id} className="emp-card" onClick={() => openEmp(e)}>
            <div style={{ display: 'flex', gap: 14, alignItems: 'center', marginBottom: 14 }}>
              <div className="avatar" style={{ background: e.color, width: 44, height: 44, fontSize: 14 }}>{e.iniciales}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600 }}>{e.nombre}</div>
                <div className="xs mute">{e.cargo}</div>
              </div>
            </div>
            <div className="emp-meta">
              <div><span className="mute">Salario</span><strong className="mono">{fmtMoney(e.salario, 0)}</strong></div>
              <div><span className="mute">Transporte</span><strong className="mono">{fmtMoney(e.transporte)}</strong></div>
              <div><span className="mute">Horas/día</span><strong className="mono">{e.horas_base}h</strong></div>
            </div>
            <div className="row" style={{ marginTop: 12, flexWrap: 'wrap', gap: 4 }}>
              {e.fondos_reserva && <Chip tone="good">Fondos reserva</Chip>}
              {e.prestamo_iess > 0 && <Chip tone="warn">Préstamo IESS</Chip>}
              <Chip>{e.region.split('/')[0]}</Chip>
            </div>
          </button>
        ))}
      </div>

      <Drawer open={!!sel} onClose={() => { setSel(null); setForm(null); }} title={sel?.isNew ? 'Nuevo empleado' : sel?.nombre}
        footer={<div className="row" style={{ justifyContent: 'space-between', width: '100%' }}>
          {!sel?.isNew && <Btn variant="ghost" className="danger" onClick={handleDelete}>Desactivar</Btn>}
          <div className="row" style={{ marginLeft: 'auto' }}>
            <Btn onClick={() => { setSel(null); setForm(null); }}>Cancelar</Btn>
            <Btn variant="primary" onClick={handleSave} disabled={saving}>{saving ? 'Guardando…' : sel?.isNew ? 'Crear empleado' : 'Guardar'}</Btn>
          </div>
        </div>}>
        {sel && form && <EmpEditor form={form} setForm={setForm} sel={sel} />}
      </Drawer>
    </div>
  );
}

function EmpEditor({ form, setForm, sel }) {
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const empData = sel.isNew ? null : NOMINA_ULTIMO.find(n => n.id === sel.id);

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 22 }}>
        <div className="avatar" style={{ background: sel.color, width: 56, height: 56, fontSize: 18 }}>{sel.iniciales}</div>
        <div>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 22 }}>{form.isNew ? 'Empleado nuevo' : form.nombre}</div>
          <div className="xs mute">{form.isNew ? 'Completa los datos para agregarlo a nómina' : sel.cargo}</div>
        </div>
      </div>

      <Eyebrow>Datos básicos</Eyebrow>
      <div className="cols-2">
        <Input label="Nombre completo" value={form.nombre} onChange={e => set('nombre', e.target.value)} placeholder={form.isNew ? 'Ej: Juan Pérez' : ''} />
        <Input label="Cargo" value={form.cargo} onChange={e => set('cargo', e.target.value)} placeholder={form.isNew ? 'Ej: Operario de línea' : ''} />
      </div>

      <Eyebrow style={{ marginTop: 20 }}>Compensación</Eyebrow>
      <div className="cols-2">
        <Input label="Salario base mensual" type="number" value={form.salario} onChange={e => set('salario', parseFloat(e.target.value) || 0)} hint={`Mín. legal 2026: $${SBU_2026}`} />
        <Input label="Transporte por día" type="number" step="0.5" value={form.transporte} onChange={e => set('transporte', parseFloat(e.target.value) || 0)} />
        <Input label="Horas base diarias" type="number" value={form.horas_base} onChange={e => set('horas_base', parseInt(e.target.value) || 8)} />
        <Select label="Región (para 14to)" value={form.region} onChange={v => set('region', v)} options={['Sierra/Amazonia', 'Costa/Galápagos']} />
      </div>

      <Eyebrow style={{ marginTop: 20 }}>Beneficios y descuentos</Eyebrow>
      <div style={{ background: 'var(--bg-raised)', border: '1px solid var(--line)', borderRadius: 'var(--radius-md)', padding: 14 }}>
        <Check checked={form.fondos_reserva} onChange={v => set('fondos_reserva', v)}>Recibe fondos de reserva (8.33%) <span className="mute xs">· Después del primer año</span></Check>
        <div className="field" style={{ marginTop: 12 }}>
          <label>Préstamo IESS (descuento mensual)</label>
          <input className="input" type="number" step="0.01" value={form.prestamo_iess} onChange={e => set('prestamo_iess', parseFloat(e.target.value) || 0)} />
          <div className="xs mute">Dejar en 0 si no hay préstamo activo.</div>
        </div>
      </div>

      {!form.isNew && <>
      <Eyebrow style={{ marginTop: 20 }}>Resumen último mes</Eyebrow>
      <div style={{ background: 'var(--bg-raised)', border: '1px solid var(--line)', borderRadius: 'var(--radius-md)', padding: 14, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
        <div>
          <div className="xs mute">Horas trabajadas</div>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 20 }}>{empData ? `${empData.horas}h` : '—'}</div>
        </div>
        <div>
          <div className="xs mute">Horas extras</div>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 20, color: 'var(--warn)' }}>{empData ? `${empData.h50 + empData.h100}h` : '—'}</div>
        </div>
        <div>
          <div className="xs mute">Total cobrado</div>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 20, color: 'var(--accent-hi)' }}>{empData ? fmtMoney(empData.total) : '—'}</div>
        </div>
      </div>
      </>}
    </div>
  );
}

Object.assign(window, { Empleados });

</script>

<script type="text/babel" data-file="app.jsx">
// App shell + Tweaks integration

const { useState: useStateA, useEffect: useEffectA } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "lavender",
  "density": "normal",
  "showExplanations": true
}/*EDITMODE-END*/;

const ACCENTS = {
  lavender: { h: '295', c: '0.16', l: '72%', lHi: '80%' },
  mint:     { h: '155', c: '0.15', l: '70%', lHi: '78%' },
  amber:    { h: '75',  c: '0.16', l: '72%', lHi: '80%' },
  rose:     { h: '15',  c: '0.17', l: '70%', lHi: '78%' },
  sky:      { h: '230', c: '0.14', l: '72%', lHi: '80%' },
};

function App() {
  const [tw, setTw] = useStateA(() => {
    try {
      const saved = localStorage.getItem('solplast.tweaks');
      if (saved) return { ...TWEAK_DEFAULTS, ...JSON.parse(saved) };
    } catch {}
    return TWEAK_DEFAULTS;
  });
  const [editMode, setEditMode] = useStateA(false);
  const [logged, setLogged] = useStateA(() => localStorage.getItem('solplast.logged') || null);
  const [page, setPage] = useStateA(() => localStorage.getItem('solplast.page') || 'home');
  const [navOpen, setNavOpen] = useStateA(false);

  // Apply tweaks to DOM
  useEffectA(() => {
    document.documentElement.setAttribute('data-theme', tw.theme);
    const acc = ACCENTS[tw.accent] || ACCENTS.lavender;
    document.documentElement.style.setProperty('--accent',    `oklch(${acc.l} ${acc.c} ${acc.h})`);
    document.documentElement.style.setProperty('--accent-hi', `oklch(${acc.lHi} ${acc.c} ${acc.h})`);
    document.documentElement.style.setProperty('--accent-soft', `color-mix(in oklab, oklch(${acc.l} ${acc.c} ${acc.h}) 18%, transparent)`);
    localStorage.setItem('solplast.tweaks', JSON.stringify(tw));
  }, [tw]);

  useEffectA(() => { if (logged) localStorage.setItem('solplast.logged', logged); else localStorage.removeItem('solplast.logged'); }, [logged]);
  useEffectA(() => { localStorage.setItem('solplast.page', page); }, [page]);

  // Edit-mode host handshake
  useEffectA(() => {
    const onMsg = (e) => {
      if (e?.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e?.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    setTw(prev => ({ ...prev, [k]: v }));
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch {}
  };

  if (!logged) return <Login onLogin={(role) => setLogged(role)} />;

  const role = logged;

  return (
    <>
      <Topbar onOpenNav={() => setNavOpen(true)} page={page} />
      <div className="app" data-screen-label={`app-${page}`}>
        <Sidebar page={page} setPage={setPage} role={role} open={navOpen} onClose={() => setNavOpen(false)} theme={tw.theme} setTheme={(t) => setTweak('theme', t)} onLogout={async () => { await window._api?.logout(); setLogged(null); }} />
        <main className="content-wrap" style={{ marginLeft: window.innerWidth > 960 ? 0 : 0 }}>
          <div className="content">
            {page === 'home' && <Home setPage={setPage} role={role} />}
            {page === 'nomina' && <Nomina setPage={setPage} />}
            {page === 'registro' && <RegistroDiario role={role} />}
            {page === 'catalogo' && <Catalogo />}
            {page === 'costos' && <Costos />}
            {page === 'metricas' && <Metricas />}
            {page === 'empleados' && <Empleados />}
          </div>
        </main>
      </div>
      <MobileBottomNav page={page} setPage={setPage} role={role} />
      {editMode && <TweaksPanel tw={tw} setTweak={setTweak} onLogout={() => setLogged(null)} />}
    </>
  );
}

function TweaksPanel({ tw, setTweak, onLogout }) {
  return (
    <div className="tweaks-panel fadein">
      <h4><Icon name="sliders" size={14}/> Tweaks</h4>
      <div className="tweak-row">
        <span>Tema</span>
        <Seg options={[{ value: 'dark', label: 'Oscuro' }, { value: 'light', label: 'Claro' }]} value={tw.theme} onChange={v => setTweak('theme', v)} />
      </div>
      <div className="tweak-row">
        <span>Acento</span>
        <div className="tweak-swatches">
          {Object.entries(ACCENTS).map(([k, v]) => (
            <button key={k} onClick={() => setTweak('accent', k)} className={tw.accent === k ? 'on' : ''}
              style={{ background: `oklch(${v.l} ${v.c} ${v.h})` }} title={k} />
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <span>Explicaciones inline</span>
        <Toggle checked={tw.showExplanations} onChange={v => setTweak('showExplanations', v)}>{tw.showExplanations ? 'On' : 'Off'}</Toggle>
      </div>
      <div style={{ borderTop: '1px solid var(--line)', marginTop: 10, paddingTop: 10, fontSize: 11.5 }}>
        <Btn variant="ghost" size="sm" onClick={onLogout} block><Icon name="logout" size={12}/> Cerrar sesión</Btn>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>


</body>
</html>
