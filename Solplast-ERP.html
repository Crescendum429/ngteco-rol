// ─── Retenciones Recibidas ────────────────────────────────────────────────────
function TabRetenciones() {
  const [items,   setItems]   = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [form,    setForm]    = useState({ numero:'', fecha: new Date().toISOString().slice(0,10), factura_id:'', base_ir:0, pct_ir:2, base_iva:0, pct_iva:30, ref:'' });
  const [saving,  setSaving]  = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  async function cargar() { setItems(await window._apiUtil.fetchRetenciones()); }
  useEffect(() => { cargar(); }, []);

  const montoIR  = (form.base_ir  * form.pct_ir  / 100);
  const montoIVA = (form.base_iva * form.pct_iva / 100);
  const totalRet = montoIR + montoIVA;

  async function guardar() {
    if (!form.numero.trim()) { alert('Número de comprobante requerido'); return; }
    setSaving(true);
    try {
      const nueva = { id: `RET-${Date.now()}`, ...form, monto_ir: montoIR, monto_iva: montoIVA, total_retenido: totalRet };
      const all = await window._apiUtil.fetchRetenciones();
      await window._apiUtil.saveRetenciones([...(all||[]), nueva]);
      await cargar();
      setShowNew(false);
      setForm({ numero:'', fecha: new Date().toISOString().slice(0,10), factura_id:'', base_ir:0, pct_ir:2, base_iva:0, pct_iva:30, ref:'' });
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  async function eliminar(id) {
    const all = await window._apiUtil.fetchRetenciones();
    await window._apiUtil.saveRetenciones((all||[]).filter(r => r.id !== id));
    await cargar();
  }

  const total = (items||[]).reduce((s,r) => s+(r.total_retenido||0), 0);

  return (
    <>
      <div className="row" style={{ justifyContent:'space-between', marginBottom:14 }}>
        <div>
          <div style={{ fontFamily:'var(--serif)', fontSize:26, letterSpacing:'-0.02em' }}>{fmtMoney(total)} <span className="xs mute" style={{ fontSize:14 }}>retenido total</span></div>
          <div className="xs mute">{(items||[]).length} comprobante{(items||[]).length!==1?'s':''} registrado{(items||[]).length!==1?'s':''}</div>
        </div>
        <Btn variant="primary" size="sm" onClick={() => setShowNew(true)}><Icon name="plus" size={12}/> Registrar retención</Btn>
      </div>

      {items === null && <div style={{ textAlign:'center', padding:40, color:'var(--text-mute)' }}><Icon name="clock" size={24}/></div>}
      {items !== null && items.length === 0 && (
        <div className="panel" style={{ textAlign:'center', padding:40, color:'var(--text-mute)' }}>
          Sin retenciones registradas.
        </div>
      )}
      {items !== null && items.length > 0 && (
        <div className="panel panel-flush">
          <table className="tbl tbl-hover">
            <thead><tr><th>Comp.</th><th>Factura</th><th>Fecha</th><th className="num">IR ret.</th><th className="num">IVA ret.</th><th className="num">Total</th><th></th></tr></thead>
            <tbody>
              {items.slice().sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(r => (
                <tr key={r.id}>
                  <td className="mono xs">{r.numero}</td>
                  <td className="mono xs">{r.factura_id||'—'}</td>
                  <td className="mono xs">{r.fecha}</td>
                  <td className="num mono">{fmtMoney(r.monto_ir||0)} <span className="xs mute">{r.pct_ir}%</span></td>
                  <td className="num mono">{fmtMoney(r.monto_iva||0)} <span className="xs mute">{r.pct_iva}%</span></td>
                  <td className="num mono" style={{ fontWeight:600, color:'var(--bad)' }}>{fmtMoney(r.total_retenido||0)}</td>
                  <td><Btn size="sm" variant="ghost" className="danger" onClick={() => eliminar(r.id)}><Icon name="trash" size={12}/></Btn></td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr style={{ borderTop:'2px solid var(--line)' }}>
                <td colSpan={5} style={{ padding:'10px 14px', fontWeight:600 }}>Total retenido</td>
                <td className="num mono" style={{ padding:'10px 14px', fontWeight:600, color:'var(--bad)' }}>{fmtMoney(total)}</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      )}

      <Modal open={showNew} onClose={() => setShowNew(false)} title="Registrar retención recibida"
        footer={<><Btn onClick={() => setShowNew(false)}>Cancelar</Btn><Btn variant="primary" onClick={guardar} disabled={saving}>{saving?'Guardando…':'Registrar'}</Btn></>}>
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
            <div className="field" style={{ margin:0 }}><label>N° comprobante</label><input className="input mono" value={form.numero} onChange={e=>set('numero',e.target.value)} placeholder="001-001-000000XXX"/></div>
            <div className="field" style={{ margin:0 }}><label>Fecha</label><input className="input" type="date" value={form.fecha} onChange={e=>set('fecha',e.target.value)}/></div>
          </div>
          <div className="field" style={{ margin:0 }}>
            <label>Factura asociada (opcional)</label>
            <select className="select" value={form.factura_id} onChange={e=>set('factura_id',e.target.value)}>
              <option value="">Sin factura específica</option>
              {FACTURAS_MOCK.map(f => { const c = CLIENTES_MOCK.find(x=>x.id===f.cliente); return <option key={f.id} value={f.id}>{f.id} · {c?.nombre_comercial}</option>; })}
            </select>
          </div>
          <div style={{ background:'var(--bg-raised)', borderRadius:'var(--radius-md)', padding:14, display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
            <div><label className="xs mute" style={{ display:'block', marginBottom:4 }}>Base IR ($)</label><input className="input mono" type="number" step="0.01" value={form.base_ir} onChange={e=>set('base_ir',parseFloat(e.target.value)||0)}/></div>
            <div><label className="xs mute" style={{ display:'block', marginBottom:4 }}>% IR retención</label><input className="input mono" type="number" step="0.5" value={form.pct_ir} onChange={e=>set('pct_ir',parseFloat(e.target.value)||0)}/></div>
            <div><label className="xs mute" style={{ display:'block', marginBottom:4 }}>Base IVA ($)</label><input className="input mono" type="number" step="0.01" value={form.base_iva} onChange={e=>set('base_iva',parseFloat(e.target.value)||0)}/></div>
            <div><label className="xs mute" style={{ display:'block', marginBottom:4 }}>% IVA retención</label><input className="input mono" type="number" step="5" value={form.pct_iva} onChange={e=>set('pct_iva',parseFloat(e.target.value)||0)}/></div>
          </div>
          <div style={{ padding:'10px 14px', background:'var(--accent-soft)', borderRadius:'var(--radius-sm)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span className="xs mute">Total retenido</span>
            <span style={{ fontFamily:'var(--serif)', fontSize:22, color:'var(--accent-hi)' }}>{fmtMoney(totalRet)}</span>
          </div>
          <div className="field" style={{ margin:0 }}><label>Referencia / observación</label><input className="input" value={form.ref} onChange={e=>set('ref',e.target.value)} placeholder="Opcional"/></div>
        </div>
      </Modal>
    </>
  );
}

// ─── Cuenta Corriente ─────────────────────────────────────────────────────────
function TabCuentaCorriente() {
  const [pagos,   setPagos]   = useState(null);
  const [rets,    setRets]    = useState(null);
  const [showPago,setShowPago]= useState(null); // factura a pagar
  const [pForm,   setPForm]   = useState({ fecha: new Date().toISOString().slice(0,10), monto:0, forma_pago:'transferencia', ref:'' });
  const [saving,  setSaving]  = useState(false);
  const hoy = new Date();

  async function cargar() {
    const [p, r] = await Promise.all([window._apiUtil.fetchPagos(), window._apiUtil.fetchRetenciones()]);
    setPagos(p || []);
    setRets(r || []);
  }
  useEffect(() => { cargar(); }, []);

  async function registrarPago() {
    if (!pForm.monto || pForm.monto <= 0) { alert('Monto requerido'); return; }
    setSaving(true);
    try {
      const all = await window._apiUtil.fetchPagos();
      const nuevo = { id: `PAG-${Date.now()}`, factura_id: showPago.id, cliente: showPago.cliente, ...pForm };
      await window._apiUtil.savePagos([...(all||[]), nuevo]);
      await cargar();
      setShowPago(null);
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  if (!pagos || !rets) return <div style={{ textAlign:'center', padding:40, color:'var(--text-mute)' }}><Icon name="clock" size={24}/></div>;

  // Agrupa por cliente
  const factsPorCliente = {};
  CLIENTES_MOCK.forEach(c => {
    const facts = FACTURAS_MOCK.filter(f => f.cliente === c.id);
    if (!facts.length) return;
    const totalFact = facts.reduce((s,f)=>s+(f.total||0), 0);
    const totalPagado = pagos.filter(p=>p.cliente===c.id).reduce((s,p)=>s+(p.monto||0), 0);
    const totalRet = rets.filter(r=>{
      const f = FACTURAS_MOCK.find(x=>x.id===r.factura_id);
      return f?.cliente === c.id;
    }).reduce((s,r)=>s+(r.total_retenido||0), 0);
    const saldo = totalFact - totalPagado - totalRet;
    factsPorCliente[c.id] = { cliente: c, facts, totalFact, totalPagado, totalRet, saldo };
  });

  const clientes = Object.values(factsPorCliente).filter(x => x.saldo > 0.01).sort((a,b)=>b.saldo-a.saldo);
  const totalSaldo = clientes.reduce((s,c)=>s+c.saldo, 0);

  const diasVencido = (f) => Math.ceil((hoy - new Date(f.fecha_vencimiento+'T00:00:00')) / 86400000);
  const agingBucket = (d) => d <= 0 ? 'vigente' : d <= 30 ? '1-30' : d <= 60 ? '31-60' : d <= 90 ? '61-90' : '+90';
  const agingColor = { vigente:'var(--good)', '1-30':'var(--warn)', '31-60':'var(--warn)', '61-90':'var(--bad)', '+90':'var(--bad)' };

  return (
    <>
      <div className="kpi-grid" style={{ marginBottom:18 }}>
        <Kpi label="Saldo total CxC" icon="dollar" value={fmtMoneyShort(totalSaldo)} accent="var(--bad)" />
        <Kpi label="Clientes con deuda" icon="users" value={String(clientes.length)} />
        <Kpi label="Total retenido" icon="receipt" value={fmtMoneyShort(rets.reduce((s,r)=>s+(r.total_retenido||0),0))} accent="var(--warn)" />
        <Kpi label="Total cobrado" icon="check" value={fmtMoneyShort(pagos.reduce((s,p)=>s+(p.monto||0),0))} accent="var(--good)" />
      </div>

      {clientes.length === 0 && <div className="panel" style={{ textAlign:'center', padding:40, color:'var(--text-mute)' }}>Todo cobrado. Sin saldos pendientes.</div>}

      {clientes.map(({ cliente: cli, facts, totalFact, totalPagado, totalRet, saldo }) => (
        <div key={cli.id} className="panel panel-flush" style={{ marginBottom:14 }}>
          <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--line)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div>
              <div style={{ fontFamily:'var(--serif)', fontSize:18 }}>{cli.razon_social}</div>
              <div className="xs mute">Crédito {cli.credito_dias} días</div>
            </div>
            <div className="row" style={{ gap:18 }}>
              <div style={{ textAlign:'right' }}><div className="xs mute">Facturado</div><div className="mono">{fmtMoney(totalFact)}</div></div>
              <div style={{ textAlign:'right' }}><div className="xs mute">Cobrado</div><div className="mono" style={{ color:'var(--good)' }}>−{fmtMoney(totalPagado)}</div></div>
              <div style={{ textAlign:'right' }}><div className="xs mute">Retenido</div><div className="mono" style={{ color:'var(--warn)' }}>−{fmtMoney(totalRet)}</div></div>
              <div style={{ textAlign:'right' }}><div className="xs mute">Saldo</div><div style={{ fontFamily:'var(--serif)', fontSize:22, color:'var(--bad)' }}>{fmtMoney(saldo)}</div></div>
            </div>
          </div>
          <table className="tbl tbl-hover">
            <thead><tr><th>Factura</th><th>Vencimiento</th><th className="num">Total</th><th className="num">Pagado</th><th className="num">Saldo</th><th>Aging</th><th></th></tr></thead>
            <tbody>
              {facts.filter(f => f.estado_sri==='autorizada' && !f.pagada).map(f => {
                const fPagado = pagos.filter(p=>p.factura_id===f.id).reduce((s,p)=>s+(p.monto||0), 0);
                const fRet = rets.filter(r=>r.factura_id===f.id).reduce((s,r)=>s+(r.total_retenido||0), 0);
                const fSaldo = (f.total||0) - fPagado - fRet;
                const dias = diasVencido(f);
                const bucket = agingBucket(dias);
                return (
                  <tr key={f.id}>
                    <td className="mono xs">{f.id}</td>
                    <td className="mono xs">{f.fecha_vencimiento}</td>
                    <td className="num mono">{fmtMoney(f.total)}</td>
                    <td className="num mono" style={{ color:'var(--good)' }}>{fmtMoney(fPagado+fRet)}</td>
                    <td className="num mono" style={{ fontWeight:600, color: fSaldo>0.01?'var(--bad)':'var(--good)' }}>{fmtMoney(Math.max(0, fSaldo))}</td>
                    <td><Chip style={{ color: agingColor[bucket], background:'var(--bg-hover)' }}>{bucket==='vigente'?'Vigente':`${bucket}d`}</Chip></td>
                    <td>
                      {fSaldo > 0.01 && (
                        <Btn size="sm" variant="primary" onClick={() => { setShowPago(f); setPForm({ fecha:new Date().toISOString().slice(0,10), monto:parseFloat(fSaldo.toFixed(2)), forma_pago:'transferencia', ref:'' }); }}>
                          <Icon name="check" size={11}/> Pago
                        </Btn>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      ))}

      <Modal open={!!showPago} onClose={() => setShowPago(null)} title="Registrar pago"
        footer={<><Btn onClick={()=>setShowPago(null)}>Cancelar</Btn><Btn variant="primary" onClick={registrarPago} disabled={saving}>{saving?'Guardando…':'Registrar pago'}</Btn></>}>
        {showPago && (
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            <div className="alert info">
              <div className="icon"><Icon name="receipt" size={14}/></div>
              <div className="body"><div className="title">{showPago.id}</div><div className="msg">{CLIENTES_MOCK.find(c=>c.id===showPago.cliente)?.razon_social} · {fmtMoney(showPago.total)}</div></div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
              <div className="field" style={{ margin:0 }}><label>Fecha de pago</label><input className="input" type="date" value={pForm.fecha} onChange={e=>setPForm(f=>({...f,fecha:e.target.value}))}/></div>
              <div className="field" style={{ margin:0 }}><label>Monto ($)</label><input className="input mono" type="number" step="0.01" value={pForm.monto} onChange={e=>setPForm(f=>({...f,monto:parseFloat(e.target.value)||0}))}/></div>
            </div>
            <div className="field" style={{ margin:0 }}>
              <label>Forma de pago</label>
              <Seg value={pForm.forma_pago} onChange={v=>setPForm(f=>({...f,forma_pago:v}))}
                options={[{value:'transferencia',label:'Transferencia'},{value:'cheque',label:'Cheque'},{value:'efectivo',label:'Efectivo'}]} />
            </div>
            <div className="field" style={{ margin:0 }}><label>Referencia / N° transacción</label><input className="input" value={pForm.ref} onChange={e=>setPForm(f=>({...f,ref:e.target.value}))} placeholder="Opcional"/></div>
          </div>
        )}
      </Modal>
    </>
  );
}

// ─── Reportes para Contador ───────────────────────────────────────────────────
function TabReportesContador() {
  const [mes, setMes] = useState(() => new Date().toISOString().slice(0,7));

  function ventasMes() {
    const ff = FACTURAS_MOCK.filter(f => f.fecha_emision?.startsWith(mes) && f.estado_sri === 'autorizada');
    downloadCSV(`ventas_${mes}.csv`,
      ['Numero', 'Cliente', 'RUC', 'Fecha', 'Subtotal 12%', 'Subtotal 0%', 'IVA 12%', 'Total', 'Estado'],
      ff.map(f => {
        const c = CLIENTES_MOCK.find(x=>x.id===f.cliente);
        return [f.id, c?.razon_social||f.cliente, c?.ruc||'', f.fecha_emision, f.subtotal_12||0, f.subtotal_0||0, f.iva||0, f.total||0, f.pagada?'PAGADA':'PENDIENTE'];
      })
    );
  }

  function ivaCausado() {
    const ff = FACTURAS_MOCK.filter(f => f.fecha_emision?.startsWith(mes) && f.estado_sri === 'autorizada');
    downloadCSV(`iva_${mes}.csv`,
      ['Numero', 'Fecha', 'Cliente', 'Base 12%', 'IVA 12%', 'Base 0%', 'Total'],
      ff.map(f => [f.id, f.fecha_emision, CLIENTES_MOCK.find(x=>x.id===f.cliente)?.razon_social||f.cliente, f.subtotal_12||0, f.iva||0, f.subtotal_0||0, f.total||0])
    );
  }

  function aging() {
    const hoy = new Date();
    const ff = FACTURAS_MOCK.filter(f => !f.pagada && f.estado_sri === 'autorizada');
    downloadCSV(`aging_${mes}.csv`,
      ['Numero', 'Cliente', 'Vencimiento', 'Dias vencido', 'Total', 'Bucket'],
      ff.map(f => {
        const dias = Math.ceil((hoy - new Date(f.fecha_vencimiento+'T00:00:00')) / 86400000);
        const bucket = dias <= 0 ? '0-vigente' : dias <= 30 ? '1-30d' : dias <= 60 ? '31-60d' : dias <= 90 ? '61-90d' : '+90d';
        return [f.id, CLIENTES_MOCK.find(x=>x.id===f.cliente)?.razon_social||f.cliente, f.fecha_vencimiento, dias, f.total||0, bucket];
      })
    );
  }

  function porCliente() {
    const totales = {};
    FACTURAS_MOCK.filter(f => f.fecha_emision?.startsWith(mes) && f.estado_sri==='autorizada').forEach(f => {
      const c = CLIENTES_MOCK.find(x=>x.id===f.cliente);
      const k = f.cliente;
      if (!totales[k]) totales[k] = { cliente: c?.razon_social||k, ruc: c?.ruc||'', total:0, n:0 };
      totales[k].total += f.total||0;
      totales[k].n++;
    });
    downloadCSV(`ventas_cliente_${mes}.csv`,
      ['Cliente', 'RUC', 'N° Facturas', 'Total Facturado'],
      Object.values(totales).sort((a,b)=>b.total-a.total).map(x => [x.cliente, x.ruc, x.n, x.total])
    );
  }

  function porProducto() {
    const totales = {};
    FACTURAS_MOCK.filter(f => f.fecha_emision?.startsWith(mes) && f.estado_sri==='autorizada').forEach(f => {
      (f.items||[]).forEach(it => {
        const p = PRODUCTOS_MOCK.find(x=>x.id===it.prod_id);
        if (!totales[it.prod_id]) totales[it.prod_id] = { prod: p?.nombre||it.prod_id, cajas:0, subtotal:0 };
        totales[it.prod_id].cajas += it.cant_cajas||0;
        totales[it.prod_id].subtotal += it.subtotal||0;
      });
    });
    downloadCSV(`ventas_producto_${mes}.csv`,
      ['Producto', 'Cajas Vendidas', 'Subtotal'],
      Object.values(totales).sort((a,b)=>b.subtotal-a.subtotal).map(x => [x.prod, x.cajas, x.subtotal])
    );
  }

  const factsMes = FACTURAS_MOCK.filter(f => f.fecha_emision?.startsWith(mes) && f.estado_sri==='autorizada');
  const totMes   = factsMes.reduce((s,f)=>s+(f.total||0), 0);
  const ivaMes   = factsMes.reduce((s,f)=>s+(f.iva||0), 0);

  return (
    <div>
      <div className="panel" style={{ marginBottom:18 }}>
        <div className="row" style={{ justifyContent:'space-between', flexWrap:'wrap', gap:12 }}>
          <div>
            <Eyebrow>Selecciona el mes</Eyebrow>
            <input type="month" className="input" value={mes} onChange={e=>setMes(e.target.value)} style={{ marginTop:6, fontFamily:'var(--mono)' }}/>
          </div>
          <div className="row" style={{ gap:18 }}>
            <div style={{ textAlign:'center' }}><div style={{ fontFamily:'var(--serif)', fontSize:26 }}>{factsMes.length}</div><div className="xs mute">facturas autorizadas</div></div>
            <div style={{ textAlign:'center' }}><div style={{ fontFamily:'var(--serif)', fontSize:26 }}>{fmtMoneyShort(totMes)}</div><div className="xs mute">ventas netas</div></div>
            <div style={{ textAlign:'center' }}><div style={{ fontFamily:'var(--serif)', fontSize:26, color:'var(--warn)' }}>{fmtMoneyShort(ivaMes)}</div><div className="xs mute">IVA causado</div></div>
          </div>
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))', gap:12 }}>
        {[
          { icon:'receipt', label:'Ventas del mes', sub:'Todas las facturas autorizadas · CSV', action: ventasMes },
          { icon:'dollar',  label:'IVA causado',    sub:'Base imponible + IVA por factura · CSV', action: ivaCausado },
          { icon:'clock',   label:'Aging CxC',      sub:'0-30 / 31-60 / 61-90 / +90 días · CSV', action: aging },
          { icon:'users',   label:'Ventas por cliente', sub:'Total facturado agrupado · CSV', action: porCliente },
          { icon:'box',     label:'Ventas por producto', sub:'Cajas y subtotales por SKU · CSV', action: porProducto },
          { icon:'download',label:'XMLs autorizados', sub:'ZIP del mes (requiere servidor)', action: null },
        ].map((r, i) => (
          <div key={i} className="panel" style={{ display:'flex', flexDirection:'column', gap:10 }}>
            <div className="row" style={{ gap:10 }}>
              <div style={{ width:36, height:36, borderRadius:8, background:'var(--accent-soft)', color:'var(--accent-hi)', display:'inline-flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                <Icon name={r.icon} size={16}/>
              </div>
              <div>
                <div style={{ fontWeight:600 }}>{r.label}</div>
                <div className="xs mute">{r.sub}</div>
              </div>
            </div>
            <Btn block onClick={r.action || undefined} disabled={!r.action} style={{ marginTop:'auto' }}>
              {r.action ? <><Icon name="download" size={13}/> Descargar CSV</> : <span className="xs mute">Conectar servidor</span>}
            </Btn>
          </div>
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { Contabilidad });

</script>
<script type="text/babel" data-file="app.jsx">

// App shell + Tweaks integration

const { useState: useStateA, useEffect: useEffectA } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "lavender",
  "density": "normal",
  "showExplanations": true
}/*EDITMODE-END*/;

const ACCENTS = {
  lavender: { h: '295', c: '0.16', l: '72%', lHi: '80%' },
  mint:     { h: '155', c: '0.15', l: '70%', lHi: '78%' },
  amber:    { h: '75',  c: '0.16', l: '72%', lHi: '80%' },
  rose:     { h: '15',  c: '0.17', l: '70%', lHi: '78%' },
  sky:      { h: '230', c: '0.14', l: '72%', lHi: '80%' },
};

function App() {
  const [tw, setTw] = useStateA(() => {
    try {
      const saved = localStorage.getItem('solplast.tweaks');
      if (saved) return { ...TWEAK_DEFAULTS, ...JSON.parse(saved) };
    } catch {}
    return TWEAK_DEFAULTS;
  });
  const [editMode, setEditMode] = useStateA(false);
  const [logged, setLogged] = useStateA(() => localStorage.getItem('solplast.logged') || null);
  const [page, setPage] = useStateA(() => localStorage.getItem('solplast.page') || 'home');
  const [navOpen, setNavOpen] = useStateA(false);

  // Apply tweaks to DOM
  useEffectA(() => {
    document.documentElement.setAttribute('data-theme', tw.theme);
    const acc = ACCENTS[tw.accent] || ACCENTS.lavender;
    document.documentElement.style.setProperty('--accent',    `oklch(${acc.l} ${acc.c} ${acc.h})`);
    document.documentElement.style.setProperty('--accent-hi', `oklch(${acc.lHi} ${acc.c} ${acc.h})`);
    document.documentElement.style.setProperty('--accent-soft', `color-mix(in oklab, oklch(${acc.l} ${acc.c} ${acc.h}) 18%, transparent)`);
    localStorage.setItem('solplast.tweaks', JSON.stringify(tw));
  }, [tw]);

  useEffectA(() => { if (logged) localStorage.setItem('solplast.logged', logged); else localStorage.removeItem('solplast.logged'); }, [logged]);
  useEffectA(() => { localStorage.setItem('solplast.page', page); }, [page]);

  // Edit-mode host handshake
  useEffectA(() => {
    const onMsg = (e) => {
      if (e?.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e?.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    setTw(prev => ({ ...prev, [k]: v }));
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch {}
  };

  useEffectA(() => {
    if (logged === 'operario' && page !== 'registro') setPage('registro');
  }, [logged, page]);

  if (!logged) return <Login onLogin={(role) => { setLogged(role); setPage(role === 'operario' ? 'registro' : 'home'); }} />;

  const role = logged;

  return (
    <>
      <Topbar onOpenNav={() => setNavOpen(true)} page={page} />
      <div className="app" data-screen-label={`app-${page}`}>
        <Sidebar page={page} setPage={setPage} role={role} open={navOpen} onClose={() => setNavOpen(false)} theme={tw.theme} setTheme={(t) => setTweak('theme', t)} onLogout={async () => { await window._api?.logout(); setLogged(null); }} />
        <main className="content-wrap" style={{ marginLeft: window.innerWidth > 960 ? 0 : 0 }}>
          <div className="content">
            {page === 'home'          && <Home setPage={setPage} role={role} />}
            {page === 'dashboard'     && <Dashboard setPage={setPage} />}
            {page === 'nomina'        && <Nomina setPage={setPage} />}
            {page === 'registro'      && <RegistroDiario role={role} />}
            {page === 'catalogo'      && <Catalogo />}
            {page === 'costos'        && <Costos />}
            {page === 'metricas'      && <Metricas />}
            {page === 'empleados'     && <Empleados />}
            {page === 'inventario'    && <Inventario />}
            {page === 'pedidos'       && <Pedidos setPage={setPage} />}
            {page === 'clientes'      && <Clientes setPage={setPage} />}
            {page === 'contabilidad'  && <Contabilidad setPage={setPage} />}
            {page === 'configuracion' && <Configuracion />}
            {page === 'auditoria'     && <Auditoria />}
          </div>
        </main>
      </div>
      <MobileBottomNav page={page} setPage={setPage} role={role} />
      {editMode && <TweaksPanel tw={tw} setTweak={setTweak} onLogout={() => setLogged(null)} />}
    </>
  );
}

function TweaksPanel({ tw, setTweak, onLogout }) {
  return (
    <div className="tweaks-panel fadein">
      <h4><Icon name="sliders" size={14}/> Tweaks</h4>
      <div className="tweak-row">
        <span>Tema</span>
        <Seg options={[{ value: 'dark', label: 'Oscuro' }, { value: 'light', label: 'Claro' }]} value={tw.theme} onChange={v => setTweak('theme', v)} />
      </div>
      <div className="tweak-row">
        <span>Acento</span>
        <div className="tweak-swatches">
          {Object.entries(ACCENTS).map(([k, v]) => (
            <button key={k} onClick={() => setTweak('accent', k)} className={tw.accent === k ? 'on' : ''}
              style={{ background: `oklch(${v.l} ${v.c} ${v.h})` }} title={k} />
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <span>Explicaciones inline</span>
        <Toggle checked={tw.showExplanations} onChange={v => setTweak('showExplanations', v)}>{tw.showExplanations ? 'On' : 'Off'}</Toggle>
      </div>
      <div style={{ borderTop: '1px solid var(--line)', marginTop: 10, paddingTop: 10, fontSize: 11.5 }}>
        <Btn variant="ghost" size="sm" onClick={onLogout} block><Icon name="logout" size={12}/> Cerrar sesión</Btn>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>
</body></html>
