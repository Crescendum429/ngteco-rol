          <Eyebrow>Totales</Eyebrow>
          <div className="tot-rows" style={{ marginTop:8 }}>
            <div><span>Subtotal 12%</span><span className="mono">{fmtMoney(factura.subtotal_12)}</span></div>
            <div><span>Subtotal 0%</span><span className="mono">{fmtMoney(factura.subtotal_0)}</span></div>
            <div><span>IVA 12%</span><span className="mono">{fmtMoney(factura.iva)}</span></div>
            <div className="tot-big"><span>Total</span><span className="mono">{fmtMoney(factura.total)}</span></div>
          </div>
          <div style={{ marginTop:12, padding:10, background:'var(--bg-raised)', borderRadius:6, fontSize:12.5 }}>
            <div className="row" style={{ justifyContent:'space-between' }}>
              <span>Vencimiento</span><span className="mono">{factura.fecha_vencimiento}</span>

      <div className="panel panel-flush">

          <thead><tr><th>Producto</th><th className="num">Cajas</th><th className="num">Precio unit.</th><th className="num">Subtotal</th></tr></thead>

            {factura.items.map((it, i) => {
              const p = producto(it.prod_id);
              return (
                <tr key={i}>
                  <td><div style={{ fontWeight: 600 }}>{p?.nombre}</div><div className="xs mute">{p?.id}</div></td>
                  <td className="num mono">{it.cant_cajas}</td>
                  <td className="num mono">{fmtMoney(it.precio_unit)}</td>
                  <td className="num mono">{fmtMoney(it.subtotal)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <div className="row" style={{ marginTop: 16, gap: 10 }}>
        {factura.guia_asociada && <Btn variant="ghost" onClick={() => setDocOpen('guia')}><Icon name="truck" size={14}/> Ver guía {factura.guia_asociada}</Btn>}
        {factura.cert_calidad && <Btn variant="ghost" onClick={() => setDocOpen('cert')}><Icon name="check" size={14}/> Certificado {factura.cert_calidad}</Btn>}
      </div>
    </div>
  );
}

function CertificadosTab({ selId, clearSel }) {

        </thead>

          {CERTIFICADOS_MOCK.map(c => (
            <tr key={c.id} style={{ cursor: 'pointer' }} onClick={() => setDocId(c.id)}>
              <td className="mono">{c.id}</td>
              <td className="mono xs">{c.factura_id}</td>
              <td className="mono xs">{c.fecha}</td>
              <td className="mono xs">{c.lote}</td>

<script type="text/babel" data-file="clientes.jsx">

// Clientes — CRUD completo con datos fiscales, dir matriz + sucursal, contacto, crédito.
// Base para emitir facturas electrónicas y guías de remisión SRI.

function Clientes() {
  const [clientes, setClientes] = useState(CLIENTES_MOCK);
  const [q, setQ] = useState('');
  const [sel, setSel] = useState(null); // cliente.id
  const [modo, setModo] = useState('ver'); // ver | editar | nuevo
  const [draft, setDraft] = useState(null);

  const filtered = clientes.filter(c => {
    if (!q) return true;
    const s = q.toLowerCase();
    return (c.razon_social || '').toLowerCase().includes(s)
        || (c.nombre_comercial || '').toLowerCase().includes(s)
        || (c.ruc || '').includes(s);
  });

  const current = clientes.find(c => c.id === sel);

  const abrir = (id) => { setSel(id); setModo('ver'); setDraft(null); };
  const editar = () => { setDraft(JSON.parse(JSON.stringify(current))); setModo('editar'); };
  const nuevo = () => {
    const blank = {
      id: `cli-${Date.now().toString(36)}`,
      razon_social: '', nombre_comercial: '', ruc: '', tipo: 'Sociedad', obligado_contabilidad: true,
      email_fact: '', email_contacto: '', telefono: '', celular: '',
      contacto_nombre: '', contacto_cargo: '',
      dir_matriz:   { calle: '', numero: '', interseccion: '', ciudad: '', referencia: '' },
      dir_sucursal: { calle: '', numero: '', interseccion: '', ciudad: '', referencia: '' },
      credito_dias: 30, credito_limite: 0,
      agente_retencion: false, resolucion_retencion: '',
      notas: '',
    };
    setDraft(blank); setSel(null); setModo('nuevo');
  };
  const cancelar = () => { setModo('ver'); setDraft(null); };
  const guardar = () => {
    if (modo === 'nuevo') {
      setClientes([draft, ...clientes]);
      setSel(draft.id);
    } else {
      setClientes(clientes.map(c => c.id === draft.id ? draft : c));
    }
    setModo('ver');
    setDraft(null);
  };
  const eliminar = () => {
    if (!current) return;
    if (!window.confirm(`Eliminar a "${current.razon_social}"? Las facturas y cotizaciones asociadas se conservan.`)) return;
    setClientes(clientes.filter(c => c.id !== current.id));
    setSel(null);
  };

  // Stats del cliente seleccionado
  const stats = current ? (() => {
    const cots = COTIZACIONES_MOCK.filter(c => c.cliente === current.id);
    const ocs  = ORDENES_COMPRA_MOCK.filter(o => o.cliente === current.id);
    const facts = FACTURAS_MOCK.filter(f => f.cliente === current.id);
    const pendientes = facts.filter(f => !f.pagada).reduce((a, f) => a + (f.total || 0), 0);
    const facturado = facts.reduce((a, f) => a + (f.total || 0), 0);
    return { cots, ocs, facts, pendientes, facturado };
  })() : null;

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Gestión comercial</Eyebrow>
          <h1 className="page-title">Clientes</h1>
          <div className="page-sub">Datos fiscales completos para facturación electrónica SRI.</div>
        </div>
        <div className="row">
          <Btn variant="ghost"><Icon name="download" size={14}/> Exportar CSV</Btn>
          <Btn variant="primary" onClick={nuevo}><Icon name="plus" size={14}/> Nuevo cliente</Btn>
        </div>
      </div>

      <div className="cli-layout">
        {/* Lista izquierda */}
        <div className="cli-list panel panel-flush">
          <div style={{ padding: 14, borderBottom: '1px solid var(--line)' }}>
            <div className="search-box">
              <Icon name="search" size={14}/>
              <input placeholder="Buscar por razón social, RUC, nombre comercial…" value={q} onChange={e => setQ(e.target.value)} />
            </div>
            <div className="xs mute" style={{ marginTop: 8 }}>{filtered.length} de {clientes.length} clientes</div>
          </div>
          <div className="cli-list-items">
            {filtered.map(c => {
              const activa = c.id === sel;
              const facts = FACTURAS_MOCK.filter(f => f.cliente === c.id);
              const pend = facts.filter(f => !f.pagada).length;
              return (
                <button key={c.id} className={`cli-item ${activa ? 'active' : ''}`} onClick={() => abrir(c.id)}>
                  <div className="cli-item-avatar" aria-hidden>
                    {(c.nombre_comercial || c.razon_social).charAt(0).toUpperCase()}
                  </div>
                  <div className="cli-item-body">
                    <div className="cli-item-name">{c.nombre_comercial || c.razon_social}</div>
                    <div className="cli-item-meta">
                      <span className="mono">{c.ruc}</span>
                      {pend > 0 && <span className="cli-pill-warn">{pend} por cobrar</span>}
                    </div>
                  </div>
                </button>
              );
            })}
            {filtered.length === 0 && (
              <div style={{ padding: 30, textAlign: 'center', color: 'var(--text-mute)', fontSize: 12.5 }}>
                Ningún cliente coincide con "{q}".
              </div>
            )}
          </div>
        </div>

        {/* Detalle derecho */}
        <div className="cli-detail">
          {!current && modo !== 'nuevo' && (
            <div className="panel" style={{ textAlign: 'center', padding: '60px 30px' }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}><Icon name="users" size={40} /></div>
              <div style={{ fontFamily: 'var(--serif)', fontSize: 22 }}>Seleccione un cliente</div>
              <div className="xs mute" style={{ marginTop: 8 }}>o cree uno nuevo para empezar.</div>
              <div style={{ marginTop: 16 }}>
                <Btn variant="primary" onClick={nuevo}><Icon name="plus" size={14}/> Nuevo cliente</Btn>
              </div>
            </div>
          )}

          {modo === 'ver' && current && <ClienteVer cliente={current} stats={stats} onEdit={editar} onDelete={eliminar} />}
          {(modo === 'editar' || modo === 'nuevo') && draft && (
            <ClienteEditor
              draft={draft}
              setDraft={setDraft}
              esNuevo={modo === 'nuevo'}
              onCancel={cancelar}
              onSave={guardar}
            />
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════ Ver Cliente ═══════════════════════
function ClienteVer({ cliente, stats, onEdit, onDelete }) {
  const [tab360, setTab360] = useState('ficha');

  // 360° data
  const cots   = COTIZACIONES_MOCK.filter(c => c.cliente === cliente.id);
  const ocs    = ORDENES_COMPRA_MOCK.filter(o => o.cliente === cliente.id);
  const facts  = FACTURAS_MOCK.filter(f => f.cliente === cliente.id);
  const lotes  = LOTES_MOCK.filter(l => l.cliente_id === cliente.id || (ocs.some(o => o.id === l.oc)));
  const pendienteTotal = facts.filter(f => !f.pagada).reduce((s,f) => s+(f.total||0), 0);
  const facturadoTotal = facts.reduce((s,f) => s+(f.subtotal_12||0), 0);

  return (
    <div>
      {/* Header */}
      <div className="panel" style={{ padding:22, marginBottom:14 }}>
        <div className="row" style={{ justifyContent:'space-between', alignItems:'flex-start', gap:16 }}>
          <div style={{ flex:1, minWidth:0 }}>
            <Eyebrow>{cliente.tipo || 'Sociedad'} · {cliente.obligado_contabilidad ? 'Obligada contabilidad' : 'No obligada'}</Eyebrow>
            <h2 style={{ fontFamily:'var(--serif)', fontSize:28, letterSpacing:'-0.01em', marginTop:6 }}>
              {cliente.razon_social}
            </h2>
            {cliente.nombre_comercial && cliente.nombre_comercial !== cliente.razon_social && (
              <div className="xs mute" style={{ marginTop:2 }}>Nombre comercial: {cliente.nombre_comercial}</div>
            )}
            <div className="mono" style={{ marginTop:8, fontSize:13 }}>RUC: {cliente.ruc}</div>
          </div>
          <div className="row">
            <Btn variant="ghost" onClick={onDelete}><Icon name="trash" size={13}/> Eliminar</Btn>
            <Btn variant="primary" onClick={onEdit}><Icon name="edit" size={13}/> Editar</Btn>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs" style={{ marginBottom:16 }}>
        <button className={`tab ${tab360==='ficha'?'on':''}`} onClick={()=>setTab360('ficha')}>Ficha</button>
        <button className={`tab ${tab360==='360'?'on':''}`} onClick={()=>setTab360('360')}>
          Vista 360° <span className="count">{cots.length+ocs.length+facts.length}</span>
        </button>
      </div>

      {/* FICHA */}
      {tab360 === 'ficha' && (
        <div>
          <div className="kpi-grid" style={{ marginBottom:14 }}>
            <Kpi label="Cotizaciones" icon="doc"     value={String(stats.cots.length)} />
            <Kpi label="Órdenes"      icon="box"     value={String(stats.ocs.length)} />
            <Kpi label="Facturas"     icon="receipt" value={String(stats.facts.length)} delta={facturadoTotal ? `${fmtMoney(facturadoTotal)} total` : null} />
            <Kpi label="Por cobrar"   icon="dollar"  value={fmtMoney(pendienteTotal)} accent={pendienteTotal>0?'var(--bad)':null} />
          </div>
          <div className="cols-2" style={{ gap:14, marginBottom:14 }}>
            <div className="panel">
              <Eyebrow>Contacto</Eyebrow>
              <div className="info-grid" style={{ marginTop:10 }}>
                <div><span className="xs mute">Persona</span><div>{cliente.contacto_nombre||<span className="mute">—</span>}</div></div>
                <div><span className="xs mute">Cargo</span><div>{cliente.contacto_cargo||<span className="mute">—</span>}</div></div>
                <div><span className="xs mute">Teléfono</span><div className="mono">{cliente.telefono||<span className="mute">—</span>}</div></div>
                <div><span className="xs mute">Celular</span><div className="mono">{cliente.celular||<span className="mute">—</span>}</div></div>
                <div style={{ gridColumn:'span 2' }}><span className="xs mute">Email facturación</span><div>{cliente.email_fact||<span className="mute">—</span>}</div></div>
                <div style={{ gridColumn:'span 2' }}><span className="xs mute">Email contacto</span><div>{cliente.email_contacto||<span className="mute">—</span>}</div></div>
              </div>
            </div>
            <div className="panel">
              <Eyebrow>Condiciones comerciales</Eyebrow>
              <div className="info-grid" style={{ marginTop:10 }}>
                <div><span className="xs mute">Plazo crédito</span><div>{cliente.credito_dias} días</div></div>
                <div><span className="xs mute">Límite crédito</span><div>{fmtMoney(cliente.credito_limite)}</div></div>
                <div><span className="xs mute">Agente retención</span><div>{cliente.agente_retencion?<Chip tone="info">Sí</Chip>:<span className="mute">No</span>}</div></div>
                <div><span className="xs mute">Resolución</span><div className="xs">{cliente.resolucion_retencion||<span className="mute">—</span>}</div></div>
              </div>
            </div>
          </div>
          <div className="cols-2" style={{ gap:14, marginBottom:14 }}>
            <div className="panel"><Eyebrow>Dirección matriz</Eyebrow><DirFmt dir={cliente.dir_matriz}/></div>
            <div className="panel"><Eyebrow>Dirección entrega</Eyebrow><DirFmt dir={cliente.dir_sucursal}/></div>
          </div>
          {cliente.notas && (
            <div className="panel" style={{ marginBottom:14 }}>
              <Eyebrow>Notas internas</Eyebrow>
              <div style={{ marginTop:8, fontSize:13.5, lineHeight:1.55 }}>{cliente.notas}</div>
            </div>
          )}
        </div>
      )}

      {/* 360° */}
      {tab360 === '360' && (
        <div>
          {/* Summary KPIs */}
          <div className="kpi-grid" style={{ marginBottom:18 }}>
            <Kpi label="Total facturado" icon="receipt" value={fmtMoneyShort(facturadoTotal)} delta={`${facts.length} facturas`} />
            <Kpi label="Por cobrar"      icon="dollar"  value={fmtMoney(pendienteTotal)} accent={pendienteTotal>0?'var(--bad)':null} />
            <Kpi label="OC activas"      icon="box"     value={String(ocs.filter(o=>!['entregada','facturada'].includes(o.estado)).length)} />
            <Kpi label="Lotes despachados" icon="truck" value={String(LOTES_MOCK.filter(l=>l.estado==='despachado'&&ORDENES_COMPRA_MOCK.filter(o=>o.cliente===cliente.id).some(()=>true)).length)} />
          </div>

          {/* Cotizaciones */}
          {cots.length > 0 && (
            <div className="panel panel-flush" style={{ marginBottom:14 }}>
              <div style={{ padding:'12px 18px', borderBottom:'1px solid var(--line)' }}><Eyebrow>Cotizaciones ({cots.length})</Eyebrow></div>
              <table className="tbl tbl-hover">
                <thead><tr><th>Número</th><th>Fecha</th><th className="num">Total</th><th>Estado</th></tr></thead>
                <tbody>
                  {cots.map(c => (
                    <tr key={c.id}>
                      <td className="mono xs">{c.id}</td>
                      <td className="mono xs">{c.fecha}</td>
                      <td className="num mono">{fmtMoney(calcTotal(c.items))}</td>
                      <td><EstadoChip estado={c.estado}/></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* OC */}
          {ocs.length > 0 && (
            <div className="panel panel-flush" style={{ marginBottom:14 }}>
              <div style={{ padding:'12px 18px', borderBottom:'1px solid var(--line)' }}><Eyebrow>Órdenes de compra ({ocs.length})</Eyebrow></div>
              <table className="tbl tbl-hover">
                <thead><tr><th>Número</th><th>OC cliente</th><th>Entrega</th><th className="num">Total</th><th>Estado</th></tr></thead>
                <tbody>
                  {ocs.map(o => (
                    <tr key={o.id}>
                      <td className="mono xs">{o.id}</td>
                      <td className="xs mute">{o.nro_pedido_cliente}</td>
                      <td className="mono xs">{o.fecha_entrega}</td>
                      <td className="num mono">{fmtMoney(calcTotal(o.items))}</td>
                      <td><EstadoChip estado={o.estado}/></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* Facturas */}
          {facts.length > 0 && (
            <div className="panel panel-flush" style={{ marginBottom:14 }}>
              <div style={{ padding:'12px 18px', borderBottom:'1px solid var(--line)' }}><Eyebrow>Facturas ({facts.length})</Eyebrow></div>
              <table className="tbl tbl-hover">
                <thead><tr><th>Número</th><th>Emisión</th><th>Vence</th><th className="num">Total</th><th>Pago</th></tr></thead>
                <tbody>
                  {facts.map(f => (
                    <tr key={f.id}>
                      <td className="mono xs">{f.id}</td>
                      <td className="mono xs">{f.fecha_emision}</td>
                      <td className="mono xs">{f.fecha_vencimiento}</td>
                      <td className="num mono">{fmtMoney(f.total)}</td>
                      <td>{f.pagada?<Chip tone="good">Pagada</Chip>:<Chip tone="warn">Pendiente</Chip>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{ padding:'10px 18px', borderTop:'1px solid var(--line)', display:'flex', justifyContent:'space-between' }}>
                <span className="xs mute">Total facturado</span>
                <span style={{ fontFamily:'var(--serif)', fontSize:18 }}>{fmtMoney(facturadoTotal)}</span>
              </div>
            </div>
          )}

          {cots.length===0 && ocs.length===0 && facts.length===0 && (
            <div className="panel" style={{ textAlign:'center', padding:40, color:'var(--text-mute)' }}>
              <Icon name="users" size={24}/><div style={{ marginTop:8 }}>Sin actividad comercial registrada</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function DirFmt({ dir }) {
  if (!dir || (!dir.calle && !dir.ciudad)) return <div className="mute xs" style={{ marginTop: 8 }}>Sin dirección registrada</div>;
  return (
    <div style={{ marginTop: 10, fontSize: 13.5, lineHeight: 1.6 }}>
      <div>{dir.calle} {dir.numero} {dir.interseccion && <span className="mute">· y {dir.interseccion}</span>}</div>
      <div>{dir.ciudad}</div>
      {dir.referencia && <div className="xs mute" style={{ marginTop: 4 }}>Ref.: {dir.referencia}</div>}
    </div>
  );
}

// ═══════════════════════ Editor de Cliente ═══════════════════════
function ClienteEditor({ draft, setDraft, esNuevo, onCancel, onSave }) {
  const set = (k, v) => setDraft({ ...draft, [k]: v });
  const setDir = (campo, k, v) => setDraft({ ...draft, [campo]: { ...draft[campo], [k]: v } });
  const copiarMatriz = () => setDraft({ ...draft, dir_sucursal: { ...draft.dir_matriz } });

  const valido = draft.razon_social.trim() && draft.ruc.trim().length >= 10;

  return (
    <div>
      <div className="panel" style={{ padding: 22 }}>
        <div className="row" style={{ justifyContent: 'space-between' }}>
          <div>
            <Eyebrow>{esNuevo ? 'Nuevo cliente' : 'Editar cliente'}</Eyebrow>
            <h2 style={{ fontFamily: 'var(--serif)', fontSize: 24, marginTop: 4 }}>
              {draft.razon_social || <span className="mute">Razón social</span>}
            </h2>
          </div>
          <div className="row">
            <Btn variant="ghost" onClick={onCancel}>Cancelar</Btn>
            <Btn variant="primary" onClick={onSave} disabled={!valido}>
              <Icon name="check" size={13}/> {esNuevo ? 'Crear cliente' : 'Guardar cambios'}
            </Btn>
          </div>
        </div>
        {!valido && (
          <div className="xs" style={{ color: 'var(--warn)', marginTop: 8 }}>
            Razón social y RUC (mínimo 10 dígitos) son obligatorios.
          </div>
        )}
      </div>

      {/* Datos fiscales */}
      <div className="panel" style={{ marginTop: 14 }}>
        <Eyebrow>Datos fiscales</Eyebrow>
        <div className="form-grid" style={{ marginTop: 12 }}>
          <Field label="Razón social *" span={2}>
            <input value={draft.razon_social} onChange={e => set('razon_social', e.target.value)} placeholder="LABORATORIOS LIFE C.A." />
          </Field>
          <Field label="Nombre comercial">
            <input value={draft.nombre_comercial} onChange={e => set('nombre_comercial', e.target.value)} placeholder="Life" />
          </Field>
          <Field label="RUC / Cédula *">
            <input className="mono" value={draft.ruc} onChange={e => set('ruc', e.target.value.replace(/\D/g, ''))} placeholder="1790012393001" maxLength={13} />
          </Field>
          <Field label="Tipo">
            <select value={draft.tipo} onChange={e => set('tipo', e.target.value)}>
              <option>Sociedad</option>
              <option>Persona Natural</option>
              <option>Gobierno</option>
            </select>
          </Field>
          <Field label="Obligado a contabilidad">
            <Toggle checked={draft.obligado_contabilidad} onChange={v => set('obligado_contabilidad', v)}>
              {draft.obligado_contabilidad ? 'Sí' : 'No'}
            </Toggle>
          </Field>
          <Field label="Agente de retención">
            <Toggle checked={draft.agente_retencion} onChange={v => set('agente_retencion', v)}>
              {draft.agente_retencion ? 'Sí' : 'No'}
            </Toggle>
          </Field>
          {draft.agente_retencion && (
            <Field label="Nº resolución retención" span={2}>
              <input value={draft.resolucion_retencion} onChange={e => set('resolucion_retencion', e.target.value)} placeholder="Res. SRI 2024-001" />
            </Field>

function DocModal({ onClose, children, title, actions }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [onClose]);

  const handlePrint = () => {
    const doc = document.querySelector('.doc-page');
    if (!doc) return window.print();
    // Print just the page via window.print; .doc-modal-chrome hides in print.
    window.print();
  };

  return (
    <div className="doc-overlay" onClick={(e) => { if (e.target.classList.contains('doc-overlay')) onClose(); }}>
      <div className="doc-modal-chrome">
        <div className="doc-modal-head">
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <Btn variant="ghost" size="sm" onClick={onClose}><Icon name="x" size={14}/></Btn>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 16, letterSpacing: '-0.01em' }}>{title}</div>
          </div>
          <div className="row">
            {actions}
            <Btn variant="ghost" size="sm" onClick={handlePrint}><Icon name="download" size={13}/> Imprimir / PDF</Btn>
          </div>
        </div>
        <div className="doc-scroll">
          {children}
        </div>
      </div>
    </div>
  );
}

// Edit-in-place helper. Click to convert to input, blur to save.
function Editable({ value, onChange, className = '', multiline = false, placeholder = '' }) {
  const [editing, setEditing] = useState(false);
  const [tmp, setTmp] = useState(value);
  useEffect(() => { setTmp(value); }, [value]);
  if (!editing) {
    return (
      <span className={`doc-editable ${className}`} onClick={() => setEditing(true)} title="Click para editar">
        {value || <span className="doc-placeholder">{placeholder || '—'}</span>}
      </span>
    );
  }
  const commit = () => { setEditing(false); if (tmp !== value) onChange(tmp); };
  const Tag = multiline ? 'textarea' : 'input';
  return (
    <Tag
      className={`doc-editable-input ${className}`}
      value={tmp}
      autoFocus
      rows={multiline ? 3 : undefined}
      onChange={(e) => setTmp(e.target.value)}
      onBlur={commit}
      onKeyDown={(e) => {
        if (e.key === 'Enter' && !multiline) { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { setEditing(false); setTmp(value); }
      }}
    />
  );
}

// Simulated clave-de-acceso barcode (pure SVG stripes, just decorative)
function ClaveBars({ clave }) {
  if (!clave) return null;
  const seed = clave.length;
  const bars = Array.from({ length: 60 }).map((_, i) => {
    const w = ((seed * (i + 1)) % 7) < 3 ? 1 : 2;
    const black = ((seed * 7 + i * 3) % 5) < 3;
    return { w, black };
  });
  let x = 0;
  return (
    <svg viewBox="0 0 200 30" width="100%" height="24" style={{ marginTop: 4 }}>
      {bars.map((b, i) => {
        const el = <rect key={i} x={x} y={0} width={b.w} height={30} fill={b.black ? '#000' : 'transparent'} />;
        x += b.w + 0.6;
        return el;
      })}
    </svg>
  );
}

  const [cot, setCot] = useState(baseCot);
  const cli = CLIENTES_MOCK.find(c => c.id === cot.cliente);

  if (!cot || !cli) return null;

  const upd = (k, v) => setCot({ ...cot, [k]: v });
  const updItem = (idx, k, v) => {
    const items = [...cot.items];
    items[idx] = { ...items[idx], [k]: v };
    setCot({ ...cot, items });
  };

  const subtotal = cot.items.reduce((s, i) => s + (i.cant_cajas * i.precio_caja), 0);
  const iva = subtotal * 0.12;
  const total = subtotal + iva;

  return (
    <DocModal onClose={onClose} title={`Cotización ${cot.id}`}>
      <div className="doc-page a4 doc-proforma">
        {/* Header estético */}
        <div className="proforma-head">
          <div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 48, lineHeight: 0.9, letterSpacing: '-0.02em' }}>
              sol<em style={{ fontStyle: 'italic', color: '#5b3a8a' }}>plast</em>
            </div>
            <div style={{ fontSize: 10.5, color: '#555', marginTop: 4, letterSpacing: '0.05em', textTransform: 'uppercase' }}>
              Envases plásticos farmacéuticos
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 36, letterSpacing: '-0.02em', color: '#5b3a8a' }}>Cotización</div>
            <div className="mono" style={{ fontSize: 12, marginTop: 4 }}>{cot.id}</div>
          </div>
        </div>

        <div style={{ borderTop: '2px solid #5b3a8a', margin: '16px 0 24px' }} />

        {/* 2 cols: emisor + cliente */}
        <div className="proforma-parties">
          <div>
            <div className="proforma-label">De</div>
            <div style={{ fontWeight: 600, marginTop: 4 }}>{EMISOR.nombre_comercial}</div>
            <div style={{ fontSize: 10.5, color: '#333', lineHeight: 1.55, marginTop: 4 }}>
              {EMISOR.razon_social}<br/>
              RUC {EMISOR.ruc}<br/>
              {EMISOR.dir_matriz.calle} {EMISOR.dir_matriz.numero}<br/>
              {EMISOR.dir_matriz.ciudad}<br/>
              {EMISOR.email} · {EMISOR.telefono}
            </div>
          </div>
          <div>
            <div className="proforma-label">Para</div>
            <div style={{ fontWeight: 600, marginTop: 4 }}>{cli.razon_social}</div>
            <div style={{ fontSize: 10.5, color: '#333', lineHeight: 1.55, marginTop: 4 }}>
              {cli.contacto_nombre && <>A/C: {cli.contacto_nombre}{cli.contacto_cargo ? ` (${cli.contacto_cargo})` : ''}<br/></>}
              RUC {cli.ruc}<br/>
              {cli.dir_matriz.calle} {cli.dir_matriz.numero}<br/>
              {cli.dir_matriz.ciudad}<br/>
              {cli.email_contacto || cli.email_fact}
            </div>
          </div>
          <div>
            <div className="proforma-label">Fecha</div>
            <div className="mono" style={{ marginTop: 4 }}><Editable value={cot.fecha} onChange={v => upd('fecha', v)} /></div>
            <div className="proforma-label" style={{ marginTop: 14 }}>Validez</div>
            <div style={{ marginTop: 4 }}><Editable value={String(cot.validez_dias)} onChange={v => upd('validez_dias', Number(v) || 0)} /> días</div>
            <div className="proforma-label" style={{ marginTop: 14 }}>Condiciones</div>
            <div style={{ fontSize: 10.5, marginTop: 4 }}>Crédito {cli.credito_dias} días</div>
          </div>
        </div>

        {/* Items */}
        <table className="proforma-items">
          <thead>
            <tr>
              <th style={{ width: '40%' }}>Producto</th>
              <th style={{ width: '12%', textAlign: 'right' }}>Cajas</th>
              <th style={{ width: '15%' }}>Unid/caja</th>
              <th style={{ width: '15%', textAlign: 'right' }}>Precio caja</th>
              <th style={{ width: '18%', textAlign: 'right' }}>Importe</th>
            </tr>
          </thead>
          <tbody>
            {cot.items.map((it, i) => {
              const prod = PRODUCTOS_MOCK.find(p => p.id === it.prod_id);
              return (
                <tr key={i}>
                  <td>
                    <div style={{ fontWeight: 500 }}>{prod?.nombre}</div>
                    <div className="xs mute" style={{ marginTop: 2 }}>{prod?.material} · {prod?.peso_g}g</div>
                  </td>
                  <td className="num"><Editable value={String(it.cant_cajas)} onChange={v => updItem(i, 'cant_cajas', Number(v) || 0)} /></td>
                  <td className="num mute">{prod?.unidades_caja}</td>
                  <td className="num mono">$ <Editable value={Number(it.precio_caja).toFixed(2)} onChange={v => updItem(i, 'precio_caja', Number(v) || 0)} /></td>
                  <td className="num mono">$ {(it.cant_cajas * it.precio_caja).toFixed(2)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>

        {/* Totales */}
        <div className="proforma-totals">
          <table>
            <tbody>
              <tr><td>Subtotal</td><td className="num mono">$ {subtotal.toFixed(2)}</td></tr>
              <tr><td>IVA 12%</td><td className="num mono">$ {iva.toFixed(2)}</td></tr>
              <tr className="tot"><td>Total</td><td className="num mono">$ {total.toFixed(2)}</td></tr>
            </tbody>
          </table>
        </div>

        {/* Observaciones */}
        <div style={{ marginTop: 32 }}>
          <div className="proforma-label">Observaciones</div>
          <div style={{ marginTop: 6, fontSize: 11, lineHeight: 1.6, color: '#333', minHeight: 40 }}>
            <Editable value={cot.observaciones || ''} onChange={v => upd('observaciones', v)} multiline placeholder="Ej. entrega en 15 días hábiles, certificado de calidad adjunto…" />
          </div>
        </div>

        {/* Footer / terms */}
        <div style={{ marginTop: 40, borderTop: '1px solid #ddd', paddingTop: 16, fontSize: 9.5, color: '#555', lineHeight: 1.6 }}>
          <b>Términos:</b> Precios sujetos a cambio sin previo aviso una vez vencida la validez indicada. Los pedidos se confirmarán con orden de compra y 50% de anticipo para clientes nuevos. El plazo de entrega comienza desde la recepción de OC confirmada.
          <br/><br/>
          Una respuesta a esta cotización con orden de compra equivale a la aceptación de estos términos.
        </div>
      </div>
    </DocModal>
  );
}
