function sparkPath(data, w, h) {
  const min = Math.min(...data), max = Math.max(...data);
  const r = max - min || 1;
  const step = w / (data.length - 1);
  return data.map((v, i) => `${i ? 'L' : 'M'} ${i * step} ${h - ((v - min) / r) * (h - 6) - 3}`).join(' ');
}

// ─── AlertasPanel — cargable desde API + CRUD de alertas manuales ───────────
function AlertasPanel({ setPage }) {
  const [alertas,  setAlertas]  = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editItem, setEditItem] = useState(null); // null = nueva
  const [form,     setForm]     = useState({ titulo:'', descripcion:'', severidad:'info' });
  const [saving,   setSaving]   = useState(false);

  // Sistema de alertas locales para demo (se mezclan con las del API)
  const anomsCount  = Object.values(window.HORAS_DETALLE || {}).flat().filter(d => d.flag && !d.flag.startsWith('CORREG')).length;
  const ultimo      = NOMINA_HISTORICA[NOMINA_HISTORICA.length - 1] || { total: 0, label: '—' };

  function localAlertas() {
    const a = [];
    if (anomsCount > 0) a.push({ id: 'local-anomalias', tipo:'sistema', severidad:'warn', titulo:`${anomsCount} anomalía${anomsCount !== 1 ? 's' : ''} en reporte de horas`, descripcion:`${ultimo.label} · revisar en Nómina`, destino:{ page:'nomina' }, _local: true });
    if (ultimo.total > 0) a.push({ id: 'local-nomina', tipo:'sistema', severidad:'good', titulo:'Nómina lista para transferir', descripcion:`${fmtMoney(ultimo.total)} — ${EMPLEADOS_MOCK.length} empleados`, destino:{ page:'nomina' }, _local: true });
    return a;
  }

  async function cargar() {
    const data = await window._apiUtil.fetchAlerts();
    if (data) setAlertas([...localAlertas(), ...data]);
    else       setAlertas(localAlertas());
  }

  useEffect(() => { cargar(); }, []);

  async function descartar(id, esLocal) {
    if (!esLocal) await window._apiUtil.dismissAlert(id);
    setAlertas(a => a.filter(x => x.id !== id));
  }

  async function guardar() {
    setSaving(true);
    try {
      if (editItem) {
        await window._apiUtil.updatePersistentAlert(editItem.id, form);
        setAlertas(a => a.map(x => x.id === editItem.id ? { ...x, ...form } : x));
      } else {
        const r = await window._apiUtil.createPersistentAlert({ ...form, fecha_creacion: new Date().toISOString().slice(0,10) });
        const newId = r?.id || `manual-${Date.now()}`;
        setAlertas(a => [...a, { id: newId, tipo:'manual', ...form, _local: !r }]);
      }
      setShowForm(false); setEditItem(null); setForm({ titulo:'', descripcion:'', severidad:'info' });
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  async function eliminar(id) {
    await window._apiUtil.deletePersistentAlert(id);
    setAlertas(a => a.filter(x => x.id !== id));
  }

  const abrir = (a) => {
    const dest = a.destino;
    if (dest?.page && setPage) setPage(dest.page);
  };

  const toneColor = { warn:'var(--warn)', good:'var(--good)', info:'var(--info)', bad:'var(--bad)' };
  const toneSoft  = { warn:'var(--warn-soft)', good:'var(--good-soft)', info:'var(--info-soft)', bad:'var(--bad-soft)' };
  const toneIcon  = { warn:'alert', good:'check', info:'info', bad:'alert', manual:'bell' };

  const lista = alertas || localAlertas();

  return (
    <div className="panel panel-flush" style={{ display:'flex', flexDirection:'column', maxHeight: 460 }}>
      <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--line)', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
        <div>
          <h3 className="panel-title">Alertas</h3>
          <div className="panel-sub">{lista.length === 0 ? 'Todo al día' : 'Requieren tu atención'}</div>
        </div>
        <div className="row" style={{ gap:8 }}>
          <Chip tone="accent">{lista.length}</Chip>
          <Btn size="sm" onClick={() => { setEditItem(null); setForm({ titulo:'', descripcion:'', severidad:'info' }); setShowForm(true); }}>
            <Icon name="plus" size={12}/> Nueva
          </Btn>
        </div>
      </div>

      <div style={{ overflowY:'auto', flex:1, minHeight:0 }}>
      {lista.length === 0 && (
        <div style={{ padding:'28px 18px', textAlign:'center', color:'var(--text-mute)', fontSize:13 }}>
          <Icon name="check" size={22}/><div style={{ marginTop:6 }}>Todo al día</div>
        </div>
      )}

      {lista.map((a) => {
        const sev = a.severidad || 'info';
        const isManual = a.tipo === 'manual';
        return (
          <div key={a.id} className="list-row" style={{ alignItems:'flex-start', gap:10 }}>
            <button onClick={() => abrir(a)} style={{ display:'flex', alignItems:'center', gap:10, flex:1, background:'transparent', border:0, textAlign:'left', cursor: a.destino ? 'pointer' : 'default', color:'var(--text)', padding:0 }}>
              <div className="ico" style={{ background: toneSoft[sev] || 'var(--accent-soft)', color: toneColor[sev] || 'var(--accent-hi)', flexShrink:0 }}>
                <Icon name={toneIcon[sev] || 'bell'} size={16}/>
              </div>
              <div className="body">
                <div className="ttl">{a.titulo}</div>
                <div className="cap">{a.descripcion}{a.fecha && ` · ${a.fecha}`}</div>
              </div>
            </button>
            <div className="row" style={{ gap:4, flexShrink:0 }}>
              {isManual && (
                <Btn size="sm" variant="ghost" title="Editar" onClick={() => {
                  setEditItem(a); setForm({ titulo:a.titulo, descripcion:a.descripcion||'', severidad:a.severidad||'info' }); setShowForm(true);
                }}><Icon name="edit" size={12}/></Btn>
              )}
              {isManual && (
                <Btn size="sm" variant="ghost" className="danger" title="Eliminar" onClick={() => eliminar(a.id)}>
                  <Icon name="trash" size={12}/>
                </Btn>
              )}
              {!a._local && (
                <Btn size="sm" variant="ghost" title="Descartar" onClick={() => descartar(a.id, false)}>
                  <Icon name="x" size={12}/>
                </Btn>
              )}
            </div>
          </div>
        );
      })}
      </div>

      <Modal open={showForm} onClose={() => { setShowForm(false); setEditItem(null); }}
        title={editItem ? 'Editar alerta' : 'Nueva alerta manual'}
        footer={<>
          <Btn onClick={() => { setShowForm(false); setEditItem(null); }}>Cancelar</Btn>
          <Btn variant="primary" disabled={saving || !form.titulo} onClick={guardar}>
            {saving ? 'Guardando…' : <><Icon name="check" size={13}/> {editItem ? 'Actualizar' : 'Crear'}</>}
          </Btn>
        </>}>
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <div className="field" style={{ margin:0 }}>
            <label>Título</label>
            <input className="input" value={form.titulo} onChange={e => setForm(f => ({...f, titulo: e.target.value}))} placeholder="Ej: Revisar stock de cánulas" />
          </div>
          <div className="field" style={{ margin:0 }}>
            <label>Descripción</label>
            <textarea className="input" rows={2} value={form.descripcion} onChange={e => setForm(f => ({...f, descripcion: e.target.value}))} placeholder="Contexto adicional (opcional)" style={{ resize:'vertical' }}/>
          </div>
          <div className="field" style={{ margin:0 }}>
            <label>Severidad</label>
            <Seg value={form.severidad} onChange={v => setForm(f => ({...f, severidad: v}))}
              options={[{value:'info',label:'Info'},{value:'warn',label:'Advertencia'},{value:'bad',label:'Urgente'},{value:'good',label:'OK'}]} />
          </div>
        </div>
      </Modal>
    </div>
  );
}

Object.assign(window, { Home, AlertasPanel });


</script>

<script type="text/babel" data-file="nomina.jsx">

// Nómina: 3-step flow (Subir → Revisar horas → Sueldos)

function Nomina({ setPage }) {
  const [step, setStep] = useState(0);
  const [periodoId, setPeriodoId] = useState(LATEST_PERIODO || '');

  const hist = NOMINA_HISTORICA.find(h => h.id === periodoId);
  const periodoLabel = hist?.label || '—';

  const steps = [
    { label: 'Subir reporte', sub: 'Archivo XLS del reloj NGTeco' },
    { label: 'Revisar horas', sub: 'Corregir anomalías antes de calcular' },
    { label: 'Calcular sueldos', sub: 'Nómina final con extras y descuentos' },
  ];

  function selectPeriodo(id) {
    setPeriodoId(id);
    setStep(1);
  }

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Personal · Nómina · {periodoLabel}</Eyebrow>
          <h1 className="page-title">Roles y <em>nómina</em></h1>
          <div className="page-sub">Tres pasos para cerrar el mes: importar el reporte del reloj, revisar las anomalías detectadas y calcular los sueldos según la ley ecuatoriana.</div>
        </div>
      </div>

      <div className="stepper">
        {steps.map((s, i) => (
          <button key={i} className={`step ${i === step ? 'active' : ''} ${i < step ? 'done' : ''}`} onClick={() => setStep(i)}>
            <span className="num">{i < step ? <Icon name="check" size={11} strokeWidth={3}/> : i + 1}</span>
            <span>{s.label}</span>
            {i < steps.length - 1 && <span className="step-sep">·</span>}
          </button>
        ))}
      </div>

      {step === 0 && <NomStepSubir periodoId={periodoId} onNext={() => setStep(1)} onSelectPeriodo={selectPeriodo} />}
      {step === 1 && <NomStepRevisar periodoId={periodoId} periodoLabel={periodoLabel} onNext={() => setStep(2)} onBack={() => setStep(0)} />}
      {step === 2 && <NomStepSueldos periodoId={periodoId} periodoLabel={periodoLabel} onBack={() => setStep(1)} />}
    </div>
  );
}

function NomStepSubir({ periodoId, onNext, onSelectPeriodo }) {
  const [uploading, setUploading] = useState(false);
  const [pendingFile, setPendingFile] = useState(null);
  const [conflictInfo, setConflictInfo] = useState(null);
  const [justUploaded, setJustUploaded] = useState(() => {
    try {
      const s = sessionStorage.getItem('solplast.justUploaded');
      if (s) {
        sessionStorage.removeItem('solplast.justUploaded');
        return JSON.parse(s);
      }
    } catch {}
    return null;
  });

  async function doUpload(file, force) {
    setUploading(true);
    const result = await window._api?.uploadNomina(file, force);
    if (result && result.conflict) {
      setUploading(false);
      setPendingFile(file);
      setConflictInfo(result);
      return;
    }
    if (result && !result.error) {
      try {
        sessionStorage.setItem('solplast.justUploaded', JSON.stringify({
          periodo_id: result.periodo_id,
          periodo_label: result.periodo_label,
          empleados: result.empleados,
          anomalias: result.anomalias,
        }));
      } catch {}
      location.reload();
      return;
    }
    setUploading(false);
    alert((result && result.error) || 'Error subiendo el archivo.');
  }

  function handleFile(file) {
    if (!file) return;
    doUpload(file, false);
  }

  function confirmarSobreescribir() {
    if (!pendingFile) return;
    setConflictInfo(null);
    doUpload(pendingFile, true);
    setPendingFile(null);
  }

  function cancelarSobreescribir() {
    setConflictInfo(null);
    setPendingFile(null);
  }

  const periodos = NOMINA_HISTORICA.slice().reverse();

  return (
    <div className="cols-2">
      <div className="panel">
        <PanelHead title="Subir reporte del reloj" sub="XLS exportado del NGTeco · hasta 10MB" />
        <div
          style={{ border: '2px dashed var(--line-hi)', borderRadius: 'var(--radius-lg)', padding: '40px 20px', textAlign: 'center', background: 'var(--bg-raised)' }}
          onDragOver={e => e.preventDefault()}
          onDrop={e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}
        >
          <div style={{ color: 'var(--accent)', margin: '0 auto 12px' }}><Icon name="upload" size={28} /></div>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 22, marginBottom: 4 }}>Arrastra el archivo aquí</div>
          <div className="small mute" style={{ marginBottom: 16 }}>o selecciona desde tu computadora</div>
          <label className="btn primary" style={{ cursor: uploading ? 'not-allowed' : 'pointer', opacity: uploading ? 0.4 : 1 }}>
            {uploading ? 'Procesando…' : 'Elegir archivo XLS'}
            <input type="file" accept=".xls,.xlsx" disabled={uploading} style={{ display: 'none' }} onChange={e => { if (e.target.files[0]) handleFile(e.target.files[0]); e.target.value = ''; }} />
          </label>
          <div className="xs mute" style={{ marginTop: 16 }}>El sistema detecta entradas faltantes, salidas sin fichar y fechas cruzadas.</div>
        </div>
        {justUploaded && (
          <div className="alert good" style={{ marginTop: 14 }}>
            <div className="icon"><Icon name="check" size={16}/></div>
            <div className="body">
              <div className="title">Reporte cargado: {justUploaded.periodo_label}</div>
              <div className="msg">{justUploaded.empleados} empleados · {justUploaded.anomalias} anomalía{justUploaded.anomalias !== 1 ? 's' : ''}</div>
            </div>
            <Btn variant="primary" size="sm" onClick={() => { onSelectPeriodo(justUploaded.periodo_id); }}>Revisar <Icon name="arrow_r" size={12}/></Btn>
          </div>
        )}
      </div>

      <div className="panel panel-flush">
        <div style={{ padding: '18px', borderBottom: '1px solid var(--line)' }}>
          <PanelHead title="Períodos guardados" sub="Selecciona uno para revisar o recalcular" />
        </div>
        {periodos.length === 0 && <div className="xs mute" style={{ padding: 18 }}>Sin reportes guardados.</div>}
        {periodos.map((r, i) => {
          const sel = r.id === periodoId;
          return (
            <button key={r.id} className="list-row" onClick={() => onSelectPeriodo(r.id)} style={{ width: '100%', textAlign: 'left', background: sel ? 'var(--accent-soft)' : 'transparent', border: 0, cursor: 'pointer', color: 'var(--text)' }}>
              <div className="ico" style={{ background: sel ? 'var(--accent)' : (i === 0 ? 'var(--accent-soft)' : 'var(--bg-hover)'), color: sel ? 'white' : (i === 0 ? 'var(--accent-hi)' : 'var(--text-dim)') }}>
                <Icon name="calendar" size={16} />
              </div>
              <div className="body">
                <div className="ttl">{r.label}{sel && <Chip tone="accent" style={{ marginLeft: 8 }}>seleccionado</Chip>}</div>
                <div className="cap">{r.empleados} empleados · {fmtMoney(r.total)}</div>
              </div>
              <Icon name="arrow_r" size={14} className="mute" />
            </button>
          );
        })}
      </div>

      <Modal open={!!conflictInfo} onClose={cancelarSobreescribir} title="¿Sobrescribir reporte?"
        footer={<><Btn onClick={cancelarSobreescribir}>Cancelar</Btn><Btn variant="primary" onClick={confirmarSobreescribir}><Icon name="check" size={14}/> Sí, sobrescribir</Btn></>}>
        {conflictInfo && (
          <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
            <div style={{ width: 44, height: 44, borderRadius: 12, background: 'color-mix(in oklab, var(--warn) 18%, transparent)', color: 'var(--warn)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <Icon name="alert" size={20}/>
            </div>
            <div>
              <div style={{ fontSize: 14, marginBottom: 8 }}>Ya existe un reporte guardado para <strong>{conflictInfo.periodo_label}</strong>.</div>
              <div className="small mute">Si continúas, se reemplazará con el archivo nuevo ({conflictInfo.empleados} empleados). Las horas corregidas manualmente de este período se perderán.</div>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

function NomStepRevisar({ periodoId, periodoLabel, onNext, onBack }) {
  const cloneHoras = (pid) => {
    const src = HORAS_POR_PERIODO[pid] || {};
    const copy = {};
    for (const k of Object.keys(src)) copy[k] = src[k].map(d => ({ ...d }));
    return copy;
  };

  const [horasPeriodo, setHorasPeriodo] = useState(() => cloneHoras(periodoId));
  const empIds = Object.keys(horasPeriodo);
  const firstId = empIds[0] || EMPLEADOS_MOCK[0]?.id || '';
  const [sel, setSel] = useState(firstId);
  const [edits, setEdits] = useState({});
  const [saving, setSaving] = useState(false);
  const [showRec, setShowRec] = useState(false);

  React.useEffect(() => {
    const nuevo = cloneHoras(periodoId);
    setHorasPeriodo(nuevo);
    setEdits({});
    const ids = Object.keys(nuevo);
    if (ids.length > 0 && !ids.includes(sel)) setSel(ids[0]);
  }, [periodoId]);

  const baseDays = horasPeriodo[sel] || [];
  const days = baseDays.map((d, i) => {
    const override = edits[sel]?.[i] || {};
    const edited = Object.keys(override).length > 0;
    const h1 = override.h1 !== undefined ? override.h1 : d.h1;
    const h2 = override.h2 !== undefined ? override.h2 : d.h2;
    const h3 = override.h3 !== undefined ? override.h3 : d.h3;
    const h4 = override.h4 !== undefined ? override.h4 : d.h4;
    const total = computeTotal(h1, h2, h3, h4);
    const flag = edited ? 'CORREGIDO MANUALMENTE' : d.flag;
    return { ...d, h1, h2, h3, h4, total, flag };
  });

  const hayCambios = Object.keys(edits).some(k => Object.keys(edits[k] || {}).length > 0);

  function applyFlagLocal(empKey, idx, nuevoFlag) {
    setHorasPeriodo(h => ({
      ...h,
      [empKey]: h[empKey].map((d, i) => i === idx ? { ...d, flag: nuevoFlag } : d),
    }));
  }

  async function cambiarFlag(idx, nuevoFlag) {
    const row = baseDays[idx];
    if (!row || saving) return;
    setSaving(true);
    const ediciones = { [sel]: { [row.fecha]: { _flag: nuevoFlag } } };
    const ok = await window._api?.corregirNomina(periodoId, ediciones);
    setSaving(false);
    if (ok) {
      applyFlagLocal(sel, idx, nuevoFlag);
      if (HORAS_POR_PERIODO[periodoId]?.[sel]?.[idx]) HORAS_POR_PERIODO[periodoId][sel][idx].flag = nuevoFlag;
    } else {
      alert('Error actualizando observación.');
    }
  }

  async function guardarCorrecciones() {
    if (!hayCambios) return;
    setSaving(true);
    const ediciones = {};
    for (const empKey of Object.keys(edits)) {
      const perDay = edits[empKey] || {};
      const base = horasPeriodo[empKey] || [];
      for (const idx of Object.keys(perDay)) {
        const row = base[idx];
        if (!row) continue;
        ediciones[empKey] = ediciones[empKey] || {};
        ediciones[empKey][row.fecha] = perDay[idx];
      }
    }
    const ok = await window._api?.corregirNomina(periodoId, ediciones);
    setSaving(false);
    if (ok) {
      setHorasPeriodo(h => {
        const nuevo = { ...h };
        for (const empKey of Object.keys(edits)) {
          nuevo[empKey] = (nuevo[empKey] || []).map((d, i) => {
            const ov = edits[empKey]?.[i];
            if (!ov) return d;
            const nd = { ...d, ...ov, flag: 'CORREGIDO MANUALMENTE' };
            nd.total = computeTotal(nd.h1, nd.h2, nd.h3, nd.h4);
            return nd;
          });
          if (HORAS_POR_PERIODO[periodoId]?.[empKey]) {
            HORAS_POR_PERIODO[periodoId][empKey] = nuevo[empKey].map(d => ({ ...d }));
          }
        }
        return nuevo;
      });
      setEdits({});
    } else {
      alert('Error guardando correcciones.');
    }
  }

  const horasTotal = Object.values(horasPeriodo).flat().reduce((a, d) => a + (d.total || 0), 0);
  const anomsTotal = Object.values(horasPeriodo).flat().filter(d => d.flag && d.flag.startsWith('REVISAR')).length;
  const empOptions = empIds.map(id => {
    const emp = EMPLEADOS_MOCK.find(e => e.id === id);
    return { value: id, label: emp?.nombre || id };
  });
  const empSel = EMPLEADOS_MOCK.find(e => e.id === sel);
  const baseH = empSel?.horas_base || 8;

  const [ovPeriodo, setOvPeriodo] = useState(() => (OVERRIDES_POR_PERIODO[periodoId] || {})[sel] || {});
  React.useEffect(() => {
    setOvPeriodo((OVERRIDES_POR_PERIODO[periodoId] || {})[sel] || {});
  }, [periodoId, sel]);

  const eff = {
    transporte_dia: ovPeriodo.transporte_dia !== undefined ? ovPeriodo.transporte_dia : (empSel?.transporte ?? 0),
    prestamo_iess: ovPeriodo.prestamo_iess !== undefined ? ovPeriodo.prestamo_iess : (empSel?.prestamo_iess ?? 0),
    descuento_iess: ovPeriodo.descuento_iess !== undefined ? ovPeriodo.descuento_iess : (empSel?.descuento_iess !== false),
    fondos_reserva: ovPeriodo.fondos_reserva !== undefined ? ovPeriodo.fondos_reserva : !!empSel?.fondos_reserva,
  };

  async function setOverride(field, value, isDefault) {
    const todos = { ...(OVERRIDES_POR_PERIODO[periodoId] || {}) };
    const emp_ov = { ...(todos[sel] || {}) };
    if (isDefault) {
      delete emp_ov[field];
    } else {
      emp_ov[field] = value;
    }
    if (Object.keys(emp_ov).length === 0) delete todos[sel];
    else todos[sel] = emp_ov;
    setOvPeriodo(emp_ov);
    OVERRIDES_POR_PERIODO[periodoId] = todos;
    const ok = await window._api?.saveOverrides(periodoId, todos);
    if (!ok) { alert('Error guardando override.'); return; }
    await window._api?.refreshNomina();
    setOvPeriodo((OVERRIDES_POR_PERIODO[periodoId] || {})[sel] || {});
  }

  function esOverride(field) { return ovPeriodo[field] !== undefined; }

  const bancoEmp = React.useMemo(() => {
    let bal = 0;
    const pids = Object.keys(HORAS_POR_PERIODO);
    for (const pid of pids) {
      const fuente = pid === periodoId ? horasPeriodo : HORAS_POR_PERIODO[pid];
      const days = (fuente || {})[sel] || [];
      for (const d of days) {
        const horas = d.total || 0;
        if (d.es_finde && horas > 0) {
          if (d.modo_extra !== 'pagar') bal += horas;
        } else if (!d.es_finde) {
          const exc = Math.max(0, horas - baseH);
          if (exc > 0 && d.modo_extra !== 'pagar') bal += exc;
          else if (horas < baseH && d.cubrir_banco) bal -= (baseH - horas);
        }
      }
    }
    return bal;
  }, [horasPeriodo, periodoId, sel, baseH]);

  async function toggleModo(idx) {
    const row = baseDays[idx];
    if (!row || saving) return;
    const nuevoModo = row.modo_extra === 'pagar' ? 'banco' : 'pagar';
    setSaving(true);
    const ok = await window._api?.corregirNomina(periodoId, { [sel]: { [row.fecha]: { _modo: nuevoModo } } });
    setSaving(false);
    if (ok) {
      setHorasPeriodo(h => ({
        ...h,
        [sel]: h[sel].map((d, i) => i === idx ? { ...d, modo_extra: nuevoModo } : d),
      }));
      if (HORAS_POR_PERIODO[periodoId]?.[sel]?.[idx]) HORAS_POR_PERIODO[periodoId][sel][idx].modo_extra = nuevoModo;
    } else { alert('Error.'); }
  }

  async function toggleCubrir(idx) {
    const row = baseDays[idx];
    if (!row || saving) return;
    const nuevo = !row.cubrir_banco;
    setSaving(true);
    const ok = await window._api?.corregirNomina(periodoId, { [sel]: { [row.fecha]: { _cubrir: nuevo } } });
    setSaving(false);
    if (ok) {
      setHorasPeriodo(h => ({
        ...h,
        [sel]: h[sel].map((d, i) => i === idx ? { ...d, cubrir_banco: nuevo } : d),
      }));
      if (HORAS_POR_PERIODO[periodoId]?.[sel]?.[idx]) HORAS_POR_PERIODO[periodoId][sel][idx].cubrir_banco = nuevo;
    } else { alert('Error.'); }
  }

  function updateCell(idx, field, value) {
    setEdits(e => ({
      ...e,
      [sel]: { ...(e[sel] || {}), [idx]: { ...((e[sel] || {})[idx] || {}), [field]: value } }
    }));
  }

  const fechaFmt = (ds) => {
    const [y, m, d] = (ds || '').split('-');
    return d ? `${d}/${m}` : ds;
  };
  const dow = (ds) => {
    if (!ds) return '';
    const parts = ds.split('-');
    if (parts.length !== 3) return '';
    const y = parts[0].length === 2 ? '20' + parts[0] : parts[0];
    const d = new Date(`${y}-${parts[1]}-${parts[2]}T00:00:00`);
    return ['dom','lun','mar','mié','jue','vie','sáb'][d.getDay()] || '';
  };

  return (
    <div>
      <div className="cols-3" style={{ marginBottom: 16 }}>
        <div className="panel">
          <div className="row" style={{ justifyContent: 'space-between' }}>
            <Eyebrow>Empleados</Eyebrow>
            <span className="num-big">{empIds.length || EMPLEADOS_MOCK.length}</span>
          </div>
          <div className="small mute" style={{ marginTop: 6 }}>detectados en el reporte</div>
        </div>
        <div className="panel">
          <div className="row" style={{ justifyContent: 'space-between' }}>
            <Eyebrow>Anomalías</Eyebrow>
            <span className="num-big" style={{ color: 'var(--warn)' }}>{anomsTotal}</span>
          </div>
          <div className="small mute" style={{ marginTop: 6 }}>requieren revisión manual</div>
        </div>
        <div className="panel">
          <div className="row" style={{ justifyContent: 'space-between' }}>
            <Eyebrow>Horas totales</Eyebrow>
            <span className="num-big">{horasTotal.toFixed(1)}</span>
          </div>
          <div className="small mute" style={{ marginTop: 6 }}>en el período</div>
        </div>
      </div>

      {empSel && (
        <div className="panel" style={{ marginBottom: 16 }}>
          <div className="panel-head">
            <div>
              <h3 className="panel-title">Beneficios y descuentos del mes</h3>
              <div className="panel-sub">Valores para {empSel.nombre} este período. Los cambios solo aplican a {periodoLabel}, no alteran los defaults del empleado.</div>
            </div>
            <Btn size="sm" variant="ghost" onClick={() => setShowRec(true)}><Icon name="calendar" size={12}/> Recurrentes con vigencia</Btn>
          </div>

          <RecurrentesAplicadas empleadoId={sel} periodoId={periodoId} />

          <div className="cols-2" style={{ gap: 10 }}>
            <div className="field">
              <label>Transporte por día {esOverride('transporte_dia') && <Chip tone="accent" style={{ marginLeft: 6 }}>override</Chip>}</label>
              <div className="row" style={{ gap: 6 }}>
                <input className="input" type="number" step="0.5" value={eff.transporte_dia} onChange={e => setOverride('transporte_dia', parseFloat(e.target.value) || 0, false)} />
                {esOverride('transporte_dia') && <Btn size="sm" variant="ghost" onClick={() => setOverride('transporte_dia', null, true)}>Usar default</Btn>}
              </div>
              <div className="xs mute">Default empleado: ${(empSel.transporte ?? 0).toFixed(2)}</div>
            </div>
            <div className="field">

function ObsDropdown({ value, onChange, disabled }) {
  const [open, setOpen] = useState(false);
  const [custom, setCustom] = useState('');
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);

  const esRevisar = value && value.startsWith('REVISAR');
  const tone = !value ? null : esRevisar ? 'warn' : 'good';

  const opciones = [
    { v: 'VERIFICADO', tone: 'good' },
    { v: 'CORREGIDO MANUALMENTE', tone: 'good' },
    { v: 'REVISAR: verificar horarios', tone: 'warn' },
    { v: 'REVISAR: salida tarde no registrada', tone: 'warn' },
    { v: 'REVISAR: hora de salida inusual', tone: 'warn' },
    { v: 'REVISAR: verificar manualmente', tone: 'warn' },
  ];

  return (
    <div ref={ref} style={{ position: 'relative', display: 'inline-block' }}>
      <button
        onClick={() => !disabled && setOpen(o => !o)}
        disabled={disabled}
        style={{
          border: 0, padding: 0, background: 'transparent',
          cursor: disabled ? 'default' : 'pointer',
          display: 'inline-flex', alignItems: 'center', gap: 6,
        }}
      >
        {value ? <Chip tone={tone}>{value}</Chip> : <Chip>Sin observación</Chip>}
        <Icon name="chev_d" size={11} className="mute" />
      </button>
      {open && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 6px)', right: 0,
          background: 'var(--bg-raised)', border: '1px solid var(--line)',
          borderRadius: 'var(--radius-md)', padding: 6, minWidth: 260,
          zIndex: 100, boxShadow: '0 8px 28px rgba(0,0,0,0.35)',
        }}>
          <button onClick={() => { onChange(''); setOpen(false); }} style={dropItemStyle}>
            <span className="mute xs">Quitar observación</span>
          </button>
          <div style={{ height: 1, background: 'var(--line)', margin: '4px 0' }} />
          {opciones.map(o => (
            <button key={o.v} onClick={() => { onChange(o.v); setOpen(false); }} style={{ ...dropItemStyle, background: value === o.v ? 'var(--bg-hover)' : 'transparent' }}>
              <Chip tone={o.tone}>{o.v}</Chip>
            </button>
          ))}
          <div style={{ height: 1, background: 'var(--line)', margin: '4px 0' }} />
          <div style={{ padding: 6 }}>
            <input
              className="input"
              value={custom}
              onChange={e => setCustom(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && custom.trim()) { onChange(custom.trim()); setCustom(''); setOpen(false); } }}
              placeholder="Otra observación… (Enter)"
              style={{ fontSize: 12, padding: '6px 8px' }}
            />
          </div>
        </div>
      )}
    </div>
  );
}

function computeTotal(h1, h2, h3, h4) {
  const toMin = (t) => {
    if (!t) return null;
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  };
  let total = 0;
  const m1 = toMin(h1), m2 = toMin(h2), m3 = toMin(h3), m4 = toMin(h4);
  if (m1 != null && m2 != null) total += m2 - m1;
  if (m3 != null && m4 != null) total += m4 - m3;
  return total / 60;
}

// ═══════════════════════ Recurrentes con vigencia ═══════════════════════
// Formato periodoId → 'YYYY-MM' en nomina lo convertimos con periodoToYM
function periodoToYM(periodoId) {
  // periodoId esperado: '2026-04' o '2026_04'; si no, devolver null
  if (!periodoId) return null;
  const s = String(periodoId).replace('_', '-');
  if (/^\d{4}-\d{2}$/.test(s)) return s;
  return null;
}

function vigenteEn(rec, ym) {
  if (!ym) return true;
  if (rec.desde && ym < rec.desde) return false;
  if (rec.hasta && ym > rec.hasta) return false;
  return true;
}

const TIPOS_REC = [
  { key: 'prestamo_iess',    label: 'Préstamo IESS',       signo: '-' },
  { key: 'prestamo_empresa', label: 'Préstamo empresa',    signo: '-' },

  { key: 'otro_desc',        label: 'Otro descuento',      signo: '-' },
  { key: 'otro_ben',         label: 'Otro beneficio',      signo: '+' },
];

function RecurrentesAplicadas({ empleadoId, periodoId }) {
  const ym = periodoToYM(periodoId);
  const all = (window.BENEFICIOS_RECURRENTES_MOCK || []).filter(r => r.empleado_id === empleadoId);
  const vigentes = all.filter(r => vigenteEn(r, ym));
  if (vigentes.length === 0) return null;
  return (
    <div className="rec-applied">

      <div className="rec-chips">
        {vigentes.map(r => {

}

function RecurrentesModal({ empleadoId, onClose }) {
  const emp = EMPLEADOS_MOCK.find(e => e.id === empleadoId);
  const [items, setItems] = useState(() => (window.BENEFICIOS_RECURRENTES_MOCK || []).filter(r => r.empleado_id === empleadoId));
  const [nuevo, setNuevo] = useState(null);

  function agregar() {
    const ahora = new Date();
    const ym = `${ahora.getFullYear()}-${String(ahora.getMonth() + 1).padStart(2, '0')}`;
    setNuevo({ id: 'tmp-' + Date.now(), empleado_id: empleadoId, tipo: 'prestamo_iess', monto: 0, desde: ym, hasta: null, nota: '' });
  }

  async function guardar(r) {
    const existe = items.find(x => x.id === r.id);
    let next;
    if (existe) next = items.map(x => x.id === r.id ? r : x);
    else next = [...items, r];
    setItems(next);
    // Sync to global mock (backend se encargará)
    const all = window.BENEFICIOS_RECURRENTES_MOCK || [];
    const otros = all.filter(x => x.empleado_id !== empleadoId);
    window.BENEFICIOS_RECURRENTES_MOCK = [...otros, ...next];
    if (window._api?.saveRecurrentes) await window._api.saveRecurrentes(empleadoId, next);
    setNuevo(null);
  }

  async function eliminar(id) {
    if (!confirm('¿Eliminar esta regla recurrente?')) return;
    const next = items.filter(x => x.id !== id);
    setItems(next);
    const all = window.BENEFICIOS_RECURRENTES_MOCK || [];
    const otros = all.filter(x => x.empleado_id !== empleadoId);
    window.BENEFICIOS_RECURRENTES_MOCK = [...otros, ...next];
    if (window._api?.saveRecurrentes) await window._api.saveRecurrentes(empleadoId, next);
  }

  return (
    <div className="modal-back" onClick={onClose}>
      <div className="modal-card lg" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div>
            <Eyebrow>Nómina · Recurrentes</Eyebrow>
            <h3 className="panel-title">Descuentos y beneficios recurrentes</h3>
            <div className="panel-sub">{emp?.nombre} · se aplican automáticamente a los meses dentro de su vigencia</div>
          </div>
          <Btn size="sm" variant="ghost" onClick={onClose}><Icon name="x" size={14}/></Btn>
        </div>
        <div className="modal-body">
          {items.length === 0 && !nuevo && (
            <div className="empty-state" style={{ textAlign: 'center', padding: 30, color: 'var(--text-dim)' }}>
              <Icon name="calendar" size={24}/>
              <div style={{ marginTop: 8 }}>No hay reglas recurrentes configuradas.</div>
              <div className="xs mute" style={{ marginTop: 4 }}>Puedes crear una para que aplique automáticamente a un rango de meses.</div>
            </div>
          )}
          {items.map(r => (
            <RecurrenteRow key={r.id} rec={r} onSave={guardar} onDelete={() => eliminar(r.id)} />
          ))}
          {nuevo && (
            <RecurrenteRow rec={nuevo} onSave={guardar} onDelete={() => setNuevo(null)} isNew />
          )}
        </div>
        <div className="modal-foot">
          {!nuevo && <Btn variant="ghost" onClick={agregar}><Icon name="plus" size={12}/> Agregar regla</Btn>}
          <Btn onClick={onClose}>Cerrar</Btn>
        </div>
      </div>
    </div>
  );
}

function RecurrenteRow({ rec, onSave, onDelete, isNew }) {
  const [edit, setEdit] = useState(isNew);
  const [draft, setDraft] = useState(rec);
  const tipo = TIPOS_REC.find(t => t.key === (edit ? draft.tipo : rec.tipo)) || { label: rec.tipo, signo: '?' };

  if (!edit) {
    return (
      <div className="rec-row">
        <div className={`rec-row-sig ${tipo.signo === '-' ? 'neg' : 'pos'}`}>{tipo.signo}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontWeight: 600 }}>{tipo.label} · <span className="mono">${rec.monto.toFixed(2)}</span></div>
          <div className="xs mute">{rec.desde} → {rec.hasta || 'indefinido'}{rec.nota && ` · ${rec.nota}`}</div>
        </div>
        <Btn size="sm" variant="ghost" onClick={() => setEdit(true)}><Icon name="edit" size={12}/></Btn>
        <Btn size="sm" variant="ghost" onClick={onDelete}><Icon name="trash" size={12}/></Btn>
      </div>
    );
  }

  return (
    <div className="rec-row edit">
      <div className="rec-edit-grid">
        <div className="field">
          <label>Tipo</label>
          <Select value={draft.tipo} onChange={v => setDraft({ ...draft, tipo: v })}
            options={TIPOS_REC.map(t => ({ value: t.key, label: `${t.signo} ${t.label}` }))} />
        </div>
        <div className="field">
          <label>Monto mensual ($)</label>
          <input className="input" type="number" step="0.01" value={draft.monto}
            onChange={e => setDraft({ ...draft, monto: parseFloat(e.target.value) || 0 })} />
        </div>
        <div className="field">
          <label>Desde (mes)</label>
          <input className="input" type="month" value={draft.desde || ''}
            onChange={e => setDraft({ ...draft, desde: e.target.value })} />
        </div>
        <div className="field">
          <label>Hasta (mes) · vacío = indefinido</label>
          <input className="input" type="month" value={draft.hasta || ''}
            onChange={e => setDraft({ ...draft, hasta: e.target.value || null })} />
        </div>
        <div className="field" style={{ gridColumn: '1 / -1' }}>
          <label>Nota</label>
          <input className="input" type="text" value={draft.nota || ''}
            onChange={e => setDraft({ ...draft, nota: e.target.value })} placeholder="Opcional (ej: 12 cuotas)" />
        </div>
      </div>
      <div className="row" style={{ justifyContent: 'flex-end', marginTop: 10 }}>
        {!isNew && <Btn size="sm" variant="ghost" onClick={() => { setDraft(rec); setEdit(false); }}>Cancelar</Btn>}
        {isNew && <Btn size="sm" variant="ghost" onClick={onDelete}>Cancelar</Btn>}
        <Btn size="sm" variant="primary" onClick={() => { onSave(draft); setEdit(false); }}>Guardar</Btn>
      </div>
    </div>
  );
}

Object.assign(window, { Nomina });

<script type="text/babel" data-file="registro.jsx">

// Registro Diario — wizard con trazabilidad por producto

// Piezas de un producto = su RECETA real (window.BOM[prod_id]) si existe.
// Fallback al mapeo fijo por kind (SUBCOMPONENTES_MOCK) si no hay receta.
function piezasDeProducto(p) {
  if (!p) return null;
  const bom = (window.BOM && window.BOM[p.id]) || null;
  if (bom && typeof bom === 'object' && Object.keys(bom).length) {
    const fijas = SUBCOMPONENTES_MOCK[p.kind] || [];
    return Object.keys(bom).map(pid => {
      const def = fijas.find(x => x.id === pid);
      return { id: pid, nombre: def?.nombre || (pid.charAt(0).toUpperCase() + pid.slice(1)), unidad: 'unidades' };
    });
  }
  return SUBCOMPONENTES_MOCK[p.kind] || null;
}

// Construye los ITEMS de produccion del dia: un producto si tuvo cajas o
// tachos, y CADA pieza suelta producida como item independiente (key
// prod::pieza). Compartido por los pasos Material, Desechos y Revisar para
// que el desglose sea identico (ej. capuchon, no gotero, si no se armo el
// gotero). Resiliente a datos faltantes: si un producto activo no tiene
// nada, igual aparece para no perder lo que se ingrese.
function itemsDeProduccion(activeProds, prod, tachos, subcomp) {
  const items = [];
  (activeProds || []).forEach(pid => {
    const p = PRODUCTOS_MOCK.find(x => x.id === pid) || { id: pid, nombre: pid, kind: 'vaso', material: '—' };
    const cajas = (prod && prod[pid]) || 0;
    const tach = (tachos && tachos[pid]) || 0;
    if (cajas > 0 || tach > 0) {
      items.push({ key: pid, prodId: pid, label: p.nombre, sub: p.material, kind: p.kind, esPieza: false });
    }
    const sc = (subcomp && subcomp[pid]) || {};
    const piezasDef = piezasDeProducto(p) || [];
    Object.entries(sc).forEach(([piezaId, n]) => {
      if ((Number(n) || 0) > 0) {
        const pdef = piezasDef.find(x => x.id === piezaId);
        items.push({
          key: `${pid}::${piezaId}`, prodId: pid, piezaId, fundas: Number(n) || 0,
          label: `${pdef?.nombre || piezaId} · ${n} fund`,
          sub: `pieza de ${p.nombre}`, kind: p.kind, esPieza: true,
        });
      }
    });
    if (cajas === 0 && tach === 0 && Object.keys(sc).length === 0) {
      items.push({ key: pid, prodId: pid, label: p.nombre, sub: p.material, kind: p.kind, esPieza: false });
    }
  });
  return items;
}

function RegistroDiario({ role }) {
  const [view, setView] = useState('wizard'); // wizard | detalle
  const [detalleId, setDetalleId] = useState(null);

  if (view === 'detalle' && detalleId) {
    return <RegistroDetalle id={detalleId} onBack={() => { setView('wizard'); setDetalleId(null); }} />;
  }

  return <RegistroWizard role={role} onOpenDetalle={(id) => { setDetalleId(id); setView('detalle'); }} />;
}

function RegistroWizard({ role, onOpenDetalle }) {
  const [step, setStep] = useState(0);
  const [showConfirm, setShowConfirm] = useState(false);
  const [saved, setSaved] = useState(false);
  const [date, setDate] = useState(() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });

  // Producción: { [prod_id]: cajas }
  // TODO el wizard arranca vacio: el operario ingresa solo lo que se
  // produjo hoy. Sin valores demo precargados.
  const [prod, setProd] = useState({});

  // Sub-componentes por producto (solo jeringa/gotero):
  // { [prod_id]: { [subcomp_id]: fundas } }
  const [subcomp, setSubcomp] = useState({});

  // Material consumido POR producto:
  // { [prod_id]: { virgen: { [mat_id]: kg }, molido: [{ origen, kg }] } }
  const [consumo, setConsumo] = useState({});

  // Tachos armados por producto: { [prod_id]: numero_de_tachos }
  const [tachos, setTachos] = useState({});

  // Desechos y molido generado por producto:
  // { [prod_id]: { desecho, molido, desecho_emp } }
  const [residuos, setResiduos] = useState({});

  const [obs, setObs] = useState('');
  // Número de lote asignado al guardar (formato L-YY-MM-NNN)
  const [loteNum, setLoteNum] = useState(null);

  const steps = [
    { label: 'Día',        icon: 'calendar', sub: 'Fecha de la jornada' },
    { label: 'Producción', icon: 'box',      sub: 'Piezas · tachos · cajas' },
    { label: 'Material',   icon: 'flask',    sub: 'Virgen + molido por producto' },
    { label: 'Desechos',   icon: 'trash',    sub: 'Merma, molido generado y empacadora' },
    { label: 'Revisar',    icon: 'check',    sub: 'Confirmar y guardar' },
  ];

  // Derivados
  // Producto se considera "activo" si tiene cajas, tachos o piezas sueltas
  // declaradas. Asi el operario puede registrar solo piezas sin obligacion
  // de cerrar caja.
  const activeProds = Array.from(new Set([
    ...Object.entries(prod).filter(([, v]) => v > 0).map(([id]) => id),
    ...Object.entries(tachos).filter(([, v]) => v > 0).map(([id]) => id),
    ...Object.entries(subcomp).filter(([, scObj]) =>
      Object.values(scObj || {}).some(n => (Number(n) || 0) > 0)
    ).map(([id]) => id),
  ]));
  const totalCajas = Object.values(prod).reduce((a, b) => a + b, 0);

  // Suma sobre TODAS las entradas de consumo (productos Y piezas: las
  // keys de pieza tienen formato "prod::pieza"). Asi el material usado
  // para producir solo piezas tambien cuenta.
  const totalVirgen = Object.values(consumo).reduce((sum, c) => {
    const v = c?.virgen || {};
    return sum + Object.values(v).reduce((a, b) => a + (Number(b) || 0), 0);
  }, 0);
  const totalMolidoUsado = Object.values(consumo).reduce((sum, c) => {
    const ml = c?.molido || [];
    return sum + ml.reduce((a, m) => a + (Number(m.kg) || 0), 0);
  }, 0);
  const totalMat = totalVirgen + totalMolidoUsado;

  // Suma sobre TODAS las entradas de residuos (productos Y piezas: las
  // keys de pieza tienen formato "prod::pieza"), igual que el consumo.
  const totalDesecho = Object.values(residuos).reduce((s, r) => s + (Number(r?.desecho) || 0), 0);
  const totalMolidoGen = Object.values(residuos).reduce((s, r) => s + (Number(r?.molido) || 0), 0);
  const mermaPct = totalMat > 0 ? (totalDesecho / totalMat) * 100 : 0;

  const next = () => setStep(s => Math.min(s + 1, 4));
  const back = () => setStep(s => Math.max(s - 1, 0));

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Producción · Cierre de jornada</Eyebrow>
          <h1 className="page-title">Registro <em>diario</em></h1>
          <div className="page-sub">
            {role === 'operario'
              ? 'Al final de tu turno, registra qué productos se hicieron y cuánto material usó cada uno.'
              : 'Cierre de jornada con trazabilidad por producto: material, molido usado, desechos y molido generado.'}
          </div>
        </div>
        <Chip tone="accent"><Icon name="clock" size={11}/> Turno activo</Chip>
      </div>

      <div className="wiz-stepper">
        {steps.map((s, i) => (
          <button key={i} className={`wstep ${i === step ? 'active' : ''} ${i < step ? 'done' : ''}`} onClick={() => setStep(i)}>
            <span className="wico">
              {i < step ? <Icon name="check" size={14} strokeWidth={3}/> : <Icon name={s.icon} size={14} />}
            </span>
            <div>
              <div className="wlbl">{s.label}</div>
              <div className="wsub">{s.sub}</div>
            </div>
          </button>
        ))}
      </div>

      <div className="panel" style={{ minHeight: 420 }}>
        {step === 0 && <RegStepDia date={date} setDate={setDate} />}
        {step === 1 && <RegStepProd prod={prod} setProd={setProd} subcomp={subcomp} setSubcomp={setSubcomp} tachos={tachos} setTachos={setTachos} />}
        {step === 2 && <RegStepMaterial activeProds={activeProds} prod={prod} tachos={tachos} subcomp={subcomp} consumo={consumo} setConsumo={setConsumo} totalMat={totalMat} totalVirgen={totalVirgen} totalMolidoUsado={totalMolidoUsado} />}
        {step === 3 && <RegStepResiduos activeProds={activeProds} prod={prod} tachos={tachos} subcomp={subcomp} residuos={residuos} setResiduos={setResiduos} totalDesecho={totalDesecho} totalMolidoGen={totalMolidoGen} mermaPct={mermaPct} />}
        {step === 4 && <RegStepRevisar date={date} activeProds={activeProds} prod={prod} consumo={consumo} residuos={residuos} obs={obs} setObs={setObs} totalMat={totalMat} totalVirgen={totalVirgen} totalMolidoUsado={totalMolidoUsado} totalCajas={totalCajas} totalDesecho={totalDesecho} totalMolidoGen={totalMolidoGen} mermaPct={mermaPct} subcomp={subcomp} tachos={tachos} loteNum={loteNum} />}

        <div className="row" style={{ justifyContent: 'space-between', marginTop: 24, paddingTop: 16, borderTop: '1px solid var(--line)' }}>
          <Btn onClick={back} disabled={step === 0}><Icon name="arrow_l" size={14}/> Atrás</Btn>
          <div className="small mute">Paso {step + 1} de {steps.length}</div>
          {step < 4 ? (
            <Btn variant="primary" onClick={next}>Siguiente <Icon name="arrow_r" size={14}/></Btn>
          ) : (
            <Btn variant="primary" onClick={() => setShowConfirm(true)}><Icon name="check" size={14}/> Guardar jornada</Btn>
          )}
        </div>
      </div>

      <Modal open={showConfirm && !saved} onClose={() => setShowConfirm(false)} title="¿Guardar jornada?"
        footer={<><Btn onClick={() => setShowConfirm(false)}>Revisar de nuevo</Btn><Btn variant="primary" onClick={() => {
          // Generar número de lote
          const d = new Date(date + 'T00:00:00');
          const yy = String(d.getFullYear()).slice(2);
          const mm = String(d.getMonth()+1).padStart(2,'0');
          const dd = String(d.getDate()).padStart(2,'0');
          const nn = String(119 + activeProds.length).padStart(3,'0');
          setLoteNum(`L-${yy}-${mm}-${dd}-${nn}`);
          setSaved(true);
        }}><Icon name="check" size={14}/> Sí, guardar</Btn></>}>
        <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: 'var(--accent-soft)', color: 'var(--accent-hi)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <Icon name="calendar" size={20}/>
          </div>
          <div>
            <div style={{ fontSize: 14, marginBottom: 8 }}>Vas a guardar la jornada del <strong>{date}</strong> con:</div>
            <ul style={{ margin: 0, paddingLeft: 18, fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.8 }}>
              <li><strong style={{ color: 'var(--text)' }}>{activeProds.length}</strong> productos · <strong style={{ color: 'var(--text)' }}>{totalCajas}</strong> cajas</li>
              <li><strong style={{ color: 'var(--text)' }}>{totalMat.toFixed(1)} kg</strong> material ({totalVirgen.toFixed(1)} virgen + {totalMolidoUsado.toFixed(1)} molido)</li>
              <li><strong style={{ color: 'var(--text)' }}>{totalDesecho.toFixed(1)} kg</strong> desecho · <strong style={{ color: 'var(--good)' }}>+{totalMolidoGen.toFixed(1)} kg</strong> al bin de molido</li>
              <li>Merma: <strong style={{ color: mermaPct > 5 ? 'var(--warn)' : 'var(--good)' }}>{mermaPct.toFixed(1)}%</strong></li>
            </ul>
            <div className="xs mute" style={{ marginTop: 12 }}>Una vez guardada, quedará en el historial. Podrás editarla después si encuentras un error.</div>
          </div>
        </div>
      </Modal>

      <Modal open={saved} onClose={() => { setSaved(false); setShowConfirm(false); }} title="¡Jornada guardada!"
        footer={<><Btn onClick={() => { setSaved(false); setShowConfirm(false); setStep(0); }}>Registrar otra</Btn><Btn variant="primary" onClick={() => { setSaved(false); setShowConfirm(false); }}>Listo</Btn></>}>
        <div style={{ textAlign: 'center', padding: '10px 0' }}>
          <div style={{ width: 60, height: 60, borderRadius: '50%', background: 'var(--good-soft)', color: 'var(--good)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 14 }}>
            <Icon name="check" size={28} strokeWidth={3}/>
          </div>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 20, marginBottom: 6 }}>Jornada del {date}</div>
          <div className="small mute">Guardada correctamente. Los costos y métricas se actualizarán en el próximo recalculo.</div>
        </div>
      </Modal>

      {role !== 'operario' && (
        <div className="panel panel-flush" style={{ marginTop: 18 }}>
          <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}>
            <PanelHead title="Últimos registros" sub="Historial de jornadas guardadas — click para ver detalle" />
          </div>
          {REGISTROS_RECIENTES.map((r, i) => (
            <button key={r.id || i} className="list-row" style={{ width: '100%', textAlign: 'left', background: 'transparent', border: 0, cursor: 'pointer', color: 'var(--text)' }}
              onClick={() => onOpenDetalle(r.id)}>
              <div className="ico" style={{ background: 'var(--accent-soft)', color: 'var(--accent-hi)' }}>
                <Icon name="calendar" size={14}/>
              </div>
              <div className="body">
                <div className="ttl">{r.fecha}</div>
                <div className="cap">{r.material} kg material · {r.cajas} cajas{r.obs && ` · ${r.obs}`}</div>
              </div>
              <Icon name="arrow_r" size={14} className="mute" />
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function RegStepDia({ date, setDate }) {
  const fmt = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const hoy = fmt(new Date());
  const ayer = fmt(new Date(Date.now() - 86400000));
  return (
    <div style={{ maxWidth: 540, margin: '20px auto', textAlign: 'center' }}>
      <div style={{ color: 'var(--accent)', margin: '0 auto 16px' }}><Icon name="calendar" size={32}/></div>
      <h2 style={{ fontFamily: 'var(--serif)', fontSize: 32, marginBottom: 8, letterSpacing: '-0.02em' }}>¿Qué día estás registrando?</h2>
      <div className="small mute" style={{ marginBottom: 24 }}>Usualmente hoy, pero puedes registrar un día pasado si se te olvidó.</div>
      <input type="date" value={date} onChange={e => setDate(e.target.value)} className="input" style={{ fontSize: 20, padding: '14px 18px', textAlign: 'center', fontFamily: 'var(--serif)' }} />
      <div className="row wrap" style={{ justifyContent: 'center', marginTop: 14 }}>
        <Btn size="sm" onClick={() => setDate(hoy)}>Hoy</Btn>
        <Btn size="sm" onClick={() => setDate(ayer)}>Ayer</Btn>
      </div>
    </div>
  );
}

function RegStepProd({ prod, setProd, subcomp, setSubcomp, tachos, setTachos }) {
  const setSC = (pid, scid, value) => {
    // Permite decimales (media funda = 0.5). No truncar a entero.
    setSubcomp({
      ...subcomp,
      [pid]: { ...(subcomp[pid] || {}), [scid]: Math.max(0, Number(value) || 0) }
    });
  };

  const hasPiezas = (kind) => ['jeringa','gotero'].includes(kind);

  return (
    <div>
      <h3 className="panel-title" style={{ marginBottom: 4 }}>¿Qué se produjo hoy?</h3>
      <div className="panel-sub" style={{ marginBottom: 10 }}>
        Para <strong>vasos y cucharas</strong>: ingresa directamente las cajas empacadas.<br/>
        Para <strong>jeringas y goteros</strong>: registra piezas sueltas por tipo, tachos armados y cajas empacadas.
      </div>

      <div className="legend-row" style={{ marginBottom: 14 }}>
        <div className="legend-chip"><span className="dot" style={{ background: 'var(--accent-hi)' }}/> Cajas empacadas</div>
        <div className="legend-chip"><span className="dot" style={{ background: 'var(--info)' }}/> Tachos armados (solo jeringa/gotero)</div>
        <div className="legend-chip"><span className="dot" style={{ background: 'var(--text-mute)' }}/> Piezas sueltas</div>
      </div>

      <div className="prod-grid">
        {PRODUCTOS_MOCK.map(p => {
          const v = prod[p.id] || 0;
          const piezas = piezasDeProducto(p);
          const sc = subcomp[p.id] || {};
          const tach = tachos[p.id] || 0;
          // Card activa si hay CUALQUIER aporte: cajas, tachos o piezas sueltas.
          // Esto permite registrar piezas sin haber ensamblado cajas.
          const sumaPiezas = Object.values(sc).reduce((a, b) => a + (Number(b) || 0), 0);
          const active = v > 0 || tach > 0 || sumaPiezas > 0;
          const unidadesEsperadas = v * p.unidades_caja;
          const isPiezas = hasPiezas(p.kind);
          return (
            <div key={p.id} className={`prod-card ${active ? 'on' : ''}`}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
                <ProductIllus kind={p.kind} size={34} color={active ? 'var(--accent-hi)' : 'var(--text-dim)'} />
                <div style={{ textAlign: 'right' }}>
                  <div className="xs mute">x caja</div>
                  <div className="mono xs">{fmtNum(p.unidades_caja)}</div>
                </div>
              </div>
              <div style={{ fontWeight: 600, marginTop: 8, marginBottom: 2 }}>{p.nombre}</div>
              <div className="xs mute" style={{ marginBottom: 10 }}>{p.peso_g} g · {fmtMoney(p.costo_caja)}/caja</div>

              {/* Cajas empacadas */}
              <div style={{ marginBottom: isPiezas && active ? 10 : 0 }}>
                <div className="xs mute" style={{ marginBottom: 4, display: 'flex', alignItems: 'center', gap: 4 }}>
                  <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--accent-hi)', display: 'inline-block' }}/>
                  Cajas empacadas
                </div>
                <div className="num-stepper">
                  <button onClick={() => setProd({ ...prod, [p.id]: Math.max(0, v - 1) })}><Icon name="minus" size={12}/></button>
                  <input type="number" value={v} onChange={e => setProd({ ...prod, [p.id]: parseInt(e.target.value) || 0 })} />
                  <button onClick={() => setProd({ ...prod, [p.id]: v + 1 })}><Icon name="plus" size={12}/></button>
                </div>
              </div>

              {/* Tachos armados (solo jeringas/goteros, siempre visibles) */}
              {isPiezas && (
                <div style={{ marginBottom: 10 }}>
                  <div className="xs mute" style={{ marginBottom: 4, display: 'flex', alignItems: 'center', gap: 4 }}>
                    <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--info)', display: 'inline-block' }}/>
                    Tachos armados
                  </div>
                  <div className="num-stepper">
                    <button onClick={() => setTachos({ ...tachos, [p.id]: Math.max(0, tach - 1) })}><Icon name="minus" size={12}/></button>
                    <input type="number" value={tach} onChange={e => setTachos({ ...tachos, [p.id]: parseInt(e.target.value) || 0 })} />
                    <button onClick={() => setTachos({ ...tachos, [p.id]: tach + 1 })}><Icon name="plus" size={12}/></button>
                  </div>
                </div>
              )}

              {/* Piezas sueltas: SIEMPRE visibles para jeringa/gotero
                  (independientes de cajas — el operario puede registrar
                  piezas sin haber ensamblado nada). Unidad: fundas. */}
              {piezas && (
                <div className="subcomp-block">
                  <div className="subcomp-head">
                    <div className="subcomp-title">
                      <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--text-mute)', display: 'inline-block' }}/>
                      Piezas sueltas (fundas)
                    </div>
                    {active && <div className="xs mute">Esperado: {fmtNum(unidadesEsperadas)} u</div>}
                  </div>
                  <div className="subcomp-list">
                    {piezas.map(pc => {
                      const val = sc[pc.id] || 0;
                      // Si el bin tiene unidades_por_funda, mostramos el calculo.
                      // INVENTARIO_PIEZAS_MOCK puede traer este ratio configurado.
                      const binInfo = (INVENTARIO_PIEZAS_MOCK || []).find(b => (b.pieza || '').toLowerCase() === pc.id);
                      const upf = binInfo?.unidades_por_funda || 0;
                      const unidadesCalc = upf > 0 ? val * upf : 0;
                      return (
                        <div key={pc.id} className="subcomp-row">
                          <div className="subcomp-name">{pc.nombre}</div>
                          <input className="input mono xs" type="number" value={val}
                            step="0.5" min="0"
                            onChange={e => setSC(p.id, pc.id, parseFloat(e.target.value) || 0)}
                            placeholder="fundas"
                            style={{ padding: '3px 6px', width: 80, textAlign: 'right' }} />
                          <span className="xs mute" style={{ minWidth: 60, textAlign: 'right' }}>
                            {val > 0 ? `${val} fund` : '—'}
                            {unidadesCalc > 0 && <span> · {fmtNum(unidadesCalc)} u</span>}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div className="sum-bar" style={{ marginTop: 18 }}>
        <div>Total cajas hoy</div>
        <div className="mono" style={{ fontSize: 22, fontFamily: 'var(--serif)' }}>
          {Object.values(prod).reduce((a,b)=>a+b,0)} cajas
        </div>
      </div>
    </div>
  );
}

function RegStepMaterial({ activeProds, prod, tachos, subcomp, consumo, setConsumo, totalMat, totalVirgen, totalMolidoUsado }) {

    return <EmptyProducts msg="Primero registra producción (paso anterior): cajas, tachos o piezas sueltas." />;
  }

    <div>
      <h3 className="panel-title" style={{ marginBottom: 4 }}>Material consumido por producto / pieza</h3>
      <div className="panel-sub" style={{ marginBottom: 14 }}>

        producto armado o pieza producida. Si solo se hicieron piezas (ej. capuchones), el material va a la pieza.
      </div>

      <div className="legend-row">
        <div className="legend-chip"><span className="dot" style={{ background: 'var(--accent-hi)' }}/>Virgen · material nuevo</div>
        <div className="legend-chip"><span className="dot" style={{ background: 'var(--good)' }}/>Molido · reusado</div>
      </div>

      <div className="prod-consumo-list">
        {items.map(item => {
          const pid = item.key;
          const p = PRODUCTOS_MOCK.find(x => x.id === item.prodId) || { kind: item.kind };
          const c = consumo[pid] || { virgen: {}, molido: [] };
          const setC = (nc) => setConsumo({ ...consumo, [pid]: nc });
          const vTotal = Object.values(c.virgen || {}).reduce((a, b) => a + (b || 0), 0);
          const mTotal = (c.molido || []).reduce((a, m) => a + (m.kg || 0), 0);

          return (
            <div key={pid} className="prod-consumo-card">

                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600 }}>{item.label}</div>
                  <div className="xs mute">{item.sub}</div>
                </div>
                <div className="pcc-totals">
                  <div><span className="xs mute">Virgen</span><strong className="mono">{vTotal.toFixed(1)} kg</strong></div>
                  <div><span className="xs mute">Molido</span><strong className="mono" style={{ color: 'var(--good)' }}>{mTotal.toFixed(1)} kg</strong></div>
                  <div><span className="xs mute">Total</span><strong className="mono" style={{ fontFamily: 'var(--serif)' }}>{(vTotal+mTotal).toFixed(1)} kg</strong></div>

                        <input type="number" step="0.5" value={c.virgen[m.id] || 0}

  }
  const tone = mermaPct > 5 ? 'warn' : mermaPct > 3 ? 'info' : 'good';

          return (
            <div key={key} className="residuo-card">

    </div>
  );
