// ═══════════════════════ Detalle de Registro ═══════════════════════
function RegistroDetalle({ id, onBack }) {
  const reg = REGISTROS_RECIENTES.find(r => r.id === id);
  if (!reg) {
    return (
      <div className="fadein">
        <Btn onClick={onBack}><Icon name="arrow_l" size={14}/> Volver</Btn>
        <div className="panel" style={{ marginTop: 14, textAlign: 'center', padding: 60, color: 'var(--text-dim)' }}>
          <Icon name="alert" size={24}/>
          <div style={{ marginTop: 8 }}>Registro no encontrado.</div>
        </div>
      </div>
    );
  }

  const [editing, setEditing] = useState(false);
  const [saving, setSaving] = useState(false);
  const [draft, setDraft] = useState(() => (reg.productos || []).map(p => ({ ...p })));

  const productos = editing ? draft : (reg.productos || []);
  const totalVirgen = productos.reduce((a, p) => a + (Number(p.virgen) || 0), 0);
  const totalMolidoUsado = productos.reduce((a, p) => a + (Number(p.molido_usado) || 0), 0);
  const totalMat = totalVirgen + totalMolidoUsado;
  const totalDesecho = productos.reduce((a, p) => a + (Number(p.desecho) || 0), 0);
  const totalDesempEmp = productos.reduce((a, p) => a + (Number(p.desecho_emp) || 0), 0);
  const totalMolidoGen = productos.reduce((a, p) => a + (Number(p.molido_gen) || 0), 0);
  const totalCajas = productos.reduce((a, p) => a + (Number(p.cajas) || 0), 0);
  const mermaPct = totalMat > 0 ? (totalDesecho / totalMat) * 100 : 0;
  const lote = reg.loteNum || reg.lote || `L-${reg.fecha.slice(2).replace(/-/g,'-')}-${String(118 + productos.length).padStart(3,'0')}`;

  const setDraftField = (i, k, v) => {
    setDraft(d => d.map((p, j) => j === i ? { ...p, [k]: v } : p));
  };

  async function guardarEdicion() {
    setSaving(true);
    const payload = { ...reg, productos: draft };
    let res = null;
    try {
      res = await (window._apiUtil?.put?.(`/api/registros/v2/${reg.fecha}`, payload)
        || fetch(`/api/registros/v2/${reg.fecha}`, {
            method: 'PUT', headers: {'Content-Type':'application/json'},
            body: JSON.stringify(payload), credentials: 'same-origin'
          }).then(r => r.ok ? r.json() : { error: 'HTTP '+r.status }));
    } catch(e) { res = { error: e.message }; }
    setSaving(false);
    if (res?.error) { window.solpToast && window.solpToast(res.error, 'bad'); return; }
    // Reflejar en el array inyectado para que el detalle quede consistente
    const idx = REGISTROS_RECIENTES.findIndex(r => r.id === reg.id);
    if (idx >= 0) REGISTROS_RECIENTES[idx] = { ...reg, productos: draft };
    window.solpToast && window.solpToast('Registro actualizado', 'ok');
    setEditing(false);
  }

  async function eliminarRegistro() {
    if (!await window.solpConfirm(`¿Eliminar el registro del ${reg.fecha}? Esta acción no se puede deshacer.`)) return;
    let res = null;
    try {
      res = await (window._apiUtil?.del?.(`/api/registros/v2/${reg.fecha}`)
        || fetch(`/api/registros/v2/${reg.fecha}`, { method:'DELETE', credentials:'same-origin' })
            .then(r => r.ok ? { ok:true } : { error:'HTTP '+r.status }));
    } catch(e) { res = { error: e.message }; }
    if (res?.error) { window.solpToast && window.solpToast(res.error, 'bad'); return; }
    const idx = REGISTROS_RECIENTES.findIndex(r => r.id === reg.id);
    if (idx >= 0) REGISTROS_RECIENTES.splice(idx, 1);
    window.solpToast && window.solpToast('Registro eliminado', 'ok');
    onBack();
  }

  function exportarRegistro() {
    const filas = productos.map(p => {
      const prod = PRODUCTOS_MOCK.find(x => x.id === p.prod_id) || {};
      return {
        fecha: reg.fecha, producto: prod.nombre || p.prod_id,
        cajas: p.cajas || 0, tachos: p.tachos || 0,
        virgen_kg: p.virgen || 0, molido_usado_kg: p.molido_usado || 0,
        desecho_kg: p.desecho || 0, molido_gen_kg: p.molido_gen || 0,
        desecho_emp_u: p.desecho_emp || 0,
      };
    });
    if (window.solpExportCSV) {
      window.solpExportCSV(`registro_${reg.fecha}.csv`,
        ['fecha','producto','cajas','tachos','virgen_kg','molido_usado_kg','desecho_kg','molido_gen_kg','desecho_emp_u'],
        filas);
    } else {
      window.solpToast && window.solpToast('Export no disponible', 'warn');
    }
  }

  const fmtFecha = (ds) => {
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const dt = new Date(`${ds}T00:00:00`);
    const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const [y,m,d] = ds.split('-');
    return `${dias[dt.getDay()]} ${parseInt(d)} de ${meses[parseInt(m)-1]} ${y}`;
  };

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <div className="row" style={{ gap: 8, marginBottom: 6 }}>
            <Btn size="sm" variant="ghost" onClick={onBack}><Icon name="arrow_l" size={12}/> Registros</Btn>
          </div>
          <Eyebrow>Producción · Detalle de jornada</Eyebrow>
          <h1 className="page-title">Registro del <em>{reg.fecha}</em></h1>
          <div className="page-sub">{fmtFecha(reg.fecha)}{reg.obs && <> · {reg.obs}</>}</div>
        </div>
        <div className="row">
          <Chip tone="accent" className="mono">{lote}</Chip>
          {!editing && <Btn variant="ghost" onClick={() => { setDraft((reg.productos||[]).map(p=>({...p}))); setEditing(true); }}><Icon name="edit" size={14}/> Editar</Btn>}
          {editing && <Btn variant="ghost" onClick={() => { setEditing(false); }}>Cancelar</Btn>}
          {editing && <Btn variant="primary" onClick={guardarEdicion} disabled={saving}>{saving ? 'Guardando…' : <><Icon name="check" size={14}/> Guardar</>}</Btn>}
          {!editing && <Btn onClick={exportarRegistro}><Icon name="download" size={14}/> Exportar</Btn>}
          {!editing && <Btn variant="ghost" className="danger" onClick={eliminarRegistro}><Icon name="trash" size={14}/> Eliminar</Btn>}
        </div>
      </div>

      <div className="kpi-grid" style={{ marginBottom: 18 }}>
        <Kpi label="Cajas producidas" icon="box" value={String(totalCajas)} unit="cajas" />
        <Kpi label="Material total" icon="flask" value={totalMat.toFixed(1)} unit="kg"
          delta={`${totalVirgen.toFixed(1)} virgen + ${totalMolidoUsado.toFixed(1)} molido`} />
        <Kpi label="Desecho pieza" icon="trash" value={totalDesecho.toFixed(1)} unit="kg" accent="var(--bad)" />
        <Kpi label="Merma" icon="alert" value={`${mermaPct.toFixed(1)}%`}
          accent={mermaPct > 5 ? 'var(--warn)' : 'var(--good)'}
          delta={totalDesempEmp > 0 ? `+ ${fmtNum(totalDesempEmp)} u descarte empacadora` : undefined} />
      </div>

      <div className="panel panel-flush">
        <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}>
          <PanelHead title="Desglose por producto" sub={`${productos.length} productos registrados`} />
        </div>
        {productos.map((pp, i) => {
          let p;
          if (pp.es_pieza) {
            // Entrada de pieza producida sin armar el producto padre.
            const padre = PRODUCTOS_MOCK.find(x => x.id === pp.producto_padre);
            const pdef = (SUBCOMPONENTES_MOCK[padre?.kind] || []).find(s => s.id === pp.pieza_id);
            p = {
              nombre: `${pdef?.nombre || pp.pieza_id}${pp.fundas ? ' · ' + pp.fundas + ' fund' : ''}`,
              kind: padre?.kind || 'gotero',
              material: `pieza de ${padre?.nombre || pp.producto_padre}`,
              unidades_caja: 0,
            };
          } else {
            p = PRODUCTOS_MOCK.find(x => x.id === pp.prod_id) || { nombre: pp.prod_id, kind: 'vaso', material: '—', unidades_caja: 0 };
          }
          const piezas = pp.es_pieza ? null : (SUBCOMPONENTES_MOCK[p.kind] || null);
          const unitEsperadas = (pp.cajas || 0) * (p.unidades_caja || 0);
          return (
            <div key={i} className="reg-det-row">
              <div className="reg-det-head">
                <ProductIllus kind={p.kind} size={32} color="var(--accent-hi)" />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600 }}>{p.nombre}</div>
                  <div className="xs mute">{p.material} · {fmtNum(unitEsperadas)} unidades esperadas</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  {editing ? (
                    <input className="input mono" type="number" value={pp.cajas || 0}
                      onChange={e => setDraftField(i, 'cajas', parseInt(e.target.value) || 0)}
                      style={{ width: 80, textAlign: 'right' }} />
                  ) : (
                    <div style={{ fontFamily: 'var(--serif)', fontSize: 22 }}>{pp.cajas} <span className="xs mute">cajas</span></div>
                  )}
                  {(pp.tachos || 0) > 0 && !editing && <div className="xs" style={{ color: 'var(--info)' }}>{pp.tachos} tacho{pp.tachos > 1 ? 's' : ''}</div>}
                  {editing && (
                    <div style={{ marginTop: 4 }}>
                      <span className="xs mute">tachos </span>
                      <input className="input mono" type="number" value={pp.tachos || 0}
                        onChange={e => setDraftField(i, 'tachos', parseInt(e.target.value) || 0)}
                        style={{ width: 64, textAlign: 'right' }} />
                    </div>
                  )}
                </div>
              </div>
              <div className="reg-det-grid">
                {[
                  { k: 'virgen', label: 'Virgen', color: undefined },
                  { k: 'molido_usado', label: 'Molido usado', color: 'var(--good)' },
                  { k: 'desecho', label: 'Desecho pieza', color: 'var(--bad)' },
                  { k: 'molido_gen', label: 'Molido generado', color: 'var(--good)', prefix: '+' },
                ].map(f => (
                  <div key={f.k} className="reg-det-stat">
                    <div className="xs mute">{f.label}</div>
                    {editing ? (
                      <input className="input mono" type="number" step="0.1" value={pp[f.k] || 0}
                        onChange={e => setDraftField(i, f.k, parseFloat(e.target.value) || 0)}
                        style={{ width: '100%', fontSize: 14 }} />
                    ) : (
                      <div className="mono" style={{ fontSize: 15, color: f.color }}>{f.prefix || ''}{(Number(pp[f.k]) || 0).toFixed(1)} kg</div>
                    )}
                  </div>
                ))}
                {editing && (
                  <div className="reg-det-stat">
                    <div className="xs mute">Descarte empac. (u)</div>
                    <input className="input mono" type="number" value={pp.desecho_emp || 0}
                      onChange={e => setDraftField(i, 'desecho_emp', parseInt(e.target.value) || 0)}
                      style={{ width: '100%', fontSize: 14 }} />
                  </div>
                )}
                {!editing && (pp.desecho_emp || 0) > 0 && (
                  <div className="reg-det-stat" style={{ borderColor: 'var(--warn)', background: 'var(--warn-soft)' }}>
                    <div className="xs" style={{ color: 'var(--warn)' }}>Descarte empacadora</div>
                    <div className="mono" style={{ fontSize: 15, color: 'var(--warn)' }}>{fmtNum(pp.desecho_emp)} u</div>
                  </div>
                )}
              </div>
              {piezas && pp.subcomp && (
                <div className="reg-det-piezas">
                  <div className="xs mute" style={{ marginBottom: 6 }}>Piezas sueltas registradas</div>
                  <div className="reg-det-piezas-grid">
                    {piezas.map(pc => {
                      const val = pp.subcomp[pc.id] || 0;
                      const diff = val - unitEsperadas;
                      return (
                        <div key={pc.id} className="reg-det-pieza">
                          <div className="xs mute">{pc.nombre}</div>
                          <div className="mono" style={{ fontSize: 14 }}>{fmtNum(val)}</div>
                          {val > 0 && diff !== 0 && (
                            <div className="xs" style={{ color: Math.abs(diff) > unitEsperadas * 0.02 ? 'var(--warn)' : 'var(--text-mute)' }}>
                              {diff > 0 ? '+' : ''}{fmtNum(diff)} vs esperado
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {reg.obs && (
        <div className="panel" style={{ marginTop: 18 }}>
          <Eyebrow>Observaciones</Eyebrow>
          <div style={{ marginTop: 6 }}>{reg.obs}</div>
        </div>
      )}
    </div>
  );
}

Object.assign(window, { RegistroDiario, RegistroWizard, RegistroDetalle });

</script>

<script type="text/babel" data-file="catalogo.jsx">

// Catálogo: Materiales + Productos + Empaques + Gastos fijos en un solo módulo

function Catalogo() {
  const [tab, setTab] = useState('productos');
  const [nuevoTick, setNuevoTick] = useState(0);
  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Producción · Configuración</Eyebrow>
          <h1 className="page-title"><em>Catálogo</em></h1>
          <div className="page-sub">Todo lo que alimenta el cálculo de costos, en un solo lugar. Cambia aquí y se actualiza en todo el sistema.</div>
        </div>
        {tab !== 'gastos' && <Btn variant="primary" onClick={() => setNuevoTick(n => n + 1)}><Icon name="plus" size={14}/> Nuevo</Btn>}
      </div>

      <div className="tabs">
        {[
          { k: 'productos', l: 'Productos',  c: PRODUCTOS_MOCK.length },
          { k: 'materiales',l: 'Materiales', c: MATERIALES_MOCK.length },
          { k: 'empaques',  l: 'Empaques',   c: EMPAQUES_MOCK.length },
          { k: 'gastos',    l: 'Gastos fijos', c: Object.keys(GASTOS_FIJOS_MOCK).length },
        ].map(t => (
          <button key={t.k} className={`tab ${tab === t.k ? 'on' : ''}`} onClick={() => setTab(t.k)}>
            {t.l} <span className="count">{t.c}</span>
          </button>
        ))}
      </div>

      {tab === 'productos' && <TabProductos nuevoTick={nuevoTick} />}
      {tab === 'materiales' && <TabMateriales nuevoTick={nuevoTick} />}
      {tab === 'empaques' && <TabEmpaques nuevoTick={nuevoTick} />}
      {tab === 'gastos' && <TabGastos />}
    </div>
  );
}

function TabProductos({ nuevoTick }) {
  const [items, setItems] = useState(() => PRODUCTOS_MOCK.map(p => ({ ...p })));
  const [sel, setSel] = useState(null);
  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);
  const groups = {};
  items.forEach(p => { (groups[p.kind] = groups[p.kind] || []).push(p); });
  const kindLabel = { vaso: 'Vasos', cuchara: 'Cucharas', gotero: 'Goteros', jeringa: 'Jeringas' };

  function openProd(p) { setSel(p); setForm({ ...p }); }

  React.useEffect(() => {
    if (nuevoTick > 0) {
      const empty = { id: '', kind: 'vaso', nombre: '', unidades_caja: 1000, peso_g: 0, material: '', factor: 1.0, costo_unit: 0, costo_caja: 0, desactivado: false, isNew: true };
      setSel(empty);
      setForm(empty);
    }
  }, [nuevoTick]);

  async function refreshProductos() {
    const fresh = await window._api?.fetchProductos();
    if (Array.isArray(fresh)) {
      setItems(fresh);
      PRODUCTOS_MOCK.length = 0;
      PRODUCTOS_MOCK.push(...fresh);
    }
  }

  async function handleSave() {
    if (!form || !sel) return;
    setSaving(true);
    if (sel.isNew) {
      await window._api?.createProducto(form);
    } else {
      await window._api?.saveProducto(sel.id, form);
    }
    setSaving(false);
    await refreshProductos();
    setSel(null); setForm(null);
  }

  async function handleToggleDesactivado() {
    if (!sel || sel.isNew) return;
    const nuevoEstado = !sel.desactivado;
    const ok = await window._api?.setDesactivado('productos', sel.id, nuevoEstado);
    if (!ok) { alert('Error cambiando estado.'); return; }
    setItems(list => list.map(p => p.id === sel.id ? { ...p, desactivado: nuevoEstado } : p));
    const idx = PRODUCTOS_MOCK.findIndex(p => p.id === sel.id);
    if (idx >= 0) PRODUCTOS_MOCK[idx].desactivado = nuevoEstado;
    setSel(null); setForm(null);
  }

  async function handleEliminar() {
    if (!sel || sel.isNew) return;
    if (!await window.solpConfirm(`¿Eliminar definitivamente "${sel.nombre}"?\n\nSolo se permite si no tiene lotes activos, facturas ni OC pendientes. Si los tiene, usa Desactivar.`)) return;
    let res = null;
    try {
      res = await (window._apiUtil?.del?.(`/api/productos/${sel.id}`)
        || fetch(`/api/productos/${encodeURIComponent(sel.id)}`, { method: 'DELETE', credentials: 'same-origin' })
            .then(r => r.ok ? { ok: true } : r.json()));
    } catch (e) { res = { error: e.message }; }
    if (res?.error) { window.solpToast ? window.solpToast(res.error, 'bad') : alert(res.error); return; }
    setItems(list => list.filter(p => p.id !== sel.id));
    const idx = PRODUCTOS_MOCK.findIndex(p => p.id === sel.id);
    if (idx >= 0) PRODUCTOS_MOCK.splice(idx, 1);
    window.solpToast && window.solpToast('Producto eliminado', 'ok');
    setSel(null); setForm(null);
  }

  return (
    <>
      {Object.entries(groups).map(([kind, items]) => (
        <div key={kind} style={{ marginBottom: 24 }}>
          <Eyebrow>{kindLabel[kind] || kind}</Eyebrow>
          <div className="prod-grid">
            {items.map(p => (
              <button key={p.id} className="prod-card static" onClick={() => openProd(p)} style={p.desactivado ? { opacity: 0.55, filter: 'grayscale(1)' } : {}}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
                  <ProductIllus kind={p.kind} size={42} />
                  {p.desactivado ? <Chip tone="bad">DESACTIVADO</Chip> : <Chip>{fmtNum(p.unidades_caja)} u/caja</Chip>}
                </div>
                <div style={{ fontWeight: 600, marginTop: 10 }}>{p.nombre}</div>
                <div className="xs mute" style={{ marginBottom: 12 }}>{p.peso_g} g · factor {p.factor}x</div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', paddingTop: 12, borderTop: '1px dashed var(--line)' }}>
                  <span className="xs mute">costo unitario</span>
                  <strong style={{ fontFamily: 'var(--serif)', fontSize: 18, color: 'var(--accent-hi)' }}>${p.costo_unit.toFixed(4)}</strong>
                </div>
              </button>
            ))}
          </div>
        </div>
      ))}
      <Drawer open={!!sel} onClose={() => { setSel(null); setForm(null); }} title={sel?.nombre}
        footer={<div className="row" style={{ justifyContent: 'space-between', width: '100%' }}>
          {!sel?.isNew && (
            <div className="row" style={{ gap: 6 }}>
              <Btn variant="ghost" className="danger" onClick={handleToggleDesactivado}>{sel?.desactivado ? 'Reactivar' : 'Desactivar'}</Btn>
              <Btn variant="ghost" className="danger" onClick={handleEliminar}><Icon name="trash" size={13}/> Eliminar</Btn>
            </div>
          )}
          <div className="row" style={{ marginLeft: 'auto', gap: 8 }}>
            <Btn onClick={() => { setSel(null); setForm(null); }}>Cancelar</Btn>
            <Btn variant="primary" onClick={handleSave} disabled={saving}>{saving ? 'Guardando…' : 'Guardar'}</Btn>
          </div>
        </div>}>
        {sel && form && <ProductEditor form={form} setForm={setForm} sel={sel} />}
      </Drawer>
    </>
  );
}

function ProductEditor({ form, setForm, sel }) {
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const [qcTab, setQcTab] = useState('ficha'); // ficha | receta | qc
  const hasPiezas = ['jeringa','gotero'].includes(sel.kind);
  // Receta y QC: leer del backend (window.BOM, window.QC_TPL) con fallback al mock
  const bomInicial = (window.BOM && window.BOM[sel.id]) || null;
  const qcInicial = (window.QC_TPL && window.QC_TPL[sel.id]) || QC_TEMPLATES_MOCK[sel.id] || null;
  const recetaInicial = RECETAS_MOCK[sel.id] || null;
  const clienteAsoc = PRODUCTO_CLIENTE_MOCK[sel.id] || '';
  const [clienteId, setClienteId] = useState(clienteAsoc);
  const [qcParams, setQcParams] = useState(() => qcInicial?.parametros ? [...qcInicial.parametros] : []);
  const [recetaPiezas, setRecetaPiezas] = useState(() => {
    if (bomInicial && typeof bomInicial === 'object') {
      return Object.entries(bomInicial).map(([pid, cant]) => ({
        pieza_id: pid, nombre: pid, cantidad: Number(cant) || 0,
      }));
    }
    return recetaInicial?.piezas ? [...recetaInicial.piezas] : [];
  });

  const updateQcParam = (i, k, v) => {
    const arr = [...qcParams]; arr[i] = { ...arr[i], [k]: v }; setQcParams(arr);
  };

  // Autosave QC y BOM con debounce (igual que en chunk previo, lo perdimos en v4)
  React.useEffect(() => {
    if (sel.isNew || !window._apiUtil) return;
    const t = setTimeout(() => {
      const r = window._apiUtil.put('/api/qc/' + encodeURIComponent(sel.id), { parametros: qcParams });
      if (r && r.catch) r.catch(e => console.error('saveQc', e));
    }, 800);
    return () => clearTimeout(t);
  }, [qcParams, sel.id, sel.isNew]);

  React.useEffect(() => {
    if (sel.isNew || !window._apiUtil || !hasPiezas) return;
    const t = setTimeout(() => {
      const bom = {};
      recetaPiezas.forEach(p => { if (p.pieza_id) bom[p.pieza_id] = p.cantidad; });
      const r = window._apiUtil.put('/api/bom/' + encodeURIComponent(sel.id), bom);
      if (r && r.catch) r.catch(e => console.error('saveBom', e));
    }, 800);
    return () => clearTimeout(t);
  }, [recetaPiezas, sel.id, sel.isNew, hasPiezas]);

  return (
    <div>
      {/* Header */}
      <div style={{ display:'flex', gap:16, marginBottom:20, alignItems:'center' }}>
        <div style={{ padding:16, background:'var(--bg-raised)', borderRadius:'var(--radius-lg)', border:'1px solid var(--line)' }}>
          <ProductIllus kind={sel.kind} size={64} />
        </div>
        <div>
          <Eyebrow>Producto · {sel.kind}</Eyebrow>
          <div style={{ fontFamily:'var(--serif)', fontSize:22 }}>{form.nombre || 'Nuevo producto'}</div>
          <div className="xs mute">{sel.material}</div>
          {clienteId && <Chip tone="info" style={{ marginTop:6 }}>{CLIENTES_MOCK.find(c=>c.id===clienteId)?.nombre_comercial}</Chip>}
        </div>
      </div>

      {/* Sub-tabs */}
      <div className="tabs" style={{ marginBottom:16 }}>
        <button className={`tab ${qcTab==='ficha'?'on':''}`} onClick={()=>setQcTab('ficha')}>Ficha</button>
        {hasPiezas && <button className={`tab ${qcTab==='receta'?'on':''}`} onClick={()=>setQcTab('receta')}>Receta <span className="count">{recetaPiezas.length}</span></button>}
        <button className={`tab ${qcTab==='qc'?'on':''}`} onClick={()=>setQcTab('qc')}>Control Calidad <span className="count">{qcParams.length}</span></button>
      </div>

      {/* Ficha */}
      {qcTab === 'ficha' && (
        <div>
          <div className="cols-2">
            <Input label="Nombre" value={form.nombre} onChange={e => set('nombre', e.target.value)} />
            <Input label="Unidades por caja" type="number" value={form.unidades_caja} onChange={e => set('unidades_caja', parseInt(e.target.value)||0)} />
            <Input label="Peso por unidad (g)" type="number" step="0.001" value={form.peso_g} onChange={e => set('peso_g', parseFloat(e.target.value)||0)} />
            <Input label="Factor mano de obra" type="number" step="0.1" value={form.factor} onChange={e => set('factor', parseFloat(e.target.value)||1)} hint="Jeringas: mayor tiempo-máquina" />
          </div>
          {/* IVA */}
          <div className="field" style={{ marginTop:8 }}>
            <label>IVA del producto <span className="xs mute">(0% exento · 5% reducido · 15% estándar)</span></label>
            <Seg value={String(form.iva_pct ?? 0)} onChange={v => set('iva_pct', Number(v))}
              options={[{value:'0',label:'0% Exento'},{value:'5',label:'5% Reducido'},{value:'15',label:'15% Estándar'}]} />
            <div className="xs mute" style={{ marginTop:4 }}>
              {(form.iva_pct??0)===0 && 'La mayoría de envases Solplast es exento (art. 55 LORTI)'}
              {(form.iva_pct??0)===15 && 'Aplica a vasos Life (Lamosan) y similares cotizados con IVA'}
            </div>
          </div>

          {/* Cliente asociado */}
          <div className="field" style={{ marginTop:8 }}>
            <label>Cliente asociado <span className="xs mute">(opcional — deja vacío si es genérico)</span></label>
            <select className="select" value={clienteId} onChange={e => setClienteId(e.target.value)}>
              <option value="">— Sin cliente específico (producto genérico)</option>
              {CLIENTES_MOCK.map(c => <option key={c.id} value={c.id}>{c.nombre_comercial} · {c.razon_social}</option>)}

function TabGastos() {
  const [gastos, setGastos] = useState({ ...GASTOS_FIJOS_MOCK });
  const [desactivados, setDesactivados] = useState(() => new Set(GASTOS_DESACTIVADOS));
  const [saving, setSaving] = useState(false);
  const period = new Date().toISOString().slice(0, 7);

  const items = [
    { k: 'electricidad',  l: 'Electricidad',  icon: 'flame' },
    { k: 'agua',          l: 'Agua',          icon: 'flask' },
    { k: 'tinta',         l: 'Tinta',         icon: 'edit' },
    { k: 'tinner',        l: 'Tinner',        icon: 'flask' },
    { k: 'solvente',      l: 'Solvente',      icon: 'flask' },
    { k: 'transporte',    l: 'Transporte',    icon: 'box' },
    { k: 'mantenimiento', l: 'Mantenimiento', icon: 'settings' },
  ];

  const total = items.reduce((a, it) => desactivados.has(it.k) ? a : a + (gastos[it.k] || 0), 0);

  async function handleSave() {
    setSaving(true);
    await window._api?.saveGastos(period, gastos);
    setSaving(false);
  }

  async function toggleDesact(key) {
    const nuevo = !desactivados.has(key);
    const ok = await window._api?.setGastoDesactivado(period, key, nuevo);
    if (!ok) { alert('Error cambiando estado.'); return; }
    setDesactivados(s => {
      const ns = new Set(s);
      if (nuevo) ns.add(key); else ns.delete(key);
      return ns;
    });
  }

  return (
    <>
      <div className="panel" style={{ marginBottom: 16, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div>
          <Eyebrow>Total mensual activo</Eyebrow>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 40, letterSpacing: '-0.02em' }}>{fmtMoney(total)}</div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 10 }}>
          <div className="xs mute" style={{ maxWidth: 280, textAlign: 'right' }}>Estos gastos se prorratean entre todas las unidades producidas para obtener el componente "gastos fijos" del costo unitario.</div>
          <Btn variant="primary" onClick={handleSave} disabled={saving}>{saving ? 'Guardando…' : 'Guardar gastos'}</Btn>
        </div>
      </div>
      <div className="gasto-grid">
        {items.map(it => {
          const off = desactivados.has(it.k);
          return (
            <div key={it.k} className="gasto-card" style={{ position: 'relative', ...(off ? { opacity: 0.55, filter: 'grayscale(1)' } : {}) }}>
              <div className="ico"><Icon name={it.icon} size={14}/></div>
              <div style={{ flex: 1 }}>
                <div>{it.l}</div>
                {off && <Chip tone="bad" style={{ marginTop: 4 }}>DESACTIVADO</Chip>}
              </div>
              <input className="input num-input" type="number" value={gastos[it.k]} disabled={off} onChange={e => setGastos(g => ({ ...g, [it.k]: parseFloat(e.target.value) || 0 }))} />
              <span className="unit">/mes</span>
              <button
                onClick={() => toggleDesact(it.k)}
                title={off ? 'Reactivar' : 'Desactivar'}
                style={{ background: 'transparent', border: '1px solid var(--line)', borderRadius: 6, padding: '4px 6px', cursor: 'pointer', color: off ? 'var(--good)' : 'var(--bad)', display: 'inline-flex', alignItems: 'center', marginLeft: 6 }}
              >
                <Icon name={off ? 'check' : 'x'} size={12} strokeWidth={3}/>
              </button>
            </div>
          );
        })}
      </div>
    </>
  );
}

<script type="text/babel" data-file="costos.jsx">

// Costos — breakdown + evolución + comparador
function Costos() {
  const [sel, setSel] = useState(PRODUCTOS_MOCK[0].id);
  const [view, setView] = useState('detalle');
  const prod = PRODUCTOS_MOCK.find(p => p.id === sel);

  const nominaMes = (NOMINA_HISTORICA[NOMINA_HISTORICA.length - 1]?.total) || 0;
  const gastosFijos = Object.values(GASTOS_FIJOS_MOCK).reduce((a, b) => a + b, 0);
  const totalUnits = PRODUCCION_MES.reduce((a, p) => a + p.unidades, 0);

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Producción · Análisis</Eyebrow>
          <h1 className="page-title">Costos <em>por producto</em></h1>
          <div className="page-sub">Costo unitario real, con descomposición completa: material, empaques, nómina prorrateada y gastos fijos.</div>
        </div>
        <Seg options={[{ value: 'detalle', label: 'Detalle' }, { value: 'comparar', label: 'Comparar' }, { value: 'evolucion', label: 'Evolución' }]} value={view} onChange={setView} />
      </div>

      {view === 'detalle' && <VistaDetalle prod={prod} sel={sel} setSel={setSel} nominaMes={nominaMes} gastosFijos={gastosFijos} totalUnits={totalUnits} />}
      {view === 'comparar' && <VistaComparar />}
      {view === 'evolucion' && <VistaEvolucion />}
    </div>
  );
}

function VistaDetalle({ prod, sel, setSel, nominaMes, gastosFijos, totalUnits }) {
  const [inclNomina, setInclNomina] = useState(true);
  const [inclGastos, setInclGastos] = useState(true);
  const [usarMermaReal, setUsarMermaReal] = useState(false);
  const matCost = prod.costo_unit * 0.55;
  const empCost = prod.costo_unit * 0.15;
  const nomCost = prod.costo_unit * 0.22;

function CostDonut({ parts }) {
  const total = parts.reduce((a,b)=>a+b.v,0);
  const size = 180, r = 70, cx = 100, cy = 100, strokeW = 22;
  let cum = 0;
  const circ = 2 * Math.PI * r;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 20, flexWrap: 'wrap' }}>
      <svg width={200} height={size}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--line)" strokeWidth={strokeW} />
        {parts.map((p, i) => {
          const frac = p.v / total;
          const dash = frac * circ;
          const off = -cum * circ;
          cum += frac;
          return (
            <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={p.c} strokeWidth={strokeW}
              strokeDasharray={`${dash} ${circ - dash}`} strokeDashoffset={off}
              transform={`rotate(-90 ${cx} ${cy})`} />
          );
        })}
        <text x={cx} y={cy - 4} textAnchor="middle" fontSize="10" fill="var(--text-mute)">Total</text>
        <text x={cx} y={cy + 14} textAnchor="middle" fontFamily="var(--serif)" fontSize="20" fill="var(--text)">${total.toFixed(4)}</text>
      </svg>
      <div style={{ flex: 1 }}>
        {parts.map(p => (
          <div key={p.k} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '6px 0' }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: p.c }} />
            <span style={{ flex: 1, fontSize: 13 }}>{p.k}</span>
            <span className="mono xs">${p.v.toFixed(4)}</span>
            <span className="xs mute" style={{ width: 40, textAlign: 'right' }}>{((p.v/total)*100).toFixed(0)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function VistaComparar() {
  const [ids, setIds] = useState(['v_life', 'j_life', 'gotero']);
  const items = PRODUCTOS_MOCK.filter(p => ids.includes(p.id));
  const max = Math.max(...items.map(p => p.costo_unit));
  return (

        <div className="row wrap" style={{ marginTop: 10 }}>

            <button key={p.id} className={`pp-toggle ${ids.includes(p.id) ? 'on' : ''}`} onClick={() => setIds(ids.includes(p.id) ? ids.filter(x => x !== p.id) : [...ids, p.id])}>

          ))}

      </div>

      <div className="panel">
        <PanelHead title="Comparación" sub="Costo unitario y composición lado a lado" />
        {items.map(p => (
          <div key={p.id} style={{ marginBottom: 18 }}>
            <div className="row" style={{ justifyContent: 'space-between', marginBottom: 6 }}>
              <div className="row">
                <ProductIllus kind={p.kind} size={22} />
                <strong>{p.nombre}</strong>
              </div>
              <span className="mono" style={{ fontFamily: 'var(--serif)', fontSize: 18 }}>${p.costo_unit.toFixed(4)}</span>
            </div>
            <div className="compare-bar">
              <div style={{ flex: 55, background: 'var(--accent)' }} title="Material"/>
              <div style={{ flex: 22, background: 'var(--info)' }} title="Nómina"/>
              <div style={{ flex: 15, background: 'var(--good)' }} title="Empaque"/>
              <div style={{ flex: 8, background: 'var(--warn)' }} title="Gastos"/>

            </div>
          </div>
        ))}
        <div className="legend-row">
          <span><span className="sw" style={{background:'var(--accent)'}}/> Material</span>
          <span><span className="sw" style={{background:'var(--info)'}}/> Nómina</span>
          <span><span className="sw" style={{background:'var(--good)'}}/> Empaque</span>
          <span><span className="sw" style={{background:'var(--warn)'}}/> Gastos fijos</span>
        </div>
      </div>
    </>
  );
}

function VistaEvolucion() {
  const prods = Object.keys(COSTOS_EVOLUCION);
  const series = prods.map((p, i) => ({ data: COSTOS_EVOLUCION[p], color: ['var(--accent)', 'var(--info)', 'var(--warn)', 'var(--good)'][i] }));
  return (
    <div className="panel">
      <PanelHead title="Evolución del costo unitario" sub="Últimos 8 meses · principales productos" />

<script type="text/babel" data-file="empleados.jsx">

// Empleados — grid de tarjetas + drawer lateral de edición

const EMPTY_EMP = {
  id: 'nuevo', nombre: '', cargo: '', iniciales: '··',
  color: 'var(--accent-soft)', salario: 470, transporte: 1.5, horas_base: 8,
  region: 'Sierra/Amazonia', fondos_reserva: false, prestamo_iess: 0, isNew: true,
};

function Empleados() {
  const [allItems, setAllItems] = useState(() => EMPLEADOS_MOCK.map(e => ({ ...e })));
  const [sel, setSel] = useState(null);
  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);
  const [q, setQ] = useState('');
  const items = allItems.filter(e => e.nombre.toLowerCase().includes(q.toLowerCase()));

  function openEmp(e) { setSel(e); setForm({ ...e }); }

  async function refresh() {
    const fresh = await window._api?.fetchEmpleados();
    if (Array.isArray(fresh)) {
      const visibles = fresh.filter(e => !e.ocultar);
      setAllItems(visibles);
      EMPLEADOS_MOCK.length = 0;
      EMPLEADOS_MOCK.push(...visibles);
    }
    await window._api?.refreshNomina();
  }

  async function handleSave() {
    if (!form) return;
    setSaving(true);
    let ok;
    if (form.isNew) {
      ok = await window._api?.createEmpleado(form);
    } else {
      ok = await window._api?.saveEmpleado(sel.id, form);
    }
    setSaving(false);
    if (ok !== false) {
      await refresh();
      setSel(null); setForm(null);
    } else {
      alert('Error guardando.');
    }
  }

  async function handleDelete() {
    if (!sel || sel.isNew) return;
    if (!confirm(`¿Desactivar a ${sel.nombre}? Se eliminará de la nómina.`)) return;
    await window._api?.deleteEmpleado(sel.id);
    await refresh();
    setSel(null); setForm(null);
  }

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Personal · Configuración</Eyebrow>

              <input className="input" style={{ paddingLeft: 32 }} placeholder="Buscar..." value={q} onChange={e => setQ(e.target.value)} />
            </div>
          </div>
          <Btn variant="primary" onClick={() => openEmp(EMPTY_EMP)}><Icon name="plus" size={14}/> Nuevo empleado</Btn>
        </div>
      </div>

      <div className="emp-grid">
        {items.map(e => (
          <button key={e.id} className="emp-card" onClick={() => openEmp(e)}>
            <div style={{ display: 'flex', gap: 14, alignItems: 'center', marginBottom: 14 }}>
              <div className="avatar" style={{ background: e.color, width: 44, height: 44, fontSize: 14 }}>{e.iniciales}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600 }}>{e.nombre}</div>
                <div className="xs mute">{e.cargo}</div>
              </div>
            </div>
            <div className="emp-meta">
              <div><span className="mute">Salario</span><strong className="mono">{fmtMoney(e.salario, 0)}</strong></div>
              <div><span className="mute">Transporte</span><strong className="mono">{fmtMoney(e.transporte)}</strong></div>
              <div><span className="mute">Horas/día</span><strong className="mono">{e.horas_base}h</strong></div>
            </div>
            <div className="row" style={{ marginTop: 12, flexWrap: 'wrap', gap: 4 }}>
              {e.fondos_reserva && <Chip tone="good">Fondos reserva</Chip>}
              {e.prestamo_iess > 0 && <Chip tone="warn">Préstamo IESS</Chip>}
              <Chip>{e.region.split('/')[0]}</Chip>
            </div>
          </button>
        ))}
      </div>

      <Drawer open={!!sel} onClose={() => { setSel(null); setForm(null); }} title={sel?.isNew ? 'Nuevo empleado' : sel?.nombre}
        footer={<div className="row" style={{ justifyContent: 'space-between', width: '100%' }}>
          {!sel?.isNew && <Btn variant="ghost" className="danger" onClick={handleDelete}>Desactivar</Btn>}
          <div className="row" style={{ marginLeft: 'auto' }}>
            <Btn onClick={() => { setSel(null); setForm(null); }}>Cancelar</Btn>
            <Btn variant="primary" onClick={handleSave} disabled={saving}>{saving ? 'Guardando…' : sel?.isNew ? 'Crear empleado' : 'Guardar'}</Btn>
          </div>
        </div>}>
        {sel && form && <EmpEditor form={form} setForm={setForm} sel={sel} />}
      </Drawer>
    </div>
  );
}

        <Select label="Región (para 14to)" value={form.region} onChange={v => set('region', v)} options={['Sierra/Amazonia', 'Costa/Galápagos']} />
      </div>

      <Eyebrow style={{ marginTop: 20 }}>Valores por defecto del mes</Eyebrow>
      <div style={{ background: 'var(--bg-raised)', border: '1px solid var(--line)', borderRadius: 'var(--radius-md)', padding: 14 }}>
        <div className="xs mute" style={{ marginBottom: 10 }}>
          Estos se aplican a cada mes nuevo como base. Puedes ajustarlos por mes en "Revisar horas" sin cambiar el default.
        </div>
        <div className="cols-2" style={{ gap: 10 }}>
          <Input label="Transporte por día" type="number" step="0.5" value={form.transporte} onChange={e => set('transporte', parseFloat(e.target.value) || 0)} />
          <Input label="Préstamo IESS" type="number" step="0.01" value={form.prestamo_iess} onChange={e => set('prestamo_iess', parseFloat(e.target.value) || 0)} />
        </div>
        <div style={{ marginTop: 10 }}>
          <Check checked={form.descuento_iess !== false} onChange={v => set('descuento_iess', v)}>Aporte IESS 9.45%</Check>
        </div>
        <div style={{ marginTop: 6 }}>
          <Check checked={form.fondos_reserva} onChange={v => set('fondos_reserva', v)}>Recibe fondos de reserva (8.33%)</Check>
        </div>
      </div>

      {!form.isNew && <>
      <Eyebrow style={{ marginTop: 20 }}>Resumen último mes</Eyebrow>
      <div style={{ background: 'var(--bg-raised)', border: '1px solid var(--line)', borderRadius: 'var(--radius-md)', padding: 14, display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>

          <div className="xs mute">Horas extras pagadas</div>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 20, color: 'var(--warn)' }}>{empData ? `${(empData.h50 + empData.h100).toFixed(1)}h` : '—'}</div>

        <div>
          <div className="xs mute">Banco compensatorias</div>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 20, color: (BANCO_POR_EMP[sel.id] || 0) >= 0 ? 'var(--good)' : 'var(--bad)' }}>{((BANCO_POR_EMP[sel.id] || 0)).toFixed(1)}h</div>
        </div>
        <div>
          <div className="xs mute">Total cobrado</div>
          <div style={{ fontFamily: 'var(--serif)', fontSize: 20, color: 'var(--accent-hi)' }}>{empData ? fmtMoney(empData.total) : '—'}</div>
        </div>
      </div>
      </>}
    </div>
  );
}

Object.assign(window, { Empleados });


</script>

<script type="text/babel" data-file="inventario.jsx">

// Inventario — v2 con piezas sueltas, molido segregado, mat. auxiliar y panorámica

  const [showMov, setShowMov] = useState(false);

  const tabs = [
    { k: 'resumen',  l: 'Resumen',         ico: 'chart'   },
    { k: 'mp',       l: 'Materia prima',   ico: 'flask'   },
    { k: 'pt',       l: 'Producto term.',  ico: 'package' },

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Inventario</Eyebrow>
          <h1 className="page-title">Inventario <em>en tiempo real</em></h1>
          <div className="page-sub">Stock completo: materia prima, producto terminado, piezas sueltas, molido segregado y material auxiliar.</div>
        </div>
        <div className="row">
          <Btn variant="ghost"><Icon name="download" size={14}/> Exportar</Btn>
          <Btn variant="primary" onClick={() => setShowMov(true)}><Icon name="plus" size={14}/> Movimiento</Btn>

      {showMov && <NuevoMovimientoModal onClose={() => setShowMov(false)} onSaved={() => { setShowMov(false); setTab('mov'); }} />}

        ))}

      {tab === 'resumen'  && <InvResumen />}

      {tab === 'molido'   && <InvMolido />}
      {tab === 'aux'      && <InvMaterialAux />}

      {tab === 'mov'      && <InvMovimientos />}

// ═══════════════════ Resumen ═══════════════════
function InvResumen() {
  const mpBajos = INVENTARIO_MP_MOCK.filter(x => x.stock_kg <= x.minimo_kg);
  const ptBajos = INVENTARIO_PT_MOCK.filter(x => (x.stock_cajas - x.reservado) <= x.minimo_cajas);
  const auxBajos = INVENTARIO_AUX_MOCK.filter(x => x.stock <= x.minimo);
  const totalKg = INVENTARIO_MP_MOCK.reduce((a, x) => a + x.stock_kg, 0);
  const totalCajas = INVENTARIO_PT_MOCK.reduce((a, x) => a + x.stock_cajas, 0);
  const valorMP = INVENTARIO_MP_MOCK.reduce((a, x) => a + x.stock_kg * x.costo_prom_kg, 0);
  const valorPT = INVENTARIO_PT_MOCK.reduce((a, x) => {
    const p = PRODUCTOS_MOCK.find(q => q.id === x.prod_id);
    return a + x.stock_cajas * (p?.costo_caja || 0);
  }, 0);
  const totalMolido = INVENTARIO_MOLIDO_MOCK.reduce((a, x) => a + x.kg, 0);
  const totalAlertas = mpBajos.length + ptBajos.length + auxBajos.length;

  return (
    <>
      <div className="kpi-grid" style={{ marginBottom: 18 }}>
        <Kpi label="Materia prima"    icon="flask"   value={`${fmtNum(totalKg,1)} kg`} delta={fmtMoney(valorMP)} />
        <Kpi label="Producto terminado" icon="package" value={`${totalCajas} cajas`} delta={fmtMoney(valorPT)} />
        <Kpi label="Molido disponible" icon="flame"  value={`${totalMolido.toFixed(1)} kg`} accent="var(--good)" />
        <Kpi label="Alertas de stock"  icon="alert"  value={String(totalAlertas)} accent={totalAlertas ? 'var(--bad)' : 'var(--good)'} />
      </div>

      {totalAlertas > 0 && (
        <div className="panel panel-flush" style={{ marginBottom: 18 }}>
          <div style={{ padding: '14px 18px', borderBottom: '1px solid var(--line)' }}>
            <PanelHead title="Alertas de stock" sub="Items bajo el mínimo configurado" />
          </div>
          {mpBajos.map(m => {
            const mat = MATERIALES_MOCK.find(x => x.id === m.id);
            return (<div key={m.id} className="list-row"><div className="ico" style={{ background:'var(--bad-soft)',color:'var(--bad)' }}><Icon name="flask" size={14}/></div><div className="body"><div className="ttl">{mat?.nombre}</div><div className="cap">{fmtNum(m.stock_kg)} kg · mínimo {m.minimo_kg} kg</div></div><Chip tone="bad">MP baja</Chip></div>);
          })}
          {ptBajos.map(p => {
            const prod = PRODUCTOS_MOCK.find(x => x.id === p.prod_id);
            return (<div key={p.prod_id} className="list-row"><div className="ico" style={{ background:'var(--warn-soft)',color:'var(--warn)' }}><Icon name="package" size={14}/></div><div className="body"><div className="ttl">{prod?.nombre}</div><div className="cap">Disponible {p.stock_cajas - p.reservado} cajas · mínimo {p.minimo_cajas}</div></div><Chip tone="warn">PT bajo</Chip></div>);
          })}
          {auxBajos.map(a => (
            <div key={a.id} className="list-row"><div className="ico" style={{ background:'var(--info-soft)',color:'var(--info)' }}><Icon name="box" size={14}/></div><div className="body"><div className="ttl">{a.nombre}</div><div className="cap">{a.stock} {a.unidad} · mínimo {a.minimo}</div></div><Chip tone="info">Auxiliar</Chip></div>
          ))}
        </div>
      )}

      <div className="cols-2" style={{ gap: 18 }}>
        <div className="panel panel-flush">
          <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}><PanelHead title="Materia prima" sub="Stock vs. mínimo" /></div>
          <div style={{ padding: 14 }}>
            {INVENTARIO_MP_MOCK.map(m => {
              const mat = MATERIALES_MOCK.find(x => x.id === m.id);
              const pct = Math.min(100, (m.stock_kg / (m.minimo_kg * 2)) * 100);
              const tone = m.stock_kg <= m.minimo_kg ? 'var(--bad)' : m.stock_kg <= m.minimo_kg * 1.5 ? 'var(--warn)' : 'var(--good)';
              return (<div key={m.id} style={{ marginBottom: 14 }}><div className="row" style={{ justifyContent:'space-between', marginBottom:5 }}><span style={{ fontSize:13, fontWeight:500 }}>{mat?.nombre}</span><span className="mono xs">{fmtNum(m.stock_kg)} kg</span></div><div style={{ height:6, background:'var(--bg-raised)', borderRadius:3, overflow:'hidden' }}><div style={{ height:'100%', width:`${pct}%`, background:tone, transition:'width .3s' }}/></div></div>);
            })}
          </div>
        </div>
        <div className="panel panel-flush">
          <div style={{ padding: 18, borderBottom: '1px solid var(--line)' }}><PanelHead title="Molido por origen" sub="Disponible en bin" /></div>
          <div style={{ padding: 14 }}>
            {INVENTARIO_MOLIDO_MOCK.map(m => (
              <div key={m.id} className="row" style={{ justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid var(--line)' }}>
                <div className="row" style={{ gap: 8 }}>
                  <div style={{ width:10, height:10, borderRadius:'50%', background: m.color }}/>
                  <div>{m.origen}{m.producto && <span className="xs mute"> ({PRODUCTOS_MOCK.find(p=>p.id===m.producto)?.nombre})</span>}</div>
                </div>
                <div className="mono" style={{ fontWeight:600, color:'var(--good)' }}>{m.kg.toFixed(1)} kg</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

// ═══════════════════ Materia Prima ═══════════════════
function InvMateriaPrima() {
  const [items, setItems] = useState(() => INVENTARIO_MP_MOCK.map(m => ({ ...m })));
  const [editStock, setEditStock] = useState({});

  const toggleDesact = (id) => setItems(prev => prev.map(m => m.id === id ? { ...m, desactivado: !m.desactivado } : m));
  const saveStock = (id) => {
    const v = parseFloat(editStock[id]);
    if (!isNaN(v)) setItems(prev => prev.map(m => m.id === id ? { ...m, stock_kg: v } : m));
    setEditStock(e => { const n = {...e}; delete n[id]; return n; });
  };

  return (
    <div className="panel panel-flush">
      <table className="tbl tbl-hover">
        <thead><tr><th>Material</th><th className="num">Stock (kg)</th><th className="num">Mínimo</th><th className="num">Costo/kg</th><th className="num">Valor total</th><th>Última entrada</th><th>Estado</th><th></th></tr></thead>
        <tbody>
          {items.map(m => {
            const mat = MATERIALES_MOCK.find(x => x.id === m.id);
            const bajo = m.stock_kg <= m.minimo_kg;
            const alerta = m.stock_kg <= m.minimo_kg * 1.5;
            const editing = editStock[m.id] !== undefined;
            return (
              <tr key={m.id} style={{ opacity: m.desactivado ? 0.5 : 1 }}>
                <td><div className="row" style={{ gap:8 }}><div style={{ width:10,height:10,borderRadius:'50%',background:mat?.color,flexShrink:0 }}/><div style={{ fontWeight:600 }}>{mat?.nombre}</div></div></td>
                <td className="num">
                  {editing ? (
                    <div className="row" style={{ gap:4, justifyContent:'flex-end' }}>
                      <input className="input mono" type="number" step="0.1" autoFocus value={editStock[m.id]}
                        onChange={e => setEditStock(s=>({...s,[m.id]:e.target.value}))}
                        onBlur={() => saveStock(m.id)}
                        onKeyDown={e => { if(e.key==='Enter') saveStock(m.id); if(e.key==='Escape') setEditStock(s=>{const n={...s};delete n[m.id];return n;}); }}
                        style={{ width:72, padding:'3px 6px', textAlign:'right' }}/>
                      <Btn size="sm" variant="primary" onClick={() => saveStock(m.id)}><Icon name="check" size={11}/></Btn>
                    </div>
                  ) : (
                    <span className="mono" style={{ cursor:'pointer', borderBottom:'1px dashed var(--line)' }} title="Click para editar"
                      onClick={() => setEditStock(s=>({...s,[m.id]:String(m.stock_kg)}))}>
                      {fmtNum(m.stock_kg,1)}
                    </span>
                  )}
                </td>
                <td className="num mono xs mute">{m.minimo_kg}</td>
                <td className="num mono">{fmtMoney(m.costo_prom_kg)}</td>
                <td className="num mono">{fmtMoney(m.stock_kg * m.costo_prom_kg)}</td>
                <td className="mono xs">{m.ultima_entrada}</td>
                <td>{m.desactivado ? <Chip tone="bad">Desactivado</Chip> : bajo ? <Chip tone="bad">Bajo mín.</Chip> : alerta ? <Chip tone="warn">Cercano</Chip> : <Chip tone="good">OK</Chip>}</td>
                <td><Btn size="sm" variant="ghost" title={m.desactivado?'Reactivar':'Desactivar'} onClick={()=>toggleDesact(m.id)}><Icon name={m.desactivado?'check':'x'} size={12}/></Btn></td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <div style={{ padding:'8px 18px', borderTop:'1px solid var(--line)', fontSize:11.5, color:'var(--text-mute)' }}>
        <Icon name="edit" size={11}/> Click en el stock para editar · X para desactivar
      </div>
    </div>
  );
}

// ═══════════════════ Producto Terminado (con lotes) ═══════════════════
function InvProductoTerminado() {
  const [expandido, setExpandido] = useState(null);
  const [items, setItems] = useState(() => INVENTARIO_PT_MOCK.map(p => ({ ...p })));
  const [editCajas, setEditCajas] = useState({});

  const toggleDesact = (pid) => setItems(prev => prev.map(p => p.prod_id === pid ? { ...p, desactivado: !p.desactivado } : p));
  const saveCajas = (pid) => {
    const v = parseInt(editCajas[pid]);
    if (!isNaN(v)) setItems(prev => prev.map(p => p.prod_id === pid ? { ...p, stock_cajas: v } : p));
    setEditCajas(e => { const n = {...e}; delete n[pid]; return n; });
  };

  return (
    <div className="panel panel-flush">
      <table className="tbl tbl-hover">
        <thead><tr><th>Producto</th><th className="num">Stock</th><th className="num">Reservadas</th><th className="num">Disponible</th><th className="num">Mínimo</th><th>Lotes</th><th>Estado</th><th></th></tr></thead>
        <tbody>
          {items.map(p => {
            const prod = PRODUCTOS_MOCK.find(x => x.id === p.prod_id);
            const disp = p.stock_cajas - p.reservado;
            const bajo = disp <= p.minimo_cajas;
            const lotes = LOTES_MOCK.filter(l => l.prod_id === p.prod_id && l.estado === 'stock');
            const isExp = expandido === p.prod_id;
            const editing = editCajas[p.prod_id] !== undefined;
            return (
              <React.Fragment key={p.prod_id}>
                <tr style={{ opacity: p.desactivado ? 0.5 : 1 }}>
                  <td onClick={() => setExpandido(isExp ? null : p.prod_id)} style={{ cursor:'pointer' }}>
                    <div style={{ fontWeight:600 }}>{prod?.nombre}</div>
                    <div className="xs mute">{fmtNum(prod?.unidades_caja||0)} u/caja</div>
                  </td>
                  <td className="num">
                    {editing ? (
                      <div className="row" style={{ gap:4, justifyContent:'flex-end' }}>
                        <input className="input mono" type="number" autoFocus value={editCajas[p.prod_id]}
                          onChange={e => setEditCajas(s=>({...s,[p.prod_id]:e.target.value}))}
                          onBlur={() => saveCajas(p.prod_id)}
                          onKeyDown={e => { if(e.key==='Enter') saveCajas(p.prod_id); if(e.key==='Escape') setEditCajas(s=>{const n={...s};delete n[p.prod_id];return n;}); }}
                          style={{ width:64, padding:'3px 6px', textAlign:'right' }}/>
                        <Btn size="sm" variant="primary" onClick={() => saveCajas(p.prod_id)}><Icon name="check" size={11}/></Btn>
                      </div>
                    ) : (
                      <span className="mono" style={{ cursor:'pointer', borderBottom:'1px dashed var(--line)' }} title="Click para editar"
                        onClick={() => setEditCajas(s=>({...s,[p.prod_id]:String(p.stock_cajas)}))}>
                        {p.stock_cajas}
                      </span>
                    )}
                  </td>
                  <td className="num mono xs mute">{p.reservado||'—'}</td>
                  <td className="num mono" style={{ color: bajo?'var(--warn)':'inherit', fontWeight: bajo?600:400 }}>{disp}</td>
                  <td className="num mono xs mute">{p.minimo_cajas}</td>
                  <td onClick={() => setExpandido(isExp ? null : p.prod_id)} style={{ cursor:'pointer' }}>
                    <Chip>{lotes.length} lote{lotes.length!==1?'s':''}</Chip>
                  </td>
                  <td>{p.desactivado ? <Chip tone="bad">Desactivado</Chip> : bajo ? <Chip tone="warn">Revisar</Chip> : <Chip tone="good">OK</Chip>}</td>
                  <td><Btn size="sm" variant="ghost" title={p.desactivado?'Reactivar':'Desactivar'} onClick={()=>toggleDesact(p.prod_id)}><Icon name={p.desactivado?'check':'x'} size={12}/></Btn></td>
                </tr>
                {isExp && (
                  <tr>
                    <td colSpan={8} style={{ padding:0, background:'var(--bg-raised)' }}>
                      <div style={{ padding:'12px 18px' }}>
                        <div className="xs mute" style={{ marginBottom:8, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase' }}>Lotes en stock — FIFO sugerido</div>
                        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                          {lotes.length === 0 && <div className="xs mute">Sin lotes en stock.</div>}
                          {lotes.sort((a,b)=>a.fecha_fab.localeCompare(b.fecha_fab)).map((l,i) => (
                            <div key={l.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'8px 12px', background:'var(--surface)', border:'1px solid var(--line)', borderRadius:'var(--radius-sm)' }}>
                              {i===0 && <Chip tone="good" style={{ fontSize:10 }}>FIFO 1°</Chip>}
                              <div className="mono xs" style={{ color:'var(--accent-hi)' }}>{l.id}</div>
                              <div className="xs mute">Fabricado: <strong>{l.fecha_fab}</strong></div>
                              <div style={{ marginLeft:'auto' }} className="mono">{l.cajas} cajas</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </td>
                  </tr>
                )}
              </React.Fragment>
            );
          })}
        </tbody>
      </table>
      <div style={{ padding:'8px 18px', borderTop:'1px solid var(--line)', fontSize:11.5, color:'var(--text-mute)' }}>
        <Icon name="edit" size={11}/> Click en stock para editar · Click en nombre/lotes para ver lotes FIFO · X para desactivar
      </div>
    </div>
  );
}

// ═══════════════════ Piezas Sueltas ═══════════════════
function InvPiezasSueltas() {
  const [filtroEstado, setFiltroEstado] = useState('todas');
  const [items,        setItems]        = useState(() => [...INVENTARIO_PIEZAS_MOCK]);
  const [sel,          setSel]          = useState(null);
  const [form,         setForm]         = useState(null);
  const [saving,       setSaving]       = useState(false);

  function openNew() {
    const empty = { id:'', pieza:'', producto:'', estado:'cruda', cantidad:0, unidad:'unidades', isNew:true };
    setSel(empty); setForm({ ...empty });
  }
  function openEdit(p) { setSel(p); setForm({ ...p }); }
  const set = (k,v) => setForm(f => ({ ...f, [k]: v }));

  async function guardar() {
    if (!form.pieza) { alert('Nombre de pieza requerido'); return; }
    setSaving(true);
    try {
      let r;
      if (sel.isNew) {
        r = await window._apiUtil.createPieza(form);
        const nueva = r?.pieza || { ...form, id: form.id || `ps-${form.pieza}-${form.estado}` };
        setItems(x => [...x, nueva]);
      } else {
        r = await window._apiUtil.updatePieza(sel.id, form);
        setItems(x => x.map(p => p.id === sel.id ? { ...p, ...form } : p));
      }
      setSel(null); setForm(null);
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  async function eliminar(id) {
    if (!confirm('¿Eliminar este bin de piezas? Solo si está vacío.')) return;
    setSaving(true);
    try {
      await window._apiUtil.deletePieza(id);
      setItems(x => x.filter(p => p.id !== id));
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  const visible = items.filter(p => filtroEstado === 'todas' || p.estado === filtroEstado);

  return (
    <>
      <div className="panel" style={{ marginBottom:14 }}>
        <div className="row" style={{ justifyContent:'space-between', flexWrap:'wrap', gap:10 }}>
          <div>
            <div style={{ fontWeight:600 }}>Piezas en proceso</div>
            <div className="xs mute">Piezas producidas pendientes de ensamble o impresión</div>
          </div>
          <div className="row" style={{ gap:8 }}>
            <Seg value={filtroEstado} onChange={setFiltroEstado} options={[
              { value:'todas',   label:`Todas (${items.length})` },
              { value:'cruda',   label:'Crudas' },
              { value:'impresa', label:'Impresas' },
            ]} />
            <Btn size="sm" variant="primary" onClick={openNew}><Icon name="plus" size={12}/> Nueva</Btn>
          </div>
        </div>
      </div>
      <div className="panel panel-flush">
        <table className="tbl tbl-hover">
          <thead><tr><th>Pieza</th><th>Producto</th><th>Estado</th><th className="num">Cantidad</th><th>Actualización</th><th></th></tr></thead>
          <tbody>
            {visible.map(p => {
              const prod = PRODUCTOS_MOCK.find(x => x.id === p.producto);
              return (
                <tr key={p.id}>
                  <td><div style={{ fontWeight:600 }}>{p.pieza}</div></td>
                  <td>{prod?.nombre || p.producto || '—'}</td>
                  <td><Chip tone={p.estado==='impresa'?'accent':'default'}>{p.estado==='impresa'?'Impresa (cliente)':'Cruda'}</Chip></td>
                  <td className="num mono">{fmtNum(p.cantidad||p.cantidad||0)} <span className="xs mute">{p.unidad}</span></td>
                  <td className="mono xs">{p.ultima_actualizacion||'—'}</td>
                  <td>
                    <div className="row" style={{ gap:4, justifyContent:'flex-end' }}>
                      <Btn size="sm" variant="ghost" onClick={() => openEdit(p)}><Icon name="edit" size={12}/></Btn>
                      <Btn size="sm" variant="ghost" className="danger" onClick={() => eliminar(p.id)}><Icon name="trash" size={12}/></Btn>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <Drawer open={!!sel} onClose={() => { setSel(null); setForm(null); }} title={sel?.isNew ? 'Nueva pieza' : 'Editar pieza'}
        footer={sel ? (
          <div className="row" style={{ justifyContent:'flex-end', width:'100%', gap:8 }}>
            <Btn onClick={() => { setSel(null); setForm(null); }}>Cancelar</Btn>
            <Btn variant="primary" onClick={guardar} disabled={saving}>{saving?'Guardando…':'Guardar'}</Btn>
          </div>
        ) : null}>
        {form && (
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            <div className="field" style={{ margin:0 }}><label>Nombre de pieza</label><input className="input" value={form.pieza||''} onChange={e=>set('pieza',e.target.value)}/></div>
            <div className="field" style={{ margin:0 }}>
              <label>Producto asociado</label>
              <select className="select" value={form.producto||''} onChange={e=>set('producto',e.target.value)}>
                <option value="">Sin asignar</option>
                {PRODUCTOS_MOCK.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
              </select>
            </div>
            <div className="field" style={{ margin:0 }}>
              <label>Estado</label>
              <Seg value={form.estado||'cruda'} onChange={v=>set('estado',v)}
                options={[{value:'cruda',label:'Cruda'},{value:'impresa',label:'Impresa'}]} />
            </div>
            <div className="field" style={{ margin:0 }}><label>Cantidad</label><input className="input mono" type="number" value={form.cantidad||0} onChange={e=>set('cantidad',parseFloat(e.target.value)||0)}/></div>
            <div className="field" style={{ margin:0 }}><label>Unidad</label><input className="input" value={form.unidad||'unidades'} onChange={e=>set('unidad',e.target.value)}/></div>
          </div>
        )}
      </Drawer>
    </>
  );
}

// ═══════════════════ Molido Segregado ═══════════════════
function InvMolido() {
  const [items,   setItems]   = useState(() => [...INVENTARIO_MOLIDO_MOCK]);
  const [editId,  setEditId]  = useState(null);
  const [editKg,  setEditKg]  = useState('');
  const [saving,  setSaving]  = useState(false);

  const total = items.reduce((a, m) => a + m.kg, 0);

  async function guardarKg(id) {
    const kg = parseFloat(editKg);
    if (isNaN(kg)) return;
    setSaving(true);
    try {
      await window._apiUtil.updateMolidoBin(id, { kg });
      setItems(x => x.map(m => m.id === id ? { ...m, kg } : m));
      setEditId(null);
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  async function eliminar(id) {
    const m = items.find(x => x.id === id);
    if (m?.kg > 0) { alert('Este bin tiene stock > 0. Vaciarlo primero.'); return; }
    if (!confirm('¿Eliminar este bin de molido?')) return;
    setSaving(true);
    try {
      await window._apiUtil.deleteMolidoBin(id);
      setItems(x => x.filter(m => m.id !== id));
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  return (
    <>
      <div className="panel" style={{ marginBottom:14, display:'flex', alignItems:'center', justifyContent:'space-between', gap:16 }}>
        <div>
          <div style={{ fontFamily:'var(--serif)', fontSize:32, letterSpacing:'-0.02em' }}>{total.toFixed(1)} <span className="xs mute" style={{ fontSize:16 }}>kg total</span></div>
          <div className="xs mute">Molido disponible segregado por origen de pieza</div>
        </div>
        <div className="alert info" style={{ maxWidth:300 }}>
          <div className="icon"><Icon name="info" size={16}/></div>
          <div className="body"><div className="title">Segregado por origen</div><div className="msg">Cada bin corresponde a un tipo de pieza. Clic en kg para editar inline.</div></div>
        </div>
      </div>
      <div className="panel panel-flush">
        <table className="tbl tbl-hover">
          <thead><tr><th>Origen</th><th>Producto compatible</th><th className="num">Stock (kg)</th><th>Barra</th><th></th></tr></thead>
          <tbody>
            {items.slice().sort((a,b)=>b.kg-a.kg).map(m => {
              const prod = PRODUCTOS_MOCK.find(p => p.id === m.producto);
              const pct  = Math.min(100, (m.kg / total) * 100);
              return (
                <tr key={m.id}>
                  <td><div className="row" style={{ gap:8 }}><div style={{ width:12,height:12,borderRadius:3,background:m.color }}/><div style={{ fontWeight:600 }}>{m.origen}</div></div></td>
                  <td>{prod ? prod.nombre : <span className="xs mute">General</span>}</td>
                  <td className="num" style={{ minWidth:120 }}>
                    {editId === m.id ? (
                      <div className="row" style={{ justifyContent:'flex-end', gap:4 }}>
                        <input className="input mono" type="number" step="0.1" value={editKg}
                          onChange={e => setEditKg(e.target.value)}
                          style={{ width:80, padding:'4px 8px', textAlign:'right' }}
                          onKeyDown={e => { if(e.key==='Enter') guardarKg(m.id); if(e.key==='Escape') setEditId(null); }} />
                        <Btn size="sm" variant="primary" onClick={() => guardarKg(m.id)} disabled={saving}><Icon name="check" size={11}/></Btn>
                        <Btn size="sm" variant="ghost" onClick={() => setEditId(null)}><Icon name="x" size={11}/></Btn>
                      </div>
                    ) : (
                      <span className="mono" style={{ color:'var(--good)', fontWeight:600, cursor:'pointer' }}
                        onClick={() => { setEditId(m.id); setEditKg(String(m.kg)); }}
                        title="Click para editar">{m.kg.toFixed(1)} kg</span>
                    )}
                  </td>
                  <td style={{ width:120 }}><div style={{ height:8, background:'var(--bg-raised)', borderRadius:4, overflow:'hidden' }}><div style={{ height:'100%', width:`${pct}%`, background:m.color }}/></div></td>
                  <td>
                    <Btn size="sm" variant="ghost" className="danger" onClick={() => eliminar(m.id)} disabled={saving}><Icon name="trash" size={12}/></Btn>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </>
  );
}
