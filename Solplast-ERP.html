<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solplast — Sistema de gestión</title>
<style>

/* ═══════════════════════════════════════════════════════════════════
   Solplast — Sistema de gestión
   Design system
   ═══════════════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap');

:root {
  /* Type */
  --sans: 'Manrope', system-ui, -apple-system, sans-serif;
  --serif: 'Fraunces', 'Instrument Serif', Georgia, serif;
  --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;

  /* Radii */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 22px;

  /* Layout */
  --sidebar-w: 248px;
  --content-max: 1280px;
}

/* ─────────── DARK (default) ─────────── */
:root, [data-theme="dark"] {
  --bg: #0d0d12;
  --bg-raised: #15151c;
  --bg-hover: #1e1e28;
  --surface: #181821;
  --surface-hi: #1f1f2b;
  --line: #272734;
  --line-hi: #343445;

  --text: #edecef;
  --text-dim: #b5b3bc;
  --text-mute: #7b7986;

  --accent: oklch(72% 0.16 295);       /* lavender */
  --accent-hi: oklch(80% 0.14 295);
  --accent-soft: color-mix(in oklab, oklch(72% 0.16 295) 18%, transparent);

  --good: oklch(75% 0.15 155);
  --good-soft: color-mix(in oklab, oklch(75% 0.15 155) 16%, transparent);
  --warn: oklch(78% 0.16 80);
  --warn-soft: color-mix(in oklab, oklch(78% 0.16 80) 18%, transparent);
  --bad:  oklch(70% 0.20 20);
  --bad-soft: color-mix(in oklab, oklch(70% 0.20 20) 16%, transparent);
  --info: oklch(75% 0.13 230);
  --info-soft: color-mix(in oklab, oklch(75% 0.13 230) 16%, transparent);

  --shadow-sm: 0 1px 0 0 color-mix(in oklab, white 4%, transparent);
  --shadow-md: 0 12px 30px -16px rgba(0,0,0,0.6), 0 2px 6px -2px rgba(0,0,0,0.4);
}

[data-theme="light"] {
  --bg: #faf8f4;
  --bg-raised: #ffffff;
  --bg-hover: #f3efe7;
  --surface: #ffffff;
  --surface-hi: #faf8f4;
  --line: #e8e3d8;
  --line-hi: #d5cfc0;

  --text: #1a1917;
  --text-dim: #524f48;
  --text-mute: #8a857a;

  --accent: oklch(60% 0.17 295);
  --accent-hi: oklch(52% 0.19 295);
  --accent-soft: color-mix(in oklab, oklch(60% 0.17 295) 12%, transparent);

  --good: oklch(50% 0.14 155);
  --good-soft: color-mix(in oklab, oklch(50% 0.14 155) 10%, transparent);
  --warn: oklch(60% 0.16 60);
  --warn-soft: color-mix(in oklab, oklch(60% 0.16 60) 14%, transparent);
  --bad:  oklch(55% 0.20 20);
  --bad-soft: color-mix(in oklab, oklch(55% 0.20 20) 12%, transparent);
  --info: oklch(55% 0.15 230);
  --info-soft: color-mix(in oklab, oklch(55% 0.15 230) 12%, transparent);

  --shadow-sm: 0 1px 0 0 rgba(0,0,0,0.02);
  --shadow-md: 0 16px 40px -20px rgba(30,25,15,0.18), 0 2px 6px -2px rgba(30,25,15,0.06);
}

/* ─────────── Base ─────────── */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: 'ss01', 'cv11';
}
button { font-family: inherit; cursor: pointer; }
h1, h2, h3, h4 { margin: 0; font-weight: 500; }
a { color: var(--accent-hi); }

.fadein { opacity: 1; }
@keyframes fadein {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─────────── Text utilities ─────────── */
.mute { color: var(--text-mute); }
.small { font-size: 12.5px; }
.xs { font-size: 11.5px; }
.mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
.num { font-variant-numeric: tabular-nums; font-family: var(--mono); }
.num-big { font-family: var(--serif); font-size: 28px; letter-spacing: -0.02em; }
.eyebrow { font-size: 10.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-mute); }
em { font-style: italic; font-family: var(--serif); color: var(--accent-hi); font-weight: 400; }

.row { display: flex; gap: 8px; align-items: center; }
.row.wrap { flex-wrap: wrap; }
.spacer { flex: 1; }

.cols-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.cols-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
@media (max-width: 860px) {
  .cols-2, .cols-3 { grid-template-columns: 1fr; }
}
.hide-mobile { display: flex; }
@media (max-width: 760px) { .hide-mobile { display: none !important; } }

/* ─────────── Layout ─────────── */
/* Sidebar is position:fixed — reserve space via padding-left */
.app {
  min-height: 100vh;
  padding-left: var(--sidebar-w);
}
.content-wrap {
  padding: 36px 40px 80px;
  max-width: 100%;
  overflow-x: hidden;
}
.content {
  max-width: var(--content-max);
  margin: 0 auto;
}

@media (max-width: 960px) {
  .app { padding-left: 0; }
  .content-wrap { padding: 16px 16px 92px; }
}

.page-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.page-title {
  font-family: var(--serif);
  font-size: clamp(32px, 4vw, 44px);
  letter-spacing: -0.02em;
  line-height: 1;
  margin: 8px 0 6px;
}
.page-sub {
  color: var(--text-dim);
  max-width: 640px;
  font-size: 14.5px;
}

/* ─────────── Sidebar ─────────── */
.sidebar {
  position: fixed;
  left: 0; top: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--line);
  padding: 20px 12px;
  display: flex;
  flex-direction: column;
  z-index: 40;
  overflow-y: auto;
}
.brand { padding: 4px 10px 16px; border-bottom: 1px solid var(--line); margin-bottom: 16px; }
.brand-mark { font-family: var(--serif); font-size: 24px; letter-spacing: -0.02em; line-height: 1; }
.brand-sub { font-size: 10.5px; color: var(--text-mute); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 6px; }

.nav-group-label { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-mute); padding: 14px 10px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  background: transparent; border: 0;
  padding: 9px 10px;
  margin: 1px 0;
  color: var(--text-dim);
  font-size: 13.5px;
  border-radius: var(--radius-sm);
  text-align: left;
  transition: background 120ms, color 120ms;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--accent-soft); color: var(--accent-hi); font-weight: 600; }
.nav-item .nav-ico { flex-shrink: 0; opacity: 0.9; }
.nav-item.active .nav-ico { opacity: 1; }

.sidebar-foot { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 10px; }
.theme-toggle {
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
  padding: 4px;
  border-radius: var(--radius-sm);
  background: var(--bg);
  border: 1px solid var(--line);
}
.theme-toggle button {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: transparent; border: 0;
  padding: 6px; border-radius: 6px;
  color: var(--text-mute);
  font-size: 11.5px; font-weight: 500;
}
.theme-toggle button.on { background: var(--surface-hi); color: var(--text); box-shadow: var(--shadow-sm); }
.user-chip { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius-sm); }
.avatar {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--accent-soft);
  color: white;
  font-size: 10.5px; font-weight: 600;
  flex-shrink: 0;
}

/* Mobile topbar */
.topbar {
  display: none;
  position: sticky; top: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  padding: 10px 12px;
  align-items: center;
  gap: 10px;
  z-index: 30;
}
@media (max-width: 960px) {
  .sidebar {
    transform: translateX(-100%);
    transition: transform 220ms cubic-bezier(0.32, 0.72, 0, 1);
    width: 300px;
  }
  .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-md); }
  .topbar { display: flex; }
}

.mobile-scrim { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 35; opacity: 0; pointer-events: none; transition: opacity 180ms; }
.mobile-scrim.open { opacity: 1; pointer-events: auto; }

/* Bottom nav (mobile) */
.mbnav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--line);
  padding: 8px 4px calc(8px + env(safe-area-inset-bottom));
  z-index: 30;
  justify-content: space-around;
}
.mbnav button {
  background: transparent; border: 0;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 6px 10px;
  color: var(--text-mute);
  font-size: 10.5px;
  border-radius: 8px;
  min-width: 56px;
}
.mbnav button.on { color: var(--accent-hi); }
@media (max-width: 960px) { .mbnav { display: flex; } }

/* ─────────── Buttons ─────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px; justify-content: center;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--line);
  padding: 9px 14px;
  font-size: 13px; font-weight: 500;
  border-radius: var(--radius-sm);
  transition: background 120ms, border 120ms, transform 80ms;
}
.btn:hover { background: var(--bg-hover); }
.btn:active { transform: translateY(1px); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.primary {
  background: var(--accent);
  color: #0d0d12;
  border-color: transparent;
  font-weight: 600;
}
[data-theme="light"] .btn.primary { color: white; }
.btn.primary:hover { background: var(--accent-hi); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--text-dim); }
.btn.ghost:hover { background: var(--bg-hover); color: var(--text); }
.btn.danger { color: var(--bad); }
.btn.sm { padding: 5px 9px; font-size: 12px; }
.btn.block { display: flex; width: 100%; }

/* ─────────── Chip ─────────── */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px;
  font-size: 10.5px; font-weight: 500;
  border-radius: 20px;
  background: var(--bg-hover);
  color: var(--text-dim);
  border: 1px solid var(--line);
  letter-spacing: 0.01em;
}
.chip.accent { background: var(--accent-soft); color: var(--accent-hi); border-color: transparent; }
.chip.warn { background: var(--warn-soft); color: var(--warn); border-color: transparent; }
.chip.good { background: var(--good-soft); color: var(--good); border-color: transparent; }
.chip.bad  { background: var(--bad-soft); color: var(--bad); border-color: transparent; }
.chip.info { background: var(--info-soft); color: var(--info); border-color: transparent; }

/* ─────────── Fields ─────────── */
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11.5px; font-weight: 500; color: var(--text-dim); margin-bottom: 5px; letter-spacing: 0.02em; }
.input, .select {
  width: 100%;
  background: var(--bg-raised);
  border: 1px solid var(--line);
  color: var(--text);
  padding: 9px 12px;
  font-size: 13.5px;
  border-radius: var(--radius-sm);
  font-family: inherit;
  transition: border-color 120ms;
}
.input:focus, .select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
select.input, select.select { background-color: var(--bg-raised); color: var(--text); }
select.input option, select.select option { background: var(--surface); color: var(--text); padding: 8px; }
.input.num-input { width: 80px; font-family: var(--mono); text-align: right; }
.select { appearance: none; background-image: linear-gradient(45deg, transparent 50%, currentColor 50%), linear-gradient(135deg, currentColor 50%, transparent 50%); background-position: right 14px top 50%, right 10px top 50%; background-size: 4px 4px, 4px 4px; background-repeat: no-repeat; padding-right: 30px; color: var(--text); }

.seg {
  display: inline-flex;
  background: var(--bg-raised);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
}
.seg button {
  background: transparent; border: 0;
  padding: 6px 14px;
  font-size: 12.5px;
  color: var(--text-mute);
  border-radius: 5px;
  font-weight: 500;
}
.seg button.on { background: var(--surface-hi); color: var(--text); box-shadow: var(--shadow-sm); }

.check { display: flex; align-items: center; gap: 10px; padding: 6px 0; cursor: pointer; font-size: 13px; }
.check input { display: none; }
.check .box { width: 17px; height: 17px; border: 1.5px solid var(--line-hi); border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; color: transparent; transition: all 120ms; }
.check input:checked + .box { background: var(--accent); border-color: var(--accent); color: #0d0d12; }
[data-theme="light"] .check input:checked + .box { color: white; }

.toggle-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 10px 5px 5px;
  background: var(--bg-raised);
  border: 1px solid var(--line);
  border-radius: 99px;
  font-size: 12.5px; font-weight: 500;
  color: var(--text-dim);
}
.toggle-pill .sw { width: 26px; height: 16px; background: var(--line); border-radius: 99px; position: relative; transition: background 150ms; }
.toggle-pill .sw::after { content: ''; position: absolute; width: 12px; height: 12px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: left 150ms; }
.toggle-pill.on { background: var(--accent-soft); color: var(--accent-hi); border-color: transparent; }
.toggle-pill.on .sw { background: var(--accent); }
.toggle-pill.on .sw::after { left: 12px; }

/* ─────────── Panels ─────────── */
.panel {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 18px;
  box-shadow: var(--shadow-sm);
}
.panel-flush { padding: 0; overflow: hidden; }
.panel-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.panel-title { font-family: var(--serif); font-size: 22px; letter-spacing: -0.015em; line-height: 1.1; }
.panel-sub { font-size: 12.5px; color: var(--text-mute); margin-top: 4px; }

/* ─────────── KPI ─────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
@media (max-width: 960px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 520px) { .kpi-grid { grid-template-columns: 1fr; } }
.kpi { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 16px; position: relative; overflow: hidden; box-shadow: var(--shadow-sm); }
.kpi-label { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-mute); margin-bottom: 10px; }
.kpi-val { font-family: var(--serif); font-size: 34px; letter-spacing: -0.02em; line-height: 1; }
.kpi-val .unit { font-size: 16px; color: var(--text-mute); margin-left: 4px; letter-spacing: 0; }
.kpi-delta { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; color: var(--text-mute); margin-top: 8px; }
.kpi-delta.up { color: var(--good); }
.kpi-delta.down { color: var(--bad); }
.kpi-spark { position: absolute; right: 8px; bottom: 6px; opacity: 0.7; pointer-events: none; }

/* ─────────── Home hero ─────────── */
.home-hero {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 30px;
  align-items: center;
  margin-bottom: 28px;
}
.home-hero h1 { font-family: var(--serif); font-size: clamp(40px, 5.5vw, 60px); letter-spacing: -0.025em; line-height: 1; }
.home-hero .sub { color: var(--text-dim); font-size: 16px; max-width: 520px; margin-top: 14px; line-height: 1.55; }
.home-hero .illus { opacity: 0.95; }
.home-hero-stack { grid-template-columns: 1fr; margin-bottom: 0; }
@media (max-width: 860px) { .home-hero { grid-template-columns: 1fr; } .home-hero .illus { display: none; } }

/* Module grid */
.module-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
@media (max-width: 960px) { .module-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 520px) { .module-grid { grid-template-columns: 1fr; } }
.module-card {
  text-align: left;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 18px;
  display: flex; flex-direction: column; gap: 8px;
  transition: transform 160ms, border-color 160ms, background 160ms;
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.module-card:hover { transform: translateY(-2px); border-color: var(--accent); background: var(--surface-hi); }
.mc-meta { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-mute); }
.mc-title { font-family: var(--serif); font-size: 26px; letter-spacing: -0.02em; line-height: 1.1; }
.mc-desc { font-size: 13px; color: var(--text-dim); flex: 1; }

/* ─────────── List rows (alerts + history) ─────────── */
.list-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  transition: background 120ms;
}
.list-row:hover { background: var(--bg-hover); }
.list-row:last-child { border-bottom: 0; }
.list-row .ico { width: 34px; height: 34px; border-radius: var(--radius-sm); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.list-row .body { flex: 1; min-width: 0; }
.list-row .ttl { font-weight: 500; font-size: 13.5px; }
.list-row .cap { font-size: 12px; color: var(--text-mute); margin-top: 2px; }

/* ─────────── Alerts ─────────── */
.alert { display: flex; gap: 12px; padding: 12px 14px; border-radius: var(--radius-md); border: 1px solid transparent; }
.alert .icon { flex-shrink: 0; }
.alert .body { flex: 1; }
.alert .title { font-weight: 600; font-size: 13.5px; }
.alert .msg { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }
.alert.good { background: var(--good-soft); color: var(--good); }
.alert.warn { background: var(--warn-soft); color: var(--warn); }
.alert.bad  { background: var(--bad-soft); color: var(--bad); }
.alert.info { background: var(--info-soft); color: var(--info); }
.alert .title { color: var(--text); }

/* ─────────── Stepper (nómina) ─────────── */
.stepper { display: flex; gap: 4px; margin-bottom: 18px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 4px; overflow-x: auto; }
.step { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; background: transparent; border: 0; color: var(--text-mute); font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); white-space: nowrap; }
.step .num { display: inline-flex; width: 22px; height: 22px; border-radius: 50%; background: var(--bg-hover); color: var(--text-mute); font-size: 11px; align-items: center; justify-content: center; font-weight: 600; font-family: var(--mono); }
.step.active { background: var(--accent-soft); color: var(--accent-hi); }
.step.active .num { background: var(--accent); color: #0d0d12; }
[data-theme="light"] .step.active .num { color: white; }
.step.done .num { background: var(--good-soft); color: var(--good); }
.step-sep { color: var(--text-mute); opacity: 0.4; margin: 0 2px; }

/* Wizard stepper (registro) */
.wiz-stepper { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 18px; }
.wstep { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 12px; display: flex; gap: 10px; align-items: center; text-align: left; color: var(--text-mute); transition: all 150ms; }
.wstep .wico { width: 28px; height: 28px; border-radius: var(--radius-sm); background: var(--bg-hover); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.wstep .wlbl { font-weight: 600; font-size: 12.5px; color: var(--text); }
.wstep .wsub { font-size: 10.5px; color: var(--text-mute); margin-top: 2px; }
.wstep.active { border-color: var(--accent); background: var(--accent-soft); }
.wstep.active .wico { background: var(--accent); color: #0d0d12; }
[data-theme="light"] .wstep.active .wico { color: white; }
.wstep.done .wico { background: var(--good-soft); color: var(--good); }
@media (max-width: 760px) {
  .wiz-stepper { grid-template-columns: repeat(2, 1fr); }
  .wstep .wsub { display: none; }
}

/* ─────────── Tables ─────────── */
.tbl { width: 100%; border-collapse: collapse; }
.tbl th { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; text-align: left; padding: 12px 14px; color: var(--text-mute); border-bottom: 1px solid var(--line); background: var(--bg-raised); position: sticky; top: 0; }
.tbl th.num { text-align: right; }
.tbl td { padding: 11px 14px; border-bottom: 1px solid var(--line); font-size: 13px; }
.tbl tbody tr:hover { background: var(--bg-hover); }
.tbl tbody tr:last-child td { border-bottom: 0; }

/* ─────────── Anomaly list ─────────── */
.anom { display: flex; align-items: flex-start; gap: 14px; padding: 10px 14px; border-radius: var(--radius-md); border-left: 3px solid; margin-bottom: 6px; background: var(--bg-raised); }
.anom.warn { border-left-color: var(--warn); }
.anom .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warn); margin-top: 6px; flex-shrink: 0; }

/* Stat stack (nómina row) */
.stat-stack { display: flex; gap: 22px; padding: 0 18px; border-left: 1px solid var(--line); }
.stat-stack .st { text-align: center; }
.stat-stack .st-val { font-size: 15px; font-family: var(--mono); font-weight: 500; }
.stat-stack .st-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-mute); margin-top: 2px; }

/* ─────────── Catálogo ─────────── */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 20px; overflow-x: auto; }
.tab { background: transparent; border: 0; padding: 10px 16px; font-size: 13.5px; font-weight: 500; color: var(--text-mute); border-bottom: 2px solid transparent; margin-bottom: -1px; display: inline-flex; gap: 8px; align-items: center; white-space: nowrap; }
.tab:hover { color: var(--text-dim); }
.tab.on { color: var(--text); border-bottom-color: var(--accent); }
.tab .count { font-size: 11px; padding: 2px 7px; border-radius: 10px; background: var(--bg-hover); color: var(--text-mute); font-weight: 500; font-family: var(--mono); }

/* Materials row */
.mat-row { display: flex; align-items: center; gap: 14px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-md); margin-bottom: 8px; }
.mat-row .swatch { width: 32px; height: 32px; border-radius: var(--radius-sm); flex-shrink: 0; opacity: 0.8; display: inline-flex; align-items: center; justify-content: center; }
.mat-row .unit { font-size: 11px; color: var(--text-mute); font-family: var(--mono); min-width: 20px; }

/* Number stepper */
.num-stepper { display: inline-flex; align-items: center; background: var(--bg-raised); border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; }
.num-stepper button { background: transparent; border: 0; padding: 6px 8px; color: var(--text-mute); }
.num-stepper button:hover { background: var(--bg-hover); color: var(--text); }
.num-stepper input { width: 60px; padding: 6px 8px; font-family: var(--mono); text-align: center; background: transparent; border: 0; color: var(--text); font-size: 13px; border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
.num-stepper input:focus { outline: none; }
.num-stepper input::-webkit-outer-spin-button, .num-stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.num-stepper input[type=number] { -moz-appearance: textfield; }

.sum-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: var(--accent-soft); border-radius: var(--radius-md); color: var(--accent-hi); font-weight: 500; }

/* Product cards */
.prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.prod-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 14px; text-align: left; transition: all 150ms; color: var(--text); display: flex; flex-direction: column; }
.prod-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.prod-card.on { border-color: var(--accent); background: var(--accent-soft); }
.prod-card.static { cursor: pointer; }

/* Empaque cards */
.empaque-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.empaque-card { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-md); }
.empaque-card .ico { width: 32px; height: 32px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; }

/* Gasto grid */
.gasto-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
.gasto-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-sm); font-size: 13px; }
.gasto-card .ico { width: 28px; height: 28px; background: var(--accent-soft); color: var(--accent-hi); border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; }
.gasto-card .unit { font-size: 10.5px; color: var(--text-mute); }

/* ─────────── Cost breakdown ─────────── */
.cost-lines { display: flex; flex-direction: column; }
.cl { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px dashed var(--line); }
.cl .dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.cl .l { flex: 1; font-size: 13.5px; color: var(--text-dim); }
.cl .v { font-family: var(--mono); font-variant-numeric: tabular-nums; }
.cl.tot { padding-top: 14px; border-bottom: 0; border-top: 1px solid var(--text-dim); margin-top: 6px; }
.cl.tot .l { color: var(--text); font-weight: 600; }
.cl.sub { padding: 6px 0 0; border: 0; }

.stack-bar { height: 14px; border-radius: 6px; overflow: hidden; display: flex; }

/* Comparison */
.prod-picker { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.pp { display: inline-flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--line); padding: 8px 12px; border-radius: var(--radius-md); color: var(--text); text-align: left; white-space: nowrap; }
.pp:hover { border-color: var(--accent); }
.pp.on { border-color: var(--accent); background: var(--accent-soft); }

.pp-toggle { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 99px; background: var(--bg-raised); border: 1px solid var(--line); color: var(--text-dim); font-size: 12.5px; }
.pp-toggle.on { background: var(--accent-soft); color: var(--accent-hi); border-color: transparent; }

.compare-bar { display: flex; height: 22px; border-radius: 5px; overflow: hidden; background: var(--bg-raised); border: 1px solid var(--line); }

.legend-row { display: flex; gap: 10px; flex-wrap: wrap; font-size: 11.5px; color: var(--text-mute); margin-bottom: 14px; }
.legend-row .sw { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; vertical-align: middle; }
.legend-chip { display: inline-flex; align-items: center; gap: 7px; padding: 5px 10px; background: var(--bg-raised); border: 1px solid var(--line); border-radius: 99px; font-size: 11.5px; color: var(--text-dim); }
.legend-chip .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

/* ─────────── Prod-consumo (material por producto) ─────────── */
.prod-consumo-list { display: flex; flex-direction: column; gap: 14px; }
.prod-consumo-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; }
.pcc-head { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--bg-raised); border-bottom: 1px solid var(--line); }
.pcc-totals { display: flex; gap: 14px; align-items: center; }
.pcc-totals > div { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.pcc-totals strong { font-size: 13.5px; font-variant-numeric: tabular-nums; }
.pcc-block { padding: 14px 16px; border-top: 1px dashed var(--line); }
.pcc-block:first-of-type { border-top: 0; }
.pcc-label { display: flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-mute); margin-bottom: 10px; }
.pcc-label .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.pcc-mat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; }
.pcc-mat-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius-sm); }
.pcc-mat-name { flex: 1; font-size: 12.5px; min-width: 0; }
.swatch-sm { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; opacity: 0.85; }
.num-stepper.sm input { width: 46px; font-size: 12px; padding: 4px 6px; }
.num-stepper.sm button { padding: 4px 6px; }
.unit.sm { font-size: 10.5px; color: var(--text-mute); font-family: var(--mono); }
.input.sm { padding: 5px 8px; font-size: 12.5px; height: auto; }
.pcc-mol-list { display: flex; flex-direction: column; gap: 6px; }
.pcc-mol-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: var(--good-soft, color-mix(in oklch, var(--good) 12%, transparent)); border: 1px dashed color-mix(in oklch, var(--good) 40%, var(--line)); border-radius: var(--radius-sm); }
.pcc-mol-row select { min-width: 140px; max-width: 200px; }
.pcc-del { background: transparent; border: 0; color: var(--text-mute); padding: 4px; cursor: pointer; }
.pcc-del:hover { color: var(--bad); }
.pcc-empty { padding: 12px; text-align: center; font-size: 12.5px; color: var(--text-mute); background: var(--bg); border: 1px dashed var(--line); border-radius: var(--radius-sm); }
.pcc-note { display: flex; align-items: center; gap: 5px; margin-top: 8px; }

/* ─────────── Residuo cards ─────────── */
.residuo-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 12px; }
.residuo-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 14px; }
.rc-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed var(--line); }
.rc-fields { display: flex; flex-direction: column; gap: 10px; }
.rc-field { display: flex; align-items: center; gap: 10px; }
.rc-lbl { flex: 1; display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--text-dim); }
.rc-lbl .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

/* ─────────── Revisar desglose ─────────── */
.rev-prod-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.rev-prod-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--bg-raised); border: 1px solid var(--line); border-radius: var(--radius-sm); }
.rev-metrics { display: flex; gap: 14px; align-items: center; }
.rev-metrics > div { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; font-size: 11px; }
.rev-metrics strong { font-size: 13px; font-variant-numeric: tabular-nums; }

/* Summary boxes (registro revisar) */
.summary-box { background: var(--bg-raised); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 14px; }
.sb-ttl { display: inline-flex; align-items: center; gap: 6px; font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-mute); margin-bottom: 8px; }
.sb-big { font-family: var(--serif); font-size: 22px; letter-spacing: -0.015em; line-height: 1.2; }
.sb-list { display: flex; flex-direction: column; gap: 4px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); font-size: 12.5px; }
.sb-list > div { display: flex; justify-content: space-between; color: var(--text-dim); }

/* ─────────── Empleados ─────────── */
.emp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.emp-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 16px; text-align: left; transition: all 150ms; color: var(--text); box-shadow: var(--shadow-sm); }
.emp-card:hover { transform: translateY(-2px); border-color: var(--accent); }
.emp-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 0; border-top: 1px dashed var(--line); border-bottom: 1px dashed var(--line); }
.emp-meta > div { display: flex; flex-direction: column; gap: 2px; font-size: 11px; }
.emp-meta > div > strong { font-size: 14px; color: var(--text); font-weight: 600; }

/* ─────────── Drawer ─────────── */
.drawer-back { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: opacity 220ms; z-index: 50; }
.drawer-back.open { opacity: 1; pointer-events: auto; }
.drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 500px; max-width: 100vw; background: var(--surface); border-left: 1px solid var(--line); transform: translateX(100%); transition: transform 300ms cubic-bezier(0.32, 0.72, 0, 1); z-index: 60; display: flex; flex-direction: column; box-shadow: var(--shadow-md); }
.drawer.open { transform: translateX(0); }
.drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--line); }
.drawer-body { flex: 1; overflow-y: auto; padding: 24px; }
.drawer-foot { padding: 16px 24px; border-top: 1px solid var(--line); display: flex; gap: 10px; justify-content: flex-end; background: var(--bg-raised); }

/* ─────────── Bar chart ─────────── */
.bar-chart { display: flex; align-items: flex-end; gap: 3px; }
.bar-chart .bar { flex: 1; min-height: 4px; border-radius: 2px 2px 0 0; opacity: 0.85; transition: opacity 120ms; }
.bar-chart .bar:hover { opacity: 1; }

/* ─────────── Modal ─────────── */
.modal-back { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 80; display: grid; place-items: center; padding: 20px; animation: fadein 160ms ease; }
.modal-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); width: 100%; max-width: 480px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; max-height: 90vh; animation: popin 180ms cubic-bezier(0.32, 0.72, 0, 1); }
.modal-card.sm { max-width: 400px; }
.modal-card.lg { max-width: 640px; }
.modal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--line); }
.modal-body { padding: 22px; overflow-y: auto; }
.modal-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 14px 22px; border-top: 1px solid var(--line); background: var(--bg-raised); }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
@keyframes popin { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

/* ─────────── Recurrentes (nómina) ─────────── */
.rec-applied { background: var(--bg-raised); border: 1px dashed var(--line); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 12px; }
.rec-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.rec-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: var(--radius-sm); font-size: 11.5px; border: 1px solid var(--line); background: var(--surface); }
.rec-chip.neg { border-color: color-mix(in oklab, var(--bad) 40%, var(--line)); }
.rec-chip.pos { border-color: color-mix(in oklab, var(--good) 40%, var(--line)); }
.rec-chip-sig { width: 14px; height: 14px; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 10px; }
.rec-chip.neg .rec-chip-sig { background: var(--bad-soft); color: var(--bad); }
.rec-chip.pos .rec-chip-sig { background: var(--good-soft); color: var(--good); }
.rec-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--bg-raised); margin-bottom: 8px; }
.rec-row.edit { display: block; padding: 14px; }
.rec-row-sig { width: 24px; height: 24px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
.rec-row-sig.neg { background: var(--bad-soft); color: var(--bad); }
.rec-row-sig.pos { background: var(--good-soft); color: var(--good); }
.rec-edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 600px) { .rec-edit-grid { grid-template-columns: 1fr; } }

/* ─────────── Sub-componentes (piezas jeringa / gotero) ─────────── */
.subcomp-block { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line); }
.subcomp-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.subcomp-title { display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-mute); }
.subcomp-list { display: flex; flex-direction: column; gap: 4px; }
.subcomp-row { display: flex; align-items: center; gap: 8px; }
.subcomp-name { flex: 1; font-size: 12px; color: var(--text-dim); }

/* ─────────── Detalle de registro ─────────── */
.reg-det-row { padding: 16px 18px; border-bottom: 1px solid var(--line); }
.reg-det-row:last-child { border-bottom: 0; }
.reg-det-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.reg-det-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.reg-det-stat { background: var(--bg-raised); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 10px 12px; display: flex; flex-direction: column; gap: 2px; }
.reg-det-piezas { margin-top: 12px; padding: 12px; background: var(--bg-raised); border: 1px dashed var(--line); border-radius: var(--radius-sm); }
.reg-det-piezas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
.reg-det-pieza { display: flex; flex-direction: column; gap: 1px; }
@media (max-width: 760px) {
  .reg-det-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ─────────── Login ─────────── */
.login-page { min-height: 100vh; display: grid; place-items: center; padding: 20px; background:
  radial-gradient(circle at 20% 30%, var(--accent-soft) 0%, transparent 50%),
  radial-gradient(circle at 80% 70%, var(--info-soft) 0%, transparent 50%),
  var(--bg);
}
.login-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: 36px 32px; box-shadow: var(--shadow-md); }
.login-brand { font-family: var(--serif); font-size: 44px; letter-spacing: -0.02em; line-height: 1; }

/* ─────────── Tweaks panel ─────────── */
.tweaks-panel { position: fixed; right: 20px; bottom: 20px; width: 280px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-md); z-index: 70; }
.tweaks-panel h4 { font-family: var(--serif); font-size: 18px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.tweak-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 12.5px; }
.tweak-swatches { display: flex; gap: 6px; }
.tweak-swatches button { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
.tweak-swatches button.on { border-color: var(--text); }
@media (max-width: 760px) { .tweaks-panel { left: 10px; right: 10px; bottom: 80px; width: auto; } }

  

/* ─────────── Pedidos / Inventario módulos ─────────── */

/* Alias for .tab-bar → behaves like .tabs */
.tab-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 20px; overflow-x: auto; }
.tab-bar .tab { background: transparent; border: 0; padding: 10px 16px; font-size: 13.5px; font-weight: 500; color: var(--text-mute); border-bottom: 2px solid transparent; margin-bottom: -1px; display: inline-flex; gap: 8px; align-items: center; white-space: nowrap; cursor: pointer; }
.tab-bar .tab:hover { color: var(--text-dim); }
.tab-bar .tab.on { color: var(--text); border-bottom-color: var(--accent); }

/* Tables with row hover */
.tbl-hover tbody tr { transition: background 100ms; }
.tbl-hover tbody tr:hover { background: var(--bg-hover); }

/* Reminder pills in pipeline */
.reminder-pill { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 56px; padding: 6px 8px; border-radius: var(--radius-sm); font-family: var(--mono); line-height: 1.2; flex-shrink: 0; }
.reminder-pill strong { font-size: 13px; font-weight: 600; }
.reminder-pill .xs { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.75; }
.reminder-pill.normal   { background: var(--bg-raised); color: var(--text-dim); }
.reminder-pill.proximo  { background: var(--info-soft); color: var(--info); }
.reminder-pill.urgente  { background: var(--warn-soft); color: var(--warn); }
.reminder-pill.atraso   { background: var(--bad-soft); color: var(--bad); }

/* Flow diagram */
.flow { display: flex; align-items: center; justify-content: space-between; gap: 6px; flex-wrap: wrap; }
.flow-node { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; min-width: 70px; }
.flow-bubble { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; font-weight: 700; font-family: var(--mono); font-size: 13px; }
.flow-label { font-size: 11px; color: var(--text-dim); text-align: center; font-weight: 500; }
.flow-arrow { color: var(--text-mute); font-size: 18px; font-weight: 300; }

/* Progress stepper (OC flow) */
.progress-stepper { display: flex; align-items: center; padding: 18px 22px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-md); }
.ps-node { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
.ps-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--bg-raised); color: var(--text-mute); display: grid; place-items: center; font-size: 11px; font-family: var(--mono); font-weight: 600; border: 1px solid var(--line); }
.ps-lbl { font-size: 11px; color: var(--text-mute); font-weight: 500; }
.ps-node.done .ps-dot { background: var(--good); color: var(--bg); border-color: var(--good); }
.ps-node.done .ps-lbl { color: var(--text-dim); }
.ps-node.current .ps-dot { background: var(--accent); color: var(--bg); border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
.ps-node.current .ps-lbl { color: var(--text); font-weight: 600; }
.ps-line { flex: 1; height: 2px; background: var(--bg-raised); margin: 0 6px; margin-bottom: 17px; }
.ps-line.done { background: var(--good); }

/* Info grid inside detail panels */
.info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 16px; }
.info-grid > div { min-width: 0; }
.info-grid .xs.mute { display: block; margin-bottom: 2px; }

/* Totals rows */
.tot-rows { display: flex; flex-direction: column; gap: 6px; }
.tot-rows > div { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 13px; }
.tot-rows .tot-big { padding-top: 10px; margin-top: 4px; border-top: 1px solid var(--line); font-size: 15px; font-weight: 600; }
.tot-rows .tot-big span:last-child { font-size: 18px; color: var(--accent-hi); }

/* panel-flush table adjustments */
.panel-flush .tbl th { padding-left: 18px; }
.panel-flush .tbl th:last-child { padding-right: 18px; }
.panel-flush .tbl td { padding-left: 18px; }
.panel-flush .tbl td:last-child { padding-right: 18px; }


/* ═══════ Clientes module ═══════ */

/* Form grid for client editor */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 16px;
}
.form-grid .field { margin-bottom: 0; }
.form-grid input[type=text],
.form-grid input[type=email],
.form-grid input[type=number],
.form-grid input:not([type]),
.form-grid select,
.form-grid textarea {
  width: 100%;
  background: var(--bg-raised);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 9px 11px;
  font-size: 13.5px;
  color: var(--text);
  font-family: inherit;
  transition: border-color .15s ease, background .15s ease;
}
.form-grid input.mono { font-family: var(--mono); }
.form-grid input:focus,
.form-grid select:focus,
.form-grid textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--surface);
}
.form-grid textarea { resize: vertical; min-height: 60px; line-height: 1.5; }

@media (max-width: 720px) {
  .form-grid { grid-template-columns: 1fr; }
}

/* Layout: list + detail */
.cli-layout {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 16px;
  align-items: flex-start;
}
@media (max-width: 960px) {
  .cli-layout { grid-template-columns: 1fr; }
}

.cli-list {
  position: sticky;
  top: 14px;
  max-height: calc(100vh - 90px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.cli-list-items {
  overflow-y: auto;
  flex: 1;
}

.cli-item {
  display: flex;
  align-items: center;
  gap: 11px;
  width: 100%;
  padding: 11px 14px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  text-align: left;
  cursor: pointer;
  color: inherit;
  transition: background .12s ease;
}
.cli-item:hover { background: var(--bg-hover); }
.cli-item.active {
  background: var(--accent-soft);
  box-shadow: inset 3px 0 0 var(--accent);
}

.cli-item-avatar {
  width: 34px; height: 34px; flex-shrink: 0;
  border-radius: 50%;

  color: var(--accent-hi);
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--line);
}
.cli-item.active .cli-item-avatar {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

.cli-item-body { flex: 1; min-width: 0; }
.cli-item-name {
  font-size: 13.5px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cli-item-meta {
  font-size: 11px;
  color: var(--text-mute);
  margin-top: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.cli-pill-warn {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 99px;
  font-size: 10px;
  font-weight: 500;
  background: var(--warn-soft);

}

/* Search box (reusable) */
.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-raised);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  transition: border-color .15s ease;
}
.search-box:focus-within { border-color: var(--accent); }
.search-box svg { color: var(--text-mute); flex-shrink: 0; }
.search-box input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-size: 13px;
  color: var(--text);
  font-family: inherit;
}

function Btn({ variant = 'default', size, block, className = '', children, ...p }) {
  const cls = ['btn'];

  if (variant === 'ghost') cls.push('ghost');
  if (variant === 'danger') cls.push('danger');
  if (size === 'sm') cls.push('sm');
  if (block) cls.push('block');
  if (className) cls.push(className);
  return <button {...p} className={cls.join(' ')}>{children}</button>;
}

      {hint && <div className="xs mute">{hint}</div>}

  );
}

        {options.map(o => typeof o === 'string'
          ? <option key={o} value={o}>{o}</option>
          : <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </div>
  );
}

function Seg({ options, value, onChange, className = '' }) {
  return (
    <div className={`seg ${className}`}>
      {options.map(o => {
        const v = typeof o === 'string' ? o : o.value;
        const l = typeof o === 'string' ? o : o.label;
        return (
          <button key={v} className={value === v ? 'on' : ''} onClick={() => onChange(v)}>
            {l}
          </button>
        );
      })}
    </div>
  );
}

function Check({ checked, onChange, children }) {
  return (
    <label className="check">

      <span>{children}</span>

}

            {deltaDir === 'up' && <Icon name="trend_up" size={12} />}
            {deltaDir === 'down' && <Icon name="trend_down" size={12} />}
            {delta}
          </div>
        )}
      </div>
      {spark && <div className="kpi-spark">{spark}</div>}
    </div>
  );
}

// Mini bar chart (pure divs)
function Bars({ data, color = 'var(--accent)', height = 72, className = '' }) {
  const max = Math.max(...data, 1);
  return (
    <div className={`bar-chart ${className}`} style={{ height }}>
      {data.map((v, i) => (
        <div key={i} className="bar" style={{ height: `${Math.max(4, (v / max) * 100)}%`, background: color }} />
      ))}
    </div>
  );
}

// SVG line chart
function LineChart({ series, labels, height = 220, colors, yFmt = (v) => v, showPoints = true }) {
  const ref = useRef(null);
  const [w, setW] = useState(600);
  useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(entries => setW(entries[0].contentRect.width));
    ro.observe(ref.current);
    return () => ro.disconnect();
  }, []);
  const padL = 46, padR = 16, padT = 16, padB = 30;
  const all = series.flatMap(s => s.data);
  const min = Math.min(...all);
  const max = Math.max(...all);
  const range = max - min || 1;
  const ymin = min - range * 0.15;
  const ymax = max + range * 0.15;
  const xStep = (w - padL - padR) / Math.max(labels.length - 1, 1);
  const y = v => padT + (height - padT - padB) * (1 - (v - ymin) / (ymax - ymin));
  const x = i => padL + i * xStep;
  const defaultColors = ['var(--accent)', 'var(--warn)', 'var(--good)', 'var(--info)'];
  const palette = colors || defaultColors;

  // y-axis ticks
  const ticks = 4;
  const tickVals = Array.from({length: ticks}, (_, i) => ymin + (ymax - ymin) * (i / (ticks - 1)));

  return (
    <div ref={ref} style={{ width: '100%' }}>
      <svg width={w} height={height} style={{ overflow: 'visible' }}>
        {/* grid */}
        {tickVals.map((v, i) => (
          <g key={i}>
            <line x1={padL} x2={w - padR} y1={y(v)} y2={y(v)} stroke="var(--line)" strokeDasharray="3 4" />
            <text x={padL - 8} y={y(v)} textAnchor="end" dominantBaseline="middle" fontSize="10" fill="var(--text-mute)" fontFamily="var(--mono)">
              {yFmt(v)}
            </text>
          </g>
        ))}
        {/* x labels */}
        {labels.map((l, i) => (
          <text key={i} x={x(i)} y={height - 8} textAnchor="middle" fontSize="10" fill="var(--text-mute)">{l}</text>
        ))}
        {/* lines */}
        {series.map((s, si) => {
          const color = s.color || palette[si % palette.length];
          const path = s.data.map((v, i) => `${i === 0 ? 'M' : 'L'} ${x(i)} ${y(v)}`).join(' ');
          const areaPath = path + ` L ${x(s.data.length - 1)} ${y(ymin)} L ${x(0)} ${y(ymin)} Z`;
          return (
            <g key={si}>
              {s.area !== false && (
                <path d={areaPath} fill={color} opacity="0.1" />
              )}
              <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
              {showPoints && s.data.map((v, i) => (
                <circle key={i} cx={x(i)} cy={y(v)} r="3.5" fill="var(--bg)" stroke={color} strokeWidth="2" />
              ))}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function Modal({ open, onClose, title, children, footer, size = 'md' }) {
  useEffect(() => {
    if (open) document.body.style.overflow = 'hidden';
    else document.body.style.overflow = '';
    return () => { document.body.style.overflow = ''; };
  }, [open]);
  if (!open) return null;
  return (
    <div className="modal-back" onClick={onClose}>
      <div className={`modal-card ${size}`} onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div style={{ fontFamily: 'var(--serif)', fontSize: 22, letterSpacing: '-0.01em' }}>{title}</div>
          <Btn variant="ghost" size="sm" onClick={onClose}><Icon name="x" size={16}/></Btn>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-foot">{footer}</div>}
      </div>
    </div>
  );
}

function Drawer({ open, onClose, title, children, footer }) {
  useEffect(() => {
    if (open) document.body.style.overflow = 'hidden';
    else document.body.style.overflow = '';
    return () => { document.body.style.overflow = ''; };
  }, [open]);
  return (
    <>
      <div className={`drawer-back ${open ? 'open' : ''}`} onClick={onClose} />
      <aside className={`drawer ${open ? 'open' : ''}`}>
        <div className="drawer-head">
          <div style={{ fontFamily: 'var(--serif)', fontSize: 24, letterSpacing: '-0.01em' }}>{title}</div>
          <Btn variant="ghost" size="sm" onClick={onClose}><Icon name="x" size={16} /></Btn>
        </div>
        <div className="drawer-body">{children}</div>
        {footer && <div className="drawer-foot">{footer}</div>}
      </aside>
    </>
  );
}

// Section helpers
function PanelHead({ title, sub, right }) {
  return (
    <div className="panel-head">
      <div>
        <h3 className="panel-title">{title}</h3>
        {sub && <div className="panel-sub">{sub}</div>}
      </div>
      {right}
    </div>
  );
}

function Eyebrow({ children }) { return <div className="eyebrow">{children}</div>; }

Object.assign(window, {
  Icon, Btn, Chip, Input, NumInput, Select, Seg, Check, Toggle, Kpi,
  Bars, LineChart, Drawer, Modal, PanelHead, Eyebrow,
});


</script>

function sparkPath(data, w, h) {
  const min = Math.min(...data), max = Math.max(...data);
  const r = max - min || 1;
  const step = w / (data.length - 1);
  return data.map((v, i) => `${i ? 'L' : 'M'} ${i * step} ${h - ((v - min) / r) * (h - 6) - 3}`).join(' ');
}

// Nómina: 3-step flow (Subir → Revisar horas → Sueldos)

function Nomina({ setPage }) {
  const [step, setStep] = useState(0);
  const [periodoId, setPeriodoId] = useState(LATEST_PERIODO || '');

  const hist = NOMINA_HISTORICA.find(h => h.id === periodoId);

  const steps = [

    { label: 'Revisar horas', sub: 'Corregir anomalías antes de calcular' },
    { label: 'Calcular sueldos', sub: 'Nómina final con extras y descuentos' },
  ];

  function selectPeriodo(id) {
    setPeriodoId(id);
    setStep(1);
  }

  return (
    <div className="fadein">
      <div className="page-head">
        <div>
          <Eyebrow>Personal · Nómina · {periodoLabel}</Eyebrow>
